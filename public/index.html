<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Danumes – Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-bg"></div>

  <!-- Модальное окно входа / регистрации -->
  <div id="login-modal" class="modal-overlay">
    <div class="modal-card">
      <h2 id="modal-title">Вход</h2>
      <p class="modal-subtitle" id="modal-subtitle">Войдите в аккаунт</p>
      <input type="text" id="username-input" class="glass-input" placeholder="Логин" autocomplete="username">
      <input type="password" id="password-input" class="glass-input" placeholder="Пароль" autocomplete="current-password">
      <div id="error-msg" class="error-msg"></div>
      <button id="submit-btn" class="btn-primary">Войти</button>
      <p class="toggle-text">
        <span id="toggle-mode-text">Нет аккаунта?</span> <a href="#" id="toggle-mode-link">Зарегистрироваться</a>
      </p>
    </div>
  </div>

  <!-- Модальное окно профиля (свой / собеседника) -->
  <div id="profile-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card profile-card">
      <button class="modal-close icon-btn" id="close-profile">✕</button>
      <div class="profile-avatar" id="profile-avatar">?</div>
      <h2 id="profile-name">username</h2>
      <p class="profile-status" id="profile-status-text">В сети</p>

      <!-- Блок для своего профиля (смена пароля, выход) -->
      <div id="self-profile-actions" class="profile-actions">
        <button id="change-password-btn" class="btn-secondary">Сменить пароль</button>
        <button id="logout-btn" class="btn-danger">Выйти</button>
      </div>
      <div id="change-password-form" style="display: none;">
        <input type="password" id="old-password" class="glass-input" placeholder="Старый пароль">
        <input type="password" id="new-password" class="glass-input" placeholder="Новый пароль">
        <div id="profile-error" class="error-msg"></div>
        <button id="save-password-btn" class="btn-primary">Сохранить</button>
      </div>

      <!-- Блок для профиля собеседника (кнопка назад к чату) -->
      <div id="contact-profile-actions" style="display: none;">
        <button id="back-to-chat-btn" class="btn-secondary">← Назад к чату</button>
      </div>
    </div>
  </div>

  <!-- Основной интерфейс -->
  <div id="app" class="app-container" style="display: none;">
    <!-- Сайдбар -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="current-user" id="current-user-area">
          <div class="avatar" id="sidebar-avatar">?</div>
          <span class="sidebar-username" id="sidebar-username">User</span>
        </div>
        <button id="refresh-contacts" class="icon-btn" title="Обновить контакты">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-contacts" class="glass-input search-input" placeholder="Поиск...">
      </div>
      <div id="contacts-list" class="contacts-list"></div>
    </aside>

    <!-- Область переписки -->
    <main id="chat-area" class="chat-area">
      <header class="chat-header">
        <button id="back-btn" class="icon-btn back-btn" aria-label="Назад">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="avatar chat-avatar-clickable" id="chat-avatar">?</div>
        <div class="chat-header-text" id="chat-header-info-clickable">
          <h3 id="chat-name">Выберите чат</h3>
          <span id="chat-status" class="status">офлайн</span>
        </div>
        <button class="icon-btn" aria-label="Меню">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </header>

      <div id="messages-container" class="messages-container">
        <div id="messages-list" class="messages-list"></div>
        <button id="scroll-bottom" class="scroll-bottom-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>

      <div class="composer">
        <button id="emoji-btn" class="icon-btn">😊</button>
        <button id="attach-btn" class="icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="text" id="message-input" class="message-input" placeholder="Сообщение..." autocomplete="off">
        <button id="mic-btn" class="icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button id="send-btn" class="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
