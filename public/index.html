<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Danumes – Liquid Glass</title>
  
  <!-- PWA-метатеги -->
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
  
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-bg"></div>

  <!-- Логин -->
  <div id="login-modal" class="modal-overlay">
    <div class="modal-card">
      <h2 id="modal-title">Вход</h2>
      <p id="modal-sub" class="modal-sub">Войдите в аккаунт</p>
      <input id="login-username" class="glass-input" placeholder="Логин" autocomplete="username" maxlength="15">
      <input id="login-password" type="password" class="glass-input" placeholder="Пароль" autocomplete="current-password">
      <div id="login-error" class="error-msg"></div>
      <button id="login-btn" class="btn-primary">Войти</button>
      <p id="toggle-text" class="toggle-text">
        Нет аккаунта? <a href="#" id="toggle-link">Зарегистрироваться</a>
      </p>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile-modal" class="modal-overlay" style="display:none">
    <div class="modal-card profile-card">
      <button class="modal-close icon-btn" id="close-profile">✕</button>
      <div class="big-avatar" id="profile-avatar">?</div>
      <h2 id="profile-name">user</h2>
      <p class="profile-status">В сети</p>
      <div id="self-actions" class="profile-actions">
        <button id="logout-btn" class="btn-danger">Выйти</button>
      </div>
      <div id="contact-actions" style="display:none">
        <button id="back-btn-profile" class="btn-secondary">← Назад к чату</button>
      </div>
    </div>
  </div>

  <!-- Редактор сообщений -->
  <div id="edit-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h2>Редактировать сообщение</h2>
      <textarea id="edit-textarea" class="glass-input" style="height:100px;resize:none;" maxlength="2000"></textarea>
      <div id="edit-error" class="error-msg"></div>
      <div style="display:flex;gap:8px;">
        <button id="cancel-edit-btn" class="btn-secondary">Отмена</button>
        <button id="save-edit-btn" class="btn-primary">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Создание группы/канала -->
  <div id="create-modal" class="modal-overlay" style="display:none">
    <div class="modal-card group-modal-card">
      <button class="modal-close icon-btn" id="close-create">✕</button>
      <h2 id="create-title">Новая группа</h2>
      <input id="entity-name" class="glass-input" placeholder="Название" maxlength="20">
      <p id="members-label" class="modal-sub" style="margin-top:12px">Выберите участников</p>
      <div id="members-list" class="members-list"></div>
      <button id="create-btn" class="btn-primary" style="margin-top:16px">Создать</button>
    </div>
  </div>

  <!-- Меню плюса -->
  <div id="plus-modal" class="modal-overlay" style="display:none">
    <div class="modal-card plus-menu-modal">
      <button class="modal-close icon-btn" id="close-plus">✕</button>
      <h2>Создать</h2>
      <div class="plus-menu-options">
        <button id="menu-group-btn" class="plus-option-btn"><span>👥</span> Группу</button>
        <button id="menu-channel-btn" class="plus-option-btn"><span>📢</span> Канал</button>
      </div>
    </div>
  </div>

  <!-- Настройки -->
  <div id="settings-modal" class="modal-overlay" style="display:none">
    <div class="modal-card settings-card">
      <button class="modal-close icon-btn" id="close-settings">✕</button>
      <h2>Настройки</h2>
      <label class="settings-label">Никнейм (макс. 15 символов)</label>
      <input id="settings-nickname" class="glass-input" placeholder="Новый никнейм" maxlength="15">
      <label class="settings-label">Тема</label>
      <div id="theme-grid" class="theme-grid"></div>
      <label class="settings-label">Сменить пароль</label>
      <input id="settings-old-pass" type="password" class="glass-input" placeholder="Старый пароль">
      <input id="settings-new-pass" type="password" class="glass-input" placeholder="Новый пароль">
      <div id="settings-pass-error" class="error-msg"></div>
      <button id="save-settings-btn" class="btn-primary">Сохранить</button>
    </div>
  </div>

  <!-- Контекстное меню -->
  <div id="context-menu" class="context-menu" style="display:none">
    <div class="context-item" id="context-copy">📋 Копировать</div>
    <div class="context-item" id="context-reply">↩️ Ответить</div>
    <div class="context-item" id="context-edit">✏️ Редактировать</div>
    <div class="context-item" id="context-delete">🗑️ Удалить</div>
    <div class="context-item" id="context-reactions">😀 Реакции</div>
  </div>

  <!-- Панель ответа -->
  <div id="reply-bar" class="reply-bar" style="display:none">
    <span id="reply-text"></span>
    <button id="reply-cancel" class="icon-btn">✕</button>
  </div>

  <!-- Пикер реакций -->
  <div id="reactions-picker" class="reactions-picker" style="display:none"></div>

  <!-- Основной интерфейс -->
  <div id="app" class="app-container" style="display:none">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="user-info" id="user-info">
          <div class="avatar" id="my-avatar">?</div>
          <span id="my-name" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">User</span>
        </div>
        <div style="display:flex;gap:4px;">
          <button id="settings-btn" class="icon-btn" title="Настройки">⚙️</button>
          <button id="plus-btn" class="icon-btn plus-btn" title="Создать">+</button>
        </div>
      </div>
      <div class="search-wrap">
        <input id="search" class="glass-input search-input" placeholder="Поиск контактов...">
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <main id="chat" class="chat">
      <header class="chat-head">
        <button id="back-btn" class="icon-btn back-btn">←</button>
        <div class="avatar" id="chat-avatar">?</div>
        <div class="chat-info" id="chat-info" style="max-width:200px;overflow:hidden;">
          <h3 id="chat-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Выберите чат</h3>
          <span id="chat-status" class="status">офлайн</span>
        </div>
        <button id="chat-menu-btn" class="icon-btn" title="Меню">⋯</button>
      </header>

      <div id="chat-menu" class="chat-menu" style="display:none">
        <div class="context-item" id="chat-menu-search">🔍 Поиск по сообщениям</div>
      </div>

      <div id="messages-box" class="messages-box">
        <div id="messages" class="messages"></div>
      </div>
      <div id="composer" class="composer">
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <button id="attach-btn" class="icon-btn" title="Прикрепить файл">📎</button>
        <input id="msg-input" class="message-input" placeholder="Сообщение..." maxlength="2000">
        <button id="send-btn" class="send-btn">↑</button>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
  
  <!-- Регистрация Service Worker для PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
