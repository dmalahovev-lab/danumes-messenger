<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram v27 Liquid</title>
    <style>
        /* ИДЕАЛЬНЫЕ ШРИФТЫ И СБРОС iOS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, SF Pro Text, SF Pro Rounded, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: #0e0f14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* КОНТЕЙНЕР СМАРТФОНА С ОРИГИНАЛЬНЫМИ ОБОЯМИ TG */
        .phone-wrapper {
            position: relative;
            width: 100%;
            max-width: 390px;
            height: 84vh;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 44px;
            box-shadow: 0 25px 65px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            /* Фирменный темный фон Telegram с едва заметными узорами blobs */
            background-color: #10141a; 
        }

        /* ЖИДКИЕ СФЕРЫ ДЛЯ LIQUID GLASS */
        .liquid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            animation: float 14s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 260px;
            height: 260px;
            background: linear-gradient(135px, #007aff, #00ffcc);
            top: 15%;
            left: -15%;
        }

        .blob-2 {
            width: 320px;
            height: 320px;
            background: linear-gradient(135px, #ff007f, #7000ff);
            bottom: 20%;
            right: -15%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 40px) scale(1.1); }
        }

        /* ГЛАВНЫЙ ЭКРАН ТЕЛЕГРАМА */
        .chat-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(16, 20, 26, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* ШАПКА ЧАТА (Один в один как в оригинале iOS TG) */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(23, 30, 38, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        .header-btn {
            background: none;
            border: none;
            color: #248bfe;
            font-size: 16px;
            cursor: pointer;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-btn:active { opacity: 0.6; }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .user-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.2px;
        }

        .status {
            font-size: 12px;
            color: #52a7ff;
            font-weight: 400;
            margin-top: 1px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135px, #2a9df4, #1167b1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            color: #fff;
        }

        /* ЛЕНТА С ПРАВИЛЬНЫМИ ОБЛАЧКАМИ И ОТСТУПАМИ */
        .chat-messages {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ИДЕАЛЬНЫЙ ДИЗАЙН ОБЛАЧЕК TELEGRAM */
        .message {
            max-width: 72%;
            padding: 8px 14px 6px 14px;
            font-size: 15px;
            line-height: 1.35;
            position: relative;
            display: inline-block;
            word-wrap: break-word;
            animation: appendMsg 0.15s ease-out;
        }

        @keyframes appendMsg {
            from { transform: translateY(5px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .message.incoming {
            background: #182533;
            color: #fff;
            align-self: flex-start;
            border-radius: 16px 16px 16px 4px;
            border: 0.5px solid rgba(255, 255, 255, 0.04);
        }

        .message.outgoing {
            background: #2b5278; /* Родной цвет исходящих в темной теме TG */
            color: #fff;
            align-self: flex-end;
            border-radius: 16px 16px 4px 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Контейнер для выравнивания времени справа внизу текста */
        .msg-meta {
            display: inline-flex;
            align-items: center;
            float: right;
            margin-left: 12px;
            margin-top: 4px;
            position: relative;
            bottom: -2px;
        }

        .msg-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .msg-status {
            font-size: 10px;
            color: #52a7ff;
            margin-left: 3px;
            font-weight: bold;
        }

        /* НИЖНЯЯ ПАНЕЛЬ ВВОДА TG iOS */
        .chat-input-area {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(23, 30, 38, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 60px; /* строго над таббаром */
        }

        .input-action-btn {
            background: none;
            border: none;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #8e8e93;
            cursor: pointer;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            background: #10141a;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
        }

        #message-input {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            outline: none;
            font-size: 15.5px;
        }

        #message-input::placeholder {
            color: #707579;
        }

        #send-btn {
            background: #248bfe;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        #send-btn:active { transform: scale(0.9); }

        /* ТАБ-БАР (КОПИЯ С iOS ТЕЛЕГРАМА) */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(23, 30, 38, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 6px;
            z-index: 10;
        }

        .tab-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #707579;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
            width: 33%;
            height: 100%;
            justify-content: center;
            gap: 2px;
        }

        .tab-item.active {
            color: #248bfe;
        }

        .tab-icon {
            font-size: 21px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <!-- Анимированные сферы перемещены на корректную подложку -->
        <div class="liquid-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="chat-container">
            <!-- Оригинальная шапка Telegram -->
            <header class="chat-header">
                <button class="header-btn" id="back-btn">🔍</button>
                <div class="user-info" id="user-profile-trigger">
                    <h2>Test</h2>
                    <span class="status">в сети</span>
                </div>
                <div class="avatar">T</div>
            </header>

            <!-- Лента сообщений -->
            <main class="chat-messages" id="messages">
