<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram v27 Liquid</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Жидкий анимированный фон под стеклом -->
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Основной контейнер iPhone -->
    <div class="phone-wrapper">
        <div class="chat-container">
            
            <!-- Шапка чата (Личные сообщения с Test) -->
            <header class="chat-header">
                <button class="header-btn" id="back-btn">◀ Назад</button>
                <div class="user-info">
                    <div class="avatar">T</div>
                    <div class="user-meta">
                        <h2>Test</h2>
                        <span class="status">в сети</span>
                    </div>
                </div>
                <button class="header-btn" id="call-btn">📞</button>
            </header>

            <!-- Окно сообщений -->
            <main class="chat-messages" id="messages">
                <div class="message incoming">
                    <span class="msg-text">Привет! Это твой мессенджер Telegram v27? Выглядит круто!</span>
                    <span class="msg-time">23:35</span>
                </div>
            </main>

            <!-- Рабочая панель ввода сообщения -->
            <form class="chat-input-area" id="chat-form">
                <button type="button" class="input-action-btn">📎</button>
                <input type="text" id="message-input" placeholder="Сообщение" autocomplete="off" required>
                <button type="submit" id="send-btn">➔</button>
            </form>

            <!-- Плавающий нижний Таб-бар -->
            <nav class="tab-bar">
                <button class="tab-item" id="tab-contacts">
                    <span class="tab-icon">👤</span>
                    <span class="tab-label">Контакты</span>
                </button>
                <button class="tab-item active" id="tab-chats">
                    <span class="tab-icon">💬</span>
                    <span class="tab-label">Чаты</span>
                </button>
                <button class="tab-item" id="tab-settings">
                    <span class="tab-icon">⚙️</span>
                    <span class="tab-label">Настройки</span>
                </button>
            </nav>

        </div>
    </div>
</body>
</html>
