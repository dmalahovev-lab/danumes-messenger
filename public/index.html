<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danumes</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ВХОД -->
  <div id="loginPage">
    <div style="max-width:400px;margin:100px auto;padding:20px;text-align:center;">
      <h1>Danumes</h1>
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Username" style="width:100%;padding:10px;margin:5px 0;">
        <input type="password" id="loginPassword" placeholder="Password" style="width:100%;padding:10px;margin:5px 0;">
        <button type="submit" style="width:100%;padding:10px;background:#27A5E7;color:white;border:none;border-radius:8px;">Войти</button>
      </form>
      <p><a href="#" id="showRegister">Регистрация</a></p>
      <div id="loginError" style="color:red;margin-top:10px;"></div>
    </div>
  </div>

  <!-- РЕГИСТРАЦИЯ -->
  <div id="registerPage" style="display:none;">
    <div style="max-width:400px;margin:100px auto;padding:20px;text-align:center;">
      <h1>Danumes</h1>
      <form id="registerForm">
        <input type="text" id="registerUsername" placeholder="Username" style="width:100%;padding:10px;margin:5px 0;">
        <input type="email" id="registerEmail" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;">
        <input type="password" id="registerPassword" placeholder="Password" style="width:100%;padding:10px;margin:5px 0;">
        <button type="submit" style="width:100%;padding:10px;background:#27A5E7;color:white;border:none;border-radius:8px;">Зарегистрироваться</button>
      </form>
      <p><a href="#" id="showLogin">Войти</a></p>
      <div id="registerError" style="color:red;margin-top:10px;"></div>
    </div>
  </div>

  <!-- МЕССЕНДЖЕР -->
  <div id="app" style="display:none;">
    <div style="display:flex;height:100vh;">
      <div style="width:300px;border-right:1px solid #ddd;padding:10px;overflow-y:auto;">
        <h2>Danumes</h2>
        <input type="text" id="searchInput" placeholder="Поиск..." style="width:100%;padding:8px;margin:10px 0;">
        <button id="logoutBtn" style="margin:10px 0;padding:5px 10px;">Выйти</button>
        <div id="chatList"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;">
        <div style="padding:10px;border-bottom:1px solid #ddd;">
          <span id="chatUserName">Выберите чат</span>
        </div>
        <div id="messages" style="flex:1;overflow-y:auto;padding:10px;"></div>
        <div style="display:flex;padding:10px;border-top:1px solid #ddd;">
          <input type="text" id="messageInput" placeholder="Сообщение..." style="flex:1;padding:8px;">
          <button id="sendBtn" style="padding:8px 16px;background:#27A5E7;color:white;border:none;border-radius:8px;">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
