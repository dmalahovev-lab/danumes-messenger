<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram v27 Liquid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .phone-wrapper {
            position: relative;
            width: 100%;
            max-width: 390px;
            height: 84vh;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            background: #0f1218;
        }

        .liquid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.4;
            animation: float 12s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135px, #007aff, #00ffcc);
            top: 10%;
            left: -15%;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135px, #ff007f, #7000ff);
            bottom: 15%;
            right: -15%;
            animation-delay: -4s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 50px) scale(1.1); }
        }

        .chat-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(15, 18, 24, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(22, 27, 36, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-btn {
            background: none;
            border: none;
            color: #248bfe;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .user-info h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .status {
            font-size: 11px;
            color: #52a7ff;
            margin-top: 2px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135px, #2a9df4, #1167b1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            padding: 16px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 72%;
            padding: 8px 14px;
            font-size: 14.5px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            animation: showMsg 0.15s ease-out;
        }

        @keyframes showMsg {
            from { transform: translateY(5px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .message.incoming {
            background: #182533;
            align-self: flex-start;
            border-radius: 16px 16px 16px 4px;
        }

        .message.outgoing {
            background: #2b5278;
            align-self: flex-end;
            border-radius: 16px 16px 4px 16px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .msg-status {
            font-size: 10px;
            color: #52a7ff;
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(22, 27, 36, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 60px;
        }

        .input-action-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #8e8e93;
            cursor: pointer;
        }

        .input-wrapper {
            flex: 1;
            background: #10141a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 6px 12px;
        }

        #message-input {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            outline: none;
            font-size: 15px;
        }

        #send-btn {
            background: #248bfe;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(22, 27, 36, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 6px;
        }

        .tab-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #707579;
            cursor: pointer;
            font-size: 10px;
            width: 33%;
            height: 100%;
            justify-content: center;
            gap: 2px;
        }

        .tab-item.active {
            color: #248bfe;
        }

        .tab-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="liquid-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="chat-container">
            <header class="chat-header">
                <button class="header-btn" id="back-btn">Поиск</button>
                <div class="user-info" id="user-profile">
                    <h2>Test</h2>
                    <span class="status">в сети</span>
                </div>
                <div class="avatar">T</div>
            </header>

            <main class="chat-messages" id="messages">
                <div class="message incoming">
                    Привет! Теперь код полностью чистый. Проверяй отправку сообщений и кликай по кнопкам!
                    <div class="msg-meta">
                        <span class="msg-time">00:05</span>
                    </div>
                </div>
            </main>

            <form class="chat-input-area" id="chat-form">
                <button type="button" class="input-action-btn" id="clip-btn">📎</button>
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Сообщение" autocomplete="off" required>
                </div>
                <button type="submit" id="send-btn">➔</button>
            </form>

            <nav class="tab-bar">
                <button type="button" class="tab-item" id="tab-contacts">
                    <span class="tab-icon">👤</span>
                    <span class="tab-label">Контакты</span>
                </button>
                <button type="button" class="tab-item active" id="tab-chats">
                    <span class="tab-icon">💬</span>
                    <span class="tab-label">Чаты</span>
                </button>
                <button type="button" class="tab-item" id="tab-settings">
                    <span class="tab-icon">⚙️</span>
                    <span class="tab-label">Настройки</span>
                </button>
            </nav>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const socketUrl = protocol + window.location.host;
        let socket;
        const myToken = Math.random().toString(36).substring(2, 10);

        function connectWebSocket() {
            socket = new WebSocket(socketUrl);
            
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.senderToken !== myToken) {
                        displayMessage(data.text, 'incoming');
                    }
                } catch(e) {
                    console.log("Данные:", event.data);
                }
            };

            socket.onclose = () => {
setTimeout(connectWebSocket, 2000);};}const chatForm = document.getElementById('chat-form');const messageInput = document.getElementById('message-input');const messagesContainer = document.getElementById('messages');chatForm.addEventListener('submit', (e) => {e.preventDefault();const text = messageInput.value.trim();if (!text) return;const messageData = {text: text,senderToken: myToken};if (socket && socket.readyState === WebSocket.OPEN) {socket.send(JSON.stringify(messageData));}displayMessage(text, 'outgoing');messageInput.value = '';messageInput.focus();});function displayMessage(text, type) {const messageEl = document.createElement('div');messageEl.classList.add('message', type);const now = new Date();const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');if (type === 'outgoing') {messageEl.innerHTML = <span class="msg-text"></span> <div class="msg-meta"> <span class="msg-time">${timeStr}</span> <span class="msg-status">✓✓</span> </div>;} else {messageEl.innerHTML = <span class="msg-text"></span> <div class="msg-meta"> <span class="msg-time">${timeStr}</span> </div>;}messageEl.querySelector('.msg-text').innerText = text;messagesContainer.appendChild(messageEl);messagesContainer.scrollTop = messagesContainer.scrollHeight;}// РАБОТА КНОПОКdocument.getElementById('back-btn').addEventListener('click', () => alert('Поиск запущен'));document.getElementById('user-profile').addEventListener('click', () => alert('Профиль пользователя Test'));document.getElementById('clip-btn').addEventListener('click', () => alert('Выбор файлов'));const tabs = document.querySelectorAll('.tab-item');tabs.forEach(tab => {tab.addEventListener('click', () => {tabs.forEach(t => t.classList.remove('active'));tab.classList.add('active');alert('Переход в раздел: ' + tab.querySelector('.tab-label').innerText);});});connectWebSocket();
