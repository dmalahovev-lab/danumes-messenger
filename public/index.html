<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>Danumes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
</head>
<body>
  <!-- ===== СТРАНИЦА ВХОДА ===== -->
  <div id="loginPage" class="auth-page">
    <div class="auth-container">
      <div class="auth-box">
        <h1>Danumes</h1>
        <p class="subtitle">Войдите в аккаунт</p>
        <form id="loginForm">
          <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
          </div>
          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="Пароль" required>
          </div>
          <button type="submit">Войти</button>
        </form>
        <p class="auth-footer">Нет аккаунта? <a href="#" id="showRegister">Регистрация</a></p>
      </div>
    </div>
  </div>

  <!-- ===== СТРАНИЦА РЕГИСТРАЦИИ ===== -->
  <div id="registerPage" class="auth-page" style="display:none">
    <div class="auth-container">
      <div class="auth-box">
        <h1>Danumes</h1>
        <p class="subtitle">Создайте аккаунт</p>
        <form id="registerForm">
          <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" id="registerUsername" placeholder="Имя пользователя" required>
          </div>
          <div class="input-group">
            <span class="icon">📧</span>
            <input type="email" id="registerEmail" placeholder="Email" required>
          </div>
          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" id="registerPassword" placeholder="Пароль" required>
          </div>
          <button type="submit">Зарегистрироваться</button>
        </form>
        <p class="auth-footer">Уже есть аккаунт? <a href="#" id="showLogin">Войти</a></p>
      </div>
    </div>
  </div>

  <!-- ===== ОСНОВНОЙ ИНТЕРФЕЙС ===== -->
  <div id="app" class="app-container" style="display:none">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <h2>Danumes</h2>
        <button id="logoutBtn" class="logout-btn" title="Выйти">✕</button>
      </div>

      <div class="user-profile" id="userProfile">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-info">
          <div class="user-name" id="userName">Пользователь</div>
          <div class="user-status" id="userStatus">В сети</div>
        </div>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Поиск...">
        <div id="searchResults" class="search-results" style="display:none"></div>
      </div>

      <!-- Заявки в друзья -->
      <div class="friend-requests-section" id="friendRequestsSection">
        <div class="friend-requests-header" id="friendRequestsToggle">
          <span>📩 Заявки в друзья</span>
          <span class="badge" id="friendRequestsBadge" style="display:none">0</span>
        </div>
        <div id="pendingRequestsList" style="display:none"></div>
      </div>

      <div id="chatList" class="chat-list"></div>
    </aside>

    <main id="chatArea" class="chat-area">
      <div class="chat-header" id="chatHeader">
        <button class="back-btn" id="backBtn" style="display:none">←</button>
        <div class="chat-user-info">
          <div class="chat-user-avatar" id="chatUserAvatar">👤</div>
          <div>
            <div class="chat-user-name" id="chatUserName">Выберите чат</div>
            <div class="chat-user-status" id="chatUserStatus"></div>
          </div>
        </div>
        <button class="chat-actions-btn" id="chatActionsBtn">⋯</button>
      </div>

      <div id="messagesContainer" class="messages-container">
        <div id="messages" class="messages"></div>
      </div>

      <div class="input-area" id="inputArea">
        <button class="attach-btn" id="attachBtn">📎</button>
        <button class="emoji-btn" id="emojiBtn">😊</button>
        <input type="text" id="messageInput" placeholder="Сообщение...">
        <button class="voice-btn" id="voiceBtn">🎤</button>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </main>
  </div>

  <!-- ===== МОДАЛКА НАСТРОЕК / ОФОРМЛЕНИЯ ПРОФИЛЯ ===== -->
  <div id="settingsModal" class="modal" style="display:none">
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>⚙️ Настройки</h2>
          <button class="modal-close" id="settingsClose">✕</button>
        </div>
        <div class="modal-body">
          <form id="settingsForm">
            <div class="form-group">
              <label>Аватар</label>
              <div id="emojiGrid" class="emoji-grid"></div>
            </div>
            <div class="form-group">
              <label>Отображаемое имя</label>
              <input type="text" id="settingsDisplayName" placeholder="Как вас видеть">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="settingsEmail" placeholder="Email">
            </div>
            <div class="form-group">
              <label>Пол</label>
              <select id="settingsGender">
                <option value="">Не указан</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
              </select>
            </div>
            <div class="form-group">
              <label>О себе</label>
              <textarea id="settingsBio" placeholder="Расскажите о себе..."></textarea>
            </div>
            <div class="form-group">
              <label>Видимость</label>
              <div class="visibility-options">
                <label><input type="checkbox" id="visibilityEmail"> Показывать email</label>
                <label><input type="checkbox" id="visibilityGender"> Показывать пол</label>
                <label><input type="checkbox" id="visibilityBio"> Показывать описание</label>
              </div>
            </div>
            <div class="form-group">
              <label>Тема</label>
              <div class="theme-selector" id="themeSelector">
                <button data-theme="blue" class="active" style="background:#4A6CF7"></button>
                <button data-theme="green" style="background:#4CAF50"></button>
                <button data-theme="purple" style="background:#9C27B0"></button>
                <button data-theme="sunset" style="background:#FF6B35"></button>
                <button data-theme="ocean" style="background:#00897B"></button>
              </div>
            </div>
            <button type="submit" class="save-btn">💾 Сохранить</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== МОДАЛКА ПРОСМОТРА ИЗОБРАЖЕНИЙ ===== -->
  <div id="imageModal" class="modal" style="display:none">
    <div class="modal-overlay">
      <div class="modal-content image-modal">
        <button class="modal-close" id="imageModalClose">✕</button>
        <img id="modalImage" src="" alt="Изображение">
      </div>
    </div>
  </div>

  <!-- ===== КОНТЕКСТНОЕ МЕНЮ ===== -->
  <div id="contextMenu" class="context-menu" style="display:none">
    <div class="context-menu-item" data-action="add-friend">👤 Добавить в друзья</div>
    <div class="context-menu-item" data-action="remove-friend" style="display:none">❌ Удалить из друзей</div>
    <div class="context-menu-item" data-action="view-profile">👁️ Профиль</div>
    <div class="context-menu-item" data-action="start-chat">💬 Начать чат</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
