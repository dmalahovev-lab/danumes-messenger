<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>Danumes - Мессенджер</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ===== СТРАНИЦА ВХОДА ===== -->
  <div id="loginPage" class="auth-page">
    <div class="auth-container">
      <div class="auth-box">
        <h1>💬 Danumes</h1>
        <p>Войдите в аккаунт</p>
        <form id="loginForm">
          <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
          <input type="password" id="loginPassword" placeholder="Пароль" required>
          <button type="submit">Войти</button>
        </form>
        <p>Нет аккаунта? <a href="#" id="showRegister">Регистрация</a></p>
      </div>
    </div>
  </div>

  <!-- ===== СТРАНИЦА РЕГИСТРАЦИИ ===== -->
  <div id="registerPage" class="auth-page" style="display:none">
    <div class="auth-container">
      <div class="auth-box">
        <h1>💬 Danumes</h1>
        <p>Создайте аккаунт</p>
        <form id="registerForm">
          <input type="text" id="registerUsername" placeholder="Имя пользователя" required>
          <input type="email" id="registerEmail" placeholder="Email" required>
          <input type="password" id="registerPassword" placeholder="Пароль" required>
          <button type="submit">Зарегистрироваться</button>
        </form>
        <p>Уже есть аккаунт? <a href="#" id="showLogin">Войти</a></p>
      </div>
    </div>
  </div>

  <!-- ===== ОСНОВНОЙ ИНТЕРФЕЙС ===== -->
  <div id="app" class="app-container" style="display:none">
    <!-- САЙДБАР -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <h2>💬 Danumes</h2>
        <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
      </div>

      <!-- Профиль пользователя -->
      <div class="user-profile" id="userProfile">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-info">
          <div class="user-name" id="userName">Пользователь</div>
          <div class="user-status" id="userStatus">В сети</div>
        </div>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
      </div>

      <!-- Поиск -->
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Поиск чатов...">
      </div>

      <!-- ===== ЗАЯВКИ В ДРУЗЬЯ (НОВЫЙ БЛОК) ===== -->
      <div class="friend-requests-section" id="friendRequestsSection">
        <div class="friend-requests-header" id="friendRequestsToggle">
          <span>📩 Заявки в друзья</span>
          <span class="badge" id="friendRequestsBadge" style="display: none;">0</span>
        </div>
        <div id="pendingRequestsList" style="display: none;">
          <!-- Список заявок будет здесь -->
        </div>
      </div>

      <!-- Список чатов -->
      <div id="chatList" class="chat-list">
        <!-- Чаты будут здесь -->
      </div>
    </aside>

    <!-- ОБЛАСТЬ ЧАТА -->
    <main id="chatArea" class="chat-area">
      <div class="chat-header" id="chatHeader">
        <button class="back-btn" id="backBtn" style="display:none">←</button>
        <div class="chat-user-info">
          <div class="chat-user-avatar" id="chatUserAvatar">👤</div>
          <div class="chat-user-name" id="chatUserName">Выберите чат</div>
          <div class="chat-user-status" id="chatUserStatus"></div>
        </div>
        <button class="chat-actions-btn" id="chatActionsBtn">⋮</button>
      </div>

      <div id="messagesContainer" class="messages-container">
        <div id="messages" class="messages">
          <!-- Сообщения будут здесь -->
        </div>
      </div>

      <div class="input-area" id="inputArea">
        <button class="attach-btn" id="attachBtn" title="Прикрепить файл">📎</button>
        <button class="emoji-btn" id="emojiBtn" title="Эмодзи">😊</button>
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button class="voice-btn" id="voiceBtn" title="Голосовое сообщение">🎤</button>
        <button class="send-btn" id="sendBtn" title="Отправить">➤</button>
      </div>
    </main>
  </div>

  <!-- ===== МОДАЛЬНОЕ ОКНО НАСТРОЕК ===== -->
  <div id="settingsModal" class="modal" style="display:none">
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>⚙️ Настройки</h2>
          <button class="modal-close" id="settingsClose">✕</button>
        </div>
        <div class="modal-body">
          <form id="settingsForm">
            <div class="form-group">
              <label>Аватар (эмодзи)</label>
              <div id="emojiGrid" class="emoji-grid">
                <!-- Эмодзи будут здесь -->
              </div>
            </div>
            <div class="form-group">
              <label>Никнейм</label>
              <input type="text" id="settingsUsername" placeholder="Никнейм">
            </div>
            <div class="form-group">
              <label>Псевдоним</label>
              <input type="text" id="settingsNickname" placeholder="Псевдоним">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="settingsEmail" placeholder="Email">
            </div>
            <div class="form-group">
              <label>Пол</label>
              <select id="settingsGender">
                <option value="">Не указан</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
              </select>
            </div>
            <div class="form-group">
              <label>Описание</label>
              <textarea id="settingsDescription" placeholder="О себе..."></textarea>
            </div>
            <div class="form-group">
              <label>Видимость профиля</label>
              <div class="visibility-options">
                <label><input type="checkbox" id="visibilityEmail"> Показывать email</label>
                <label><input type="checkbox" id="visibilityGender"> Показывать пол</label>
                <label><input type="checkbox" id="visibilityDescription"> Показывать описание</label>
              </div>
            </div>
            <div class="form-group">
              <label>Тема оформления</label>
              <select id="settingsTheme">
                <option value="blue">Синяя</option>
                <option value="green">Зелёная</option>
                <option value="purple">Фиолетовая</option>
                <option value="sunset">Закат</option>
                <option value="ocean">Океан</option>
              </select>
            </div>
            <button type="submit" class="save-btn">💾 Сохранить</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== МОДАЛЬНОЕ ОКНО ПРОСМОТРА ИЗОБРАЖЕНИЙ ===== -->
  <div id="imageModal" class="modal" style="display:none">
    <div class="modal-overlay">
      <div class="modal-content image-modal">
        <button class="modal-close" id="imageModalClose">✕</button>
        <img id="modalImage" src="" alt="Изображение">
      </div>
    </div>
  </div>

  <!-- ===== КОНТЕКСТНОЕ МЕНЮ (НОВЫЙ БЛОК) ===== -->
  <div id="contextMenu" class="context-menu" style="display: none;">
    <div class="context-menu-item" data-action="add-friend">
      <span>👤</span> Добавить в друзья
    </div>
    <div class="context-menu-item" data-action="remove-friend" style="display: none;">
      <span>❌</span> Удалить из друзей
    </div>
    <div class="context-menu-item" data-action="view-profile">
      <span>👁️</span> Просмотр профиля
    </div>
    <div class="context-menu-item" data-action="start-chat">
      <span>💬</span> Начать чат
    </div>
  </div>

  <!-- ===== СКРИПТЫ ===== -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
