<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>Danumes</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
</head>
<body>
  <!-- ===== СТРАНИЦА ВХОДА (Telegram стиль) ===== -->
  <div id="loginPage" class="auth-page">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-logo">
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
            <circle cx="30" cy="30" r="30" fill="#27A5E7"/>
            <path d="M16 30.5L26 36L44 20" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Danumes</h1>
        <p class="subtitle">Войдите в аккаунт</p>
        <form id="loginForm">
          <div class="input-group">
            <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
          </div>
          <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Пароль" required>
          </div>
          <button type="submit">Войти</button>
        </form>
        <p class="auth-footer">Нет аккаунта? <a href="#" id="showRegister">Регистрация</a></p>
      </div>
    </div>
  </div>

  <!-- ===== СТРАНИЦА РЕГИСТРАЦИИ ===== -->
  <div id="registerPage" class="auth-page" style="display:none">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-logo">
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
            <circle cx="30" cy="30" r="30" fill="#27A5E7"/>
            <path d="M16 30.5L26 36L44 20" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Danumes</h1>
        <p class="subtitle">Создайте аккаунт</p>
        <form id="registerForm">
          <div class="input-group">
            <input type="text" id="registerUsername" placeholder="Имя пользователя" required>
          </div>
          <div class="input-group">
            <input type="email" id="registerEmail" placeholder="Email" required>
          </div>
          <div class="input-group">
            <input type="password" id="registerPassword" placeholder="Пароль" required>
          </div>
          <button type="submit">Зарегистрироваться</button>
        </form>
        <p class="auth-footer">Уже есть аккаунт? <a href="#" id="showLogin">Войти</a></p>
      </div>
    </div>
  </div>

  <!-- ===== ОСНОВНОЙ ИНТЕРФЕЙС (Telegram стиль) ===== -->
  <div id="app" class="app-container" style="display:none">
    <!-- ЛЕВАЯ ПАНЕЛЬ (список чатов) -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <button class="menu-btn" id="menuBtn">☰</button>
        <h2>Danumes</h2>
        <button class="new-chat-btn" id="newChatBtn">✏️</button>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Поиск">
        <div id="searchResults" class="search-results" style="display:none"></div>
      </div>

      <div id="chatList" class="chat-list"></div>
    </aside>

    <!-- ПРАВАЯ ПАНЕЛЬ (чат) -->
    <main id="chatArea" class="chat-area">
      <!-- Пустое состояние (Telegram стиль) -->
      <div id="emptyState" class="empty-state-full">
        <div class="empty-icon">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
            <circle cx="60" cy="60" r="60" fill="#E8F5FE"/>
            <path d="M40 60L52 70L78 48" stroke="#27A5E7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Danumes</h2>
        <p>Выберите чат, чтобы начать общение</p>
      </div>

      <!-- Шапка чата -->
      <div class="chat-header" id="chatHeader" style="display:none">
        <button class="back-btn" id="backBtn">←</button>
        <div class="chat-user-info">
          <div class="chat-user-avatar" id="chatUserAvatar">👤</div>
          <div>
            <div class="chat-user-name" id="chatUserName">Пользователь</div>
            <div class="chat-user-status" id="chatUserStatus">был(а) недавно</div>
          </div>
        </div>
        <div class="chat-actions">
          <button class="chat-actions-btn" id="chatCallBtn">📞</button>
          <button class="chat-actions-btn" id="chatActionsBtn">⋯</button>
        </div>
      </div>

      <!-- Сообщения -->
      <div id="messagesContainer" class="messages-container" style="display:none">
        <div id="messages" class="messages"></div>
      </div>

      <!-- Поле ввода -->
      <div class="input-area" id="inputArea" style="display:none">
        <button class="attach-btn" id="attachBtn">📎</button>
        <input type="text" id="messageInput" placeholder="Сообщение">
        <button class="voice-btn" id="voiceBtn">🎤</button>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </main>
  </div>

  <!-- ===== МОДАЛКА НАСТРОЕК ===== -->
  <div id="settingsModal" class="modal" style="display:none">
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Настройки</h2>
          <button class="modal-close" id="settingsClose">✕</button>
        </div>
        <div class="modal-body">
          <div class="settings-avatar">
            <div class="settings-avatar-preview" id="settingsAvatarPreview">👤</div>
            <button class="change-avatar-btn" id="changeAvatarBtn">Сменить аватар</button>
          </div>
          <div id="emojiGrid" class="emoji-grid" style="display:none"></div>
          
          <form id="settingsForm">
            <div class="form-group">
              <label>Имя</label>
              <input type="text" id="settingsDisplayName" placeholder="Как вас видеть">
            </div>
            <div class="form-group">
              <label>Никнейм</label>
              <input type="text" id="settingsUsername" placeholder="@username">
            </div>
            <div class="form-group">
              <label>О себе</label>
              <textarea id="settingsBio" placeholder="Расскажите о себе..." rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>Тема</label>
              <div class="theme-selector" id="themeSelector">
                <button data-theme="light" class="active" style="background:#ffffff;border:2px solid #ddd;"></button>
                <button data-theme="dark" style="background:#1a1a2e;"></button>
                <button data-theme="blue" style="background:#27A5E7;"></button>
                <button data-theme="green" style="background:#4CAF50;"></button>
                <button data-theme="purple" style="background:#9C27B0;"></button>
              </div>
            </div>
            <button type="submit" class="save-btn">Сохранить</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== МОДАЛКА ПРОСМОТРА ИЗОБРАЖЕНИЙ ===== -->
  <div id="imageModal" class="modal" style="display:none">
    <div class="modal-overlay">
      <div class="modal-content image-modal">
        <button class="modal-close" id="imageModalClose">✕</button>
        <img id="modalImage" src="" alt="Изображение">
      </div>
    </div>
  </div>

  <!-- ===== КОНТЕКСТНОЕ МЕНЮ ===== -->
  <div id="contextMenu" class="context-menu" style="display:none">
    <div class="context-menu-item" data-action="add-friend">👤 Добавить в друзья</div>
    <div class="context-menu-item" data-action="remove-friend" style="display:none">❌ Удалить из друзей</div>
    <div class="context-menu-item" data-action="view-profile">👁️ Профиль</div>
    <div class="context-menu-item" data-action="start-chat">💬 Начать чат</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
