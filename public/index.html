<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Danumes – Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-bg"></div>

  <!-- Модальное окно входа / регистрации -->
  <div id="login-modal" class="modal-overlay">
    <div class="modal-card">
      <h2 id="modal-title">Вход</h2>
      <p class="modal-sub" id="modal-sub">Войдите в аккаунт</p>
      <input type="text" id="login-username" class="glass-input" placeholder="Логин" autocomplete="username">
      <input type="password" id="login-password" class="glass-input" placeholder="Пароль" autocomplete="current-password">
      <div id="login-error" class="error-msg"></div>
      <button id="login-btn" class="btn-primary">Войти</button>
      <p class="toggle-text" id="toggle-text">
        Нет аккаунта? <a href="#" id="toggle-link">Зарегистрироваться</a>
      </p>
    </div>
  </div>

  <!-- Модальное окно профиля -->
  <div id="profile-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card profile-card">
      <button class="modal-close icon-btn" id="close-profile">✕</button>
      <div class="big-avatar" id="profile-avatar">?</div>
      <h2 id="profile-name">username</h2>
      <p class="profile-status">В сети</p>
      <div id="self-actions" class="profile-actions">
        <button id="change-pass-btn" class="btn-secondary">Сменить пароль</button>
        <button id="logout-btn" class="btn-danger">Выйти</button>
      </div>
      <div id="pass-form" style="display: none;">
        <input type="password" id="old-pass" class="glass-input" placeholder="Старый пароль">
        <input type="password" id="new-pass" class="glass-input" placeholder="Новый пароль">
        <div id="pass-error" class="error-msg"></div>
        <button id="save-pass-btn" class="btn-primary">Сохранить</button>
      </div>
      <div id="contact-actions" style="display: none;">
        <button id="back-btn-profile" class="btn-secondary">← Назад к чату</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно создания группы/канала -->
  <div id="create-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card group-modal-card">
      <button class="modal-close icon-btn" id="close-create">✕</button>
      <h2 id="create-title">Новая группа</h2>
      <input type="text" id="entity-name" class="glass-input" placeholder="Название" maxlength="30">
      <p id="members-label" class="modal-sub" style="margin-top: 12px;">Выберите участников</p>
      <div id="members-list" class="members-list"></div>
      <button id="create-btn" class="btn-primary" style="margin-top: 16px;">Создать</button>
    </div>
  </div>

  <!-- Модальное меню плюса -->
  <div id="plus-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card plus-menu-modal">
      <button class="modal-close icon-btn" onclick="document.getElementById('plus-modal').style.display='none'">✕</button>
      <h2>Создать</h2>
      <div class="plus-menu-options">
        <button id="menu-group-btn" class="plus-option-btn">
          <span>👥</span> Группу
        </button>
        <button id="menu-channel-btn" class="plus-option-btn">
          <span>📢</span> Канал
        </button>
      </div>
    </div>
  </div>

  <!-- Модальное окно настроек -->
  <div id="settings-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card settings-card">
      <button class="modal-close icon-btn" id="close-settings">✕</button>
      <h2>Настройки</h2>
      
      <label class="settings-label">Никнейм</label>
      <input type="text" id="settings-nickname" class="glass-input" placeholder="Новый никнейм">
      
      <label class="settings-label">Тема</label>
      <div id="theme-grid" class="theme-grid"></div>
      
      <label class="settings-label">Сменить пароль</label>
      <input type="password" id="settings-old-pass" class="glass-input" placeholder="Старый пароль">
      <input type="password" id="settings-new-pass" class="glass-input" placeholder="Новый пароль">
      <div id="settings-pass-error" class="error-msg"></div>
      <button id="save-settings-btn" class="btn-primary">Сохранить</button>
    </div>
  </div>

  <!-- Контекстное меню -->
  <div id="context-menu" class="context-menu" style="display: none;">
    <div class="context-item" id="context-copy">📋 Копировать</div>
    <div class="context-item" id="context-reply">↩️ Ответить</div>
    <div class="context-item" id="context-delete">🗑️ Удалить</div>
  </div>

  <!-- Панель ответа -->
  <div id="reply-bar" class="reply-bar" style="display: none;">
    <span id="reply-text"></span>
    <button id="reply-cancel" class="icon-btn">✕</button>
  </div>

  <!-- Пикер реакций -->
  <div id="reactions-picker" class="reactions-picker" style="display: none;"></div>

  <!-- Индикатор записи -->
  <div id="recording-indicator" class="recording-indicator" style="display: none;">
    🔴 Запись... <span id="voice-timer">0с</span>
  </div>

  <!-- Основной интерфейс -->
  <div id="app" class="app-container" style="display: none;">
    <!-- Сайдбар -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="user-info" id="user-info">
          <div class="avatar" id="my-avatar">?</div>
          <span id="my-name">User</span>
        </div>
        <div style="display: flex; gap: 4px;">
          <button id="settings-btn" class="icon-btn" title="Настройки">⚙️</button>
          <button id="plus-btn" class="icon-btn plus-btn" title="Создать">+</button>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" class="glass-input search-input" placeholder="Поиск...">
      </div>
      <div id="chat-list" class="chat-list"></div>
    </aside>

    <!-- Область переписки -->
    <main id="chat" class="chat">
      <header class="chat-head">
        <button id="back-btn" class="icon-btn back-btn" aria-label="Назад">←</button>
        <div class="avatar" id="chat-avatar">?</div>
        <div class="chat-info" id="chat-info">
          <h3 id="chat-title">Выберите чат</h3>
          <span id="chat-status" class="status">офлайн</span>
        </div>
      </header>

      <div id="messages-box" class="messages-box">
        <div id="messages" class="messages"></div>
      </div>

      <div id="composer" class="composer">
        <button id="emoji-btn" class="icon-btn">😊</button>
        <button id="voice-btn" class="icon-btn" title="Голосовое (зажать)">🎤</button>
        <input type="text" id="msg-input" class="message-input" placeholder="Сообщение..." autocomplete="off">
        <button id="send-btn" class="send-btn">↑</button>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
