            right: -5%;

            width: 100%;

            height: 85vh;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 35px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        /* LIQUID GLASS КОНТЕЙНЕР */
        .chat-container {
            width: 100%;
            height: 100%;
            backdrop-filter: blur(40px) saturate(210%);
            -webkit-backdrop-filter: blur(40px) saturate(210%);
            display: flex;
            flex-direction: column;
        }

        /* ШАПКА ЧАТА */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-btn {
            background: none;
            border: none;
            color: #007aff;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {

            height: 38px;
            background: linear-gradient(135px, #ff9500, #ff5e62);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
            color: #fff;
        }

        .user-meta h2 {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.2;
        }

        .status {
            font-size: 11px;
            color: #34c759;
        }

        /* ОКНО СООБЩЕНИЙ */
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ОБЛАЧКА ТЕКСТА */
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
        }

        .message.incoming {
            background: rgba(255, 255, 255, 0.08);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .message.outgoing {
            background: linear-gradient(135px, #007aff, #0051a3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);

        .msg-time {
            font-size: 9.5px;
            color: rgba(255, 255, 255, 0.5);
            align-self: flex-end;
            margin-top: 3px;

            gap: 10px;

            background: rgba(0, 0, 0, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 60px;
        }

        .input-action-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #007aff;
            cursor: pointer;
        }

        #message-input {

            padding: 9px 14px;
            border-radius: 18px;
            color: #fff;
            outline: none;
            font-size: 14.5px;
        }

        #send-btn {
            background: #007aff;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* НИЖНИЙ ТАБ-БАР */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(15, 16, 22, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 4px;
        }

        .tab-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            font-size: 10px;
            gap: 3px;
        }

        .tab-item.active {
            color: #007aff;
        }

        .tab-icon {
            font-size: 18px;
        }
    </style>
