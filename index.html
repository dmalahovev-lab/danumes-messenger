<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danumes</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Подключаем библиотеку сокетов, чтобы не было ошибки io is not defined -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0b0813;
            color: #f1f1f1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Заголовок Danumes в левом верхнем углу */
        .brand-title {
            position: absolute;
            top: 40px;
            left: 50px;
            font-size: 2rem;
            font-weight: 500;
            color: #d1ceda;
            letter-spacing: -0.5px;
        }

        /* Контейнер авторизации */
        .auth-card {
            background: linear-gradient(145deg, #13101c, #0e0b16);
            padding: 45px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #1a162b;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .auth-card h2 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 30px;
            color: #f1f1f1;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background-color: #1e1b29;
            border: 1px solid #28243c;
            border-radius: 30px;
            color: #f1f1f1;
            font-size: 0.95rem;
            margin-bottom: 18px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #4b2374;
            background-color: #221e30;
            box-shadow: 0 0 15px rgba(75, 35, 116, 0.2);
        }

        .input-field::placeholder {
            color: #5d5973;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #3c1464, #4c1c7a);
            color: #f1f1f1;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(76, 28, 122, 0.4);
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(76, 28, 122, 0.6);
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #726e8a;
        }

        .toggle-link span {
            color: #9c82cc;
            text-decoration: none;
            cursor: pointer;
            margin-left: 5px;
            transition: color 0.2s;
        }

        .toggle-link span:hover {
            color: #bfa8eb;
        }

        /* Кнопка Ошибки Подключения */
        #error-badge {
            position: fixed;
            top: 20px;
            background-color: #44141a;
            border: 1px solid #6b1d26;
            color: #fccfcf;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: none;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* --- РАБОЧАЯ ЗОНА МЕССЕНДЖЕРА после входа --- */
        #messenger-layout {
            display: none;
            width: 100%;
            height: 100vh;
            grid-template-columns: 320px 1fr;
            background-color: #08060d;
        }

        #chat-sidebar {
            background-color: #0e0b16;
            border-right: 1px solid #1a162b;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .profile-section {
            padding-bottom: 20px;
            border-bottom: 1px solid #1a162b;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .verified-star {
            color: #9c82cc;
            font-weight: bold;
        }

        .news-tab-btn {
            background-color: #1e1b29;
            border: 1px solid #28243c;
            color: #9c82cc;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        #chat-window {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #0b0813;
        }

        #messages-view {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg.inbound {
            background-color: #13101c;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #1a162b;
        }

        .msg.outbound {
            background: linear-gradient(135deg, #2c124a, #36145c);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid #441b73;
        }

        .msg-author {
            font-size: 0.75rem;
            color: #9c82cc;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .msg-time {
            font-size: 0.7rem;
            color: #5d5973;
            text-align: right;
            margin-top: 4px;
        }

        .input-bar {
            padding: 20px 30px;
            background-color: #0e0b16;
            border-top: 1px solid #1a162b;
            display: flex;
            gap: 15px;
        }

        .input-bar input {
            flex: 1;
            padding: 16px;
            background-color: #13101c;
            border: 1px solid #28243c;
            border-radius: 30px;
            color: #f1f1f1;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="error-badge">Ошибка подключения к Danumes. Переподключение...</div>
    <div class="brand-title">Danumes</div>

    <!-- ЭКРАН С ФИОЛЕТОВЫМ ДИЗАЙНОМ (ОКНО АВТОРИЗАЦИИ) -->
    <div id="auth-screen" class="auth-card">
        <!-- Блок Входа -->
        <div id="login-box">
            <h2>Вход</h2>
            <input type="text" id="login-user" class="input-field" placeholder="Логин">
            <input type="password" id="login-pass" class="input-field" placeholder="Пароль">
            <button class="action-btn" id="btn-login-action">Войти в аккаунт</button>
            <div class="toggle-link">
                Нет аккаунта? <span onclick="switchView(true)">Зарегистрироваться</span>
            </div>
        </div>

        <!-- Блок Регистрации -->
        <div id="register-box" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="reg-user" class="input-field" placeholder="Придумайте логин">
            <input type="password" id="reg-pass" class="input-field" placeholder="Придумайте пароль">
            <button class="action-btn" id="btn-reg-action">Создать аккаунт</button>
            <div class="toggle-link">
                Уже есть аккаунт? <span onclick="switchView(false)">Войти</span>
            </div>
        </div>
    </div>

    <!-- ГЛАВНОЕ ОКНО ЧАТА -->
    <div id="messenger-layout">
        <div id="chat-sidebar">
            <div class="profile-section">
                <span id="my-profile-name">Пользователь</span>
                <span id="my-profile-badge" class="verified-star" style="display: none;">✔</span>
            </div>
            <div style="color: #5d5973; font-size: 0.9rem;">Глобальный чат</div>
            <button id="danumes-news-btn" class="news-tab-btn">📢 Danumes News</button>
        </div>
        <div id="chat-window">
            <div id="messages-view"></div>
            <div class="input-bar">
                <input type="text" id="msg-input-field" placeholder="Напишите сообщение...">
                <button class="action-btn" id="btn-send-msg" style="width: auto; padding: 0 25px; margin: 0;">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // Подключаемся к твоему серверу на Render
        const socket = io('https://onrender.com');

        let myAccount = null;

        // Показ ошибок сети
        socket.on('connect', () => document.getElementById('error-badge').style.display = 'none');
        socket.on('disconnect', () => document.getElementById('error-badge').style.display = 'block');

        // Переключение окон Логин / Регистрация
        function switchView(toRegister) {
            document.getElementById('login-box').style.display = toRegister ? 'none' : 'block';
            document.getElementById('register-box').style.display = toRegister ? 'block' : 'none';
        }

        // Починка работы Кнопки Входа
        document.getElementById('btn-login-action').addEventListener('click', () => {
            const username = document.getElementById('login-user').value.trim();
            const password = document.getElementById('login-pass').value.trim();
            if (username && password) {
                socket.emit('login-attempt', { username, password });
            }
        });

        // Починка работы Кнопки Регистрации
        document.getElementById('btn-reg-action').addEventListener('click', () => {
            const username = document.getElementById('reg-user').value.trim();
            const password = document.getElementById('reg-pass').value.trim();
            if (username && password) {
                myAccount = { username, hasVerifiedBadge: false, hasNewsAccess: false };
                openMessenger();
            }
        });

        // Успешный вход системных пользователей (Danumala, RunFly)
        socket.on('login-success', (serverUser) => {
            myAccount = serverUser;
            openMessenger();
        });

        // Авторизация для обычных пользователей, если пароль не совпал с системными
        socket.on('login-failure', () => {
            const username = document.getElementById('login-user').value.trim();
            myAccount = { username, hasVerifiedBadge: false, hasNewsAccess: false };
            openMessenger();
        });

        function openMessenger() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('messenger-layout').style.display = 'grid';
            document.getElementById('my-profile-name').innerText = myAccount.username;

            if (myAccount.hasVerifiedBadge) {
                document.getElementById('my-profile-badge').style.display = 'inline';
            }
            if (myAccount.hasNewsAccess) {
                document.getElementById('danumes-news-btn').style.display = 'block';
            }
        }

        // Логика отправки сообщений в чат
        document.getElementById('btn-send-msg').addEventListener('click', postMessage);
        document.getElementById('msg-input-field').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') postMessage();
        });

        function postMessage() {
            const field = document.getElementById('msg-input-field');
            if (field.value.trim() && myAccount) {
                socket.emit('send-message', {
                    username: myAccount.username,
                    text: field.value.trim()
                });
                field.value = '';
            }
        }

        // Первичная прогрузка истории из Cloudflare KV Pairs
        socket.on('init-messages', (history) => {
            const view = document.getElementById('messages-view');
            view.innerHTML = '';
            if (history) history.forEach(m => buildMessageNode(m));
        });

        socket.on('new-message', (m) => buildMessageNode(m));

        function buildMessageNode(m) {
            const view = document.getElementById('messages-view');
            const isMe = myAccount && m.username === myAccount.username;

            const node = document.createElement('div');
            node.className = `msg ${isMe ? 'outbound' : 'inbound'}`;

            const verifiedStar = m.isVerified ? ' <span class="verified-star">✔</span>' : '';

            node.innerHTML = `
                <div class="msg-author">${m.username}${verifiedStar}</div>
                <div>${m.text}</div>
                <div class="msg-time">${m.time || ''}</div>
            `;
            view.appendChild(node);
            view.scrollTop = view.scrollHeight;
        }
    </script>
</body>
</html>
