<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e1e1e1;
            height: 100vh;
            overflow: hidden;
        }

        body[data-theme="dark"] {
            --bg-page: #0a0a0f;
            --bg-sidebar: #111116;
            --bg-header: #1a1a24;
            --bg-chat: #13131a;
            --bg-message-own: #2b5278;
            --bg-message-other: #1e1e2a;
            --bg-input: #1a1a24;
            --text-primary: #e1e1e1;
            --text-secondary: #8a8a9a;
            --border: #1e1e2a;
            --accent: #2b5278;
            --accent-hover: #3a6b99;
            --online: #4caf50;
        }

        body[data-theme="light"] {
            --bg-page: #eef2f5;
            --bg-sidebar: #ffffff;
            --bg-header: #ffffff;
            --bg-chat: #eef2f5;
            --bg-message-own: #e4e6eb;
            --bg-message-other: #ffffff;
            --bg-input: #ffffff;
            --text-primary: #111111;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --accent: #0088cc;
            --online: #31a24c;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
        }

        .username {
            font-weight: 700;
            font-size: 18px;
        }

        .verified-badge {
            color: #4caf50;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            background: var(--bg-page);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .search-container {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-section {
            padding: 8px 16px 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: var(--bg-header);
        }

        .chat-item.active {
            background: var(--accent);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-page);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--online);
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .group-badge {
            font-size: 10px;
            background: var(--accent);
            padding: 2px 6px;
            border-radius: 8px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
        }

        .chat-header {
            padding: 16px 20px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: var(--bg-page);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message-own {
            align-self: flex-end;
        }

        .message-other {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            cursor: pointer;
        }

        .message-own .message-bubble {
            background: var(--bg-message-own);
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: var(--bg-message-other);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .message-text {
            font-size: 14px;
        }

        .message-meta {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .reaction-badge {
            background: var(--bg-header);
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .reaction-badge.active {
            background: var(--accent);
        }

        .input-area {
            padding: 16px 20px;
            background: var(--bg-header);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
        }

        .input-btn {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        .context-menu {
            position: fixed;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            z-index: 1000;
            min-width: 180px;
        }

        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
        }

        .context-menu-item:hover {
            background: var(--accent);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-sidebar);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal-btn-primary {
            background: var(--accent);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2b2b3a;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 3000;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-page);
        }

        .login-card {
            background: var(--bg-sidebar);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 32px;
            text-align: center;
            color: var(--accent);
        }

        .login-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-mode {
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
            color: var(--accent);
        }
    </style>
</head>
<body data-theme="dark">
    <div id="app"></div>

    <script>
        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let currentGroupId = null;
        let allUsers = [];
        let allGroups = [];
        let messages = [];
        let updateInterval = null;

        const VERIFIED_USERS = ['Danumala', 'RunFly'];

        function showToast(msg) {
            let toast = document.querySelector('.toast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function api(method, url, data) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (data) options.body = JSON.stringify(data);
                const res = await fetch(url, options);
                return await res.json();
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(ts) {
            if (!ts) return '';
            return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Загрузка чатов
        async function loadChats() {
            if (!currentUser) return;
            const users = await api('GET', '/get-users');
            allUsers = Array.isArray(users) ? users.filter(u => u.username !== currentUser.username) : [];
            const groups = await api('GET', `/get-groups/${currentUser.username}`);
            allGroups = Array.isArray(groups) ? groups : [];
            console.log('Groups loaded:', allGroups);
            renderSidebar();
        }

        // Загрузка сообщений
        async function loadMessages() {
            if (!currentUser || !currentChat) return;
            let msgs = [];
            if (currentChatType === 'group' && currentGroupId) {
                const res = await api('GET', `/get-group-messages/${currentGroupId}`);
                msgs = Array.isArray(res) ? res : [];
            } else {
                const res = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                msgs = Array.isArray(res) ? res : [];
            }
            messages = msgs;
            renderMessages();
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input?.value.trim();
            if (!text || !currentChat) return;
            
            const endpoint = currentChatType === 'group' ? '/send-group-message' : '/send-message';
            const payload = currentChatType === 'group' ? {
                groupId: currentGroupId,
                from: currentUser.username,
                text: text
            } : {
                from: currentUser.username,
                to: currentChat,
                text: text
            };
            
            const res = await api('POST', endpoint, payload);
            if (res.success) {
                input.value = '';
                await loadMessages();
            } else {
                showToast('Ошибка: ' + (res.error || 'Неизвестно'));
            }
        }

        // Редактирование
        async function editMessage(id, newText) {
            const res = await api('PUT', `/edit-message/${id}`, { text: newText });
            if (res.success) {
                await loadMessages();
                showToast('Изменено');
            } else {
                showToast('Ошибка редактирования');
            }
        }

        // Удаление
        async function deleteMessage(id) {
            if (!confirm('Удалить?')) return;
            const res = await api('DELETE', `/delete-message/${id}`);
            if (res.success) {
                await loadMessages();
                showToast('Удалено');
            } else {
                showToast('Ошибка удаления');
            }
        }

        // Реакции
        async function addReaction(msgId, reaction, type) {
            const res = await api('POST', '/add-reaction', {
                messageId: parseInt(msgId),
                userId: currentUser.username,
                reaction: reaction,
                type: type
            });
            if (res.success) await loadMessages();
        }

        async function loadReactions(msgId, type) {
            const res = await api('GET', `/get-reactions/${msgId}/${type}`);
            return Array.isArray(res) ? res : [];
        }

        // Создание группы
        async function createGroup() {
            const name = document.getElementById('groupName')?.value.trim();
            if (!name) {
                showToast('Введите название');
                return;
            }
            const selected = Array.from(document.querySelectorAll('.user-select:checked')).map(cb => cb.value);
            
            const res = await api('POST', '/create-group', {
                name: name,
                creator: currentUser.username,
                members: selected
            });
            
            if (res.success) {
                closeModal();
                await loadChats();
                showToast(`Группа "${name}" создана`);
                if (res.group) {
                    selectChat(res.group.name, 'group', res.group.id);
                }
            } else {
                showToast('Ошибка: ' + (res.error || 'Неизвестно'));
            }
        }

        // Выбор чата
        function selectChat(chatId, type, groupId = null) {
            currentChat = chatId;
            currentChatType = type;
            currentGroupId = groupId;
            renderSidebar();
            renderChatArea();
            loadMessages();
        }

        // Контекстное меню
        function showContextMenu(e, msgId, msgFrom, msgText) {
            e.preventDefault();
            const existing = document.querySelector('.context-menu');
            if (existing) existing.remove();
            
            const isOwn = msgFrom === currentUser.username;
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            
            if (isOwn) {
                const edit = document.createElement('div');
                edit.className = 'context-menu-item';
                edit.textContent = '✏️ Редактировать';
                edit.onclick = () => {
                    const newText = prompt('Новый текст:', msgText);
                    if (newText && newText !== msgText) editMessage(msgId, newText);
                    menu.remove();
                };
                menu.appendChild(edit);
                
                const del = document.createElement('div');
                del.className = 'context-menu-item';
                del.textContent = '🗑️ Удалить';
                del.onclick = () => { deleteMessage(msgId); menu.remove(); };
                menu.appendChild(del);
            }
            
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
        }

        // Модалки
        let currentModal = null;
        function showModal(content) {
            if (currentModal) currentModal.remove();
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content">${content}</div>`;
            document.body.appendChild(modal);
            currentModal = modal;
        }
        function closeModal() { if (currentModal) currentModal.remove(); currentModal = null; }

        function showCreateGroupModal() {
            if (allUsers.length === 0) {
                showToast('Нет других пользователей');
                return;
            }
            showModal(`
                <div class="modal-title">Создать группу</div>
                <input type="text" class="modal-input" id="groupName" placeholder="Название">
                <div style="margin-bottom: 12px;">Участники:</div>
                <div style="max-height: 200px; overflow-y: auto; margin-bottom: 16px;">
                    ${allUsers.map(u => `
                        <div style="padding: 6px 0;">
                            <label><input type="checkbox" class="user-select" value="${u.username}"> ${escapeHtml(u.username)}</label>
                        </div>
                    `).join('')}
                </div>
                <div class="modal-buttons">
                    <button class="modal-btn" onclick="closeModal()">Отмена</button>
                    <button class="modal-btn modal-btn-primary" onclick="createGroup()">Создать</button>
                </div>
            `);
        }

        function showAvatarPicker() {
            const emojis = ['😀', '😎', '🥳', '😺', '🐶', '🦊', '🐼', '🐨'];
            showModal(`
                <div class="modal-title">Аватар</div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;">
                    ${emojis.map(e => `<div style="font-size: 36px; text-align: center; cursor: pointer; padding: 8px;" onclick="updateAvatar('${e}')">${e}</div>`).join('')}
                </div>
            `);
        }

        async function updateAvatar(avatar) {
            await api('POST', '/update-avatar', { username: currentUser.username, avatar });
            currentUser.avatar = avatar;
            renderSidebar();
            closeModal();
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Рендер
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;
            
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const filteredGroups = allGroups.filter(g => g.name.toLowerCase().includes(search));
            const filteredUsers = allUsers.filter(u => u.username.toLowerCase().includes(search));
            
            sidebar.innerHTML = `
                <div class="sidebar-header">
                    <div class="user-card">
                        <div class="avatar" onclick="showAvatarPicker()">${currentUser?.avatar || '👤'}</div>
                        <div class="user-info">
                            <div class="username">
                                ${escapeHtml(currentUser?.username || '')}
                                ${VERIFIED_USERS.includes(currentUser?.username) ? '<span class="verified-badge">✓</span>' : ''}
                            </div>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <select class="action-btn" onchange="setTheme(this.value)">
                            <option value="dark">🌙</option>
                            <option value="light">☀️</option>
                        </select>
                        <button class="action-btn" onclick="showCreateGroupModal()">➕</button>
                    </div>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск..." oninput="renderSidebar()">
                </div>
                <div class="chats-list">
                    ${filteredGroups.length > 0 ? `
                        <div class="chat-section">ГРУППЫ</div>
                        ${filteredGroups.map(g => `
                            <div class="chat-item ${currentChat === g.name ? 'active' : ''}" onclick="selectChat('${g.name.replace(/'/g, "\\'")}', 'group', ${g.id})">
                                <div class="chat-avatar">👥</div>
                                <div class="chat-info">
                                    <div class="chat-name">${escapeHtml(g.name)} <span class="group-badge">${g.role}</span></div>
                                </div>
                            </div>
                        `).join('')}
                    ` : ''}
                    ${filteredUsers.length > 0 ? `
                        <div class="chat-section">ЛИЧНЫЕ</div>
                        ${filteredUsers.map(u => `
                            <div class="chat-item ${currentChat === u.username ? 'active' : ''}" onclick="selectChat('${u.username}', 'user', null)">
                                <div class="chat-avatar">
                                    ${u.avatar || '👤'}
                                    ${u.online ? '<div class="online-indicator"></div>' : ''}
                                </div>
                                <div class="chat-info">
                                    <div class="chat-name">
                                        ${escapeHtml(u.username)}
                                        ${u.verified ? '<span class="verified-badge">✓</span>' : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    ` : ''}
                </div>
            `;
        }

        async function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            if (!messages.length) {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">Нет сообщений</div>';
                return;
            }
            
            // Загружаем реакции
            const reactionsMap = new Map();
            for (const msg of messages) {
                const reacts = await loadReactions(msg.id, currentChatType);
                reactionsMap.set(msg.id, reacts);
            }
            
            container.innerHTML = messages.map(msg => {
                const isOwn = msg.from_user === currentUser.username;
                const reacts = reactionsMap.get(msg.id) || [];
                const userReact = reacts.find(r => r.user_id === currentUser.username);
                const reactGroups = {};
                reacts.forEach(r => { reactGroups[r.reaction] = (reactGroups[r.reaction] || 0) + 1; });
                
                return `
                    <div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${msg.id}">
                        ${!isOwn && currentChatType === 'group' ? `<div class="message-sender">${escapeHtml(msg.from_user)}</div>` : ''}
                        <div class="message-bubble" oncontextmenu="showContextMenu(event, ${msg.id}, '${msg.from_user}', '${escapeHtml(msg.text || '').replace(/'/g, "\\'")}')">
                            <div class="message-text">${escapeHtml(msg.text || '')}</div>
                        </div>
                        <div class="message-meta">${formatTime(msg.timestamp)} ${msg.edited ? '✎' : ''}</div>
                        <div class="reactions">
                            ${Object.entries(reactGroups).map(([emoji, count]) => `
                                <span class="reaction-badge ${userReact?.reaction === emoji ? 'active' : ''}" onclick="addReaction(${msg.id}, '${emoji}', '${currentChatType}')">
                                    ${emoji} ${count > 1 ? count : ''}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function renderChatArea() {
            const chatArea = document.getElementById('chatArea');
            if (!chatArea) return;
            
            const user = allUsers.find(u => u.username === currentChat);
            const status = currentChatType === 'group' ? 'Группа' : (user?.online ? 'В сети' : 'Не в сети');
            
            chatArea.innerHTML = `
                <div class="chat-header">
                    <div class="chat-header-avatar">${currentChatType === 'group' ? '👥' : (user?.avatar || '👤')}</div>
                    <div>
                        <div class="chat-header-name">
                            ${escapeHtml(currentChat || 'Выберите чат')}
                            ${user?.verified ? '<span class="verified-badge">✓</span>' : ''}
                        </div>
                        <div class="chat-header-status">${status}</div>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    ${!currentChat ? '<div style="text-align: center; padding: 40px;">Выберите чат</div>' : ''}
                </div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea class="message-input" id="msgInput" placeholder="Сообщение..." ${!currentChat ? 'disabled' : ''} rows="1"></textarea>
                        <button class="input-btn" onclick="sendMessage()" ${!currentChat ? 'disabled' : ''}>➤</button>
                    </div>
                </div>
            `;
            
            if (currentChat) {
                const input = document.getElementById('msgInput');
                input?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        }

        // Аутентификация
        let isLogin = true;
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <div class="login-title">DanuMes</div>
                        <input type="text" class="login-input" id="authUser" placeholder="Имя">
                        <input type="password" class="login-input" id="authPass" placeholder="Пароль">
                        <button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Регистрация'}</button>
                        <div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div>
                    </div>
                </div>
            `;
        }
        
        function toggleMode() { isLogin = !isLogin; renderAuth(); }
        
        async function submitAuth() {
            const username = document.getElementById('authUser').value.trim();
            const password = document.getElementById('authPass').value;
            if (!username || !password) { showToast('Заполните поля'); return; }
            
            const endpoint = isLogin ? '/login-attempt' : '/register-attempt';
            const res = await api('POST', endpoint, { username, password });
            
            if (res.success) {
                if (isLogin) {
                    currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
                    renderMain();
                } else {
                    showToast('Регистрация успешна! Войдите');
                    isLogin = true;
                    renderAuth();
                }
            } else {
                showToast(res.error || 'Ошибка');
            }
        }
        
        async function renderMain() {
            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar" id="sidebar"></div>
                    <div class="chat-area" id="chatArea"></div>
                </div>
            `;
            await loadChats();
            if (allGroups.length > 0) selectChat(allGroups[0].name, 'group', allGroups[0].id);
            else if (allUsers.length > 0) selectChat(allUsers[0].username, 'user', null);
            
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => { loadMessages(); loadChats(); }, 3000);
        }
        
        // Глобальные функции
        window.addReaction = addReaction;
        window.selectChat = selectChat;
        window.sendMessage = sendMessage;
        window.showCreateGroupModal = showCreateGroupModal;
        window.createGroup = createGroup;
        window.showAvatarPicker = showAvatarPicker;
        window.updateAvatar = updateAvatar;
        window.closeModal = closeModal;
        window.submitAuth = submitAuth;
        window.toggleMode = toggleMode;
        window.showContextMenu = showContextMenu;
        window.setTheme = setTheme;
        window.editMessage = editMessage;
        window.deleteMessage = deleteMessage;
        
        // Запуск
        renderAuth();
    </script>
</body>
</html>
