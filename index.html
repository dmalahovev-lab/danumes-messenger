<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DanuMes — Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            color: #e1e1e1;
            height: 100vh;
            overflow: hidden;
        }

        /* Темы */
        body[data-theme="dark"] {
            --bg-page: #0a0a0f;
            --bg-sidebar: #111116;
            --bg-header: #1a1a24;
            --bg-chat: #13131a;
            --bg-message-own: #2b5278;
            --bg-message-other: #1e1e2a;
            --bg-input: #1a1a24;
            --text-primary: #e1e1e1;
            --text-secondary: #8a8a9a;
            --border: #1e1e2a;
            --accent: #2b5278;
            --accent-hover: #3a6b99;
            --online: #4caf50;
        }

        body[data-theme="light"] {
            --bg-page: #eef2f5;
            --bg-sidebar: #ffffff;
            --bg-header: #ffffff;
            --bg-chat: #eef2f5;
            --bg-message-own: #e4e6eb;
            --bg-message-other: #ffffff;
            --bg-input: #ffffff;
            --text-primary: #111111;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --accent: #0088cc;
            --accent-hover: #0099e6;
            --online: #31a24c;
        }

        body[data-theme="blue"] {
            --bg-page: #0a1628;
            --bg-sidebar: #0f1a2e;
            --bg-header: #17212b;
            --bg-chat: #0e1621;
            --bg-message-own: #2b5278;
            --bg-message-other: #182533;
            --bg-input: #17212b;
            --text-primary: #e1e1e1;
            --text-secondary: #8a8a9a;
            --border: #1f2c3a;
            --accent: #2b5278;
            --online: #4caf50;
        }

        body[data-theme="purple"] {
            --bg-page: #1a0b2e;
            --bg-sidebar: #201240;
            --bg-header: #2a1a4a;
            --bg-chat: #150828;
            --bg-message-own: #6c3483;
            --bg-message-other: #2a1a4a;
            --bg-input: #2a1a4a;
            --text-primary: #e1d5f0;
            --text-secondary: #a890c0;
            --border: #35255a;
            --accent: #8e44ad;
            --online: #2ecc71;
        }

        body[data-theme="pink"] {
            --bg-page: #2d132c;
            --bg-sidebar: #3d1f3c;
            --bg-header: #4d2a4c;
            --bg-chat: #250f24;
            --bg-message-own: #b83b5e;
            --bg-message-other: #3d1f3c;
            --bg-input: #4d2a4c;
            --text-primary: #ffd9e6;
            --text-secondary: #d48aaa;
            --border: #5a3558;
            --accent: #e84393;
            --online: #2ecc71;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Сайдбар с закруглениями как раньше */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 8px 0 8px 8px;
            border-radius: 28px;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            border-radius: 28px 28px 0 0;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .user-info {
            flex: 1;
        }

        .username {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verified-badge {
            color: var(--online);
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: var(--online);
            margin-top: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            position: relative;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            background: var(--bg-page);
            border: none;
            border-radius: 20px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        /* Выпадающее меню для кнопки + */
        .plus-menu {
            position: absolute;
            bottom: 50px;
            right: 0;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 0;
            min-width: 180px;
            z-index: 100;
            display: none;
            animation: menuPop 0.2s ease;
        }

        .plus-menu.show {
            display: block;
        }

        .plus-menu-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .plus-menu-item:hover {
            background: var(--accent);
            padding-left: 28px;
        }

        @keyframes menuPop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .search-container {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 16px 8px;
        }

        .chat-section {
            padding: 8px 16px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 2px 8px;
            border-radius: 20px;
            position: relative;
        }

        .chat-item:hover {
            background: var(--bg-header);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: var(--accent);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-page);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--online);
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }

        .delete-chat {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .chat-item:hover .delete-chat {
            opacity: 1;
        }

        .delete-chat:hover {
            background: rgba(231,76,60,0.2);
            color: #ef4444;
        }

        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            margin: 8px 8px 8px 0;
            border-radius: 28px;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px;
            background: var(--bg-header);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-page);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-own {
            align-self: flex-end;
        }

        .message-other {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            cursor: pointer;
        }

        .message-own .message-bubble {
            background: var(--bg-message-own);
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: var(--bg-message-other);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .message-file {
            margin-top: 6px;
        }

        .message-file img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            cursor: pointer;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }

        .voice-play {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .voice-timeline {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .voice-progress {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .reaction {
            background: var(--bg-header);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .reaction:hover {
            background: var(--accent);
        }

        /* Панель ввода */
        .input-area {
            padding: 16px 24px;
            background: var(--bg-header);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 14px;
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input-btn {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .input-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Модалки */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
            border: 1px solid var(--border);
            animation: modalSlide 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-30px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .modal-btn-primary {
            background: var(--accent);
            color: white;
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            z-index: 1000;
            min-width: 180px;
            overflow: hidden;
        }

        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .context-menu-item:hover {
            background: var(--accent);
        }

        /* Стикеры */
        .sticker-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            z-index: 99;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            max-width: 280px;
            border: 1px solid var(--border);
        }

        .sticker-panel.show {
            display: grid;
        }

        .sticker {
            font-size: 32px;
            cursor: pointer;
            padding: 8px;
            text-align: center;
            border-radius: 12px;
        }

        .sticker:hover {
            background: var(--accent);
            transform: scale(1.1);
        }

        /* Запись голоса */
        .voice-recording {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-input);
            padding: 8px 16px;
            border-radius: 30px;
            margin-bottom: 8px;
        }

        .recording-timer {
            color: #e74c3c;
        }

        /* Профиль */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }

        .profile-card {
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-sidebar);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 3000;
            border: 1px solid var(--border);
        }

        /* Логин */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-page), var(--bg-sidebar));
        }

        .login-card {
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
        }

        .login-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 32px;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-mode {
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
            color: var(--accent);
        }

        .saved-accounts {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .saved-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .saved-account {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--bg-element);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 6px;
        }

        .saved-account:hover {
            background: var(--accent);
        }

        .saved-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -340px;
                top: 8px;
                height: calc(100% - 16px);
                z-index: 100;
                transition: left 0.3s ease;
            }
            .sidebar.open {
                left: 8px;
            }
            .back-button {
                display: flex;
            }
            .message {
                max-width: 85%;
            }
            .chat-area {
                margin: 8px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body data-theme="dark">
    <div id="app"></div>

    <script>
        // Сохранение аккаунтов
        const SAVED_ACCOUNTS_KEY = 'danumes_saved_accounts';
        const CURRENT_USER_KEY = 'danumes_current_user';
        
        function saveAccount(username, password, avatar) {
            const accounts = JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
            if (!accounts.find(a => a.username === username)) {
                accounts.push({ username, password, avatar: avatar || '👤' });
                localStorage.setItem(SAVED_ACCOUNTS_KEY, JSON.stringify(accounts));
            }
        }
        
        function getSavedAccounts() {
            return JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
        }
        
        function saveCurrentUser(user) {
            if (user) {
                localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
            } else {
                localStorage.removeItem(CURRENT_USER_KEY);
            }
        }
        
        function getCurrentUser() {
            const saved = localStorage.getItem(CURRENT_USER_KEY);
            return saved ? JSON.parse(saved) : null;
        }
        
        function clearCurrentUser() {
            localStorage.removeItem(CURRENT_USER_KEY);
        }

        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let currentGroupId = null;
        let currentChannelCreator = null;
        let allUsers = [];
        let allGroups = [];
        let allChannels = [];
        let subscribedChannels = [];
        let messages = [];
        let updateInterval = null;
        let isSending = false;
        let currentAudio = null;
        let plusMenuOpen = false;

        const VERIFIED = ['Danumala', 'RunFly'];

        async function sendMessage(text, file = null) {
            if (isSending) { toast('Подождите...'); return; }
            if (!text && !file) return;
            if (currentChatType === 'channel' && currentChannelCreator !== currentUser?.username) {

            isSending = true;

            const temp = { id: tempId, from_user: currentUser.username, text: text || (file ? `📎 ${file.name}` : ''), file_url: file?.url, timestamp: new Date().toISOString(), isTemp: true };
            
            messages.push(temp);
            renderMessages();

            let ep, pl;

                pl = { groupId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
            } else if (currentChatType === 'channel') {
                ep = '/send-channel-message';
                pl = { channelId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
            } else {
                ep = '/send-message';
                pl = { from: currentUser.username, to: currentChat, text: text || '', fileUrl: file?.url, fileName: file?.name };
            }
            
            const res = await api('POST', ep, pl);

        // Голосовые
        let mediaRec = null;
        let audioChunks = [];
        let isRec = false;
        let recTimer = null;
        let recSec = 0;

        async function startVoice() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(stream);
                audioChunks = [];
                mediaRec.ondataavailable = e => audioChunks.push(e.data);
                mediaRec.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        await sendMessage('🎤 Голосовое сообщение', { url: reader.result, name: 'voice.webm', type: 'audio/webm' });
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                    document.querySelector('.voice-recording')?.remove();
                };
                mediaRec.start();
                isRec = true;
                recSec = 0;
                const inputArea = document.querySelector('.input-area');
                const rd = document.createElement('div');
                rd.className = 'voice-recording';
                rd.innerHTML = `<span>🎙️ Запись:</span><span class="recording-timer">0:00</span><button class="input-btn" onclick="stopVoice()" style="background:#e74c3c;">⏹️</button>`;
                inputArea.insertBefore(rd, inputArea.firstChild);
                recTimer = setInterval(() => {
                    recSec++;
                    const t = document.querySelector('.recording-timer');
                    if (t) t.textContent = `${Math.floor(recSec/60)}:${(recSec%60).toString().padStart(2,'0')}`;
                }, 1000);
            } catch(e) { toast('Нет микрофона'); }
        }

        function stopVoice() {
            if (mediaRec && isRec) { mediaRec.stop(); isRec = false; clearInterval(recTimer); }
        }

        let currentVoiceAudio = null;
        let currentVoiceBtn = null;

        function playVoice(url, btn, progressDiv, durationSpan) {
            if (currentVoiceAudio && currentVoiceBtn === btn) {
                currentVoiceAudio.pause();
                currentVoiceAudio = null;
                currentVoiceBtn = null;
                btn.textContent = '▶️';
                return;
            }
            if (currentVoiceAudio) {
                currentVoiceAudio.pause();
                if (currentVoiceBtn) currentVoiceBtn.textContent = '▶️';
                currentVoiceAudio = null;
                currentVoiceBtn = null;
            }
            const audio = new Audio(url);
            currentVoiceAudio = audio;
            currentVoiceBtn = btn;
            audio.play();
            btn.textContent = '⏸️';
            
            audio.onloadedmetadata = () => {
                const duration = audio.duration;
                const minutes = Math.floor(duration / 60);
                const seconds = Math.floor(duration % 60);
                if (durationSpan) durationSpan.textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;
            };
            
            audio.ontimeupdate = () => {
                if (progressDiv && audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressDiv.style.width = percent + '%';
                }
            };
            
            audio.onended = () => {
                btn.textContent = '▶️';
                if (progressDiv) progressDiv.style.width = '0%';
                currentVoiceAudio = null;
                currentVoiceBtn = null;
            };
            
            audio.onerror = () => {
                toast('Ошибка');
                btn.textContent = '▶️';
                currentVoiceAudio = null;
                currentVoiceBtn = null;
            };
        }

                                <div class="chat-preview">${c.status}</div>
                            </div>
                            <button class="delete-chat" onclick="event.stopPropagation(); unsubscribeFromChannel(${c.channelId}, '${c.name}')">✕</button>
                        </div>
                    `).join('')}</div>` : ''}
                    ${userChats.length ? `<div class="chat-section">ЛИЧНЫЕ СООБЩЕНИЯ</div>${userChats.map(c => `
                        <div class="chat-item ${currentChat === c.name && currentChatType === 'user' ? 'active' : ''}" onclick="selectChat('${c.name}', 'user', null)">
                            <div class="chat-avatar">${c.avatar}${c.online ? '<div class="online-dot"></div>' : ''}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(c.name)}${c.verified ? ' ✓' : ''}</div>
                                <div class="chat-preview">${c.status}</div>
                            </div>
                            <button class="delete-chat" onclick="event.stopPropagation(); deleteChat('${c.name}', 'user', null)">✕</button>
                        </div>
                    `).join('')}</div>` : ''}
                    ${channelSearchResults.length ? `<div class="chat-section">ДОСТУПНЫЕ КАНАЛЫ</div>${channelSearchResults.map(c => `
                        <div class="chat-item" onclick="subscribeToChannel(${c.id}, '${c.name.replace(/'/g,"\\'")}', '${c.created_by}')">
                            <div class="chat-avatar">📢</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(c.name)}</div>
                                <div class="chat-preview">🔍 Нажмите подписаться</div>
                            </div>
                        </div>
                    `).join('')}</div>` : ''}
                    ${userSearchResults.length ? `<div class="chat-section">НОВЫЕ ЛЮДИ</div>${userSearchResults.map(u => `
                        <div class="chat-item" onclick="selectChat('${u.username}', 'user', null)">
                            <div class="chat-avatar">${u.avatar}${u.online ? '<div class="online-dot"></div>' : ''}</div>
                            <div class>
                                                        <div class="chat-info">
                                <div class="chat-name">${escapeHtml(u.username)}${u.verified ? ' ✓' : ''}</div>
                                <div class="chat-preview">${u.online ? 'В сети' : 'Не в сети'}</div>
                            </div>
                        </div>
                    `).join('')}</div>` : ''}
                </div>
                <div id="stickerPanel" class="sticker-panel">${STICKERS.map(s => `<div class="sticker" onclick="sendMessage('${s}'); toggleSticker()">${s}</div>`).join('')}</div>
            `;
            
            // Закрываем плюс меню при клике вне
            document.addEventListener('click', function(e) {
                const menu = document.getElementById('plusMenu');
                const btn = e.target.closest('.action-btn');
                if (menu && !btn && plusMenuOpen) {
                    menu.classList.remove('show');
                    plusMenuOpen = false;
                }
            });
        }

        async function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            if (!messages.length) { 
                if (currentChat) {
                    container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary);">✨ Нет сообщений</div>';
                }
                return; 
            }
            
            const rm = new Map();
            for (const m of messages) {
                if (!m.isTemp) { const r = await getReactions(m.id, currentChatType); rm.set(m.id, r); }
                else rm.set(m.id, []);
            }
            
            let html = '';
            for (const m of messages) {
                const isOwn = m.from_user === currentUser.username;
                const reacts = rm.get(m.id) || [];
                const userReact = reacts.find(r => r.user_id === currentUser.username);
                const rg = {};
                reacts.forEach(r => { rg[r.reaction] = (rg[r.reaction] || 0) + 1; });
                
                let fh = '';
                if (m.file_url) {
                    if (m.file_url.startsWith('data:image/')) {
                        fh = `<div class="message-file"><img src="${m.file_url}" onclick="viewImage('${m.file_url}')"></div>`;
                    } else if (m.file_url.startsWith('data:audio/')) {
                        fh = `<div class="voice-message">
                            <button class="voice-play" onclick="playVoice('${m.file_url}', this, document.getElementById('progress_${m.id}'), document.getElementById('duration_${m.id}'))">▶️</button>
                            <div class="voice-timeline">
                                <div class="voice-progress" id="progress_${m.id}"></div>
                            </div>
                            <span class="voice-duration" id="duration_${m.id}">--:--</span>
                        </div>`;
                    } else {
                        fh = `<div class="message-file"><a href="${m.file_url}" download>📎 ${escapeHtml(m.file_name || 'файл')}</a></div>`;
                    }
                }
                
                let rh = '';
                for (const [e,c] of Object.entries(rg)) { const a = userReact?.reaction === e ? 'active' : ''; rh += `<span class="reaction ${a}" onclick="addReaction(${m.id}, '${e}', '${currentChatType}')">${e}${c>1 ? c : ''}</span>`; }
                
                html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${m.id}">${!isOwn && (currentChatType === 'group' || currentChatType === 'channel') ? `<div class="message-sender">${escapeHtml(m.from_user)}${m.from_user === currentChannelCreator ? ' 👑' : ''}</div>` : ''}<div class="message-bubble" oncontextmenu="showMessageContextMenu(event, ${m.id}, '${m.from_user}', '${escapeHtml(m.text || '').replace(/'/g,"\\'")}')"><div class="message-text">${escapeHtml(m.text || '')}</div>${fh}</div><div class="message-time">${m.isTemp ? '🕐 отправляется...' : formatTime(m.timestamp)}</div><div class="reactions">${rh}</div></div>`;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function renderChatArea() {
            const ca = document.getElementById('chatArea');
            if (!ca) return;
            
            if (!currentChat) {
                ca.innerHTML = `<div class="empty-state">Выберите чат</div>`;
                return;
            }
            
            let status = '', verified = false;
            const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
            const canWrite = currentChatType !== 'channel' || isAuthor;
            
            if (currentChatType === 'group') status = 'Группа';
            else if (currentChatType === 'channel') status = `Автор: ${currentChannelCreator || '?'}`;
            else if (currentChat) { 
                const u = allUsers.find(u => u.username === currentChat); 
                status = u?.online ? 'В сети' : 'Не в сети'; 
                verified = u?.verified || false; 
            }
            
            const showSubscribeButton = currentChatType === 'channel' && !isAuthor;
            
            ca.innerHTML = `
                <div class="chat-header">
                    <button class="back-button" onclick="toggleSidebar()">←</button>
                    <div class="chat-header-avatar" onclick="showProfile(allUsers.find(u=>u.username===currentChat)||{username:currentChat,avatar:currentChatAvatar,online:true})">
                        ${currentChatType === 'user' ? (allUsers.find(u=>u.username===currentChat)?.avatar || '👤') : (currentChatType === 'channel' ? '📢' : '👥')}
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name">${escapeHtml(currentChat)}${verified ? ' ✓' : ''}</div>
                        <div class="chat-header-status">${status}</div>
                    </div>
                    ${showSubscribeButton ? `
                        <button class="action-btn" style="width:auto;padding:6px 12px;" onclick="${subscribedChannels.some(c => c.id === currentGroupId) ? `unsubscribeFromChannel(${currentGroupId}, '${currentChat}')` : `subscribeToChannel(${currentGroupId}, '${currentChat}', '${currentChannelCreator}')`}">
                            ${subscribedChannels.some(c => c.id === currentGroupId) ? 'Отписаться' : 'Подписаться'}
                        </button>
                    ` : ''}
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                ${!showSubscribeButton ? `
                    <div class="input-area">
                        <div class="input-wrapper">
                            <button class="input-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                            <input type="file" id="fileInput" style="display:none;" onchange="uploadFile()">
                            <button class="input-btn" onclick="startVoice()">🎙️</button>
                            <button class="input-btn" onclick="toggleSticker()">😊</button>
                            <textarea class="message-input" id="msgInput" placeholder="${canWrite ? (currentChat ? 'Сообщение...' : 'Выберите чат') : 'Только автор'}" ${!currentChat || !canWrite ? 'disabled' : ''} rows="1"></textarea>
                            <button class="input-btn send-btn" onclick="sendFromInput()" ${!currentChat || !canWrite ? 'disabled' : ''}>➤</button>
                        </div>
                    </div>
                ` : ''}
            `;
            
            renderMessages();
            
            if (currentChat && canWrite && !showSubscribeButton) { 
                const i = document.getElementById('msgInput'); 
                if (i) i.addEventListener('keypress', e => { 
                    if (e.key === 'Enter' && !e.shiftKey) { 
                        e.preventDefault(); 
                        sendFromInput(); 
                    } 
                }); 
            }
        }

        function uploadFile() {
            const i = document.getElementById('fileInput');
            const f = i.files[0];
            if (!f) return;
            if (f.size > 10*1024*1024) { toast('Файл >10MB'); return; }
            const r = new FileReader();
            r.onloadend = () => sendMessage('', { url: r.result, name: f.name, type: f.type });
            r.readAsDataURL(f);
            i.value = '';
        }

        function toggleSticker() { document.getElementById('stickerPanel')?.classList.toggle('show'); }

        async function deleteChat(id, type, gid) {
            if (!confirm(`Удалить чат?`)) return;
            if (type === 'group' && gid) { await api('POST', '/leave-group', { groupId: gid, userId: currentUser.username }); await loadChats(); }
            if (currentChat === id) { currentChat = null; renderChatArea(); }
            renderSidebar();
        }

        let isLogin = true;
        
        function renderAuth() {
            const savedAccounts = getSavedAccounts();
            
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <div class="login-title">DanuMes</div>
                        <input type="text" class="login-input" id="authUser" placeholder="Имя">
                        <input type="password" class="login-input" id="authPass" placeholder="Пароль">
                        <button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Зарегистрироваться'}</button>
                        <div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div>
                        ${savedAccounts.length > 0 ? `
                            <div class="saved-accounts">
                                <div class="saved-title">Сохранённые аккаунты</div>
                                ${savedAccounts.map(acc => `
                                    <div class="saved-account" onclick="document.getElementById('authUser').value='${acc.username}'; document.getElementById('authPass').value='${acc.password}'; submitAuth()">
                                        <div class="saved-avatar">${acc.avatar || '👤'}</div>
                                        <div class="saved-name">${escapeHtml(acc.username)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function toggleMode() { 
            isLogin = !isLogin; 
            renderAuth(); 
        }
        
        async function submitAuth() {
            const u = document.getElementById('authUser').value.trim();
            const p = document.getElementById('authPass').value;
            if (!u || !p) { toast('Заполните поля'); return; }
            
            const r = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username: u, password: p });
            if (r.success) {
                if (isLogin) { 
                    currentUser = { username: r.username, avatar: r.avatar || '👤', verified: r.verified };
                    saveAccount(u, p, r.avatar);
                    saveCurrentUser(currentUser);
                    renderMain(); 
                } else { 
                    toast('Регистрация успешна! Войдите'); 
                    isLogin = true; 
                    renderAuth(); 
                }
            } else toast(r.error || 'Ошибка');
        }
        
        async function renderMain() {
            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar" id="sidebar"></div>
                    <div class="chat-area" id="chatArea"></div>
                </div>
            `;
            await loadChats();
            if (allGroups.length) selectChat(allGroups[0].name, 'group', allGroups[0].id);
            else if (allUsers.length) selectChat(allUsers[0].username, 'user', null);
            
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
            
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => { loadMessages(); loadChats(); }, 5000);
        }

        const savedUser = getCurrentUser();
        if (savedUser) {
            currentUser = savedUser;
            renderMain();
        } else {
            renderAuth();
        }

        window.addReaction = addReaction;
        window.updateAvatar = updateAvatar;
        window.setTheme = setTheme;
        window.selectChat = selectChat;
        window.subscribeToChannel = subscribeToChannel;
        window.unsubscribeFromChannel = unsubscribeFromChannel;
        window.showGroupModal = showGroupModal;
        window.showChannelModal = showChannelModal;
        window.createGroup = createGroup;
        window.createChannel = createChannel;
        window.sendMessage = sendMessage;
        window.sendFromInput = sendFromInput;
        window.showAvatarModal = showAvatarModal;
        window.closeModal = closeModal;
        window.submitAuth = submitAuth;
        window.toggleMode = toggleMode;
        window.showMessageContextMenu = showMessageContextMenu;
        window.startVoice = startVoice;
        window.stopVoice = stopVoice;
        window.playVoice = playVoice;
        window.viewImage = viewImage;
        window.showProfile = showProfile;
        window.uploadFile = uploadFile;
        window.togglePlusMenu = togglePlusMenu;
        window.closePlusMenu = closePlusMenu;
        window.openSettings = openSettings;
        window.toggleSticker = toggleSticker;
        window.deleteChat = deleteChat;
        window.logout = logout;
        window.toggleSidebar = toggleSidebar;
    </script>
</body>
</html>
