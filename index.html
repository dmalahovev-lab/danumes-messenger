<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.2s, color 0.2s;
            height: 100vh;
            overflow: hidden;
        }
        body.dark {
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
            color: #e5e7eb;
        }
        body.light {
            background: radial-gradient(circle at 20% 30%, #e0e7ff, #f0f4f8);
            color: #1f2937;
        }
        /* Контейнер с тремя колонками */
        .messenger {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        body.dark .messenger { background: rgba(15, 25, 35, 0.4); backdrop-filter: blur(10px); }
        body.light .messenger { background: rgba(245, 245, 255, 0.6); backdrop-filter: blur(10px); }
        /* Левая колонка: чаты */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid;
        }
        body.dark .sidebar { background: rgba(30, 40, 50, 0.5); border-color: rgba(255,255,255,0.1); }
        body.light .sidebar { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.05); }
        /* Верхняя часть с аватаром и именем */
        .profile-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid;
            cursor: pointer;
        }
        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, #4b5563, #6b7280);
        }
        .profile-avatar[data-avatar="Danumala"] { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .profile-avatar[data-avatar="RunFly"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .profile-info h3 { font-size: 18px; margin-bottom: 4px; }
        .profile-info p { font-size: 12px; opacity: 0.7; }
        /* Поиск */
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid;
        }
        .search-box input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            outline: none;
        }
        body.dark .search-box input { color: white; background: rgba(0,0,0,0.3); }
        body.light .search-box input { color: #1f2937; background: rgba(0,0,0,0.05); }
        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        body.dark .chat-item:hover { background: rgba(255,255,255,0.1); }
        body.light .chat-item:hover { background: rgba(0,0,0,0.05); }
        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #4b5563, #6b7280);
        }
        .chat-avatar[data-avatar="Danumala"] { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .chat-avatar[data-avatar="RunFly"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .verified-badge { font-size: 14px; color: #3b82f6; }
        .chat-lastmsg {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }
        /* Нижняя панель */
        .bottom-actions {
            padding: 12px 16px;
            border-top: 1px solid;
            display: flex;
            gap: 12px;
            justify-content: space-around;
        }
        .bottom-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.1s;
        }
        body.dark .bottom-btn { color: #e5e7eb; }
        body.light .bottom-btn { color: #1f2937; }
        .bottom-btn:hover { background: rgba(0,0,0,0.1); }
        /* Средняя колонка: друзья */
        .friends-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid;
            transition: transform 0.2s ease;
            background: inherit;
        }
        body.dark .friends-panel { background: rgba(30, 40, 50, 0.5); border-color: rgba(255,255,255,0.1); }
        body.light .friends-panel { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.05); }
        .friends-header {
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-friends {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .friends-list {
            flex: 1;
            overflow-y: auto;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .friend-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4b5563, #6b7280);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .friend-info { flex: 1; }
        .friend-name { font-weight: 500; }
        .friend-actions {
            display: flex;
            gap: 8px;
        }
        .friend-actions button {
            background: rgba(59,130,246,0.8);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .friend-actions button.outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        .add-friend {
            padding: 12px;
            border-top: 1px solid;
            display: flex;
            gap: 8px;
        }
        .add-friend input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            outline: none;
        }
        .add-friend button {
            background: #3b82f6;
            border: none;
            padding: 0 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: background-image 0.2s;
        }
        .custom-chat-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .chat-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid;
        }
        body.dark .chat-header { background: rgba(30, 40, 50, 0.4); border-color: rgba(255,255,255,0.1); }
        body.light .chat-header { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.05); }
        .chat-header-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, #4b5563, #6b7280);
        }
        .chat-header-info { flex: 1; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 75%;
            position: relative;
        }
        .message-own { align-self: flex-end; flex-direction: row-reverse; }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            font-size: 15px;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body.dark .message-bubble { background: rgba(40,50,65,0.7); color: #f0f3f8; }
        body.light .message-bubble { background: rgba(255,255,255,0.8); color: #1f2937; }
        .message-own .message-bubble {
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 22px;
        }
        body.dark .message-own .message-bubble { background: linear-gradient(135deg, rgba(59,130,246,0.8), rgba(139,92,246,0.8)); }
        body.light .message-own .message-bubble { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .message-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 6px;
        }
        .edited-badge { font-size: 9px; opacity: 0.5; margin-left: 6px; }
        .reactions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .reaction-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .file-attach {
            display: inline-block;
            margin-top: 6px;
            background: rgba(0,0,0,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        .message-image {
            max-width: 250px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 6px;
        }
        .input-area {
            padding: 16px 20px;
            display: flex;
            gap: 14px;
            border-top: 1px solid;
        }
        body.dark .input-area { background: rgba(30, 40, 50, 0.4); border-color: rgba(255,255,255,0.1); }
        body.light .input-area { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.05); }
        .input-wrapper {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            background: none;
            border: none;
            font-size: 15px;
            outline: none;
        }
        body.dark #messageInput { color: white; }
        body.light #messageInput { color: #1f2937; }
        .file-btn, .emoji-btn, .sticker-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            color: white;
        }
        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 6px 0;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .context-menu div {
            padding: 10px 16px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }
        .context-menu div:hover { background: rgba(59,130,246,0.6); }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 16px; }
        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(30,40,50,0.95);
            border-radius: 32px;
            padding: 24px;
            width: 380px;
            text-align: center;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .emoji-option {
            font-size: 32px;
            cursor: pointer;
            padding: 6px;
            border-radius: 12px;
        }
        .emoji-option:hover { background: rgba(255,255,255,0.2); }
        .close-modal {
            background: #3b82f6;
            border: none;
            padding: 10px;
            border-radius: 28px;
            color: white;
            width: 100%;
            cursor: pointer;
        }
        /* Стикеры */
        .sticker-panel {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(30,40,50,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px;
            width: 320px;
            z-index: 1500;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .sticker { font-size: 32px; cursor: pointer; text-align: center; padding: 4px; }
        /* Шаг создания группы */
        .group-step { margin-bottom: 20px; }
        .group-step input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }
        .friend-select {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .friend-select input { width: auto; margin: 0; }
        .group-nav button {
            background: #3b82f6;
            border: none;
            padding: 8px 16px;
            border-radius: 28px;
            color: white;
            margin: 5px;
            cursor: pointer;
        }
        /* Auth */
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: rgba(30,40,50,0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 460px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        body.light .auth-card {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .auth-card h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 56px;
            cursor: pointer;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }
        body.light .tab { color: rgba(0,0,0,0.6); }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
        }
        body.light .input-group input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #1f2937; }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .error-text { color: #f87171; font-size: 13px; text-align: center; margin-top: -8px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 5000;
            animation: fadeInOut 3s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
        @media (max-width: 800px) {
            .friends-panel { width: 260px; }
        }
    </style>
</head>
<body class="dark">
<div id="app"></div>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let currentChat = null;
    let currentChatType = 'user';
    let messages = [];
    let chats = [];
    let groups = [];
    let channels = [];
    let allUsers = [];
    let friendsList = [];
    let friendRequests = { received: [], sent: [] };
    let searchQuery = '';
    let pollInterval = null;
    let searchTimeout = null;
    let drafts = {};
    let customChatBg = localStorage.getItem('customChatBg') || null;
    let theme = localStorage.getItem('theme') || 'dark';
    let showFriendsPanel = false;

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function initTheme() {
        document.body.classList.remove('dark', 'light');
        document.body.classList.add(theme);
        const chatMain = document.querySelector('.chat-main');
        if (chatMain && customChatBg) {
            chatMain.style.backgroundImage = `url(${customChatBg})`;
            chatMain.classList.add('custom-chat-bg');
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) opts.body = data;
        const res = await fetch(url, opts);
        return res.json();
    }

    async function loadAllUsers() {
        const res = await api('GET', '/get-users');
        allUsers = res || [];
    }

    async function loadFriends() {
        const friendsRes = await api('GET', `/friends/${currentUser.username}`);
        friendsList = friendsRes || [];
        const requestsRes = await api('GET', `/friend-requests/${currentUser.username}`);
        friendRequests = requestsRes;
        renderFriendsPanel();
    }

    async function loadChatsAndChannels() {
        if (!currentUser) return;
        const userChats = await api('GET', `/get-chats/${currentUser.username}`);
        const channelList = await api('GET', '/get-channels');
        const groupList = await api('GET', `/get-groups/${currentUser.username}`);
        channels = channelList || [];
        groups = groupList || [];
        let all = [];
        channels.forEach(ch => all.push({ type: 'channel', id: ch.id, name: ch.name, avatar: ch.avatar, lastMessage: ch.lastMessage || 'Нет сообщений', lastTime: ch.lastTime }));
        groups.forEach(g => all.push({ type: 'group', id: g.id, name: g.name, avatar: g.avatar, lastMessage: g.lastMessage || 'Нет сообщений', lastTime: g.lastTime }));
        (userChats || []).forEach(uc => all.push({ type: 'user', id: uc.username, name: uc.username, avatar: uc.avatar, online: uc.online, verified: uc.verified, lastMessage: uc.lastMessage || 'Нет сообщений', lastTime: uc.lastTime }));
        all.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
        chats = all;
        renderSidebar();
    }

    async function loadMessages() {
        if (!currentUser || !currentChat) return;
        let data;
        if (currentChatType === 'user') data = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
        else if (currentChatType === 'channel') data = await api('GET', `/get-channel-messages/${currentChat}`);
        else data = await api('GET', `/get-group-messages/${currentChat}`);
        messages = data || [];
        for (let msg of messages) {
            const reactions = await api('GET', `/get-reactions/${msg.id}/${currentChatType}`);
            msg.reactions = reactions || [];
        }
        renderMessages();
        const draftKey = `${currentChat}_${currentChatType}`;
        const draftInput = document.getElementById('messageInput');
        if (draftInput && drafts[draftKey] !== undefined) draftInput.value = drafts[draftKey];
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if ((!text && !fileUrl)) return;
        if (currentChatType === 'user') await api('POST', '/send-message', { from: currentUser.username, to: currentChat, text: text || '', fileUrl, fileName });
        else if (currentChatType === 'channel') await api('POST', '/send-channel-message', { channelId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
        else await api('POST', '/send-group-message', { groupId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
        const draftKey = `${currentChat}_${currentChatType}`;
        delete drafts[draftKey];
        await api('POST', '/drafts', { username: currentUser.username, chatId: currentChat, chatType: currentChatType, draftText: '' });
        await loadMessages();
        await loadChatsAndChannels();
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        renderSidebar();
        const headerAvatar = document.querySelector('.chat-header-avatar');
        if (headerAvatar) headerAvatar.textContent = emoji;
        const profileAvatar = document.querySelector('.profile-avatar');
        if (profileAvatar) profileAvatar.textContent = emoji;
        showToast('Аватар обновлён');
    }

    async function updateUsername(newUsername) {
        const res = await api('POST', '/update-username', { oldUsername: currentUser.username, newUsername });
        if (res.success) {
            currentUser.username = newUsername;
            renderSidebar();
            const profileName = document.querySelector('.profile-info h3');
            if (profileName) profileName.textContent = newUsername;
            showToast('Имя изменено');
        } else showToast(res.error || 'Ошибка', true);
    }

    async function deleteMessage(msgId) {
        if (currentChatType === 'user') await api('DELETE', `/delete-message/${msgId}`);
        else if (currentChatType === 'channel') await api('DELETE', `/delete-channel-message/${msgId}`);
        else await api('DELETE', `/delete-group-message/${msgId}`);
        await loadMessages();
        await loadChatsAndChannels();
        showToast('Сообщение удалено');
    }

    async function editMessage(msgId, newText) {
        await api('PUT', `/edit-message/${msgId}`, { text: newText, messageType: currentChatType });
        await loadMessages();
        showToast('Сообщение отредактировано');
    }

    async function addReaction(msgId, reaction) {
        await api('POST', '/reaction', { messageId: msgId, messageType: currentChatType, username: currentUser.username, reaction });
        await loadMessages();
    }

    async function removeReaction(msgId) {
        await api('DELETE', '/reaction', { messageId: msgId, messageType: currentChatType, username: currentUser.username });
        await loadMessages();
    }

    async function sendFriendRequest(to) {
        const res = await api('POST', '/send-friend-request', { from: currentUser.username, to });
        if (res.success) {
            showToast(`Заявка отправлена ${to}`);
            loadFriends();
        } else showToast('Ошибка', true);
    }

    async function acceptFriendRequest(from) {
        await api('POST', '/friend-request/accept', { from, to: currentUser.username });
        showToast(`Вы друзья с ${from}`);
        loadFriends();
        loadChatsAndChannels();
    }

    async function rejectFriendRequest(from) {
        await api('POST', '/friend-request/reject', { from, to: currentUser.username });
        showToast(`Заявка отклонена`);
        loadFriends();
    }

    async function createGroup(name, memberUsernames) {
        const res = await api('POST', '/create-group', { name, createdBy: currentUser.username, members: memberUsernames });
        if (res.success) {
            await loadChatsAndChannels();
            currentChat = res.groupId;
            currentChatType = 'group';
            await loadMessages();
            renderSidebar();
            renderChat();
            showToast('Группа создана');
        } else showToast('Ошибка', true);
    }

    function openChatWithUser(username) {
        currentChatType = 'user';
        currentChat = username;
        messages = [];
        renderChat();
        loadMessages();
        renderSidebar();
        renderFriendsPanel();
    }

    // ========== РЕНДЕРЫ ==========
    function renderSidebar() {
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        let filtered = chats.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
        let avatarAttr = (currentUser.username === 'Danumala' || currentUser.username === 'RunFly') ? `data-avatar="${currentUser.username}"` : '';
        let html = `
            <div class="profile-header" id="profileHeader">
                <div class="profile-avatar" ${avatarAttr}>${currentUser.avatar}</div>
                <div class="profile-info"><h3>${escapeHtml(currentUser.username)}</h3><p>${currentUser.verified ? 'Верифицирован' : ''}</p></div>
            </div>
            <div class="search-box"><input type="text" id="searchInput" placeholder="Поиск" value="${escapeHtml(searchQuery)}"></div>
            <div class="chats-list" id="chatsList">`;
        filtered.forEach(chat => {
            const activeClass = (currentChat === chat.id && currentChatType === chat.type) ? 'active' : '';
            let nameHtml = escapeHtml(chat.name);
            if (chat.type === 'user' && chat.verified) nameHtml += ' ✓';
            if (chat.type === 'user' && chat.online) nameHtml += ' ●';
            let chatAvatarAttr = (chat.type === 'user' && (chat.name === 'Danumala' || chat.name === 'RunFly')) ? `data-avatar="${chat.name}"` : '';
            html += `<div class="chat-item ${activeClass}" data-type="${chat.type}" data-id="${chat.id}">
                        <div class="chat-avatar" ${chatAvatarAttr}>${chat.avatar}</div>
                        <div class="chat-info"><div class="chat-name">${nameHtml}</div><div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div></div>
                    </div>`;
        });
        html += `</div><div class="bottom-actions">
                    <button class="bottom-btn" id="createGroupBtn">👥+</button>
                    <button class="bottom-btn" id="friendsBtn">👥</button>
                    <button class="bottom-btn" id="settingsBtn">⚙️</button>
                </div>`;
        sidebarDiv.innerHTML = html;
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                currentChatType = el.dataset.type;
                currentChat = el.dataset.id;
                messages = [];
                renderChat();
                loadMessages();
                renderSidebar();
            });
        });
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.addEventListener('input', (e) => {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { searchQuery = e.target.value; renderSidebar(); }, 300);
        });
        document.getElementById('profileHeader')?.addEventListener('click', showSettingsModal);
        document.getElementById('createGroupBtn')?.addEventListener('click', showCreateGroupModal);
        document.getElementById('friendsBtn')?.addEventListener('click', () => { showFriendsPanel = !showFriendsPanel; renderFriendsPanel(); });
        document.getElementById('settingsBtn')?.addEventListener('click', showSettingsModal);
    }

    function renderFriendsPanel() {
        const container = document.getElementById('friendsPanelContainer');
        if (!container) return;
        if (!showFriendsPanel) { container.innerHTML = ''; container.style.display = 'none'; return; }
        container.style.display = 'flex';
        let html = `<div class="friends-header"><span>Друзья</span><button class="close-friends" id="closeFriendsBtn">✕</button></div>
                    <div class="friends-list">`;
        (friendRequests.received || []).forEach(req => {
            html += `<div class="friend-item"><div class="friend-avatar">👤</div><div class="friend-info"><div class="friend-name">${escapeHtml(req.from_user)}</div><div class="friend-status">Заявка в друзья</div></div>
                        <div class="friend-actions"><button onclick="acceptFriendRequest('${req.from_user}')">Принять</button><button class="outline" onclick="rejectFriendRequest('${req.from_user}')">Отклонить</button></div></div>`;
        });
        friendsList.forEach(f => {
            html += `<div class="friend-item"><div class="friend-avatar">👤</div><div class="friend-info"><div class="friend-name">${escapeHtml(f)}</div></div>
                        <div class="friend-actions"><button onclick="openChatWithUser('${f}')">💬</button></div></div>`;
        });
        if (!friendsList.length && !friendRequests.received?.length) html += `<div style="padding:20px;text-align:center;">Нет друзей</div>`;
        html += `</div><div class="add-friend"><input type="text" id="newFriendName" placeholder="Имя пользователя"><button id="addFriendBtn">➕ Добавить</button></div>`;
        container.innerHTML = html;
        document.getElementById('closeFriendsBtn')?.addEventListener('click', () => { showFriendsPanel = false; renderFriendsPanel(); });
        document.getElementById('addFriendBtn')?.addEventListener('click', () => {
            const name = document.getElementById('newFriendName').value.trim();
            if (name) sendFriendRequest(name);
        });
    }

    function renderMessages() {
        const container = document.getElementById('messagesList');
        if (!container) return;
        if (!currentChat) { container.innerHTML = `<div style="text-align:center;opacity:0.5;padding:20px;">Выберите чат</div>`; return; }
        if (!messages.length) { container.innerHTML = `<div style="text-align:center;opacity:0.5;padding:20px;">Нет сообщений</div>`; return; }
        let html = '';
        messages.forEach(msg => {
            const isOwn = msg.from_user === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            let content = '';
            if (msg.file_url && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(msg.file_name)) content += `<img src="${msg.file_url}" class="message-image" data-url="${msg.file_url}">`;
            else if (msg.file_url) content += `<a href="${msg.file_url}" download class="file-attach">📎 ${escapeHtml(msg.file_name || 'Файл')}</a>`;
            if (msg.text) content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            if (msg.edited) content += `<span class="edited-badge">(ред.)</span>`;
            let reactionsHtml = '';
            if (msg.reactions?.length) {
                const grouped = {};
                msg.reactions.forEach(r => grouped[r.reaction] = (grouped[r.reaction] || 0) + 1);
                reactionsHtml = '<div class="reactions">';
                for (let [reaction, count] of Object.entries(grouped)) {
                    const hasUserReaction = msg.reactions.some(r => r.username === currentUser.username && r.reaction === reaction);
                    reactionsHtml += `<span class="reaction-badge" data-msg-id="${msg.id}" data-reaction="${reaction}" data-has="${hasUserReaction}">${reaction} ${count}</span>`;
                }
                reactionsHtml += '</div>';
            }
            let senderName = (currentChatType === 'group' && !isOwn) ? `<div class="message-sender">${escapeHtml(msg.from_user)}</div>` : '';
            html += `<div class="message ${isOwn ? 'message-own' : ''}" data-msg-id="${msg.id}" data-msg-from="${msg.from_user}" data-file-url="${msg.file_url || ''}">
                        <div class="message-bubble">${senderName}${content}${reactionsHtml}<div class="message-time">${time}</div></div>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.message-image').forEach(img => img.addEventListener('click', (e) => { e.stopPropagation(); showLightbox(img.src); }));
        document.querySelectorAll('.message').forEach(el => {
            el.addEventListener('contextmenu', (e) => {
                const msgId = el.dataset.msgId, msgFrom = el.dataset.msgFrom, isOwn = msgFrom === currentUser.username;
                const items = [];
                if (isOwn) items.push({ label: '✏️ Редактировать', action: () => startEditing(msgId, el) }, { label: '🗑 Удалить', action: () => deleteMessage(msgId) });
                items.push({ label: '❤️ Реакция', action: () => showReactionPicker(msgId) });
                if (items.length) showContextMenu(e, items);
            });
        });
        document.querySelectorAll('.reaction-badge').forEach(badge => {
            badge.addEventListener('click', async (e) => {
                e.stopPropagation();
                const msgId = badge.dataset.msgId, reaction = badge.dataset.reaction, has = badge.dataset.has === 'true';
                if (has) await removeReaction(msgId);
                else await addReaction(msgId, reaction);
            });
        });
        container.scrollTop = container.scrollHeight;
    }

    function startEditing(msgId, msgEl) {
        const bubble = msgEl.querySelector('.message-text');
        if (!bubble) return;
        const oldText = bubble.innerText;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = oldText;
        input.className = 'edit-input';
        bubble.replaceWith(input);
        input.focus();
        input.addEventListener('blur', async () => {
            if (input.value.trim() && input.value !== oldText) await editMessage(msgId, input.value.trim());
            else await loadMessages();
        });
        input.addEventListener('keypress', async (e) => { if (e.key === 'Enter') { if (input.value.trim() && input.value !== oldText) await editMessage(msgId, input.value.trim()); else await loadMessages(); } });
    }

    function showReactionPicker(msgId) {
        const reactions = ['👍','❤️','😂','😮','😢','😡'];
        const picker = document.createElement('div'); picker.className = 'reactions-panel';
        reactions.forEach(r => { const span = document.createElement('span'); span.textContent = r; span.className = 'reaction-emoji'; span.onclick = async () => { await addReaction(msgId, r); picker.remove(); }; picker.appendChild(span); });
        const msgEl = document.querySelector(`.message[data-msg-id="${msgId}"] .message-bubble`);
        if (msgEl) { msgEl.appendChild(picker); setTimeout(() => picker.remove(), 3000); }
    }

    function renderChat() {
        const mainDiv = document.getElementById('chatMain');
        if (!mainDiv) return;
        if (!currentChat) { mainDiv.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;">✨ Выберите чат ✨</div>`; return; }
        let chatInfo = { name: currentChat, avatar: '💬' };
        const found = chats.find(c => c.id === currentChat && c.type === currentChatType);
        if (found) chatInfo = found;
        let avatarAttr = (currentChatType === 'user' && (chatInfo.name === 'Danumala' || chatInfo.name === 'RunFly')) ? `data-avatar="${chatInfo.name}"` : '';
        mainDiv.innerHTML = `
            <div class="chat-header"><div class="chat-header-avatar" ${avatarAttr}>${chatInfo.avatar}</div><div class="chat-header-info"><h3>${escapeHtml(chatInfo.name)}</h3></div></div>
            <div class="messages-area" id="messagesList"></div>
            <div class="input-area"><div class="input-wrapper"><input type="text" id="messageInput" placeholder="Сообщение"><button class="emoji-btn" id="emojiBtn">😊</button><button class="sticker-btn" id="stickerBtn">🎨</button><label class="file-btn" id="fileLabel">📎</label><input type="file" id="fileInput" style="display:none"></div><button class="send-btn" id="sendBtn">➤</button></div>
            <div id="emojiPicker" style="display:none;position:absolute;bottom:70px;left:20px;background:rgba(30,40,50,0.95);border-radius:20px;padding:12px;width:280px;z-index:1500;"><div class="emoji-grid" id="emojiGrid"></div></div>
            <div id="stickerPanel" style="display:none;position:absolute;bottom:70px;left:20px;background:rgba(30,40,50,0.95);border-radius:20px;padding:12px;width:320px;z-index:1500;"><div class="sticker-grid" id="stickerGrid"></div></div>
        `;
        renderMessages();
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileLabel = document.getElementById('fileLabel'), fileInput = document.getElementById('fileInput');
        const emojiBtn = document.getElementById('emojiBtn'), emojiPicker = document.getElementById('emojiPicker'), emojiGrid = document.getElementById('emojiGrid');
        const stickerBtn = document.getElementById('stickerBtn'), stickerPanel = document.getElementById('stickerPanel'), stickerGrid = document.getElementById('stickerGrid');
        if (emojiGrid && !emojiGrid.children.length) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉','😍','🤔','😂','🥲','😭','😡','🥺','🤯','💀','👾','🎈','🍕','⚽','🎵','📷','🔒'];
            emojis.forEach(e => { const div = document.createElement('div'); div.className = 'emoji-option'; div.textContent = e; div.onclick = () => { msgInput.value += e; msgInput.focus(); emojiPicker.style.display = 'none'; }; emojiGrid.appendChild(div); });
        }
        if (stickerGrid && !stickerGrid.children.length) {
            const stickers = ['🐱','🐶','🐼','🐨','🐸','🐙','🦄','🐧','🐦','🐝','🐞','🌸','⭐','🔥','💎','🎈','🍕','🍔','☕','⚡','❤️','💔','🎉','🎂','🏆','💰','📱','💻','🎮','🎵'];
            stickers.forEach(s => { const div = document.createElement('div'); div.className = 'sticker'; div.textContent = s; div.onclick = () => { msgInput.value += s; msgInput.focus(); }; stickerGrid.appendChild(div); });
        }
        emojiBtn.onclick = (e) => { e.stopPropagation(); emojiPicker.style.display = emojiPicker.style.display === 'flex' ? 'none' : 'flex'; stickerPanel.style.display = 'none'; };
        stickerBtn.onclick = (e) => { e.stopPropagation(); stickerPanel.style.display = stickerPanel.style.display === 'flex' ? 'none' : 'flex'; emojiPicker.style.display = 'none'; };
        document.addEventListener('click', (e) => { if (!emojiPicker?.contains(e.target) && e.target !== emojiBtn) emojiPicker.style.display = 'none'; if (!stickerPanel?.contains(e.target) && e.target !== stickerBtn) stickerPanel.style.display = 'none'; });
        const send = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                const up = await uploadFile(file);
                if (up.success) { await sendMessage(text, up.fileUrl, up.fileName); fileInput.value = ''; }
            } else if (text) await sendMessage(text);
            msgInput.value = '';
            msgInput.focus();
        };
        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => send();
        msgInput.addEventListener('input', () => saveDraftToServer(msgInput.value));
        const draftKey = `${currentChat}_${currentChatType}`;
        if (drafts[draftKey]) msgInput.value = drafts[draftKey];
    }

    function showSettingsModal() {
        const modal = document.getElementById('settingsModal');
        if (!modal) return;
        modal.style.display = 'flex';
        const avatarGrid = document.getElementById('settingsAvatarGrid');
        if (avatarGrid && !avatarGrid.children.length) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉'];
            emojis.forEach(e => { const div = document.createElement('div'); div.className = 'emoji-option'; div.textContent = e; div.onclick = () => { updateAvatar(e); modal.style.display = 'none'; }; avatarGrid.appendChild(div); });
        }
        document.getElementById('changeUsernameBtn')?.addEventListener('click', () => { const newName = prompt('Новое имя:', currentUser.username); if (newName && newName !== currentUser.username) updateUsername(newName); });
        document.getElementById('darkTheme')?.addEventListener('click', () => { theme = 'dark'; localStorage.setItem('theme', theme); initTheme(); });
        document.getElementById('lightTheme')?.addEventListener('click', () => { theme = 'light'; localStorage.setItem('theme', theme); initTheme(); });
        const bgInput = document.getElementById('chatBgInput');
        bgInput?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) { const reader = new FileReader(); reader.onload = (ev) => { customChatBg = ev.target.result; localStorage.setItem('customChatBg', customChatBg); const chatMain = document.querySelector('.chat-main'); if (chatMain) { chatMain.style.backgroundImage = `url(${customChatBg})`; chatMain.classList.add('custom-chat-bg'); } showToast('Фон обновлён'); }; reader.readAsDataURL(file); }
        });
        document.getElementById('resetChatBg')?.addEventListener('click', () => { customChatBg = null; localStorage.removeItem('customChatBg'); const chatMain = document.querySelector('.chat-main'); if (chatMain) { chatMain.style.backgroundImage = ''; chatMain.classList.remove('custom-chat-bg'); } showToast('Фон сброшен'); });
        document.getElementById('closeSettingsModal')?.addEventListener('click', () => modal.style.display = 'none');
    }

    function showCreateGroupModal() {
        let step = 1;
        let groupName = '';
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
        const content = document.createElement('div'); content.className = 'modal-content';
        const renderStep = () => {
            if (step === 1) {
                content.innerHTML = `<h3>Создать группу</h3><div class="group-step"><input type="text" id="groupNameInput" placeholder="Название группы"></div><div class="group-nav"><button id="nextStep">Далее</button><button id="cancelGroup">Отмена</button></div>`;
                content.querySelector('#nextStep').onclick = () => { const name = document.getElementById('groupNameInput').value.trim(); if (!name) { showToast('Введите название', true); return; } groupName = name; step = 2; renderStep(); };
                content.querySelector('#cancelGroup').onclick = () => modal.remove();
            } else {
                let friendsHtml = '<h3>Выберите участников</h3><div class="friends-list" style="max-height:300px;overflow-y:auto;">';
                friendsList.forEach(f => { friendsHtml += `<div class="friend-select"><input type="checkbox" value="${f}" id="friend_${f}"> <label for="friend_${f}">${escapeHtml(f)}</label></div>`; });
                friendsHtml += `</div><div class="group-nav"><button id="createGroupBtn">Создать</button><button id="backStep">Назад</button><button id="cancelGroup">Отмена</button></div>`;
                content.innerHTML = friendsHtml;
                content.querySelector('#createGroupBtn').onclick = async () => {
                    const selected = Array.from(content.querySelectorAll('input:checked')).map(cb => cb.value);
                    await createGroup(groupName, selected);
                    modal.remove();
                };
                content.querySelector('#backStep').onclick = () => { step = 1; renderStep(); };
                content.querySelector('#cancelGroup').onclick = () => modal.remove();
            }
            modal.innerHTML = ''; modal.appendChild(content);
        };
        renderStep();
        document.body.appendChild(modal);
    }

            <div class="auth-container"><div class="auth-card"><h2>DanuMes</h2><div class="tabs"><div class="tab active" id="loginTab">Вход</div><div class="tab" id="regTab">Регистрация</div></div>
            <div id="loginPanel" class="auth-form"><div class="input-group"><input type="text" id="loginUsername" placeholder="Логин"></div><div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div><div id="loginError" class="error-text"></div><button id="doLogin" class="auth-btn">Войти</button></div>
            <div id="regPanel" class="auth-form" style="display:none;"><div class="input-group"><input type="text" id="regUsername" placeholder="Логин"></div><div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div><div id="regError" class="error-text"></div><button id="doReg" class="auth-btn">Зарегистрироваться</button></div></div></div>`;
        document.getElementById('loginTab').onclick = () => { document.getElementById('loginPanel').style.display = 'flex'; document.getElementById('regPanel').style.display = 'none'; document.getElementById('loginTab').classList.add('active'); document.getElementById('regTab').classList.remove('active'); };
        document.getElementById('regTab').onclick = () => { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('regPanel').style.display = 'flex'; document.getElementById('regTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); };
        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value, password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
                await loadAllUsers(); await loadFriends(); await loadChatsAndChannels(); await loadDrafts();
                startMessenger();
                showToast(`Добро пожаловать, ${username}!`);
            } else document.getElementById('loginError').innerText = res.error;
        };
        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regUsername').value, password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) { showToast('Регистрация успешна! Войдите.'); document.getElementById('loginTab').click(); }
            else document.getElementById('regError').innerText = res.error;
        };
    }

    async function loadDrafts() {
        const res = await api('GET', `/drafts/${currentUser.username}`);
        for (let d of res) drafts[`${d.chat_id}_${d.chat_type}`] = d.draft_text;
    }

    async function saveDraftToServer(text) {
        await api('POST', '/drafts', { username: currentUser.username, chatId: currentChat, chatType: currentChatType, draftText: text });
    }

    function startMessenger() {
        document.getElementById('app').innerHTML = `<div class="messenger"><div class="sidebar" id="sidebar"></div><div class="friends-panel" id="friendsPanelContainer" style="display:none;"></div><div class="chat-main" id="chatMain"></div></div>
            <div id="settingsModal" class="modal" style="display:none;"><div class="modal-content"><h3>Настройки</h3>
            <div class="settings-section"><h4>Аватар</h4><div class="emoji-grid" id="settingsAvatarGrid"></div></div>
            <div class="settings-section"><button id="changeUsernameBtn" class="close-modal">Изменить имя</button></div>
            <div class="settings-section"><h4>Тема</h4><button id="darkTheme" class="theme-option">🌙 Тёмная</button><button id="lightTheme" class="theme-option">☀️ Светлая</button></div>
            <div class="settings-section"><h4>Фон чата</h4><input type="file" id="chatBgInput" accept="image/*"><button id="resetChatBg" style="margin-top:8px;">Сбросить</button></div>
            <button id="closeSettingsModal" class="close-modal">Закрыть</button></div></div>
            <div id="lightbox" class="lightbox"><img src=""></div>`;
        renderSidebar();
        initTheme();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => { if (currentChat) loadMessages(); loadChatsAndChannels(); loadFriends(); }, 3000);
    }

    let activeMenu = null;
    function showContextMenu(e, items) {
        if (activeMenu) activeMenu.remove();
        const menu = document.createElement('div'); menu.className = 'context-menu';
        items.forEach(item => { const option = document.createElement('div'); option.textContent = item.label; option.onclick = (ev) => { ev.stopPropagation(); item.action(); menu.remove(); activeMenu = null; }; menu.appendChild(option); });
        document.body.appendChild(menu);
        let left = e.clientX, top = e.clientY;
        if (left + menu.offsetWidth > window.innerWidth) left = window.innerWidth - menu.offsetWidth - 10;
        if (top + menu.offsetHeight > window.innerHeight) top = window.innerHeight - menu.offsetHeight - 10;
        menu.style.left = left + 'px'; menu.style.top = top + 'px';
        activeMenu = menu;
        const closeMenu = () => { if(activeMenu) activeMenu.remove(); activeMenu = null; document.removeEventListener('click', closeMenu); };
        setTimeout(() => document.addEventListener('click', closeMenu), 10);
        e.preventDefault();
    }

    function showLightbox(url) {
        let lb = document.getElementById('lightbox');
        if (!lb) return;
        lb.style.display = 'flex';
        lb.querySelector('img').src = url;
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    renderAuth();
</script>
