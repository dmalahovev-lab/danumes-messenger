<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DanuMes - вход (тест)</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .auth-card {
            background: rgba(30,40,50,0.9);
            padding: 40px;
            border-radius: 32px;
            width: 350px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: #f87171;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <h2>DanuMes</h2>
    <input type="text" id="loginUsername" placeholder="Логин">
    <input type="password" id="loginPassword" placeholder="Пароль">
    <button id="doLogin">Войти</button>
    <div id="loginError" class="error"></div>
</div>
<script>
    const loginBtn = document.getElementById('doLogin');
    loginBtn.onclick = async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        console.log('Отправка запроса', username, password);
        try {
            const res = await fetch('/login-attempt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            console.log('Ответ:', data);
            if (data.success) {
                alert('Вход выполнен! Перенаправление...');
                // Здесь можно перезагрузить страницу или перейти в мессенджер
                location.reload(); // или перекинуть на основной интерфейс
            } else {
                document.getElementById('loginError').innerText = data.error || 'Ошибка входа';
            }
        } catch (err) {
            console.error('Ошибка запроса:', err);
            document.getElementById('loginError').innerText = 'Сервер не отвечает';
        }
    };
</script>
</body>
</html>
