<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальный мессенджер</title>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #070a12;
            --bg-glass: rgba(15, 22, 42, 0.7);
            --bg-sidebar: rgba(10, 15, 30, 0.8);
            --bg-active: rgba(255, 255, 255, 0.06);
            --bg-chat-user: #6366f1;
            --bg-chat-friend: rgba(255, 255, 255, 0.04);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(243, 244, 246, 0.9);
            --bg-active: rgba(0, 0, 0, 0.05);
            --bg-chat-user: #4f46e5;
            --bg-chat-friend: rgba(0, 0, 0, 0.04);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .auth-card { background: var(--bg-glass); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; box-shadow: var(--shadow); backdrop-filter: blur(20px); position: relative; }
        .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin: 10px 0; outline: none; font-size: 16px; text-align: center;}
        
        .auth-buttons-row { display: flex; gap: 12px; margin-top: 10px; }
        .auth-btn { flex: 1; padding: 14px; border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .auth-btn.login { background: #6366f1; }
        .auth-btn.register { background: #10b981; }

        .error-toast { display: none; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; font-weight: 500; text-align: center; }

        .app-container { width: 100vw; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(20px); display: flex; overflow: hidden; }
        .nav-rail { width: 72px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-btn { width: 48px; height: 48px; border-radius: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-active); color: var(--text-main); }
        .nav-btn.active { color: #6366f1; border: 1px solid var(--border-color); }
        
        .nav-profile-trigger { margin-top: auto; font-size: 24px; cursor: pointer; background: var(--bg-active); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); }

        .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); padding: 10px 16px 10px 40px; border-radius: 12px; color: var(--text-main); outline: none; }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); font-style: normal; }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .list-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 8px 12px; text-transform: uppercase; }
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--bg-active); }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px;}
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-status-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-actions { display: flex; gap: 4px; }
        .action-btn { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .action-btn.primary { background: #6366f1; color: white; border: none; }

        .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-sidebar); }
        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        .message-bubble { max-width: 55%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; }
        .sent .message-bubble { background: var(--bg-chat-user); color: white; border-bottom-right-radius: 4px; }
        .received .message-bubble { background: var(--bg-chat-friend); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #ef4444; border: none; color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; }
        .sent .delete-msg-btn { left: -75px; } 
        .received .delete-msg-btn { right: -75px; }
        .message-wrapper:hover .delete-msg-btn { opacity: 1; }

        .input-area { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-sidebar); }
        .message-input { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); padding: 14px 20px; border-radius: 12px; color: var(--text-main); outline: none; }
        .send-btn { background: #6366f1; border: none; color: white; padding: 13px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; font-weight: bold; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .profile-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; box-shadow: var(--shadow); position: relative;}
        .profile-avatar-select { display: flex; justify-content: center; gap: 12px; margin: 16px 0; font-size: 28px; }
        .avatar-opt { cursor: pointer; padding: 6px; border-radius: 10px; border: 1px solid transparent; }
        .avatar-opt.selected { border-color: #6366f1; background: var(--bg-active); }
        .profile-input { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; outline: none; font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
        .profile-save-btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <!-- Экран авторизации -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2 class="logo" style="font-size:32px; margin-bottom:15px;">DanuMes</h2>
            
            <div class="error-toast" id="errorToast"></div>

            <input type="text" class="auth-input" id="usernameInput" placeholder="Логин..." autofocus>
            <input type="password" class="auth-input" id="passwordInput" placeholder="Пароль...">
            
            <div class="auth-buttons-row">
                <button class="auth-btn login" onclick="handleLoginClick()">Войти</button>
                <button class="auth-btn register" onclick="handleRegisterClick()">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Настройки профиля -->
    <div class="modal-overlay hidden" id="profileModal">
        <div class="profile-card">
            <button class="close-modal-btn" onclick="toggleProfileModal(false)">✕</button>
            <h3 style="margin-bottom:14px; font-size:18px;">Настройки профиля</h3>
            
            <label style="font-size:13px; color:var(--text-muted)">Выберите аватарку (Emoji)</label>
            <div class="profile-avatar-select">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🤖')">🤖</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🥷')">🥷</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐱')">🐱</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🔥')">🔥</span>
            </div>

            <label style="font-size:13px; color:var(--text-muted)">Ваш статус</label>
            <input type="text" class="profile-input" id="statusInput" placeholder="Что у вас нового?">

            <button class="profile-save-btn" onclick="handleSaveProfile()">Сохранить</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Навигация -->
        <nav class="nav-rail">
            <button class="nav-btn active" id="navHome" onclick="goHome()">ЧАТЫ</button>
            <button class="nav-btn" onclick="toggleTheme()">ТЕМА</button>
            <div class="nav-profile-trigger" id="profileTrigger" onclick="toggleProfileModal(true)">🤖</div>
        </nav>

        <!-- Сайдбар -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <div class="search-box">
                    <i class="search-icon" style="width:16px;height:16px;">🔍</i>
                    <input type="text" class="search-input" id="searchInput" oninput="handleSearch(this.value)" placeholder="Поиск людей...">
                </div>
            </div>
            <div class="chats-list">
                <div class="list-section-title">Все пользователи</div>
                <div id="friendsList"></div>
                <div class="list-section-title hidden" id="globalTitle" style="margin-top: 16px;">Глобальный поиск</div>
                <div id="globalList"></div>
            </div>
        </aside>

        <!-- Главный экран -->
        <div class="home-screen" id="homeScreen">
            <div style="font-size: 50px;">💬</div>
            <h2>Добро пожаловать в DanuMes, <span id="greetingName">Пользователь</span></h2>
            <p>Вы успешно зашли в сеть. Откройте чат слева, чтобы продолжить.</p>
        </div>

        <!-- Окно чата -->
        <main class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <div class="avatar" id="activeAvatar">🤖</div>
                <div>
                    <h4 id="activeChatName">Чат</h4>
                    <span id="activeChatStatus" style="font-size: 12px; color: var(--text-muted);">Доступен</span>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea"></div>

            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение...">
                <button class="send-btn" onclick="sendMessage()">▶</button>
            </div>
        </main>
    </div>

    <script>
        let myInfo = { name: "", status: "Доступен", avatar: "🤖" };
        let activeChatName = null;
        let globalUsers = [];
        let localFriends = new Set();
        let selectedAvatarSymbol = "🤖";

        document.addEventListener("DOMContentLoaded", () => {
            // Запуск таймера ежесекундного обновления списков и сообщений (замена сокетов)
            setInterval(syncData, 1500);
            
            document.getElementById('messageInput').onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
        });

        async function syncData() {
            if (!myInfo.name) return;
            try {
                // Обновляем список пользователей
                const resUsers = await fetch('/api/users');
                const users = await resUsers.json();
                globalUsers = users.filter(u => u.name !== myInfo.name);
                renderLists(document.getElementById('searchInput').value);

                // Обновляем сообщения
                const resMsgs = await fetch('/api/messages');
                const history = await resMsgs.json();
                renderMessages(history);
            } catch(e) {}
        }

        function showAuthNotification(msg, isSuccess = false) {
            const toast = document.getElementById('errorToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            if (isSuccess) {
                toast.style.background = 'rgba(16, 185, 129, 0.2)';
                toast.style.borderColor = '#10b981';
                toast.style.color = '#a7f3d0';
            } else {
                toast.style.background = 'rgba(239, 68, 68, 0.2)';
                toast.style.borderColor = '#ef4444';
                toast.style.color = '#fca5a5';
            }
        }

        async function handleLoginClick() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            if(!user || !pass) return showAuthNotification("Заполните все поля");

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                const data = await res.json();
                if (res.ok) {
                    myInfo = data;
                    document.getElementById('greetingName').textContent = data.name;
                    document.getElementById('profileTrigger').textContent = data.avatar;
                    document.getElementById('authScreen').style.display = 'none';
                    syncData();
                } else {
                    showAuthNotification(data.error);
                }
            } catch(e) {
                showAuthNotification("Ошибка подключения к серверу");
            }
        }

        async function handleRegisterClick() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            if(!user || !pass) return showAuthNotification("Заполните все поля");

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                const data = await res.json();
                if (res.ok) {
                    showAuthNotification(data.success, true);
                } else {
                    showAuthNotification(data.error);
                }
            } catch(e) {
                showAuthNotification("Ошибка сервера");
            }
        }

        function handleSearch(val) {
            renderLists(val);
        }

        function renderLists(filter = "") {
            const friendsList = document.getElementById('friendsList');
            friendsList.innerHTML = "";

            globalUsers.forEach(user => {
                const isMatch = user.name.toLowerCase().includes(filter.toLowerCase());
                if (!isMatch) return;

                const item = document.createElement('div');
                item.className = `chat-item ${activeChatName === user.name ? 'active' : ''}`;
                item.onclick = () => openChat(user.name);
                item.innerHTML = `
                    <div class="avatar">${user.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.name}</div>
                        <div class="chat-status-text">${user.status}</div>
                    </div>
                `;
                friendsList.appendChild(item);
            });
        }

        function openChat(name) {
            activeChatName = name;
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('chatWindow').classList.remove('hidden');
            document.getElementById('navHome').classList.remove('active');
            
            const userData = globalUsers.find(u => u.name === name);
            document.getElementById('activeChatName').textContent = name;
            document.getElementById('activeAvatar').textContent = userData ? userData.avatar : "🤖";
            document.getElementById('activeChatStatus').textContent = userData ? userData.status : "Доступен";
            
            syncData();
        }

        function renderMessages(history) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = "";
            if (!activeChatName) return;

            const currentChatHistory = history.filter(msg => 
                (msg.from === myInfo.name && msg.to === activeChatName) || 
                (msg.from === activeChatName && msg.to === myInfo.name)
            );

            currentChatHistory.forEach((msg) => {
                const wrapper = document.createElement('div');
                const isMe = msg.from === myInfo.name;
                wrapper.className = `message-wrapper ${isMe ? 'sent' : 'received'}`;
                wrapper.innerHTML = `
                    <div class="message-bubble">
                        ${msg.text}
                        <button class="delete-msg-btn" onclick="deleteMessage('${msg.id}')">Удалить</button>
                    </div>
                `;
                messagesArea.appendChild(wrapper);
            });
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChatName) return;

            try {
                const res = await fetch('/api/messages/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: myInfo.name, to: activeChatName, text: text })
                });
                if (res.ok) {
                    input.value = "";
                    const history = await res.json();
                    renderMessages(history);
                }
            } catch(e) {}
        }

        async function deleteMessage(msgId) {
            try {
                const res = await fetch('/api/messages/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msgId })
                });
                if (res.ok) {
                    const history = await res.json();
                    renderMessages(history);
                }
            } catch(e) {}
        }

        function toggleProfileModal(show) {
            const modal = document.getElementById('profileModal');
            if (show) {
                modal.classList.remove('hidden');
                document.getElementById('statusInput').value = myInfo.status;
            } else {
                modal.classList.add('hidden');
            }
        }

        window.selectAvatar = function(element, emo) {
            document.querySelectorAll('.avatar-opt').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedAvatarSymbol = emo;
        };

        async function handleSaveProfile() {
            const statusVal = document.getElementById('statusInput').value.trim() || "Доступен";
            try {
                const res = await fetch('/api/profile/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: myInfo.name, status: statusVal, avatar: selectedAvatarSymbol })
                });
                if (res.ok) {
                    const data = await res.json();
                    myInfo = data;
                    document.getElementById('profileTrigger').textContent = data.avatar;
                    toggleProfileModal(false);
                    syncData();
                }
            } catch(e) {}
        }

        function goHome() {
            activeChatName = null;
            document.getElementById('navHome').classList.add('active');
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('chatWindow').classList.add('hidden');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
