<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальный Мессенджер</title>
    <!-- Подключаем только работающие CDN библиотеки напрямую через HTTPS -->
    <script src="socket.io"></script>
    <script src="cloudflare.com"></script>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #070a12;
            --bg-glass: rgba(15, 22, 42, 0.7);
            --bg-sidebar: rgba(10, 15, 30, 0.8);
            --bg-active: rgba(255, 255, 255, 0.06);
            --bg-chat-user: #6366f1;
            --bg-chat-friend: rgba(255, 255, 255, 0.04);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(243, 244, 246, 0.9);
            --bg-active: rgba(0, 0, 0, 0.05);
            --bg-chat-user: #4f46e5;
            --bg-chat-friend: rgba(0, 0, 0, 0.04);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        
        /* Экран входа */
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .auth-card { background: var(--bg-glass); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; box-shadow: var(--shadow); backdrop-filter: blur(20px); }
        .logo { font-size: 32px; font-weight: 800; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;}
        .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin-bottom: 12px; outline: none; font-size: 16px; text-align: center;}
        
        .auth-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .auth-btn { flex: 1; padding: 14px; border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .btn-login { background: #6366f1; }
        .btn-reg { background: #10b981; }

        /* Красивая плашка ошибки */
        .error-toast { display: none; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 16px; text-align: center; }

        /* Интерфейс мессенджера */
        .app-container { width: 100vw; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(20px); display: flex; overflow: hidden; }
        .nav-rail { width: 72px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-btn { width: 48px; height: 48px; border-radius: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-active); color: var(--text-main); }
        .nav-btn.active { color: #6366f1; border: 1px solid var(--border-color); }
        .nav-profile-trigger { margin-top: auto; font-size: 24px; cursor: pointer; background: var(--bg-active); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); }

        .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-color); }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); padding: 10px 16px 10px 40px; border-radius: 12px; color: var(--text-main); outline: none; }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .list-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 8px 12px; text-transform: uppercase; }
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--bg-active); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px;}
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-status-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-actions { display: flex; gap: 4px; }
        .action-btn { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .action-btn.primary { background: #6366f1; color: white; border: none; }

        .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-sidebar); }
        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        .message-bubble { max-width: 55%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; }
        .sent .message-bubble { background: var(--bg-chat-user); color: white; border-bottom-right-radius: 4px; }
        .received .message-bubble { background: var(--bg-chat-friend); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #ef4444; border: none; color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; }
        .sent .delete-msg-btn { left: -75px; } 
        .received .delete-msg-btn { right: -75px; }
        .message-wrapper:hover .delete-msg-btn { opacity: 1; }

        /* Статус печатает */
        .typing-indicator { font-size: 12px; color: #10b981; padding: 4px 24px; display: none; }

        .input-area { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-sidebar); }
        .message-input { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); padding: 14px 20px; border-radius: 12px; color: var(--text-main); outline: none; }
        .send-btn { background: #6366f1; border: none; color: white; padding: 13px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; }

        /* Модалка настроек профиля */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .profile-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; box-shadow: var(--shadow); position: relative;}
        .profile-avatar-select { display: flex; justify-content: center; gap: 12px; margin: 16px 0; font-size: 28px; }
        .avatar-opt { cursor: pointer; padding: 6px; border-radius: 10px; border: 1px solid transparent; }
        .avatar-opt.selected { border-color: #6366f1; background: var(--bg-active); }
        .profile-input { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; outline: none; font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
        .profile-save-btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; }
    </style>
</head>
<body>

    <!-- Экран входа / Регистрации -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2 class="logo">DanuMes</h2>
            
            <!-- Место для уведомления об ошибке -->
            <div class="error-toast" id="errorToast">Недействительный Логин/Пароль</div>

            <input type="text" class="auth-input" id="usernameInput" placeholder="Логин (Никнейм)..." autofocus>
            <input type="password" class="auth-input" id="passwordInput" placeholder="Пароль...">
            
            <div class="auth-buttons">
                <button class="auth-btn btn-login" id="loginBtn">Войти</button>
                <button class="auth-btn btn-reg" id="regBtn">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Настройки Профиля -->
    <div class="modal-overlay hidden" id="profileModal">
        <div class="profile-card">
            <button class="close-modal-btn" id="closeProfileBtn"><i data-lucide="x"></i></button>
            <h3 style="margin-bottom:14px; font-size:18px;">Настройки профиля</h3>
            
            <div class="profile-avatar-select">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🤖')">🤖</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🥷')">🥷</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐱')">🐱</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🔥')">🔥</span>
            </div>

            <label style="font-size:13px; color:var(--text-muted)">Ваш статус</label>
            <input type="text" class="profile-input" id="statusInput" placeholder="Что нового?">
            <button class="profile-save-btn" id="saveProfileBtn">Сохранить изменения</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Боковой рельс управления -->
        <nav class="nav-rail">
            <button class="nav-btn active" id="navHome"><i data-lucide="home"></i></button>
            <button class="nav-btn" id="themeToggle"><i data-lucide="sun" id="themeIcon"></i></button>
            <div class="nav-profile-trigger" id="profileTrigger">🤖</div>
        </nav>

        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo" style="font-size:22px;">DanuMes</div>
                <div class="search-box">
                    <i data-lucide="search" class="search-icon" style="width:16px;height:16px;"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Глобальный поиск людей...">
                </div>
            </div>
            <div class="chats-list">
                <div class="list-section-title">Мои контакты</div>
                <div id="friendsList"></div>
                <div class="list-section-title hidden" id="globalTitle" style="margin-top: 16px;">Результаты поиска</div>
                <div id="globalList"></div>
            </div>
        </aside>

        <!-- Заставка -->
        <div class="home-screen" id="homeScreen">
            <i data-lucide="message-square" style="width:64px; height:64px; color:#6366f1;"></i>
            <h2>Добро пожаловать в DanuMes, <span id="greetingName">Пользователь</span>!</h2>
            <p>Используйте глобальный поиск слева, чтобы найти людей и начать защищенное общение.</p>
        </div>

        <!-- Окно активного чата -->
        <main class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <div class="avatar" id="activeAvatar">🤖</div>
                <div>
                    <h4 id="activeChatName">Собеседник</h4>
                    <span id="activeChatStatus" style="font-size:12px; color:var(--text-muted);">Доступен</span>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea"></div>
            <div class="typing-indicator" id="typingIndicator">печатает...</div>
            
            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение...">
                <button class="send-btn" id="sendBtn"><i data-lucide="send" style="width:18px;height:18px;"></i></button>
            </div>
        </main>
    </div>

    <script>
        // Инициализация звуков уведомлений через Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNotifySound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // Ре-нота
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Подключаем Socket.IO с защитой от сбоев
        const socket = io({ transports: ['websocket', 'polling'] });
        
        // Локальное хранилище данных аккаунтов для надежности кнопок
        if(!localStorage.getItem('danumes_accounts')) {
            localStorage.setItem('danumes_accounts', JSON.stringify({
                "алина": "123", "артем": "123", "иван": "123", "мария": "123"
            }));
        }

        let myName = "";
        let myAvatar = "🤖";
        let myStatus = "Доступен";
        let activeChatName = null;
        let localFriends = new Set(JSON.parse(localStorage.getItem('danumes_friends') || '[]'));

        // Хранилище переписок
        let chatHistories = JSON.parse(localStorage.getItem('danumes_history') || '{}');

        // Элементы
        const authScreen = document.getElementById('authScreen');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const errorToast = document.getElementById('errorToast');
        const loginBtn = document.getElementById('loginBtn');
        const regBtn = document.getElementById('regBtn');

        // Функция показа красивой плашки ошибки
        function showAuthError(text) {
            errorToast.textContent = text;
            errorToast.style.display = 'block';
            setTimeout(() => { errorToast.style.display = 'none'; }, 4000);
        }

        // КНОПКА РЕГИСТРАЦИИ (100% рабочая)
        regBtn.onclick = function() {
            const user = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value.trim();
            if(!user || !pass) { showAuthError("Заполните все поля!"); return; }

            let db = JSON.parse(localStorage.getItem('danumes_accounts'));
            if(db[user]) { showAuthError("Этот логин уже занят!"); return; }

            db[user] = pass;
            localStorage.setItem('danumes_accounts', JSON.stringify(db));
            
            // Успех
            errorToast.style.background = 'rgba(16, 185, 129, 0.2)';
            errorToast.style.borderColor = '#10b981';
            errorToast.style.color = '#a7f3d0';
            showAuthError("Аккаунт успешно создан! Теперь войдите.");
            setTimeout(() => {
                errorToast.style.background = 'rgba(239, 68, 68, 0.2)';
                errorToast.style.borderColor = '#ef4444';
                errorToast.style.color = '#fca5a5';
            }, 4000);
        };

        // КНОПКА ВХОДА (100% рабочая)
        loginBtn.onclick = function() {
            const user = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value.trim();
            if(!user || !pass) { showAuthError("Введите логин и пароль!"); return; }

            let db = JSON.parse(localStorage.getItem('danumes_accounts'));
            if(db[user] && db[user] === pass) {
                // Вход выполнен успешно
                myName = usernameInput.value.trim();
                document.getElementById('greetingName').textContent = myName;
                authScreen.classList.add('hidden');
                
                // Передаем данные на сервер
                socket.emit('register_user', myName);
                renderLists();
            } else {
                showAuthError("Недействительный Логин/Пароль");
            }
        };

        // Логика списков контактов
        function renderLists(filter = "") {
            const friendsList = document.getElementById('friendsList');
            const globalList = document.getElementById('globalList');
            const globalTitle = document.getElementById('globalTitle');
            
            friendsList.innerHTML = "";
            globalList.innerHTML = "";
            
            let allSystemUsers = Object.keys(JSON.parse(localStorage.getItem('danumes_accounts')));
            let hasGlobalResults = false;

            allSystemUsers.forEach(userKey => {
                if(userKey === myName.toLowerCase()) return;
                
                // Форматируем имя для вывода красивым регистром
                let nameToShow = userKey.charAt(0).toUpperCase() + userKey.slice(1);
                if(!nameToShow.toLowerCase().includes(filter.toLowerCase())) return;

                if(localFriends.has(nameToShow)) {
                    let history = chatHistories[nameToShow] || [];
                    let lastMsg = history.length > 0 ? history[history.length - 1].text : "Нет сообщений";
                    
                    let item = document.createElement('div');
                    item.className = `chat-item ${activeChatName === nameToShow ? 'active' : ''}`;
                    item.onclick = () => openChat(nameToShow);
                    item.innerHTML = `
                        <div class="avatar">🤖</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameToShow}</div>
                            <div class="chat-status-text">${lastMsg}</div>
                        </div>
                    `;
                    friendsList.appendChild(item);
                } else if(filter.trim() !== "") {
                    hasGlobalResults = true;
                    let item = document.createElement('div');
                    item.className = "chat-item";
                    item.style.cursor = "default";
                    item.innerHTML = `
                        <div class="avatar">🥷</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameToShow}</div>
                            <div class="chat-status-text">Новый пользователь</div>
                        </div>
                        <div class="search-actions">
                            <button class="action-btn primary" onclick="addFriend('${nameToShow}')">Добавить</button>
                            <button class="action-btn" onclick="writeToUser('${nameToShow}')">Написать</button>
                        </div>
                    `;
                    globalList.appendChild(item);
                }
            });

            if (filter.trim() !== "" && hasGlobalResults) globalTitle.classList.remove('hidden');
            else globalTitle.classList.add('hidden');
        }

        window.addFriend = function(name) {
            localFriends.add(name);
            localStorage.setItem('danumes_friends', JSON.stringify(Array.from(localFriends)));
            renderLists();
        };

        window.writeToUser = function(name) {
            addFriend(name);
            openChat(name);
            document.getElementById('searchInput').value = "";
            renderLists();
        };

        function openChat(name) {
            activeChatName = name;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('chatWindow').classList.remove('hidden');
            document.getElementById('navHome').classList.remove('active');
            
            document.getElementById('activeChatName').textContent = name;
            renderMessages();
            renderLists();
        }

        function renderMessages() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = "";
            let history = chatHistories[activeChatName] || [];

            history.forEach((msg, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.sender === 'user' ? 'sent' : 'received'}`;
                wrapper.innerHTML = `
                    <div class="message-bubble">
                        ${msg.text}
                        <button class="delete-msg-btn" onclick="deleteMessage(${index})">Удалить</button>
                    </div>
                `;
                messagesArea.appendChild(wrapper);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        window.deleteMessage = function(index) {
            if(chatHistories[activeChatName]) {
                chatHistories[activeChatName].splice(index, 1);
                localStorage.setItem('danumes_history', JSON.stringify(chatHistories));
                renderMessages();
                renderLists();
            }
        };

        // Отправка сообщений
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChatName) return;

            if (!chatHistories[activeChatName]) chatHistories[activeChatName] = [];
            chatHistories[activeChatName].push({ sender: 'user', text: text });
            localStorage.setItem('danumes_history', JSON.stringify(chatHistories));

            socket.emit('send_direct_message', { toUser: activeChatName, text: text });
            
            input.value = "";
            renderMessages();
            renderLists();
            playNotifySound();
        }

        // Получение сообщений от сервера
        socket.on('receive_direct_message', (msg) => {
            let senderName = msg.from;
            addFriend(senderName);

            if (!chatHistories[senderName]) chatHistories[senderName] = [];
            chatHistories[senderName].push({ sender: 'friend', text: msg.text });
            localStorage.setItem('danumes_history', JSON.stringify(chatHistories));

            if (activeChatName === senderName) renderMessages();
            renderLists();
            playNotifySound();
        });

        // Статус "Печатает..." через сетевые события
        const messageInput = document.getElementById('messageInput');
        messageInput.oninput = () => {
            if(activeChatName) {
                socket.emit('typing_status', { toUser: activeChatName, isTyping: true });
            }
        };

        socket.on('receive_typing', (data) => {
            const indicator = document.getElementById('typingIndicator');
            if(activeChatName === data.fromUser && data.isTyping) {
                indicator.style.display = 'block';
                setTimeout(() => { indicator.style.display = 'none'; }, 2000);
            }
        });

        // Управление профилем (Модалка)
        const profileModal = document.getElementById('profileModal');
        const profileTrigger = document.getElementById('profileTrigger');
        document.getElementById('profileTrigger').onclick = () => profileModal.classList.remove('hidden');
        document.getElementById('closeProfileBtn').onclick = () => profileModal.classList.add('hidden');
        
        window.selectAvatar = function(el, emoji) {
            document.querySelectorAll('.avatar-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            myAvatar = emoji;
        };

        document.getElementById('saveProfileBtn').onclick = () => {
            myStatus = document.getElementById('statusInput').value.trim() || "Доступен";
            profileTrigger.textContent = myAvatar;
            profileModal.classList.add('hidden');
        };

        // Главная кнопка и поиск
        document.getElementById('navHome').onclick = function() {
            activeChatName = null;
            this.classList.add('active');
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('chatWindow').classList.add('hidden');
            renderLists();
        };
        document.getElementById('searchInput').oninput = (e) => renderLists(e.target.value);
        document.getElementById('sendBtn').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // Переключение тем оформления
        document.getElementById('themeToggle').onclick = function() {
            const html = document.documentElement;
            const target = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', target);
            document.getElementById('themeIcon').setAttribute('data-lucide', target === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
        };

        // Инициализация интерфейса
        lucide.createIcons();
        renderLists();
    </script>
</body>
</html>
