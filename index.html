<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — современный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Основной контейнер */
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* Шапка */
        .chat-header {
            background: white;
            padding: 16px 24px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: white;
            font-weight: bold;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .username-display {
            font-weight: 500;
            color: #1a1a2e;
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn:hover {
            background: #e9ecef;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Стили сообщений */
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 20px;
            border-top-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            max-width: 100%;
            word-wrap: break-word;
        }

        .message-own {
            flex-direction: row-reverse;
        }

        .message-own .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 4px;
        }

        .message-own .message-avatar {
            order: 2;
        }

        .message-sender {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .file-attachment {
            margin-top: 6px;
            display: inline-block;
            background: rgba(0,0,0,0.05);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-decoration: none;
            color: inherit;
        }

        .message-own .file-attachment {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Форма ввода */
        .input-area {
            background: white;
            padding: 16px 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            background: #f8f9fa;
            border-radius: 30px;
            padding: 6px 16px;
            align-items: center;
        }

        #message-text {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 0.95rem;
            outline: none;
        }

        .file-label {
            cursor: pointer;
            font-size: 22px;
            transition: transform 0.1s;
        }

        .file-label:hover {
            transform: scale(1.05);
        }

        #file-input {
            display: none;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Формы входа/регистрации */
        .auth-container {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            transition: all 0.2s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form input {
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .auth-form input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        .auth-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: -10px;
        }

        /* Скролл */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // Состояние приложения
    let currentUser = null;
    let messages = [];
    let pollingInterval = null;

    // DOM элементы
    const root = document.getElementById('root');

    // Вспомогательные функции
    async function apiRequest(url, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(url, options);
        return res.json();
    }

    async function loadMessages() {
        try {
            const data = await apiRequest('/get-messages');
            messages = data;
            renderChat();
        } catch (e) {
            console.error('Ошибка загрузки сообщений', e);
        }
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if (!text && !fileUrl) return;
        await apiRequest('/send-message', 'POST', {
            username: currentUser.username,
            text: text || '',
            fileUrl,
            fileName
        });
        await loadMessages();
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: formData });
        return res.json();
    }

    function formatTime(iso) {
        const date = new Date(iso);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function getAvatarForUser(username) {
        // Простой эмодзи по имени (можно расширить)
        if (username === 'Danumala') return '👑';
        if (username === 'RunFly') return '🚀';
        return '👤';
    }

    // Рендер чата
    function renderChat() {
        if (!currentUser) return;
        const messagesContainer = document.getElementById('messages-list');
        if (!messagesContainer) return;

        if (messages.length === 0) {
            messagesContainer.innerHTML = '<div style="text-align:center; color:#888; margin-top:40px;">💬 Напишите первое сообщение...</div>';
            return;
        }

        let html = '';
        for (let msg of messages) {
            const isOwn = msg.username === currentUser.username;
            const avatar = getAvatarForUser(msg.username);
            const time = formatTime(msg.timestamp);
            const filePart = msg.fileUrl ? `<a href="${msg.fileUrl}" target="_blank" class="file-attachment">📎 ${escapeHtml(msg.fileName || 'Файл')}</a>` : '';
            html += `
                <div class="message ${isOwn ? 'message-own' : ''}">
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-bubble">
                        <div class="message-sender">${escapeHtml(msg.username)}</div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        ${filePart}
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        }
        messagesContainer.innerHTML = html;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Инициализация интерфейса чата после входа
    function initChatInterface() {
        root.innerHTML = `
            <div class="app-container">
                <div class="chat-header">
                    <div class="logo">
                        <div class="logo-icon">💬</div>
                        <h1>DanuMes</h1>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar">${getAvatarForUser(currentUser.username)}</div>
                        <span class="username-display">${escapeHtml(currentUser.username)}</span>
                        <button class="logout-btn" id="logoutBtn" title="Выйти">🚪</button>
                    </div>
                </div>
                <div class="messages-area" id="messages-list"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="message-text" placeholder="Сообщение...">
                        <label class="file-label" id="fileLabel">📎</label>
                        <input type="file" id="file-input" style="display:none">
                    </div>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        `;

        // Загружаем сообщения
        loadMessages();

        // Отправка текста
        const textInput = document.getElementById('message-text');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('fileLabel');

        const sendCurrentMessage = async () => {
            const text = textInput.value.trim();
            if (!text && (!fileInput.files || fileInput.files.length === 0)) return;
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const uploadRes = await uploadFile(file);
                if (uploadRes.success) {
                    await sendMessage(text, uploadRes.fileUrl, uploadRes.fileName);
                    fileInput.value = '';
                } else {
                    alert('Ошибка загрузки файла');
                }
            } else {
                await sendMessage(text);
            }
            textInput.value = '';
            textInput.focus();
        };

        sendBtn.onclick = sendCurrentMessage;
        textInput.onkeypress = (e) => { if (e.key === 'Enter') sendCurrentMessage(); };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if (fileInput.files.length) sendCurrentMessage();
        };

        document.getElementById('logoutBtn').onclick = () => {
            if (pollingInterval) clearInterval(pollingInterval);
            currentUser = null;
            renderAuth();
        };

        // Поллинг новых сообщений
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(loadMessages, 3000);
    }

    // Формы входа / регистрации
    function renderAuth() {
        root.innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <div class="tabs">
                        <div class="tab active" data-tab="login">Вход</div>
                        <div class="tab" data-tab="register">Регистрация</div>
                    </div>
                    <div id="loginForm" class="auth-form">
                        <input type="text" id="loginUsername" placeholder="Имя пользователя">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <div id="loginError" class="error-msg"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="registerForm" class="auth-form" style="display:none">
                        <input type="text" id="regUsername" placeholder="Имя пользователя">
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <div id="regError" class="error-msg"></div>
                        <button id="doRegister" class="auth-btn">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;

        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');
        const tabs = document.querySelectorAll('.tab');

        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const type = tab.dataset.tab;
                if (type === 'login') {
                    loginFormDiv.style.display = 'flex';
                    registerFormDiv.style.display = 'none';
                } else {
                    loginFormDiv.style.display = 'none';
                    registerFormDiv.style.display = 'flex';
                }
            };
        });

        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const res = await apiRequest('/login-attempt', 'POST', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar };
                if (pollingInterval) clearInterval(pollingInterval);
                initChatInterface();
            } else {
                document.getElementById('loginError').innerText = res.error || 'Ошибка входа';
            }
        };

        document.getElementById('doRegister').onclick = async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const res = await apiRequest('/register-attempt', 'POST', { username, password });
            if (res.success) {
                alert('Регистрация успешна! Теперь войдите.');
                document.querySelector('.tab[data-tab="login"]').click();
            } else {
                document.getElementById('regError').innerText = res.error || 'Ошибка регистрации';
            }
        };
    }

    // Старт приложения
    renderAuth();
</script>
</body>
</html>
