<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Мессенджер</title>
    <style>
        /* ========== ВСЕ СТИЛИ (как в предыдущей версии + новые) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c15;
            color: #e5e7eb;
            height: 100vh;
            overflow: hidden;
        }
        /* ... (все предыдущие стили остаются) ... */
        
        /* Новые стили для групп, реакций, цитат, закрепления */
        .message-reply {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
            padding-left: 8px;
            border-left: 2px solid #6c5ce7;
            cursor: pointer;
        }
        .pinned-badge {
            font-size: 10px;
            background: rgba(108,92,231,0.3);
            border-radius: 12px;
            padding: 2px 8px;
            margin-left: 8px;
        }
        .group-member-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .group-member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-height: 80vh;
            background: rgba(18,22,35,0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            z-index: 6000;
            overflow-y: auto;
        }
        .theme-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .theme-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-option.active { border-color: #6c5ce7; }
        .theme-option.dark { background: #1a1a2e; }
        .theme-option.light { background: #f0eefc; }
        .theme-option.forest { background: #1a2e1a; }
        .theme-option.ocean { background: #1a2a4e; }
        .theme-option.sunset { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
        .notification-sound { margin-top: 10px; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let currentChat = null;        // может быть username (user), channelId или groupId
    let currentChatType = 'user';  // 'user', 'channel', 'group'
    let messages = [];
    let chats = [];
    let groups = [];
    let channels = [];
    let allUsers = [];
    let searchQuery = '';
    let pollInterval = null;
    let searchTimeout = null;
    (function() {
    let activeMenu = null;
})();
    let replyToMessage = null;      // для цитирования
    let notificationSound = new Audio('/notification.mp3'); // нужно добавить файл
    let soundEnabled = true;
    let themes = {
        dark: { background: 'radial-gradient(ellipse at 20% 30%, #1a1a2e, #0a0a1a)', color: '#e5e7eb' },
        light: { background: 'radial-gradient(ellipse at 20% 30%, #f0eefc, #e8e5f5)', color: '#1a1a2e' },
        forest: { background: 'radial-gradient(ellipse at 20% 30%, #1a2e1a, #0a1a0a)', color: '#e5e7eb' },
        ocean: { background: 'radial-gradient(ellipse at 20% 30%, #1a2a4e, #0a1a2e)', color: '#e5e7eb' },
        sunset: { background: 'radial-gradient(ellipse at 20% 30%, #3a1a2e, #2a0a1e)', color: '#f0e6d8' }
    };
    
    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const theme = themes[savedTheme];
        if (theme) {
            document.body.style.background = theme.background;
            document.body.style.color = theme.color;
        }
    }
    
    function setTheme(themeName) {
        const theme = themes[themeName];
        if (theme) {
            document.body.style.background = theme.background;
            document.body.style.color = theme.color;
            localStorage.setItem('theme', themeName);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === themeName);
            });
            showToast(`Тема "${themeName}" применена`);
        }
    }
    
    function playNotificationSound() {
        if (soundEnabled && notificationSound) {
            notificationSound.play().catch(e => console.log('Sound error:', e));
        }
    }
    
    // ========== API ВЫЗОВЫ (добавлены новые) ==========
    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) { opts.body = data; }
        const res = await fetch(url, opts);
        return res.json();
    }
    
    async function loadAllUsers() {
        const res = await api('GET', '/get-users');
        allUsers = res || [];
    }
    
    async function loadChatsAndChannels() {
        if (!currentUser) return;
        const userChats = await api('GET', `/get-chats/${currentUser.username}`);
        const groupList = await api('GET', `/get-groups/${currentUser.username}`);
        groups = groupList || [];
        let all = [];
        groups.forEach(g => {
            all.push({ type: 'group', id: g.id, name: g.name, avatar: g.avatar, role: g.role, lastMessage: g.lastMessage || 'Нет сообщений', lastTime: g.lastTime });
        });
        (userChats || []).forEach(uc => {
            all.push({ type: 'user', id: uc.username, name: uc.username, avatar: uc.avatar, online: uc.online, verified: uc.verified, lastMessage: uc.lastMessage || 'Нет сообщений', lastTime: uc.lastTime });
        });
        all.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
        chats = all;
        renderSidebar();
    }
    
    async function loadMessages() {
        if (!currentUser || !currentChat) return;
        try {
            let data;
            if (currentChatType === 'user') {
                data = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'group') {
                data = await api('GET', `/get-group-messages/${currentChat}`);
                messages = data || [];
            }
            renderMessages();
        } catch(e) { console.error(e); }
    }
    
    async function sendMessage(text, fileUrl = null, fileName = null) {
        if ((!text && !fileUrl)) return;
        try {
            if (currentChatType === 'user') {
                await api('POST', '/send-message', { 
                    from: currentUser.username, 
                    to: currentChat, 
                    text: text || '', 
                    fileUrl, 
                    fileName,
                    replyTo: replyToMessage?.id || null
                });
            } else if (currentChatType === 'group') {
                await api('POST', '/send-group-message', { 
                    groupId: currentChat, 
                    from: currentUser.username, 
                    text: text || '', 
                    fileUrl, 
                    fileName,
                    replyTo: replyToMessage?.id || null
                });
            }
            replyToMessage = null;
            await loadMessages();
            await loadChatsAndChannels();
        } catch(e) { console.error(e); showToast('Ошибка отправки', true); }
    }
    
    async function editMessage(msgId, newText, type) {
        await api('PUT', `/edit-message/${msgId}`, { text: newText, type });
        await loadMessages();
        showToast('Сообщение отредактировано');
    }
    
    async function addReaction(messageId, reaction, type) {
        await api('POST', '/add-reaction', { messageId, type, username: currentUser.username, reaction });
        await loadMessages();
    }
    
    async function pinMessage(groupId, messageId) {
        await api('POST', '/pin-message', { groupId, messageId, pinnedBy: currentUser.username });
        showToast('Сообщение закреплено');
        await loadMessages();
    }
    
    async function saveDraft(text) {
        if (!currentUser || !currentChat) return;
        await api('POST', '/save-draft', {
            username: currentUser.username,
            chatId: currentChat,
            chatType: currentChatType,
            draftText: text
        });
    }
    
    async function loadDrafts() {
        const res = await api('GET', `/get-drafts/${currentUser.username}`);
        for (let d of res) {
            if (d.chat_id === currentChat && d.chat_type === currentChatType) {
                const input = document.getElementById('messageInput');
                if (input) input.value = d.draft_text;
            }
        }
    }
    
    async function createGroup(name, memberUsernames) {
        const res = await api('POST', '/create-group', { name, createdBy: currentUser.username, members: memberUsernames });
        if (res.success) {
            await loadChatsAndChannels();
            currentChat = res.groupId;
            currentChatType = 'group';
            await loadMessages();
            renderSidebar();
            renderChat();
            showToast('Группа создана');
        } else showToast('Ошибка', true);
    }
    
    async function addGroupMember(groupId, username) {
        const res = await api('POST', '/add-group-member', { groupId, username, addedBy: currentUser.username });
        if (res.success) showToast(`Пользователь ${username} добавлен в группу`);
        else showToast('Ошибка', true);
    }
    
    async function openAdminPanel() {
        const users = await api('GET', '/admin/users');
        const stats = await api('GET', '/admin/stats');
        let html = `
            <div class="admin-panel">
                <h3>Админ-панель</h3>
                <div style="margin-bottom: 16px;">
                    <strong>Статистика:</strong><br>
                    👥 Пользователей: ${stats.users}<br>
                    💬 Сообщений: ${stats.messages}<br>
                    👥 Групп: ${stats.groups}<br>
                    💬 Сообщений в группах: ${stats.groupMessages}
                </div>
                <h4>Пользователи</h4>
                <div class="group-member-list">
        `;
        users.forEach(u => {
            html += `
                <div class="group-member-item">
                    <span>${escapeHtml(u.username)} ${u.verified ? '✓' : ''}</span>
                    <span style="flex:1"></span>
                    <select onchange="setUserRole('${u.username}', this.value)">
                        <option value="user" ${u.role === 'user' ? 'selected' : ''}>Пользователь</option>
                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Администратор</option>
                    </select>
                </div>
            `;
        });
        html += `</div><button onclick="this.parentElement.remove()" class="close-modal" style="margin-top:16px;">Закрыть</button></div>`;
        document.body.insertAdjacentHTML('beforeend', html);
    }
    
    async function setUserRole(username, role) {
        await api('POST', '/admin/set-role', { adminUsername: currentUser.username, targetUsername: username, role });
        showToast(`Роль ${username} изменена на ${role}`);
    }
    
    // ========== РЕНДЕР ФУНКЦИИ ==========
    function renderSidebar() {
        // Аналогично предыдущей версии, но с добавлением групп и кнопки создания группы
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        let filtered = chats;
        if (searchQuery.trim()) {
            const query = searchQuery.toLowerCase();
            filtered = chats.filter(c => c.name.toLowerCase().includes(query));
            const matchingUsers = allUsers.filter(u => u.username.toLowerCase().includes(query) && !chats.some(c => c.type === 'user' && c.id === u.username));
            matchingUsers.forEach(u => {
                filtered.push({
                    type: 'user', id: u.username, name: u.username, avatar: u.avatar, online: u.online,
                    verified: u.verified, lastMessage: 'Нет сообщений', lastTime: null
                });
            });
        }
        let avatarAttr = (currentUser.username === 'Danumala' || currentUser.username === 'RunFly') ? `data-avatar="${currentUser.username}"` : '';
        let html = `
            <div class="profile-header" id="profileHeader">
                <div class="profile-avatar" ${avatarAttr}>${currentUser.avatar}</div>
                <div class="profile-info">
                    <h3>${escapeHtml(currentUser.username)}</h3>
                    <p>${currentUser.verified ? 'Верифицирован' : ''}</p>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск" value="${escapeHtml(searchQuery)}">
            </div>
            <div class="chats-list" id="chatsList">`;
        filtered.forEach(chat => {
            const activeClass = (currentChat === chat.id && currentChatType === chat.type) ? 'active' : '';
            let nameHtml = escapeHtml(chat.name);
            if (chat.type === 'user' && chat.verified) nameHtml += ' <span class="verified-badge">✓</span>';
            if (chat.type === 'user' && chat.online) nameHtml += ' <span class="online-dot"></span>';
            if (chat.type === 'group' && chat.role === 'admin') nameHtml += ' 👑';
            let chatAvatarAttr = (chat.type === 'user' && (chat.name === 'Danumala' || chat.name === 'RunFly')) ? `data-avatar="${chat.name}"` : '';
            html += `<div class="chat-item ${activeClass}" data-type="${chat.type}" data-id="${chat.id}">
                        <div class="chat-avatar" ${chatAvatarAttr}>${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameHtml}</div>
                            <div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div>
                        </div>
                    </div>`;
        });
        html += `</div>
            <div class="bottom-bar">
                <button class="bottom-btn" id="createGroupBtn">👥+</button>
                <button class="bottom-btn" id="settingsBtn">⚙️</button>
                ${currentUser?.role === 'admin' ? '<button class="bottom-btn" id="adminBtn">🛡️</button>' : ''}
            </div>
        `;
        sidebarDiv.innerHTML = html;
        
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                currentChatType = el.dataset.type;
                currentChat = el.dataset.id;
                replyToMessage = null;
                messages = [];
                renderChat();
                loadMessages();
                loadDrafts();
                renderSidebar();
            });
        });
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.addEventListener('input', (e) => {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { searchQuery = e.target.value; renderSidebar(); }, 300);
        });
        document.getElementById('profileHeader').onclick = showSettingsModal;
        document.getElementById('settingsBtn').onclick = showSettingsModal;
        document.getElementById('createGroupBtn').onclick = showCreateGroupModal;
        if (currentUser?.role === 'admin') {
            document.getElementById('adminBtn').onclick = openAdminPanel;
        }
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesList');
        if (!container) return;
        if (!currentChat) {
            container.innerHTML = `<div style="text-align:center;opacity:0.5;padding:20px;">Выберите чат</div>`;
            return;
        }
        if (!messages.length) {
            container.innerHTML = `<div style="text-align:center;opacity:0.5;padding:20px;">Нет сообщений</div>`;
            return;
        }
        let html = '';
        messages.forEach(msg => {
            const isOwn = msg.from_user === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let content = '';
            if (msg.file_url && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(msg.file_name)) {
                content += `<img src="${msg.file_url}" class="message-image" data-url="${msg.file_url}">`;
            } else if (msg.file_url) {
                content += `<a href="${msg.file_url}" download class="file-attach">📎 ${escapeHtml(msg.file_name || 'Файл')}</a>`;
            }
            if (msg.text) content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            if (msg.edited) content += `<span class="edited-badge">(ред.)</span>`;
            
            // Реакции
            let reactionsHtml = '';
            if (msg.reactions && msg.reactions.length) {
                const grouped = {};
                msg.reactions.forEach(r => grouped[r.reaction] = (grouped[r.reaction] || 0) + 1);
                reactionsHtml = '<div class="reactions">';
                for (let [reaction, count] of Object.entries(grouped)) {
                    const hasUserReaction = msg.reactions.some(r => r.username === currentUser.username && r.reaction === reaction);
                    reactionsHtml += `<span class="reaction-badge" data-msg-id="${msg.id}" data-reaction="${reaction}" data-has="${hasUserReaction}">${reaction} ${count}</span>`;
                }
                reactionsHtml += '</div>';
            }
            
            // Цитата (ответ)
            let replyHtml = '';
            if (msg.reply_to) {
                const repliedMsg = messages.find(m => m.id === msg.reply_to);
                if (repliedMsg) {
                    replyHtml = `<div class="message-reply" data-msg-id="${repliedMsg.id}">↩️ ${escapeHtml(repliedMsg.from_user)}: ${escapeHtml(repliedMsg.text?.substring(0, 50))}${repliedMsg.text?.length > 50 ? '...' : ''}</div>`;
                }
            }
            
            let senderName = (currentChatType === 'group' && !isOwn) ? `<div class="message-sender">${escapeHtml(msg.from_user)}</div>` : '';
            let pinnedBadge = msg.pinned ? '<span class="pinned-badge">📌 Закреплено</span>' : '';
            
            html += `<div class="message ${isOwn ? 'message-own' : ''}" data-msg-id="${msg.id}" data-msg-from="${msg.from_user}" data-file-url="${msg.file_url || ''}">
                        <div class="message-bubble">
                            ${replyHtml}
                            ${senderName}
                            ${content}
                            ${reactionsHtml}
                            <div class="message-time">${time} ${pinnedBadge}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        
        // Обработчики для реакций, контекстного меню, цитат
        document.querySelectorAll('.message-image').forEach(img => img.addEventListener('click', (e) => { e.stopPropagation(); showLightbox(img.src); }));
        document.querySelectorAll('.reaction-badge').forEach(badge => {
            badge.addEventListener('click', async (e) => {
                e.stopPropagation();
                const msgId = badge.dataset.msgId;
                const reaction = badge.dataset.reaction;
                const has = badge.dataset.has === 'true';
                if (has) {
                    // Удалить реакцию — нужно отдельное API
                    await addReaction(msgId, reaction, currentChatType);
                } else {
                    await addReaction(msgId, reaction, currentChatType);
                }
            });
        });
        document.querySelectorAll('.message').forEach(el => {
            el.addEventListener('contextmenu', (e) => {
                const msgId = el.dataset.msgId;
                const msgFrom = el.dataset.msgFrom;
                const isOwn = msgFrom === currentUser.username;
                const isGroupAdmin = currentChatType === 'group' && currentUser.role === 'admin';
                const items = [];
                if (isOwn) {
                    items.push({ label: '✏️ Редактировать', action: () => startEditing(msgId, el) });
                    items.push({ label: '🗑 Удалить', action: () => deleteMessage(msgId) });
                }
                items.push({ label: '💬 Ответить', action: () => setReplyToMessage(msgId) });
                if (currentChatType === 'group') {
                    items.push({ label: '📌 Закрепить', action: () => pinMessage(currentChat, msgId) });
                }
                const reactions = ['👍','❤️','😂','😮','😢','😡'];
                reactions.forEach(r => {
                    items.push({ label: `➕ Реакция ${r}`, action: () => addReaction(msgId, r, currentChatType) });
                });
                if (items.length) showContextMenu(e, items);
            });
        });
        document.querySelectorAll('.message-reply').forEach(reply => {
            reply.addEventListener('click', (e) => {
                const targetMsgId = reply.dataset.msgId;
                const targetMsg = document.querySelector(`.message[data-msg-id="${targetMsgId}"]`);
                if (targetMsg) targetMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function setReplyToMessage(msgId) {
        const msg = messages.find(m => m.id == msgId);
        if (msg) {
            replyToMessage = msg;
            showToast(`Ответ для ${msg.from_user}: ${msg.text?.substring(0, 30)}...`);
            document.getElementById('messageInput')?.focus();
        }
    }
    
    function startEditing(msgId, msgEl) {
        const bubble = msgEl.querySelector('.message-text');
        if (!bubble) return;
        const oldText = bubble.innerText;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = oldText;
        input.className = 'edit-input';
        bubble.replaceWith(input);
        input.focus();
        input.addEventListener('blur', async () => {
            if (input.value.trim() && input.value !== oldText) {
                await editMessage(msgId, input.value.trim(), currentChatType);
            } else {
                await loadMessages();
            }
        });
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                if (input.value.trim() && input.value !== oldText) {
                    await editMessage(msgId, input.value.trim(), currentChatType);
                } else {
                    await loadMessages();
                }
            }
        });
    }
    
    function renderChat() {
        const mainDiv = document.getElementById('chatMain');
        if (!mainDiv) return;
        if (!currentChat) {
            mainDiv.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;">✨ Выберите чат ✨</div>`;
            return;
        }
        let chatInfo = { name: currentChat, avatar: '💬' };
        const found = chats.find(c => c.id === currentChat && c.type === currentChatType);
        if (found) chatInfo = found;
        let avatarAttr = (currentChatType === 'user' && (chatInfo.name === 'Danumala' || chatInfo.name === 'RunFly')) ? `data-avatar="${chatInfo.name}"` : '';
        let groupActions = '';
        if (currentChatType === 'group') {
            groupActions = `<button class="bottom-btn" id="groupInfoBtn">👥</button>`;
        }
        mainDiv.innerHTML = `
            <div class="chat-header">
                <div class="chat-header-avatar" ${avatarAttr}>${chatInfo.avatar}</div>
                <div class="chat-header-info"><h3>${escapeHtml(chatInfo.name)}</h3></div>
                ${groupActions}
            </div>
            <div class="messages-area" id="messagesList"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <label class="file-btn" id="fileLabel">📎</label>
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div id="emojiPicker" style="display:none;position:absolute;bottom:80px;left:24px;background:rgba(18,22,35,0.95);border-radius:20px;padding:12px;width:280px;z-index:1500;"><div class="emoji-grid" id="emojiGrid"></div></div>
        `;
        if (currentChatType === 'group') {
            document.getElementById('groupInfoBtn').onclick = showGroupInfo;
        }
        renderMessages();
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileLabel = document.getElementById('fileLabel'), fileInput = document.getElementById('fileInput');
        const emojiBtn = document.getElementById('emojiBtn'), emojiPicker = document.getElementById('emojiPicker'), emojiGrid = document.getElementById('emojiGrid');
        if (emojiGrid && !emojiGrid.children.length) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉','😍','🤔','😂','🥲','😭','😡','🥺','🤯','💀','👾','🎈','🍕','⚽','🎵','📷','🔒'];
            emojis.forEach(e => { const div = document.createElement('div'); div.className = 'emoji-option'; div.textContent = e; div.onclick = () => { msgInput.value += e; msgInput.focus(); emojiPicker.style.display = 'none'; }; emojiGrid.appendChild(div); });
        }
        emojiBtn.onclick = (e) => { e.stopPropagation(); emojiPicker.style.display = emojiPicker.style.display === 'flex' ? 'none' : 'flex'; };
        document.addEventListener('click', (e) => { if (emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.style.display = 'none'; });
        const send = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                const up = await uploadFile(file);
                if (up.success) { await sendMessage(text, up.fileUrl, up.fileName); fileInput.value = ''; }
            } else if (text) await sendMessage(text);
            msgInput.value = ''; msgInput.focus();
            replyToMessage = null;
        };
        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => send();
        msgInput.addEventListener('input', () => saveDraft(msgInput.value));
        msgInput.focus();
        if (replyToMessage) {
            showToast(`Ответ для ${replyToMessage.from_user}`);
        }
    }
    
    async function showGroupInfo() {
        const members = await api('GET', `/get-group-members/${currentChat}`);
        let html = `
            <div class="modal-content" style="width:400px;">
                <h3>Участники группы</h3>
                <div class="group-member-list">
        `;
        members.forEach(m => {
            html += `<div class="group-member-item">
                        <span>${escapeHtml(m.username)} ${m.role === 'admin' ? '👑' : ''}</span>
                        ${currentUser.role === 'admin' && m.username !== currentUser.username ? `<button onclick="addGroupMember('${currentChat}', prompt('Введите имя пользователя'))" style="margin-left:auto;">➕ Добавить</button><button onclick="removeGroupMember('${currentChat}', '${m.username}')">❌</button>` : ''}
                    </div>`;
        });
        html += `</div><button class="close-modal" onclick="this.parentElement.parentElement.remove()">Закрыть</button></div>`;
        const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex'; modal.innerHTML = html;
        document.body.appendChild(modal);
    }
    
    function showSettingsModal() {
        let modal = document.getElementById('settingsModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'settingsModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Настройки</h3>
                <div class="settings-section">
                    <h4>Аватар</h4>
                    <div class="emoji-grid" id="settingsAvatarGrid"></div>
                </div>
                <div class="settings-section">
                    <h4>Имя пользователя</h4>
                    <input type="text" id="newUsernameInput" placeholder="Новое имя">
                    <button id="changeUsernameBtn" class="close-modal" style="margin-top:10px;">Изменить</button>
                </div>
                <div class="settings-section">
                    <h4>Тема оформления</h4>
                    <div class="theme-selector">
                        <div class="theme-option dark" data-theme="dark" style="background:#1a1a2e;"></div>
                        <div class="theme-option light" data-theme="light" style="background:#f0eefc;"></div>
                        <div class="theme-option forest" data-theme="forest" style="background:#1a2e1a;"></div>
                        <div class="theme-option ocean" data-theme="ocean" style="background:#1a2a4e;"></div>
                        <div class="theme-option sunset" data-theme="sunset" style="background:linear-gradient(135deg,#ff7e5f,#feb47b);"></div>
                    </div>
                </div>
                <div class="settings-section notification-sound">
                    <h4>Уведомления</h4>
                    <label><input type="checkbox" id="soundToggle" ${soundEnabled ? 'checked' : ''}> Звук при сообщении</label>
                </div>
                <button id="closeSettingsModal" class="close-modal">Закрыть</button>
            </div>
        `;
        const avatarGrid = document.getElementById('settingsAvatarGrid');
        if (avatarGrid && avatarGrid.children.length === 0) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉'];
            emojis.forEach(e => { const div = document.createElement('div'); div.className = 'emoji-option'; div.textContent = e; div.onclick = () => { updateAvatar(e); modal.style.display = 'none'; }; avatarGrid.appendChild(div); });
        }
        document.getElementById('changeUsernameBtn').onclick = () => {
            const newName = document.getElementById('newUsernameInput').value.trim();
            if (newName) updateUsername(newName);
            modal.style.display = 'none';
        };
        document.getElementById('closeSettingsModal').onclick = () => modal.style.display = 'none';
        document.getElementById('soundToggle').onchange = (e) => { soundEnabled = e.target.checked; localStorage.setItem('soundEnabled', soundEnabled); };
        document.querySelectorAll('.theme-option').forEach(opt => {
            opt.addEventListener('click', () => setTheme(opt.dataset.theme));
        });
        loadTheme();
    }
    
    function showCreateGroupModal() {
        let modal = document.getElementById('groupModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'groupModal';
            modal.className = 'modal group-modal';
            document.body.appendChild(modal);
        }
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Создать группу</h3>
                <input type="text" id="groupNameInput" placeholder="Название группы">
                <div class="members-list" id="groupMembersList"></div>
                <button id="confirmCreateGroup" class="close-modal" style="margin-bottom:8px;">Создать</button>
                <button id="cancelCreateGroup" class="close-modal" style="background:#6b7280;">Отмена</button>
            </div>
        `;
        const membersContainer = document.getElementById('groupMembersList');
        if (membersContainer && membersContainer.children.length === 0 && allUsers.length) {
            allUsers.forEach(u => {
                if (u.username !== currentUser.username) {
                    const div = document.createElement('div'); div.className = 'member-item';
                    div.innerHTML = `<input type="checkbox" value="${u.username}" id="member_${u.username}"> <label for="member_${u.username}">${escapeHtml(u.username)}</label>`;
                    membersContainer.appendChild(div);
                }
            });
        }
        document.getElementById('confirmCreateGroup').onclick = async () => {
            const name = document.getElementById('groupNameInput').value.trim();
            if (!name) { showToast('Введите название', true); return; }
            const selected = [];
            document.querySelectorAll('#groupMembersList input:checked').forEach(cb => selected.push(cb.value));
            await createGroup(name, selected);
            modal.style.display = 'none';
        };
        document.getElementById('cancelCreateGroup').onclick = () => modal.style.display = 'none';
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2>DanuMes</h2>
                    <div class="tabs">
                        <div class="tab active" id="loginTab">Вход</div>
                        <div class="tab" id="regTab">Регистрация</div>
                    </div>
                    <div id="loginPanel" class="auth-form">
                        <input type="text" id="loginUsername" placeholder="Логин">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <div id="loginError" class="error-text"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="regPanel" class="auth-form" style="display:none;">
                        <input type="text" id="regUsername" placeholder="Логин">
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <div id="regError" class="error-text"></div>
                        <button id="doReg" class="auth-btn">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;
        const loginTab = document.getElementById('loginTab'), regTab = document.getElementById('regTab');
        const loginPanel = document.getElementById('loginPanel'), regPanel = document.getElementById('regPanel');
        loginTab.onclick = () => { loginPanel.style.display = 'flex'; regPanel.style.display = 'none'; loginTab.classList.add('active'); regTab.classList.remove('active'); };
        regTab.onclick = () => { loginPanel.style.display = 'none'; regPanel.style.display = 'flex'; regTab.classList.add('active'); loginTab.classList.remove('active'); };
        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value, password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar, verified: res.verified, role: res.role };
                await loadAllUsers(); await loadChatsAndChannels();
                startMessenger();
                showToast(`Добро пожаловать, ${username}!`);
            } else { document.getElementById('loginError').innerText = res.error; }
        };
        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regUsername').value, password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) { alert('Регистрация успешна! Теперь войдите.'); loginTab.click(); }
            else { document.getElementById('regError').innerText = res.error; }
        };
    }
    
    function startMessenger() {
        document.getElementById('app').innerHTML = `
            <div class="messenger">
                <div class="sidebar" id="sidebar"></div>
                <div class="chat-main" id="chatMain"></div>
            </div>
            <div id="lightbox" class="lightbox"><img src=""></div>
        `;
        renderSidebar();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => { if (currentChat) loadMessages(); loadChatsAndChannels(); loadAllUsers(); }, 3000);
        loadTheme();
        const savedSound = localStorage.getItem('soundEnabled');
        if (savedSound !== null) soundEnabled = savedSound === 'true';
    }
    
    // ========== ОБЩИЕ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.background = '#dc2626';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    let activeMenu = null;
    function showContextMenu(e, items) {
        if (activeMenu) activeMenu.remove();
        const menu = document.createElement('div'); menu.className = 'context-menu';
        items.forEach(item => { const option = document.createElement('div'); option.textContent = item.label; option.onclick = (ev) => { ev.stopPropagation(); item.action(); menu.remove(); activeMenu = null; }; menu.appendChild(option); });
        document.body.appendChild(menu);
        let left = e.clientX, top = e.clientY;
        if (left + menu.offsetWidth > window.innerWidth) left = window.innerWidth - menu.offsetWidth - 10;
        if (top + menu.offsetHeight > window.innerHeight) top = window.innerHeight - menu.offsetHeight - 10;
        menu.style.left = left + 'px'; menu.style.top = top + 'px';
        activeMenu = menu;
        const closeMenu = () => { if(activeMenu) activeMenu.remove(); activeMenu = null; document.removeEventListener('click', closeMenu); };
        setTimeout(() => document.addEventListener('click', closeMenu), 10);
        e.preventDefault();
    }
    function showLightbox(url) {
        let lb = document.getElementById('lightbox'); if (!lb) return;
        lb.style.display = 'flex'; lb.querySelector('img').src = url;
        lb.onclick = () => lb.style.display = 'none';
    }
    async function uploadFile(file) {
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }
    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        renderSidebar();
        const headerAvatar = document.querySelector('.chat-header-avatar');
        if (headerAvatar) headerAvatar.textContent = emoji;
        showToast('Аватар обновлён');
    }
    async function updateUsername(newUsername) {
        const res = await api('POST', '/update-username', { oldUsername: currentUser.username, newUsername });
        if (res.success) {
            currentUser.username = newUsername;
            renderSidebar();
            showToast('Имя изменено');
        } else showToast(res.error || 'Ошибка', true);
    }
    async function deleteMessage(msgId) {
        if (currentChatType === 'user') await api('DELETE', `/delete-message/${msgId}`);
        else await api('DELETE', `/delete-group-message/${msgId}`);
        await loadMessages(); await loadChatsAndChannels();
        showToast('Сообщение удалено');
    }
    
    renderAuth();
</script>
