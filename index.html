<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DanuChat Premium</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="glass-mode">

  <!-- Главная обертка для центрирования всего мессенджера на ПК -->
  <div class="window-wrapper">

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="screen-auth" class="auth-container">
      <div class="auth-island">
        <div class="auth-logo">D</div>
        <h2 id="auth-title">Войти в DanuChat</h2>
        
        <div class="auth-form">
          <div class="auth-input-wrapper">
            <input type="text" id="auth-username" placeholder="Имя пользователя">
          </div>
          <div class="auth-input-wrapper hidden-auth-field" id="email-field">
            <input type="email" id="auth-email" placeholder="Email адрес">
          </div>
          <div class="auth-input-wrapper">
            <input type="password" id="auth-password" placeholder="Пароль">
          </div>
          <button class="btn-auth-submit" id="auth-submit-trigger" onclick="handleAuthSubmit()">Войти</button>
        </div>

        <div class="auth-toggle-text">
          <span id="auth-toggle-hint">Ещё нет аккаунта?</span>
          <button id="btn-auth-toggle" onclick="toggleAuthMode()">Зарегистрироваться</button>
        </div>
      </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-messenger-layout" class="app-layout auth-hidden">
      
      <!-- ЛЕВАЯ ПАНЕЛЬ -->
      <aside id="panel-chats" class="messenger-panel">
        <header class="ios-header">
          <button class="btn-circle avatar-main" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <div class="header-island">Чаты</div>
          <button class="btn-circle btn-action">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </header>

        <main class="chats-list">
          <div id="chat-item-test" class="chat-item" onclick="selectChat('test-id')">
            <div class="chat-avatar blue-gradient">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="chat-details">
              <div class="chat-row">
                <span class="chat-name">Test</span>
                <span class="chat-time" id="chat-last-time">04:03</span>
              </div>
              <div class="chat-row">
                <p class="chat-preview" id="chat-last-preview">В закрепе: новые стикеры...</p>
                <span class="badge-unread" id="chat-unread-badge">1</span>
              </div>
            </div>
          </div>
        </main>

        <nav class="ios-tabbar">
          <div class="tabbar-main-island">
            <button class="tab-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span>Вы</span>
            </button>
            <button class="tab-item active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Чаты</span>
            </button>
            <button class="tab-item" onclick="toggleGlassEffect()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="21" y2="21"/><line x1="4" x2="20" y1="14" y2="14"/><line x1="4" x2="20" y1="7" y2="7"/></svg>
              <span>Стекло</span>
            </button>
          </div>
          <button class="btn-circle btn-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
        </nav>
      </aside>

      <!-- ПРАВАЯ ПАНЕЛЬ -->
      <section id="panel-dialog" class="messenger-panel mobile-hidden">
        <div id="dialog-placeholder" class="dialog-empty-state">
          <div class="placeholder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <p>Выберите чат, чтобы начать общение</p>
        </div>

        <div id="dialog-active-content" class="dialog-content-wrapper hidden-content">
          <header class="ios-header">
            <button class="btn-circle btn-back" onclick="closeChatMobile()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            
            <div class="header-island profile-island">
              <div class="mini-avatar">🐮</div>
              <div class="profile-meta">
                <span class="user-name">Test</span>
                <span class="user-status">был(а) 1 ч. назад</span>
              </div>
              <svg class="icon-arrow-profile" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </div>
            
            <div class="header-controls-island">
              <button class="icon-control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </button>
              <button class="icon-control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
              </button>
            </div>
          </header>

          <main class="messages-container" id="messages-view">
            <div class="message msg-outgoing item-sticker">
              <div class="sticker-wrapper">
                <span class="mock-sticker">🐮😂</span>
                <div class="msg-meta">
                  <span class="msg-time">04:03</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </div>
              </div>
            </div>
          </main>

          <footer class="ios-footer">
            <button class="btn-circle btn-plus">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            </button>
            
            <div class="input-island">
              <input type="text" placeholder="Сообщение..." id="message-input" autocomplete="off" oninput="handleInputMessage(this)">
              <button class="btn-inside-smile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
              </button>
            </div>
            
            <button class="btn-circle btn-mic" id="btn-send" onclick="handleSendClick()">
              <span id="send-icon-container" style="display:flex; justify-content:center; align-items:center; width:100%; height:100%;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
              </span>
            </button>
          </footer>
        </div>
      </section>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
