<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Modern Web Messenger</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #070a12;
            --bg-glass: rgba(15, 22, 42, 0.7);
            --bg-sidebar: rgba(10, 15, 30, 0.8);
            --bg-active: rgba(255, 255, 255, 0.06);
            --bg-chat-user: #6366f1;
            --bg-chat-friend: rgba(255, 255, 255, 0.04);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(243, 244, 246, 0.9);
            --bg-active: rgba(0, 0, 0, 0.05);
            --bg-chat-user: #4f46e5;
            --bg-chat-friend: rgba(0, 0, 0, 0.04);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        
        /* Авторизационный экран */
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .auth-card { background: var(--bg-glass); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; box-shadow: var(--shadow); backdrop-filter: blur(20px); position: relative;}
        .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin: 8px 0; outline: none; font-size: 15px; text-align: left; padding-left: 16px;}
        
        /* Раздельные кнопки входа и регистрации */
        .auth-buttons-row { display: flex; gap: 10px; margin-top: 16px; }
        .auth-btn { flex: 1; padding: 14px; border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .auth-btn.login { background: #6366f1; }
        .auth-btn.login:hover { background: #4f46e5; }
        .auth-btn.register { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color); color: var(--text-main); }
        .auth-btn.register:hover { background: var(--bg-active); }

        /* Красивая плашка системных уведомлений и ошибок */
        .alert-toast { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 500; margin-bottom: 16px; text-align: center; display: none; }
        .alert-toast.success { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #34d399; }

        /* Стили главного интерфейса мессенджера */
        .app-container { width: 100vw; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(20px); display: flex; overflow: hidden; }
        .nav-rail { width: 72px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        
        .nav-btn { width: 48px; height: 48px; border-radius: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-active); color: var(--text-main); }
        .nav-btn.active { color: #6366f1; border: 1px solid var(--border-color); }
        
        .nav-profile-trigger { margin-top: auto; font-size: 24px; cursor: pointer; background: var(--bg-active); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); }

        .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;}
        
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px 16px 12px 40px; border-radius: 12px; color: var(--text-main); outline: none; }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); font-style: normal; font-weight: bold; }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .list-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 8px 12px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--bg-active); }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px; position: relative;}
        .online-badge { width: 12px; height: 12px; background: #10b981; border: 2px solid #0a0f1e; border-radius: 50%; position: absolute; bottom: 0; right: 0; display: none; }
        .chat-item.online .online-badge { display: block; }

        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-status-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;}

        .search-actions { display: flex; gap: 4px; }
        .action-btn { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .action-btn.primary { background: #6366f1; color: white; border: none; }

        .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;}
        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-sidebar); }
        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        
        .message-bubble { max-width: 55%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; word-wrap: break-word; }
        .sent .message-bubble { background: var(--bg-chat-user); color: white; border-bottom-right-radius: 4px; }
        .received .message-bubble { background: var(--bg-chat-friend); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        /* Время сообщения внутри баббла */
        .msg-time { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 4px; display: block; }

        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #ef4444; border: none; color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.1s ease; }
        .sent .delete-msg-btn { left: -75px; } 
        .received .delete-msg-btn { right: -75px; }
        .message-wrapper:hover .delete-msg-btn { opacity: 1; }

        /* Статус "Печатает..." в окне чата */
        .typing-indicator-text { font-size: 13px; color: #6366f1; padding: 4px 24px; font-style: italic; display: none; min-height: 24px;}

        .input-area { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-sidebar); }
        .message-input { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); padding: 14px 20px; border-radius: 12px; color: var(--text-main); outline: none; font-size: 15px; }
        .send-btn { background: #6366f1; border: none; color: white; padding: 14px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; font-weight: 600; }
        .send-btn:hover { background: #4f46e5; }

        /* Окно профиля */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .profile-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; box-shadow: var(--shadow); position: relative;}
        .profile-avatar-select { display: flex; justify-content: center; gap: 12px; margin: 16px 0; font-size: 28px; }
        .avatar-opt { cursor: pointer; padding: 6px; border-radius: 10px; border: 1px solid transparent; }
        .avatar-opt.selected { border-color: #6366f1; background: var(--bg-active); }
        .profile-input { width: 100%; padding: 12px; border-radius: 8px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; outline: none; font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
        .profile-save-btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Экран входа / Регистрации -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2 class="logo" style="font-size:36px; margin-bottom:12px;">DanuMes</h2>
            
            <!-- Окно ошибок -->
            <div class="alert-toast" id="authAlert"></div>
            
            <input type="text" class="auth-input" id="usernameInput" placeholder="Логин (Никнейм)..." autofocus>
            <input type="password" class="auth-input" id="passwordInput" placeholder="Пароль...">
            
            <div class="auth-buttons-row">
                <button class="auth-btn login" id="loginBtn">Войти</button>
                <button class="auth-btn register" id="registerBtn">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно Настройки Профиля -->
    <div class="modal-overlay hidden" id="profileModal">
        <div class="profile-card">
            <button class="close-modal-btn" id="closeProfileBtn">✕</button>
            <h3 style="margin-bottom:14px; font-size:18px;">Настройки профиля</h3>
            
            <label style="font-size:13px; color:var(--text-muted)">Выберите аватарку (Emoji)</label>
            <div class="profile-avatar-select">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🤖')">🤖</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🥷')">🥷</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐱')">🐱</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🔥')">🔥</span>
            </div>

            <label style="font-size:13px; color:var(--text-muted)">Ваш статус</label>
            <input type="text" class="profile-input" id="statusInput" placeholder="Что у вас нового?">

            <button class="profile-save-btn" id="saveProfileBtn">Сохранить изменения</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Навигационное рельс-меню слева -->
        <nav class="nav-rail">
            <button class="nav-btn active" id="navHome" title="Главная">🏠</button>
            <button class="nav-btn" id="themeToggle" title="Сменить тему">☀️</button>
            <div class="nav-profile-trigger" id="profileTrigger" title="Мой профиль">🤖</div>
        </nav>

        <!-- Боковая панель списков -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск людей по логину...">
                </div>
            </div>
            <div class="chats-list">
                <div class="list-section-title" id="friendsTitle">Мои диалоги</div>
                <div id="friendsList"></div>
                <div class="list-section-title hidden" id="globalTitle" style="margin-top: 16px;">Глобальный поиск пользователей</div>
                <div id="globalList"></div>
            </div>
        </aside>

        <!-- Домашний экран приветствия -->
        <div class="home-screen" id="homeScreen">
            <span style="font-size:64px; margin-bottom:12px;">💬</span>
            <h2>Добро пожаловать в DanuMes, <span id="greetingName">Пользователь</span>!</h2>
            <p style="color:var(--text-muted); margin-top:8px; max-width:400px;">Вы подключены к единой сети. Найдите человека через поиск, чтобы начать общение.</p>
        </div>

        <!-- Окно открытого чата -->
        <main class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <div class="avatar" id="activeAvatar">🤖</div>
                <div>
                    <h4 id="activeChatName"></h4>
                    <span id="activeChatStatus" style="font-size:12px; color:var(--text-muted);">Доступен</span>
                </div>
            </div>
            
            <!-- Место под сообщения -->
            <div class="messages-area" id="messagesArea"></div>
            
            <!-- Текст печатает -->
            <div class="typing-indicator-text" id="typingIndicator">Алина печатает...</div>

            <!-- Зона ввода -->
            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение...">
                <button class="send-btn" id="sendBtn">Отправить</button>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let activeChatName = null;
        let globalUsersList = [];
        let openedChats = new Set(); 
        let selectedAvatarSymbol = "🤖";
        let typingTimeout = null;

        // Элементы
        const authScreen = document.getElementById('authScreen');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authAlert = document.getElementById('authAlert');

        const profileModal = document.getElementById('profileModal');
        const profileTrigger = document.getElementById('profileTrigger');
        const closeProfileBtn = document.getElementById('closeProfileBtn');
        const saveProfileBtn = document.getElementById('saveProfileBtn');
        const statusInput = document.getElementById('statusInput');
        const messageInput = document.getElementById('messageInput');

        // Генератор приятных звуков для уведомлений (Web Audio API)
        function playNotifySound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'sent') {
                    osc.frequency.setValueAtTime(580, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'received') {
                    osc.frequency.setValueAtTime(650, ctx.currentTime);
                    osc.frequency.setValueAtTime(900, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
            } catch (e) { console.log("Аудио контекст заблокирован браузером."); }
        }

        // Вывод ошибок на плашке
        function showAuthAlert(text, isSuccess = false) {
            authAlert.innerText = text;
            authAlert.style.
