<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DanuMes — Мессенджер</title>
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ТЕМЫ */
    body[data-theme="dark"] {
      --bg-main: #0B0B0C;
      --bg-sidebar: #121214;
      --bg-element: #1A1A1E;
      --accent: #5826FF;
      --text-main: #FFFFFF;
      --text-muted: #66666E;
      --border: #2A2A2E;
      --status-bar-bg: #0B0B0C;
    }

    body[data-theme="light"] {
      --bg-main: #F5F5F5;
      --bg-sidebar: #FFFFFF;
      --bg-element: #E8E8E8;
      --accent: #5826FF;
      --text-main: #111111;
      --text-muted: #666666;
      --border: #DDDDDD;
      --status-bar-bg: #F5F5F5;
    }

    body[data-theme="blue"] {
      --bg-main: #0A1628;
      --bg-sidebar: #0F1A2E;
      --bg-element: #17212B;
      --accent: #2B5278;
      --text-main: #E1E1E1;
      --text-muted: #8A8A9A;
      --border: #1F2C3A;
      --status-bar-bg: #0A1628;
    }

    body[data-theme="purple"] {
      --bg-main: #1A0B2E;
      --bg-sidebar: #201240;
      --bg-element: #2A1A4A;
      --accent: #8E44AD;
      --text-main: #E1D5F0;
      --text-muted: #A890C0;
      --border: #35255A;
      --status-bar-bg: #1A0B2E;
    }

    body[data-theme="pink"] {
      --bg-main: #2D132C;
      --bg-sidebar: #3D1F3C;
      --bg-element: #4D2A4C;
      --accent: #E84393;
      --text-main: #FFD9E6;
      --text-muted: #D48AAA;
      --border: #5A3558;
      --status-bar-bg: #2D132C;
    }

    /* Status bar */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: env(safe-area-inset-top);
      background: var(--status-bar-bg);
      z-index: 1000;
      pointer-events: none;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* САЙДБАР */
    .sidebar {
      width: 320px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      height: 100vh;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: env(safe-area-inset-top);
        left: 0;
        width: 100%;
        height: calc(100vh - env(safe-area-inset-top));
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        border-right: none;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-overlay {
        position: fixed;
        top: env(safe-area-inset-top);
        left: 0;
        width: 100%;
        height: calc(100vh - env(safe-area-inset-top));
        background: rgba(0,0,0,0.5);
        z-index: 99;
        display: none;
      }
      .sidebar-overlay.open {
        display: block;
      }
      .back-button {
        display: flex !important;
      }
      .chat-area {
        width: 100%;
      }
    }

    @media (min-width: 769px) {
      .sidebar {
        margin: 0;
        border-radius: 0;
      }
      .chat-area {
        margin: 0;
        border-radius: 0;
      }
      .back-button {
        display: none !important;
      }
    }

    .sidebar-header {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 24px;
      font-weight: 600;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    .settings-btn, .logout-btn {
      width: 36px;
      height: 36px;
      background: var(--bg-element);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
    }

    .settings-btn:hover, .logout-btn:hover {
      background: var(--accent);
      color: white;
    }

    .logout-btn:hover {
      background: #ef4444;
    }

    .plus-btn {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: 50px;
      right: 16px;
      background: var(--bg-element);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 0;
      min-width: 180px;
      display: none;
      z-index: 100;
    }

    .dropdown-menu.show { display: block; }
    .dropdown-item { padding: 10px 16px; cursor: pointer; }
    .dropdown-item:hover { background: var(--accent); }

    .search-container {
      padding: 12px 16px;
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-element);
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      font-size: 14px;
    }
    .search-input::placeholder { color: var(--text-muted); }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      min-height: 0;
    }

    .chat-section {
      padding: 12px 8px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      cursor: pointer;
      border-radius: 8px;
      position: relative;
    }

    .chat-item:hover { background: var(--bg-element); }
    .chat-item.active { background: var(--bg-element); }

    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--bg-element);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
      flex-shrink: 0;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg-sidebar);
    }

    .chat-info { 
      flex: 1; 
      min-width: 0;
    }
    .chat-name { 
      font-weight: 600; 
      font-size: 15px; 
      margin-bottom: 4px; 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      flex-wrap: wrap; 
    }
    .chat-preview { 
      font-size: 12px; 
      color: var(--text-muted); 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    .chat-time { 
      font-size: 10px; 
      color: var(--text-muted); 
      margin-left: 8px; 
      flex-shrink: 0; 
    }
    .chat-row { 
      display: flex; 
      align-items: baseline; 
      justify-content: space-between; 
    }
    .delete-chat {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      opacity: 0;
    }
    .chat-item:hover .delete-chat { opacity: 1; }

    /* ЧАТ */
    .chat-area {
      flex: 1;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .chat-header {
      padding: 16px 20px;
      background: var(--bg-sidebar);
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-button {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 24px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      display: none;
    }

    .chat-header-avatar {
      width: 44px;
      height: 44px;
      background: var(--bg-element);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-name { font-weight: 600; font-size: 17px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chat-header-status { font-size: 12px; color: var(--text-muted); }

    .subscribe-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    /* СООБЩЕНИЯ */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 75%;
      display: flex;
      flex-direction: column;
    }
    .message-own { align-self: flex-end; }
    .message-other { align-self: flex-start; }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--bg-element);
      cursor: pointer;
    }
    .message-own .message-bubble { background: var(--accent); }

    .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
    .message-text { font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .message-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    .message-file { margin-top: 6px; }
    .message-file img { max-width: 200px; max-height: 150px; border-radius: 12px; cursor: pointer; }

    .voice-message { display: flex; align-items: center; gap: 10px; min-width: 180px; flex-wrap: wrap; }
    .voice-play {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
    }
    .voice-timeline { flex: 1; height: 4px; background: var(--border); border-radius: 2px; min-width: 80px; }
    .voice-progress { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; }
    .voice-duration { font-size: 11px; color: var(--text-muted); min-width: 40px; }

    .reactions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .reaction {
      background: var(--bg-element);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .reaction:hover { background: var(--accent); }
    .reaction.active { background: var(--accent); }

    /* ===== КОМПАКТНАЯ ПАНЕЛЬ ВВОДА ДЛЯ ТЕЛЕФОНА ===== */
    .input-area {
      padding: 12px 16px;
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .input-wrapper { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
    }
    
    .message-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-element);
      border: none;
      border-radius: 20px;
      color: var(--text-main);
      font-size: 14px;
      resize: none;
      font-family: inherit;
      max-height: 80px;
    }
    
    .input-btn {
      width: 38px;
      height: 38px;
      background: var(--bg-element);
      border: none;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .input-btn:hover { 
      background: var(--accent); 
      color: white; 
    }
    
    .input-btn.send-btn { 
      background: var(--accent); 
      color: white; 
    }

    /* Телефон — ещё меньше отступы */
    @media (max-width: 768px) {
      .input-area {
        padding: 8px 12px;
      }
      
      .input-wrapper {
        gap: 6px;
      }
      
      .input-btn {
        width: 36px;
        height: 36px;
        font-size: 15px;
      }
      
      .message-input {
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 18px;
      }
    }

    /* МОДАЛКИ */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: var(--bg-sidebar);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      border: 1px solid var(--border);
    }
    .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    .modal-input {
      width: 100%;
      padding: 12px;
      background: var(--bg-element);
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      margin-bottom: 16px;
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .modal-btn-primary { background: var(--accent); color: white; }
    .modal-btn-cancel { background: var(--bg-element); color: var(--text-muted); }

    .context-menu {
      position: fixed;
      background: var(--bg-element);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 180px;
      overflow: hidden;
      z-index: 1000;
    }
    .context-menu-item { padding: 10px 16px; cursor: pointer; }
    .context-menu-item:hover { background: var(--accent); }

    .sticker-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--bg-element);
      border-radius: 16px;
      padding: 16px;
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      max-width: 280px;
      border: 1px solid var(--border);
      z-index: 99;
    }
    .sticker-panel.show { display: grid; }
    .sticker { font-size: 32px; cursor: pointer; padding: 6px; text-align: center; border-radius: 8px; }

    .voice-recording {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-element);
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .recording-timer { color: #ef4444; }

    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    }
    .profile-card {
      background: var(--bg-sidebar);
      border-radius: 24px;
      padding: 32px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 20px;
      cursor: pointer;
    }
    .profile-name { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .profile-status { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-element);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 3000;
      white-space: nowrap;
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      padding: 20px;
    }
    .login-card {
      background: var(--bg-sidebar);
      padding: 40px;
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
    }
    .login-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      color: var(--accent);
    }
    .login-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-element);
      border: none;
      border-radius: 12px;
      color: var(--text-main);
      margin-bottom: 14px;
      font-size: 16px;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .switch-mode {
      text-align: center;
      margin-top: 20px;
      cursor: pointer;
      color: var(--accent);
    }
    .saved-accounts {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .saved-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .saved-account {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-element);
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .saved-account:hover { background: var(--accent); }
    .saved-avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
  </style>
</head>

  <div id="app"></div>

</body>
</html>
