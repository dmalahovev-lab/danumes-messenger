<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальный мессенджер</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --input-bg: #21262d;
            --msg-inbound: #21262d;
            --msg-outbound: #238636;
        }

        [data-theme="light"] {
            --bg-color: #f6f8fa;
            --container-bg: #ffffff;
            --text-color: #24292f;
            --accent-color: #0969da;
            --border-color: #d0d7de;
            --input-bg: #f6f8fa;
            --msg-inbound: #afb8c133;
            --msg-outbound: #dafbe1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .auth-container h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            outline: none;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Интерфейс мессенджера (Bento Grid) */
        .messenger-container {
            display: none;
            width: 100%;
            height: 100vh;
            grid-template-columns: 320px 1fr;
        }

        .sidebar {
            background-color: var(--container-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-menu {
            display: flex;
            padding: 10px 20px;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            padding: 10px 20px;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
        }

        .list-section {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .list-section h3 {
            font-size: 14px;
            margin: 15px 0 5px 0;
            color: var(--accent-color);
        }

        .item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .item:hover, .item.active {
            background-color: var(--input-bg);
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .chat-window {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        .chat-header {
            padding: 20px;
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
            position: relative;
            word-break: break-word;
        }

        .message.inbound {
            background-color: var(--msg-inbound);
            align-self: flex-start;
        }

        .message.outbound {
            background-color: var(--msg-outbound);
            align-self: flex-end;
            color: white;
        }

        [data-theme="light"] .message.outbound {
            color: #24292f;
        }

        .message .meta {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px;
            background-color: var(--container-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            outline: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 8px;
            width: 320px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 10px;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <!-- ОКНО АВТОРИЗАЦИИ -->
    <div class="auth-container" id="authBlock">
        <h2>DanuMes</h2>
        <div class="input-group">
            <label>Имя пользователя</label>
            <input type="text" id="usernameInput" placeholder="Введите никнейм...">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="passwordInput" placeholder="Введите пароль...">
        </div>
        <div class="btn-row">
            <button onclick="login()">Войти</button>
            <button onclick="register()">Регистрация</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС МЕССЕНДЖЕРА -->
    <div class="messenger-container" id="messengerBlock">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2 style="font-size: 18px;">🤖 DanuMes</h2>
                <button onclick="toggleTheme()" style="padding: 5px 10px; flex: none;">ТЕМA</button>
            </div>
            <div class="sidebar-menu">
                <button onclick="openModal()" style="padding: 8px;">+</button>
                <div style="flex: 1;"></div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Поиск...">
            </div>
            <div class="list-section">
                <h3>Мои группы</h3>
                <div id="groupsList"></div>
                <h3>Мои друзья</h3>
                <div id="friendsList"></div>
            </div>
        </div>

        <!-- Окно чата -->
        <div class="chat-window">
            <div class="chat-header">
                <div class="avatar" id="activeChatAvatar">?</div>
                <div>
                    <h3 id="activeChatName">Выберите чат</h3>
                    <span id="activeChatStatus" style="font-size: 12px; opacity: 0.6;"></span>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <!-- Здесь будут сообщения -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" style="flex: none; width: 100px;">Отправить</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ДЛЯ СОЗДАНИЯ ГРУППЫ -->
    <div class="modal" id="groupModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 style="margin-bottom: 15px;">Создать новую группу</h3>
            <div class="input-group">
                <label>Название группы</label>
                <input type="text" id="newGroupNameInput" placeholder="Имя группы...">
            </div>
            <button onclick="createGroup()" style="width: 100%;">Создать группу</button>
        </div>
    </div>

    <script>
        // АВТОМАТИЧЕСКИ ОПРЕДЕЛЯЕМ АДРЕС СЕРВЕРА
        const API_URL = window.location.origin.includes('localhost') 
            ? 'http://localhost:3000' 
            : 'https://danumes.onrender.com';

        let currentUser = localStorage.getItem('danumes_user') || null;
        let activeChat = null;
        let isGroupChat = false;
        let serverData = { users: {}, messages: [], groups: [] };

        if (currentUser) {
            showMessenger();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
        }

        async function login() {
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            if (!u || !p) return alert('Заполните все поля');

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = u;
                    localStorage.setItem('danumes_user', u);
                    showMessenger();
                } else {
                    alert(data.error || 'Ошибка входа');
                }
            } catch (err) {
                alert('Не удалось подключиться к серверу. Подождите пару минут, сервер на Render «просыпается».');
            }
        }

        async function register() {
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            if (!u || !p) return alert('Заполните все поля');

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Регистрация успешна! Теперь нажмите "Войти".');
                } else {
                    alert(data.error || 'Ошибка регистрации');
                }
            } catch (err) {
                alert('Ошибка соединения с сервером.');
            }
        }

        function showMessenger() {
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('messengerBlock').style.display = 'grid';
            startSync();
        }

        function startSync() {
            syncData();
            setInterval(syncData, 3000);
        }

        async function syncData() {
            if (!currentUser) return;
            try {
                const res = await fetch(`${API_URL}/api/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
                serverData = await res.json();
                renderSidebar();
                renderMessages();
            } catch (e) {
                console.error("Ошибка синхронизации", e);
            }
        }

        function renderSidebar() {
            const fList = document.getElementById('friendsList');
            const gList = document.getElementById('groupsList');
            
            fList.innerHTML = '';
            gList.innerHTML = '';

            // Рендер пользователей
            Object.keys(serverData.users).forEach(u => {
                if (u === currentUser) return;
                const isOnline = serverData.users[u].online;
                const div = document.createElement('div');
                div.className = `item ${activeChat === u && !isGroupChat ? 'active' : ''}`;
                div.onclick = () => selectChat(u, false);
                div.innerHTML = `
                    <div class="avatar">${u[0].toUpperCase()}</div>
                    <div style="flex:1;">
                        <div>${u}</div>
                        <div style="font-size:11px; color:${isOnline ? '#238636' : '#8b949e'}">
                            ${isOnline ? 'В сети' : 'Офлайн'}
                        </div>
                    </div>
                `;
                fList.appendChild(div);
            });

            // Рендер групп
            serverData.groups.forEach(g => {
                const div = document.createElement('div');
                div.className = `item ${activeChat === g.name && isGroupChat ? 'active' : ''}`;
                div.onclick = () => selectChat(g.name, true);
                div.innerHTML = `
                    <div class="avatar" style="background-color: var(--accent-color)">#</div>
                    <div>${g.name}</div>
                `;
                gList.appendChild(div);
            });
        }

        function selectChat(name, isGroup) {
            activeChat = name;
            isGroupChat = isGroup;
            document.getElementById('activeChatName').innerText = name;
            document.getElementById('activeChatAvatar').innerText = isGroup ? '#' : name[0].toUpperCase();
            document.getElementById('activeChatStatus').innerText = isGroup ? 'Групповой чат' : '';
            renderMessages();
        }

        function renderMessages() {
            const area = document.getElementById('messagesArea');
            if (!activeChat) return;

            // Сохраняем позицию скролла
            const shouldScroll = area.scrollTop + area.clientHeight >= area.scrollHeight - 50;

            area.innerHTML = '';

            const filtered = serverData.messages.filter(m => {
                if (isGroupChat) {
                    return m.isGroup && m.to === activeChat;
                } else {
                    return !m.isGroup && ((m.from === currentUser && m.to === activeChat) || (m.from === activeChat && m.to === currentUser));
                }
            });

            filtered.forEach(m => {
                const div = document.createElement('div');
                const isOut = m.from === currentUser;
                div.className = `message ${isOut ? 'outbound' : 'inbound'}`;
                
                let authorHTML = !isOut && isGroupChat ? `<strong style="font-size:12px;color:var(--accent-color);display:block;margin-bottom:2px;">${m.from}</strong>` : '';
                
                div.innerHTML = `
                    ${authorHTML}
                    <div>${m.text}</div>
                    <div class="meta">${new Date(m.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                `;
                area.appendChild(div);
            });

            if (shouldScroll) {
                area.scrollTop = area.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChat) return;

            try {
                await fetch(`${API_URL}/api/messages/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from: currentUser,
                        to: activeChat,
                        text: text,
                        isGroup: isGroupChat
                    })
                });
                input.value = '';
                syncData();
            } catch (e) {
                alert('Не удалось отправить сообщение');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function openModal() { document.getElementById('groupModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('groupModal').style.display = 'none'; }

        async function createGroup() {
            const name = document.getElementById('newGroupNameInput').value.trim();
            if (!name) return alert('Введите имя группы');

            try {
                const res = await fetch(`${API_URL}/api/groups/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, creator: currentUser })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    document.getElementById('newGroupNameInput').value = '';
                    syncData();
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert('Ошибка при создании группы');
            }
        }
    </script>
</body>
</html>
