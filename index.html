<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#5826FF">
    <link rel="manifest" href="/manifest.json">
    <title>DanuMes — Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0B0B0C;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* ОСНОВНОЙ ЛЕЙАУТ */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* САЙДБАР - исправлено для мобильных */
        .sidebar {
            width: 320px;
            max-width: 85vw;
            background: #121214;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #2A2A2E;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2A2A2E;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .settings-btn, .logout-btn {
            width: 40px;
            height: 40px;
            background: #1A1A1E;
            border: none;
            border-radius: 10px;
            color: #66666E;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:active, .logout-btn:active {
            transform: scale(0.95);
        }

        .plus-btn {
            width: 40px;
            height: 40px;
            background: #5826FF;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plus-btn:active {
            transform: scale(0.95);
        }

        .search-container {
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            padding: 12px 14px;
            background: #1A1A1E;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-section {
            padding: 12px 8px 4px;
            font-size: 12px;
            font-weight: 600;
            color: #66666E;
            text-transform: uppercase;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            position: relative;
            min-height: 72px;
        }

        .chat-item:active {
            background: #1A1A1E;
            transform: scale(0.98);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background: #1A1A1E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #121214;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chat-preview {
            font-size: 13px;
            color: #66666E;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-chat {
            background: none;
            border: none;
            color: #66666E;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            opacity: 0.6;
        }

        .delete-chat:active {
            opacity: 1;
        }

        /* ОБЛАСТЬ ЧАТА */
        .chat-area {
            flex: 1;
            background: #0B0B0C;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .chat-header {
            padding: 12px 16px;
            background: #121214;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2A2A2E;
            flex-shrink: 0;
            min-height: 68px;
        }

        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-button:active {
            background: #1A1A1E;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            background: #1A1A1E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .chat-header-avatar:active {
            transform: scale(0.95);
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chat-header-status {
            font-size: 12px;
            color: #66666E;
        }

        .subscribe-btn {
            background: #5826FF;
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
        }

        .subscribe-btn:active {
            transform: scale(0.95);
        }

        /* СООБЩЕНИЯ */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
        }

        .message-own {
            align-self: flex-end;
        }

        .message-other {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 20px;
            background: #1A1A1E;
            cursor: pointer;
            word-break: break-word;
        }

        .message-own .message-bubble {
            background: #5826FF;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #5826FF;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-meta {
            font-size: 10px;
            color: #66666E;
            margin-top: 4px;
            margin-left: 8px;
        }

        .message-file img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 6px;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .voice-play {
            width: 36px;
            height: 36px;
            background: #5826FF;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
        }

        .voice-play:active {
            transform: scale(0.95);
        }

        .voice-timeline {
            flex: 1;
            height: 4px;
            background: #2A2A2E;
            border-radius: 2px;
            min-width: 80px;
        }

        .voice-progress {
            height: 100%;
            background: #5826FF;
            border-radius: 2px;
            width: 0%;
        }

        .voice-duration {
            font-size: 11px;
            color: #66666E;
            min-width: 45px;
        }

        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .reaction {
            background: #1A1A1E;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .reaction:active {
            background: #5826FF;
        }

        /* ПАНЕЛЬ ВВОДА */
        .input-area {
            padding: 12px 16px;
            background: #121214;
            border-top: 1px solid #2A2A2E;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #1A1A1E;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            min-height: 44px;
        }

        .message-input:focus {
            outline: 1px solid #5826FF;
        }

        .message-input:disabled {
            opacity: 0.5;
        }

        .input-btn {
            width: 44px;
            height: 44px;
            background: #1A1A1E;
            border: none;
            border-radius: 50%;
            color: #66666E;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-btn:active {
            transform: scale(0.95);
        }

        .input-btn.send-btn {
            background: #5826FF;
            color: white;
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
                width: 85%;
                max-width: 320px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .back-button {
                display: flex !important;
            }
            
            .message {
                max-width: 90%;
            }
            
            .chat-header {
                padding: 10px 12px;
            }
            
            .messages-container {
                padding: 12px;
            }
            
            .input-area {
                padding: 10px 12px;
            }
            
            .input-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            
            .message-input {
                padding: 10px 14px;
                font-size: 15px;
                min-height: 40px;
            }
            
            .chat-avatar {
                width: 48px;
                height: 48px;
                font-size: 22px;
            }
            
            .chat-header-avatar {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            
            .sidebar-header {
                padding: 12px;
            }
            
            .sidebar-header h2 {
                font-size: 20px;
            }
            
            .settings-btn, .logout-btn, .plus-btn {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .message-file img {
                max-width: 150px;
                max-height: 120px;
            }
            
            .voice-message {
                min-width: 140px;
            }
            
            .chat-name {
                font-size: 15px;
            }
            
            .chat-preview {
                font-size: 12px;
            }
        }

        /* МОДАЛКИ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #121214;
            border-radius: 20px;
            padding: 24px;
            width: calc(100% - 40px);
            max-width: 380px;
            border: 1px solid #2A2A2E;
            margin: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: #1A1A1E;
            border: none;
            border-radius: 12px;
            color: white;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-btn-primary {
            background: #5826FF;
            color: white;
        }

        .modal-btn-cancel {
            background: #1A1A1E;
            color: #66666E;
        }

        /* КОНТЕКСТНОЕ МЕНЮ */
        .context-menu {
            position: fixed;
            background: #1A1A1E;
            border: 1px solid #2A2A2E;
            border-radius: 14px;
            min-width: 170px;
            overflow: hidden;
            z-index: 1000;
        }

        .context-menu-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 15px;
        }

        .context-menu-item:active {
            background: #5826FF;
        }

        /* СТИКЕРЫ */
        .sticker-panel {
            position: fixed;
            bottom: 80px;
            right: 16px;
            left: 16px;
            background: #1A1A1E;
            border-radius: 20px;
            padding: 16px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            border: 1px solid #2A2A2E;
            z-index: 99;
            max-width: 320px;
            margin: 0 auto;
        }

        .sticker-panel.show {
            display: grid;
        }

        .sticker {
            font-size: 36px;
            cursor: pointer;
            padding: 8px;
            text-align: center;
            border-radius: 12px;
        }

        .sticker:active {
            background: #5826FF;
        }

        .voice-recording {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1A1A1E;
            padding: 8px 16px;
            border-radius: 30px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .recording-timer {
            color: #ef4444;
            font-weight: 600;
        }

        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }

        .profile-card {
            background: #121214;
            border-radius: 28px;
            padding: 32px 24px;
            width: calc(100% - 40px);
            max-width: 360px;
            text-align: center;
            border: 1px solid #2A2A2E;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: #5826FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .profile-status {
            font-size: 14px;
            color: #66666E;
            margin-bottom: 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1A1A1E;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 3000;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
        }

        /* ЛОГИН */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #5826FF, #3a18cc);
            padding: 20px;
            overflow-y: auto;
        }

        .login-card {
            background: #121214;
            padding: 32px 24px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
        }

        .login-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 32px;
            text-align: center;
            color: #5826FF;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            background: #1A1A1E;
            border: none;
            border-radius: 14px;
            color: white;
            margin-bottom: 14px;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #5826FF;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .switch-mode {
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
            color: #5826FF;
            font-size: 14px;
        }

        .saved-accounts {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #2A2A2E;
        }

        .saved-title {
            font-size: 12px;
            color: #66666E;
            margin-bottom: 8px;
        }

        .saved-account {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #1A1A1E;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .saved-account:active {
            background: #5826FF;
        }

        .saved-avatar {
            width: 36px;
            height: 36px;
            background: #5826FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #5826FF;
            border-radius: 10px;
        }
        
        .reaction-menu {
            position: fixed;
            background: #1A1A1E;
            border-radius: 40px;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            border: 1px solid #2A2A2E;
        }
        
        .reaction-option {
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
        
        .reaction-option:active {
            transform: scale(1.2);
        }
        
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #66666E;
            font-size: 16px;
            text-align: center;
            padding: 20px;
        }
        
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: #1A1A1E;
            border: 1px solid #2A2A2E;
            border-radius: 12px;
            padding: 8px 0;
            min-width: 170px;
            display: none;
            z-index: 100;
        }
        
        .dropdown-menu.show {
            display: block;
        }
        
        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .dropdown-item:active {
            background: #5826FF;
        }
        
        /* ТЕМЫ */
        body[data-theme="light"] { background: #FFFFFF; color: #000000; }
        body[data-theme="light"] .sidebar, body[data-theme="light"] .chat-header, body[data-theme="light"] .input-area,
        body[data-theme="light"] .modal-content, body[data-theme="light"] .login-card, body[data-theme="light"] .profile-card,
        body[data-theme="light"] .dropdown-menu, body[data-theme="light"] .context-menu, body[data-theme="light"] .sticker-panel,
        body[data-theme="light"] .chat-item.active { background: #F2F2F2; }
        body[data-theme="light"] .chat-area { background: #FFFFFF; }
        body[data-theme="light"] .message-bubble, body[data-theme="light"] .modal-input, body[data-theme="light"] .login-input,
        body[data-theme="light"] .search-input { background: #E5E5E5; color: #000000; }
        body[data-theme="light"] .message-own .message-bubble { background: #5826FF; color: white; }
        
        body[data-theme="blue"] { --accent: #0084FF; }
        body[data-theme="blue"] .plus-btn, body[data-theme="blue"] .subscribe-btn, body[data-theme="blue"] .send-btn,
        body[data-theme="blue"] .message-own .message-bubble, body[data-theme="blue"] .modal-btn-primary,
        body[data-theme="blue"] .login-btn, body[data-theme="blue"] .login-title, body[data-theme="blue"] .voice-play { background: #0084FF; color: white; }
        body[data-theme="blue"] .login-title { color: #0084FF; }
        
        body[data-theme="purple"] { --accent: #9C27B0; }
        body[data-theme="purple"] .plus-btn, body[data-theme="purple"] .subscribe-btn, body[data-theme="purple"] .send-btn,
        body[data-theme="purple"] .message-own .message-bubble, body[data-theme="purple"] .modal-btn-primary,
        body[data-theme="purple"] .login-btn, body[data-theme="purple"] .login-title, body[data-theme="purple"] .voice-play { background: #9C27B0; color: white; }
        body[data-theme="purple"] .login-title { color: #9C27B0; }
        
        body[data-theme="pink"] { --accent: #E91E63; }
        body[data-theme="pink"] .plus-btn, body[data-theme="pink"] .subscribe-btn, body[data-theme="pink"] .send-btn,
        body[data-theme="pink"] .message-own .message-bubble, body[data-theme="pink"] .modal-btn-primary,
        body[data-theme="pink"] .login-btn, body[data-theme="pink"] .login-title, body[data-theme="pink"] .voice-play { background: #E91E63; color: white; }
        body[data-theme="pink"] .login-title { color: #E91E63; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // [ВСЯ ЛОГИКА ОСТАЁТСЯ ТАКОЙ ЖЕ, КАК У ВАС БЫЛА]
        // Я сохранил весь ваш JavaScript код полностью без изменений.
        // Прокрутите вниз — там ваш оригинальный скрипт
        
        const SAVED_ACCOUNTS_KEY = 'danumes_saved_accounts';
        const CURRENT_USER_KEY = 'danumes_current_user';
        
        function saveAccount(username, password, avatar) {
            const accounts = JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
            if (!accounts.find(a => a.username === username)) {
                accounts.push({ username, password, avatar: avatar || '👤' });
                localStorage.setItem(SAVED_ACCOUNTS_KEY, JSON.stringify(accounts));
            }
        }
        
        function getSavedAccounts() {
            return JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
        }
        
        function saveCurrentUser(user) {
            if (user) {
                localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
            } else {
                localStorage.removeItem(CURRENT_USER_KEY);
            }
        }
        
        function getCurrentUser() {
            const saved = localStorage.getItem(CURRENT_USER_KEY);
            return saved ? JSON.parse(saved) : null;
        }
        
        function clearCurrentUser() {
            localStorage.removeItem(CURRENT_USER_KEY);
        }

        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let currentGroupId = null;
        let currentChannelCreator = null;
        let isSubscribed = false;
        let allUsers = [];
        let allGroups = [];
        let allChannels = [];
        let subscribedChannels = [];
        let messages = [];
        let updateInterval = null;
        let isSending = false;
        let currentVoiceAudio = null;
        let dropdownOpen = false;

        const VERIFIED = ['Danumala', 'RunFly'];
        const REACTIONS = ['👍', '❤️', '😂', '😮', '😢', '😡'];
        const STICKERS = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','❤️','🔥','✨','⭐','🎉','🎈','🎵','🎸','⚽','🏀','🌈','🍕'];

        function toast(msg) {
            let t = document.querySelector('.toast');
            if (t) t.remove();
            t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        async function api(method, url, data) {
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: data ? JSON.stringify(data) : undefined
                });
                return await res.json();
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function formatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        async function loadChats(force = false) {
            if (!currentUser) return;
            
            const [users, groups, channels] = await Promise.all([
                api('GET', '/get-users'),
                api('GET', `/get-groups/${currentUser.username}`),
                api('GET', `/get-channels/${currentUser.username}`)
            ]);
            
            allUsers = Array.isArray(users) ? users.filter(u => u.username !== currentUser.username) : [];
            allGroups = Array.isArray(groups) ? groups : [];
            allChannels = Array.isArray(channels) ? channels : [];
            
            const subs = await api('GET', `/get-user-subscriptions/${currentUser.username}`);
            subscribedChannels = Array.isArray(subs) ? subs : [];
            
            renderSidebar();
        }

        async function getLastMessageForChat(chatId, chatType, groupId) {
            let fetched = [];
            if (chatType === 'group') {
                const r = await api('GET', `/get-group-messages/${groupId}`);
                fetched = Array.isArray(r) ? r : [];
            } else if (chatType === 'channel') {
                const r = await api('GET', `/get-channel-messages/${groupId}`);
                fetched = Array.isArray(r) ? r : [];
            } else {
                const r = await api('GET', `/get-messages/${currentUser.username}/${chatId}`);
                fetched = Array.isArray(r) ? r : [];
            }
            if (fetched.length > 0) {
                const last = fetched[fetched.length - 1];
                return { text: last.text?.substring(0, 50) || 'Файл' };
            }
            return null;
        }

        async function loadMessages(force = false) {
            if (!currentUser || !currentChat) return;
            
            let fetched = [];
            if (currentChatType === 'group') {
                const r = await api('GET', `/get-group-messages/${currentGroupId}`);
                fetched = Array.isArray(r) ? r : [];
            } else if (currentChatType === 'channel') {
                const r = await api('GET', `/get-channel-messages/${currentGroupId}`);
                fetched = Array.isArray(r) ? r : [];
            } else {
                const r = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                fetched = Array.isArray(r) ? r : [];
            }
            
            messages = fetched;
            renderMessages();
            renderSidebar();
        }

        async function sendMessage(text, file = null) {
            if (isSending) { toast('Подождите...'); return; }
            if (!text && !file) return;
            if (currentChatType === 'channel' && currentChannelCreator !== currentUser?.username) {
                toast('⛔ Только автор канала');
                return;
            }
            isSending = true;
            
            const tempId = Date.now();
            const temp = { id: tempId, from_user: currentUser.username, text: text || (file ? `📎 ${file.name}` : ''), file_url: file?.url, timestamp: new Date().toISOString(), isTemp: true };
            
            messages.push(temp);
            renderMessages();

            let ep, pl;
            if (currentChatType === 'group') {
                ep = '/send-group-message';
                pl = { groupId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
            } else if (currentChatType === 'channel') {
                ep = '/send-channel-message';
                pl = { channelId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
            } else {
                ep = '/send-message';
                pl = { from: currentUser.username, to: currentChat, text: text || '', fileUrl: file?.url, fileName: file?.name };
            }
            
            const res = await api('POST', ep, pl);
            if (res.success) { 
                await loadMessages(true); 
            } else { 
                toast('Ошибка'); 
                messages = messages.filter(m => m.id !== tempId);
                renderMessages();
            }
            isSending = false;
        }

        async function sendFromInput() {
            const i = document.getElementById('msgInput');
            const t = i?.value.trim();
            if (t) { 
                await sendMessage(t); 
                i.value = ''; 
            }
        }

        async function editMessage(messageId, newText) {
            const r = await api('PUT', `/edit-message/${messageId}`, { text: newText });
            if (r.success) { await loadMessages(true); toast('Изменено'); }
            else toast('Ошибка');
        }

        async function deleteMessage(messageId) {
            if (!confirm('Удалить?')) return;
            const r = await api('DELETE', `/delete-message/${messageId}`);
            if (r.success) { await loadMessages(true); toast('Удалено'); }
            else toast('Ошибка');
        }

        async function addReaction(mid, reaction, type) {
            const r = await api('POST', '/add-reaction', { messageId: parseInt(mid), userId: currentUser.username, reaction, type });
            if (r.success) await loadMessages(true);
        }

        async function getReactions(mid, type) {
            const r = await api('GET', `/get-reactions/${mid}/${type}`);
            return Array.isArray(r) ? r : [];
        }

        let mediaRec = null;
        let audioChunks = [];
        let isRec = false;
        let recTimer = null;
        let recSec = 0;

        async function startVoice() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(stream);
                audioChunks = [];
                mediaRec.ondataavailable = e => audioChunks.push(e.data);
                mediaRec.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        await sendMessage('🎤 Голосовое сообщение', { url: reader.result, name: 'voice.webm', type: 'audio/webm' });
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                    document.querySelector('.voice-recording')?.remove();
                };
                mediaRec.start();
                isRec = true;
                recSec = 0;
                const inputArea = document.querySelector('.input-area');
                const rd = document.createElement('div');
                rd.className = 'voice-recording';
                rd.innerHTML = `<span>🎙️ Запись:</span><span class="recording-timer">0:00</span><button class="input-btn" onclick="stopVoice()" style="background:#ef4444;">⏹️</button>`;
                inputArea.insertBefore(rd, inputArea.firstChild);
                recTimer = setInterval(() => {
                    recSec++;
                    const t = document.querySelector('.recording-timer');
                    if (t) t.textContent = `${Math.floor(recSec/60)}:${(recSec%60).toString().padStart(2,'0')}`;
                }, 1000);
            } catch(e) { toast('Нет микрофона'); }
        }

        function stopVoice() {
            if (mediaRec && isRec) { mediaRec.stop(); isRec = false; clearInterval(recTimer); }
        }

        function playVoice(url, btn, progressDiv, durationSpan) {
            if (currentVoiceAudio) {
                currentVoiceAudio.pause();
                currentVoiceAudio = null;
                if (btn) btn.textContent = '▶️';
                return;
            }
            const audio = new Audio(url);
            currentVoiceAudio = audio;
            audio.play();
            btn.textContent = '⏸️';
            
            audio.onloadedmetadata = () => {
                const duration = audio.duration;
                const minutes = Math.floor(duration / 60);
                const seconds = Math.floor(duration % 60);
                if (durationSpan) durationSpan.textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;
            };
            
            audio.ontimeupdate = () => {
                if (progressDiv && audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressDiv.style.width = percent + '%';
                }
            };
            
            audio.onended = () => {
                btn.textContent = '▶️';
                if (progressDiv) progressDiv.style.width = '0%';
                currentVoiceAudio = null;
            };
            
            audio.onerror = () => {
                toast('Ошибка');
                btn.textContent = '▶️';
                currentVoiceAudio = null;
            };
        }

        async function createGroup() {
            const name = document.getElementById('groupName')?.value.trim();
            if (!name) { toast('Введите название'); return; }
            const selected = Array.from(document.querySelectorAll('.user-select:checked')).map(cb => cb.value);
            const r = await api('POST', '/create-group', { name, creator: currentUser.username, members: selected });
            if (r.success) {
                closeModal(); 
                await loadChats(true); 
                toast(`Группа "${name}" создана`);
                if (r.group) selectChat(r.group.name, 'group', r.group.id);
            } else toast('Ошибка');
        }

        async function createChannel() {
            const name = document.getElementById('channelName')?.value.trim();
            if (!name) { toast('Введите название'); return; }
            const r = await api('POST', '/create-channel', { name, creator: currentUser.username });
            if (r.success) {
                closeModal(); 
                await loadChats(true); 
                toast(`Канал "${name}" создан`);
                renderSidebar();
            } else toast('Ошибка');
        }

        async function subscribeToChannel(channelId, channelName, channelCreator) {
            const r = await api('POST', '/subscribe-channel', { channelId, userId: currentUser.username });
            if (r.success) {
                toast(`Подписка на ${channelName}`);
                isSubscribed = true;
                subscribedChannels.push({ id: channelId, name: channelName, created_by: channelCreator });
                await loadChats(true);
                selectChat(channelName, 'channel', channelId, channelCreator);
                renderChatArea();
                renderSidebar();
            } else toast('Ошибка');
        }

        async function unsubscribeFromChannel(channelId, channelName) {
            const r = await api('POST', '/unsubscribe-channel', { channelId, userId: currentUser.username });
            if (r.success) {
                toast(`Отписка от ${channelName}`);
                isSubscribed = false;
                subscribedChannels = subscribedChannels.filter(c => c.id !== channelId);
                if (currentChat === channelName) {
                    currentChat = null;
                    renderChatArea();
                }
                await loadChats(true);
                renderSidebar();
            } else toast('Ошибка');
        }

        function selectChat(chatId, type, gid = null, creator = null) {
            if (currentChat === chatId && currentChatType === type) return;
            currentChat = chatId;
            currentChatType = type;
            currentGroupId = gid;
            currentChannelCreator = creator;
            
            if (type === 'channel') {
                isSubscribed = subscribedChannels.some(c => c.id === gid);
            }
            
            renderSidebar();
            renderChatArea();
            loadMessages();
            
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }

        let sidebarOpen = false;
        function openSidebar() {
            document.querySelector('.sidebar')?.classList.add('open');
            sidebarOpen = true;
        }

        function closeSidebar() {
            document.querySelector('.sidebar')?.classList.remove('open');
            sidebarOpen = false;
        }

        function toggleSidebar() {
            if (sidebarOpen) closeSidebar();
            else openSidebar();
        }

        async function updateAvatar(avatar) {
            const r = await api('POST', '/update-avatar', { username: currentUser.username, avatar });
            if (r.success) {
                currentUser.avatar = avatar;
                saveCurrentUser(currentUser);
                await loadChats(true);
                if (currentChatType === 'user') renderChatArea();
                toast('Аватар обновлён');
            }
            closeModal();
        }

        function showProfile(user) {
            if (!user) return;
            const modal = document.createElement('div');
            modal.className = 'profile-modal';
            modal.innerHTML = `<div class="profile-card"><div class="profile-avatar" onclick="viewAvatarExpanded('${user.avatar || '👤'}', '${escapeHtml(user.username)}')">${user.avatar || '👤'}</div><div class="profile-name">${escapeHtml(user.username)}${VERIFIED.includes(user.username) ? ' ✓' : ''}</div><div class="profile-status">${user.online ? '🟢 В сети' : '⚫ Не в сети'}</div><div class="profile-actions" style="display:flex;gap:10px;justify-content:center;"><button class="modal-btn modal-btn-primary" onclick="this.parentElement.parentElement.parentElement.remove(); selectChat('${user.username}', 'user', null)">💬 Написать</button><button class="modal-btn" onclick="this.parentElement.parentElement.parentElement.remove()">Закрыть</button></div></div>`;
            document.body.appendChild(modal);
        }

        function viewAvatarExpanded(avatar, name) {
            const d = document.createElement('div');
            d.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:6000;cursor:pointer';
            d.innerHTML = `<div style="font-size:160px;background:#5826FF;border-radius:50%;padding:40px;">${avatar}</div><div style="position:absolute;bottom:100px;color:white;">${escapeHtml(name)}</div>`;
            d.onclick = () => d.remove();
            document.body.appendChild(d);
        }

        function viewImage(url) {
            const v = document.createElement('div');
            v.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:5000;cursor:pointer';
            v.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%;border-radius:16px;"><button style="position:absolute;top:20px;right:30px;font-size:40px;background:none;border:none;color:white;cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`;
            v.onclick = (e) => { if (e.target === v) v.remove(); };
            document.body.appendChild(v);
        }

        function showMessageContextMenu(e, mid, from, text) {
            e.preventDefault();
            document.querySelector('.context-menu')?.remove();
            const isOwn = from === currentUser.username;
            const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
            
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            
            if (isOwn || isAuthor) {
                const edit = document.createElement('div');
                edit.className = 'context-menu-item';
                edit.textContent = '✏️ Редактировать';
                edit.onclick = () => {
                    const newText = prompt('Новый текст:', text);
                    if (newText && newText !== text) editMessage(mid, newText);
                    menu.remove();
                };
                menu.appendChild(edit);
                
                const del = document.createElement('div');
                del.className = 'context-menu-item';
                del.textContent = '🗑️ Удалить';
                del.onclick = () => { deleteMessage(mid); menu.remove(); };
                menu.appendChild(del);
            }
            
            const react = document.createElement('div');
            react.className = 'context-menu-item';
            react.textContent = '😊 Реакция';
            react.onclick = () => { menu.remove(); showReactionMenu(e, mid); };
            menu.appendChild(react);
            
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
        }

        function showReactionMenu(e, mid) {
            document.querySelector('.reaction-menu')?.remove();
            const menu = document.createElement('div');
            menu.className = 'reaction-menu';
            menu.style.left = e.clientX + 'px';
            menu.style.top = (e.clientY - 50) + 'px';
            REACTIONS.forEach(emoji => {
                const opt = document.createElement('div');
                opt.className = 'reaction-option';
                opt.textContent = emoji;
                opt.onclick = () => { addReaction(mid, emoji, currentChatType); menu.remove(); };
                menu.appendChild(opt);
            });
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
        }

        let currentModal = null;
        function showModal(c) { if (currentModal) currentModal.remove(); const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${c}</div>`; document.body.appendChild(m); currentModal = m; }
        function closeModal() { if (currentModal) currentModal.remove(); currentModal = null; }

        function showAvatarModal() {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👨‍💻','👩‍💻','💼','🎮','📚','🎨','⚽','🎵'];
            showModal(`<div class="modal-title">Выберите аватар</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;">${emojis.map(e => `<div style="font-size:44px;text-align:center;cursor:pointer;padding:12px;border-radius:12px;" onclick="updateAvatar('${e}'); closeModal()">${e}</div>`).join('')}</div><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Закрыть</button></div>`);
        }

        function showGroupModal() {
            if (allUsers.length === 0) { toast('Нет других пользователей'); return; }
            showModal(`<div class="modal-title">Создать группу</div><input type="text" class="modal-input" id="groupName" placeholder="Название"><div style="max-height:200px;overflow-y:auto;margin-bottom:20px;">${allUsers.map(u => `<div style="padding:8px 0;"><label><input type="checkbox" class="user-select" value="${u.username}"> ${escapeHtml(u.username)}</label></div>`).join('')}</div><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Отмена</button><button class="modal-btn modal-btn-primary" onclick="createGroup(); closeModal()">Создать</button></div>`);
        }

        function showChannelModal() {
            showModal(`<div class="modal-title">Создать канал</div><input type="text" class="modal-input" id="channelName" placeholder="Название"><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Отмена</button><button class="modal-btn modal-btn-primary" onclick="createChannel(); closeModal()">Создать</button></div>`);
        }

        function openSettings() {
            showModal(`
                <div class="modal-title">Настройки</div>
                <div style="margin-bottom:16px;">
                    <div style="margin-bottom:8px;color:#66666E;">Тема оформления</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="modal-btn" style="flex:1;" onclick="setTheme('dark'); closeModal()">🌙 Dark</button>
                        <button class="modal-btn" style="flex:1;" onclick="setTheme('light'); closeModal()">☀️ Light</button>
                        <button class="modal-btn" style="flex:1;" onclick="setTheme('blue'); closeModal()">💙 Blue</button>
                        <button class="modal-btn" style="flex:1;" onclick="setTheme('purple'); closeModal()">💜 Purple</button>
                        <button class="modal-btn" style="flex:1;" onclick="setTheme('pink'); closeModal()">🌸 Pink</button>
                    </div>
                </div>
                <div class="modal-buttons"><button class="modal-btn modal-btn-primary" onclick="closeModal()">Закрыть</button></div>
            `);
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        async function logout() {
            if (currentUser) {
                await api('POST', '/logout', { username: currentUser.username });
            }
            currentUser = null;
            currentChat = null;
            messages = [];
            clearCurrentUser();
            renderAuth();
        }

        function toggleDropdown() {
            const menu = document.getElementById('dropdownMenu');
            if (menu) {
                dropdownOpen = !dropdownOpen;
                menu.classList.toggle('show', dropdownOpen);
            }
        }

        async function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;
            
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            let myChats = [];
            
            for (const u of allUsers) {
                const lastMsg = await getLastMessageForChat(u.username, 'user', null);
                myChats.push({ 
                    id: u.username, name: u.username, type: 'user', 
                    avatar: u.avatar || '👤', online: u.online, verified: u.verified, 
                    preview: lastMsg ? lastMsg.text : (u.online ? 'В сети' : 'Не в сети')
                });
            }
            
            for (const g of allGroups) {
                const lastMsg = await getLastMessageForChat(g.name, 'group', g.id);
                myChats.push({ 
                    id: g.id, name: g.name, type: 'group', groupId: g.id, avatar: '👥', 
                    preview: lastMsg?.text || 'Группа'
                });
            }
            
            for (const c of subscribedChannels) {
                const lastMsg = await getLastMessageForChat(c.name, 'channel', c.id);
                myChats.push({ 
                    id: c.id, name: c.name, type: 'channel', channelId: c.id, created_by: c.created_by, avatar: '📢', 
                    preview: lastMsg?.text || 'Канал'
                });
            }
            
            let filtered = myChats;
            if (searchTerm) {
                filtered = myChats.filter(c => c.name.toLowerCase().includes(searchTerm));
            }
            
            let channelSearchResults = [];
            if (searchTerm) {
                const subscribedIds = subscribedChannels.map(c => c.id);
                allChannels.forEach(c => {
                    if (c.name.toLowerCase().includes(searchTerm) && !subscribedIds.includes(c.id)) {
                        channelSearchResults.push({ type: 'channel', id: c.id, name: c.name, created_by: c.created_by });
                    }
                });
            }
            
            let userSearchResults = [];
            if (searchTerm) {
                allUsers.forEach(u => {
                    if (u.username.toLowerCase().includes(searchTerm) && !myChats.some(m => m.type === 'user' && m.name === u.username)) {
                        userSearchResults.push({ type: 'user', username: u.username, avatar: u.avatar || '👤', online: u.online, verified: u.verified });
                    }
                });
            }
            
            const isVerified = VERIFIED.includes(currentUser?.username);
            const userChats = filtered.filter(c => c.type === 'user');
            const groupChats = filtered.filter(c => c.type === 'group');
            const channelChats = filtered.filter(c => c.type === 'channel');
            
            sidebar.innerHTML = `
                <div class="sidebar-header">
                    <h2>Чаты</h2>
                    <div class="header-buttons">
                        <button class="settings-btn" onclick="openSettings()">⚙️</button>
                        <button class="logout-btn" onclick="logout()">🚪</button>
                        <div style="position: relative;">
                            <button class="plus-btn" onclick="toggleDropdown()">+</button>
                            <div id="dropdownMenu" class="dropdown-menu">
                                <div class="dropdown-item" onclick="showGroupModal(); closeDropdown()">👥 Создать группу</div>
                                <div class="dropdown-item" onclick="showChannelModal(); closeDropdown()">📢 Создать канал</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск..." oninput="renderSidebar()">
                </div>
                <div class="chats-list">
                    ${groupChats.length ? `<div class="chat-section">ГРУППЫ</div>${groupChats.map(c => `
                        <div class="chat-item ${currentChat === c.name && currentChatType === 'group' ? 'active' : ''}" onclick="selectChat('${c.name}', 'group', ${c.groupId})">
                            <div class="chat-avatar">👥</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(c.name)}</div>
                                <div class="chat-preview">${escapeHtml(c.preview)}</div>
                            </div>
                        </div>
                    `).join('')}` : ''}
                    ${channelChats.length ? `<div class="chat-section">КАНАЛЫ</div>${channelChats.map(c => `
                        <div class="chat-item ${currentChat === c.name && currentChatType === 'channel' ? 'active' : ''}" onclick="selectChat('${c.name}', 'channel', ${c.channelId}, '${c.created_by || ''}')">
                            <div class="chat-avatar">📢</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(c.name)}</div>
                                <div class="chat-preview">${escapeHtml(c.preview)}</div>
                            </div>
                            <button class="delete-chat" onclick="event.stopPropagation(); unsubscribeFromChannel(${c.channelId}, '${c.name}')">✕</button>
                        </div>
                    `).join('')}</div>` : ''}
                    ${userChats.length ? `<div class="chat-section">ЛИЧНЫЕ</div>${userChats.map(c => `
                        <div class="chat-item ${currentChat === c.name && currentChatType === 'user' ? 'active' : ''}" onclick="selectChat('${c.name}', 'user', null)">
                            <div class="chat-avatar">${c.avatar}${c.online ? '<div class="online-dot"></div>' : ''}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(c.name)}${c.verified ? ' ✓' : ''}</div>
                                <div class="chat-preview">${escapeHtml(c.preview)}</div>
                            </div>
                            <button class="delete-chat" onclick="event.stopPropagation(); deleteChat('${c.name}', 'user', null)">✕</button>
                        </div>
                    `).join('')}</div>` : ''}
                    ${channelSearchResults.length ? `<div class="chat-section">ДОСТУПНЫЕ КАНАЛЫ</div>${channelSearchResults.map(c => `
                        <div class="chat-item" onclick="subscribeToChannel(${c.id}, '${c.name.replace(/'/g,"\\'")}', '${c.created_by}')">
                            <div class="chat-avatar">📢</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(c.name)}</div>
                                <div class="chat-preview">🔍 Нажмите подписаться</div>
                            </div>
                        </div>
                    `).join('')}</div>` : ''}
                    ${userSearchResults.length ? `<div class="chat-section">НОВЫЕ ЛЮДИ</div>${userSearchResults.map(u => `
                        <div class="chat-item" onclick="selectChat('${u.username}', 'user', null)">
                            <div class="chat-avatar">${u.avatar}${u.online ? '<div class="online-dot"></div>' : ''}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(u.username)}${u.verified ? ' ✓' : ''}</div>
                                <div class="chat-preview">${u.online ? 'В сети' : 'Не в сети'}</div>
                            </div>
                        </div>
                    `).join('')}</div>` : ''}
                </div>
                <div id="stickerPanel" class="sticker-panel">${STICKERS.map(s => `<div class="sticker" onclick="sendMessage('${s}'); toggleSticker()">${s}</div>`).join('')}</div>
            `;
            
            document.addEventListener('click', function(e) {
                const menu = document.getElementById('dropdownMenu');
                const btn = e.target.closest('.plus-btn');
                if (menu && !btn && dropdownOpen) {
                    menu.classList.remove('show');
                    dropdownOpen = false;
                }
            });
        }

        async function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            if (!messages.length) { 
                if (currentChat) {
                    container.innerHTML = '<div class="empty-state">Нет сообщений</div>';
                }
                return; 
            }
            
            const rm = new Map();
            for (const m of messages) {
                if (!m.isTemp) { const r = await getReactions(m.id, currentChatType); rm.set(m.id, r); }
                else rm.set(m.id, []);
            }
            
            let html = '';
            for (const m of messages) {
                const isOwn = m.from_user === currentUser.username;
                const reacts = rm.get(m.id) || [];
                const userReact = reacts.find(r => r.user_id === currentUser.username);
                const rg = {};
                reacts.forEach(r => { rg[r.reaction] = (rg[r.reaction] || 0) + 1; });
                
                let fh = '';
                if (m.file_url) {
                    if (m.file_url.startsWith('data:image/')) {
                        fh = `<div class="message-file"><img src="${m.file_url}" onclick="viewImage('${m.file_url}')"></div>`;
                    } else if (m.file_url.startsWith('data:audio/')) {
                        fh = `<div class="voice-message">
                            <button class="voice-play" onclick="playVoice('${m.file_url}', this, document.getElementById('progress_${m.id}'), document.getElementById('duration_${m.id}'))">▶️</button>
                            <div class="voice-timeline">
                                <div class="voice-progress" id="progress_${m.id}"></div>
                            </div>
                            <span class="voice-duration" id="duration_${m.id}">--:--</span>
                        </div>`;
                    } else {
                        fh = `<div class="message-file"><a href="${m.file_url}" download>📎 ${escapeHtml(m.file_name || 'файл')}</a></div>`;
                    }
                }
                
                let rh = '';
                for (const [e,c] of Object.entries(rg)) { const a = userReact?.reaction === e ? 'active' : ''; rh += `<span class="reaction ${a}" onclick="addReaction(${m.id}, '${e}', '${currentChatType}')">${e}${c>1 ? c : ''}</span>`; }
                
                html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${m.id}">${!isOwn && (currentChatType === 'group' || currentChatType === 'channel') ? `<div class="message-sender">${escapeHtml(m.from_user)}${m.from_user === currentChannelCreator ? ' 👑' : ''}</div>` : ''}<div class="message-bubble" oncontextmenu="showMessageContextMenu(event, ${m.id}, '${m.from_user}', '${escapeHtml(m.text || '').replace(/'/g,"\\'")}')"><div class="message-text">${escapeHtml(m.text || '')}</div>${fh}</div><div class="message-meta">${m.isTemp ? '🕐 отправляется...' : formatTime(m.timestamp)}</div><div class="reactions">${rh}</div></div>`;
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function renderChatArea() {
            const ca = document.getElementById('chatArea');
            if (!ca) return;
            
            if (!currentChat) {
                ca.innerHTML = `<div class="empty-state">Выберите чат</div>`;
                return;
            }
            
            let status = '', verified = false;
            const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
            const canWrite = currentChatType !== 'channel' || isAuthor;
            
            if (currentChatType === 'group') status = 'Группа';
            else if (currentChatType === 'channel') status = `Автор: ${currentChannelCreator || '?'}`;
            else if (currentChat) { 
                const u = allUsers.find(u => u.username === currentChat); 
                status = u?.online ? 'В сети' : 'Не в сети'; 
                verified = u?.verified || false; 
            }
            
            const showSubscribeButton = currentChatType === 'channel' && !isAuthor;
            
            ca.innerHTML = `
                <div class="chat-header">
                    <button class="back-button" onclick="toggleSidebar()">←</button>
                    <div class="chat-header-avatar" onclick="showProfile(allUsers.find(u=>u.username===currentChat)||{username:currentChat,avatar:currentChatAvatar,online:true})">
                        ${currentChatType === 'user' ? (allUsers.find(u=>u.username===currentChat)?.avatar || '👤') : (currentChatType === 'channel' ? '📢' : '👥')}
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name">${escapeHtml(currentChat)}${verified ? ' ✓' : ''}</div>
                        <div class="chat-header-status">${status}</div>
                    </div>
                    ${showSubscribeButton ? `
                        <button class="subscribe-btn" onclick="${subscribedChannels.some(c => c.id === currentGroupId) ? `unsubscribeFromChannel(${currentGroupId}, '${currentChat}')` : `subscribeToChannel(${currentGroupId}, '${currentChat}', '${currentChannelCreator}')`}">
                            ${subscribedChannels.some(c => c.id === currentGroupId) ? 'Отписаться' : 'Подписаться'}
                        </button>
                    ` : ''}
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                ${!showSubscribeButton ? `
                    <div class="input-area">
                        <div class="input-wrapper">
                            <button class="input-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                            <input type="file" id="fileInput" style="display:none;" onchange="uploadFile()">
                            <button class="input-btn" onclick="startVoice()">🎙️</button>
                            <button class="input-btn" onclick="toggleSticker()">😊</button>
                            <textarea class="message-input" id="msgInput" placeholder="${canWrite ? (currentChat ? 'Сообщение...' : 'Выберите чат') : 'Только автор'}" ${!currentChat || !canWrite ? 'disabled' : ''} rows="1"></textarea>
                            <button class="input-btn send-btn" onclick="sendFromInput()" ${!currentChat || !canWrite ? 'disabled' : ''}>➤</button>
                        </div>
                    </div>
                ` : ''}
            `;
            
            renderMessages();
            
            if (currentChat && canWrite && !showSubscribeButton) { 
                const i = document.getElementById('msgInput'); 
                if (i) i.addEventListener('keypress', e => { 
                    if (e.key === 'Enter' && !e.shiftKey) { 
                        e.preventDefault(); 
                        sendFromInput(); 
                    } 
                }); 
            }
        }

        function uploadFile() {
            const i = document.getElementById('fileInput');
            const f = i.files[0];
            if (!f) return;
            if (f.size > 10*1024*1024) { toast('Файл >10MB'); return; }
            const r = new FileReader();
            r.onloadend = () => sendMessage('', { url: r.result, name: f.name, type: f.type });
            r.readAsDataURL(f);
            i.value = '';
        }

        function toggleSticker() { document.getElementById('stickerPanel')?.classList.toggle('show'); }

        async function deleteChat(id, type, gid) {
            if (!confirm(`Удалить чат?`)) return;
            if (type === 'group' && gid) { await api('POST', '/leave-group', { groupId: gid, userId: currentUser.username }); await loadChats(true); }
            if (currentChat === id) { currentChat = null; renderChatArea(); }
            renderSidebar();
        }

        let isLogin = true;
        
        function renderAuth() {
            const savedAccounts = getSavedAccounts();
            
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <div class="login-title">DanuMes</div>
                        <input type="text" class="login-input" id="authUser" placeholder="Имя">
                        <input type="password" class="login-input" id="authPass" placeholder="Пароль">
                        <button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Зарегистрироваться'}</button>
                        <div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div>
                        ${savedAccounts.length > 0 ? `
                            <div class="saved-accounts">
                                <div class="saved-title">Сохранённые аккаунты</div>
                                ${savedAccounts.map(acc => `
                                    <div class="saved-account" onclick="document.getElementById('authUser').value='${acc.username}'; document.getElementById('authPass').value='${acc.password}'; submitAuth()">
                                        <div class="saved-avatar">${acc.avatar || '👤'}</div>
                                        <div class="saved-name">${escapeHtml(acc.username)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function toggleMode() { 
            isLogin = !isLogin; 
            renderAuth(); 
        }
        
        async function submitAuth() {
            const u = document.getElementById('authUser').value.trim();
            const p = document.getElementById('authPass').value;
            if (!u || !p) { toast('Заполните поля'); return; }
            
            const r = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username: u, password: p });
            if (r.success) {
                if (isLogin) { 
                    currentUser = { username: r.username, avatar: r.avatar || '👤', verified: r.verified };
                    saveAccount(u, p, r.avatar);
                    saveCurrentUser(currentUser);
                    renderMain(); 
                } else { 
                    toast('Регистрация успешна! Войдите'); 
                    isLogin = true; 
                    renderAuth(); 
                }
            } else toast(r.error || 'Ошибка');
        }
        
        async function renderMain() {
            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar" id="sidebar"></div>
                    <div class="chat-area" id="chatArea"></div>
                </div>
            `;
            await loadChats(true);
            if (allGroups.length) selectChat(allGroups[0].name, 'group', allGroups[0].id);
            else if (allUsers.length) selectChat(allUsers[0].username, 'user', null);
            
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
            
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => { loadMessages(); loadChats(); }, 5000);
        }

        const savedUser = getCurrentUser();
        if (savedUser) {
            currentUser = savedUser;
            renderMain();
        } else {
            renderAuth();
        }

        window.addReaction = addReaction;
        window.updateAvatar = updateAvatar;
        window.setTheme = setTheme;
        window.selectChat = selectChat;
        window.subscribeToChannel = subscribeToChannel;
        window.unsubscribeFromChannel = unsubscribeFromChannel;
        window.showGroupModal = showGroupModal;
        window.showChannelModal = showChannelModal;
        window.createGroup = createGroup;
        window.createChannel = createChannel;
        window.sendMessage = sendMessage;
        window.sendFromInput = sendFromInput;
        window.showAvatarModal = showAvatarModal;
        window.closeModal = closeModal;
        window.submitAuth = submitAuth;
        window.toggleMode = toggleMode;
        window.showMessageContextMenu = showMessageContextMenu;
        window.startVoice = startVoice;
        window.stopVoice = stopVoice;
        window.playVoice = playVoice;
        window.viewImage = viewImage;
        window.showProfile = showProfile;
        window.uploadFile = uploadFile;
        window.toggleDropdown = toggleDropdown;
        window.openSettings = openSettings;
        window.toggleSticker = toggleSticker;
        window.deleteChat = deleteChat;
        window.logout = logout;
        window.toggleSidebar = toggleSidebar;
        window.closeDropdown = () => { dropdownOpen = false; document.getElementById('dropdownMenu')?.classList.remove('show'); };
    </script>
</body>
</html>
