<!DOCTYPE html>
<html>
<head>
    <title>DanuMes</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        #app { max-width: 800px; margin: 0 auto; background: white; border-radius: 8px; padding: 20px; }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; padding: 5px; border-bottom: 1px solid #eee; }
        .username { font-weight: bold; color: #007bff; }
        .time { font-size: 0.7em; color: #888; }
        #input-area { display: flex; gap: 10px; }
        #text { flex: 1; padding: 8px; }
        button { padding: 8px 16px; }
        #login-form, #register-form { margin-bottom: 20px; }
        .error { color: red; }
    </style>
</head>
<body>
<div id="app">
    <h2>DanuMes</h2>
    <div id="login-register">
        <div id="login-form">
            <h3>Вход</h3>
            <input type="text" id="login-username" placeholder="Имя пользователя"><br>
            <input type="password" id="login-password" placeholder="Пароль"><br>
            <button id="login-btn">Войти</button>
            <span id="login-error" class="error"></span>
        </div>
        <div id="register-form">
            <h3>Регистрация</h3>
            <input type="text" id="reg-username" placeholder="Имя пользователя"><br>
            <input type="password" id="reg-password" placeholder="Пароль"><br>
            <button id="reg-btn">Зарегистрироваться</button>
            <span id="reg-error" class="error"></span>
        </div>
    </div>
    <div id="chat" style="display: none;">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-text" placeholder="Сообщение">
            <input type="file" id="file-input">
            <button id="send-btn">Отправить</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    // ВСЕ ЗАПРОСЫ ИДУТ ПО ОТНОСИТЕЛЬНЫМ ПУТЯМ (без localhost)
    async function request(url, data) {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return response.json();
    }

    async function loadMessages() {
        const res = await fetch('/get-messages');
        const messages = await res.json();
        const container = document.getElementById('messages');
        container.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="username">${escapeHtml(msg.username)}</span> <span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span><br>${escapeHtml(msg.text)}`;
            if (msg.fileUrl) div.innerHTML += `<br><a href="${msg.fileUrl}" target="_blank">${escapeHtml(msg.fileName || 'Файл')}</a>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('login-btn').onclick = async () => {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const res = await request('/login-attempt', { username, password });
        if (res.success) {
            currentUser = username;
            document.getElementById('login-register').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            loadMessages();
            setInterval(loadMessages, 3000);
        } else {
            document.getElementById('login-error').innerText = res.error;
        }
    };

    document.getElementById('reg-btn').onclick = async () => {
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        const res = await request('/register-attempt', { username, password });
        if (res.success) {
            alert('Регистрация успешна, теперь войдите');
        } else {
            document.getElementById('reg-error').innerText = res.error;
        }
    };

    document.getElementById('send-btn').onclick = async () => {
        const text = document.getElementById('message-text').value;
        if (!text && !document.getElementById('file-input').files[0]) return;
        if (document.getElementById('file-input').files[0]) {
            const formData = new FormData();
            formData.append('file', document.getElementById('file-input').files[0]);
            const uploadRes = await fetch('/upload-file', { method: 'POST', body: formData });
            const uploadData = await uploadRes.json();
            if (uploadData.success) {
                await request('/send-message', { username: currentUser, text: text, fileUrl: uploadData.fileUrl, fileName: uploadData.fileName });
            }
        } else {
            await request('/send-message', { username: currentUser, text: text });
        }
        document.getElementById('message-text').value = '';
        loadMessages();
    };
</script>
</body>
</html>
