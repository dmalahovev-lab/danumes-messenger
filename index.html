<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Liquid Glass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Жидкий анимированный фон -->
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Основной контейнер мессенджера -->
    <div class="chat-container">
        <header class="chat-header">
            <div class="user-info">
                <div class="avatar">TG</div>
                <div>
                    <h2>Telegram v27</h2>
                    <span class="status">в сети</span>
                </div>
            </div>
        </header>

        <main class="chat-messages" id="messages"></main>

        <form class="chat-input-area" id="chat-form">
            <input type="text" id="message-input" placeholder="Сообщение" autocomplete="off" required>
            <button type="submit" id="send-btn">➔</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
