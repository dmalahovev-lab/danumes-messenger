<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Liquid Glass Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
            height: 100vh;
            overflow: hidden;
            backdrop-filter: blur(0px);
        }

        /* Основной контейнер */
        .messenger {
            display: flex;
            height: 100vh;
            width: 100%;
            background: rgba(15, 25, 35, 0.4);
            backdrop-filter: blur(10px);
        }

        /* Боковая панель — стекло */
        .sidebar {
            width: 300px;
            background: rgba(30, 40, 50, 0.5);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5f3fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(165,243,252,0.3);
        }
        .profile-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 32px;
            cursor: pointer;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .profile-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 16px;
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
            outline: none;
            backdrop-filter: blur(5px);
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .chat-item:hover { background: rgba(255,255,255,0.1); }
        .chat-item.active { background: rgba(255,255,255,0.15); }
        .chat-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 600;
            color: #f0f3f8;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
        }
        .chat-lastmsg {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            box-shadow: 0 0 5px #22c55e;
        }

        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 20, 30, 0.3);
            backdrop-filter: blur(8px);
        }
        .chat-header {
            height: 70px;
            padding: 0 20px;
            background: rgba(30, 40, 50, 0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .chat-header-avatar {
            font-size: 44px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }
        .chat-header-info h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        .chat-header-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 75%;
            position: relative;
        }
        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-bubble {
            background: rgba(40, 50, 65, 0.7);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            color: #f0f3f8;
            font-size: 15px;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.1s;
        }
        .message-own .message-bubble {
            background: linear-gradient(135deg, rgba(59,130,246,0.8), rgba(139,92,246,0.8));
            backdrop-filter: blur(8px);
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 22px;
        }
        .message-text {
            word-wrap: break-word;
        }
        .message-time {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-align: right;
            margin-top: 6px;
        }
        .file-attach {
            display: inline-block;
            margin-top: 6px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            color: #a5f3fc;
            cursor: pointer;
        }
        .message-image {
            max-width: 250px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 6px 0;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .context-menu div {
            padding: 10px 16px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: 0.05s;
        }
        .context-menu div:hover {
            background: rgba(59,130,246,0.6);
        }

        /* Лайтбокс для изображений */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Формы входа/регистрации — стекло, крупно */
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 40%, #1a2a3a, #0a0f1e);
        }
        .auth-card {
            background: rgba(20, 30, 45, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 460px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .auth-card h2 {
            color: white;
            font-size: 32px;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #a5f3fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 60px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
            color: #eee;
            transition: 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }
        .auth-form input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            margin-bottom: 24px;
            outline: none;
            transition: 0.2s;
        }
        .auth-form input:focus {
            border-color: #8b5cf6;
            background: rgba(0,0,0,0.5);
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.1s;
        }
        .auth-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        .error-text {
            color: #f87171;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Адаптив */
        @media (max-width: 680px) {
            .sidebar { width: 80px; }
            .chat-info, .logo { display: none; }
            .chat-avatar { width: 48px; height: 48px; font-size: 26px; }
            .auth-card { width: 90%; padding: 32px 24px; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    let currentUser = null;
    let currentChat = null;
    let messages = [];
    let chats = [];
    let searchQuery = '';
    let pollInterval = null;

    // Вспомогательные функции
    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) {
            opts.body = data;
        }
        const res = await fetch(url, opts);
        return res.json();
    }

    async function loadChats() {
        if (!currentUser) return;
        const res = await api('GET', `/get-chats/${currentUser.username}`);
        chats = res;
        renderSidebar();
    }

    async function loadMessagesWith(partner) {
        if (!currentUser || !partner) return;
        const res = await api('GET', `/get-messages/${currentUser.username}/${partner}`);
        messages = res;
        renderChat();
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if (!text && !fileUrl) return;
        await api('POST', '/send-message', {
            from: currentUser.username,
            to: currentChat,
            text: text || '',
            fileUrl,
            fileName
        });
        await loadMessagesWith(currentChat);
        await loadChats();
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        loadChats();
        renderSidebar();
    }

    async function deleteMessage(msgId) {
        await api('DELETE', `/delete-message/${msgId}`);
        await loadMessagesWith(currentChat);
        await loadChats();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function isImageFile(fileName) {
        return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(fileName);
    }

    // Контекстное меню
    let activeMenu = null;
    function showContextMenu(e, items) {
        if (activeMenu) activeMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        items.forEach(item => {
            const option = document.createElement('div');
            option.textContent = item.label;
            option.onclick = (ev) => {
                ev.stopPropagation();
                item.action();
                menu.remove();
                activeMenu = null;
            };
            menu.appendChild(option);
        });
        document.body.appendChild(menu);
        menu.style.left = e.clientX + 'px';
        menu.style.top = e.clientY + 'px';
        activeMenu = menu;
        const closeMenu = () => { if(activeMenu) activeMenu.remove(); activeMenu = null; document.removeEventListener('click', closeMenu); };
        setTimeout(() => document.addEventListener('click', closeMenu), 10);
        e.preventDefault();
    }

    // Лайтбокс
    function showLightbox(url) {
        let lb = document.getElementById('lightbox');
        if (!lb) {
            lb = document.createElement('div');
            lb.id = 'lightbox';
            lb.className = 'lightbox';
            lb.innerHTML = '<img src="">';
            lb.onclick = () => lb.style.display = 'none';
            document.body.appendChild(lb);
        }
        lb.style.display = 'flex';
        lb.querySelector('img').src = url;
    }

    function renderSidebar() {
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        let filtered = chats.filter(c => c.username.toLowerCase().includes(searchQuery.toLowerCase()));
        let html = `
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <button class="profile-btn" id="profileBtn">${currentUser.avatar}</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск" value="${escapeHtml(searchQuery)}">
            </div>
            <div class="chats-list" id="chatsList">
        `;
        filtered.forEach(chat => {
            const activeClass = currentChat === chat.username ? 'active' : '';
            html += `
                <div class="chat-item ${activeClass}" data-chat="${chat.username}">
                    <div class="chat-avatar">${chat.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(chat.username)}
                            ${chat.online ? '<span class="online-dot"></span>' : ''}
                        </div>
                        <div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        sidebarDiv.innerHTML = html;

        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                currentChat = el.dataset.chat;
                loadMessagesWith(currentChat);
                renderSidebar();
            });
        });
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderSidebar();
        });
        document.getElementById('profileBtn')?.addEventListener('click', () => {
            document.getElementById('avatarModal').style.display = 'flex';
        });
    }

    function renderChat() {
        const mainDiv = document.getElementById('chatMain');
        if (!mainDiv) return;
        if (!currentChat) {
            mainDiv.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.6); font-size:18px;">✨ Выберите чат ✨</div>`;
            return;
        }
        const chatUser = chats.find(c => c.username === currentChat) || { username: currentChat, avatar: '👤', online: false };
        let messagesHtml = `<div class="messages-area" id="messagesList">`;
        messages.forEach(msg => {
            const isOwn = msg.from === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let content = '';
            if (msg.fileUrl && isImageFile(msg.fileName)) {
                content += `<img src="${msg.fileUrl}" class="message-image" data-url="${msg.fileUrl}">`;
            } else if (msg.fileUrl) {
                content += `<a href="${msg.fileUrl}" download class="file-attach" data-url="${msg.fileUrl}" data-name="${msg.fileName}">📎 ${escapeHtml(msg.fileName || 'Файл')}</a>`;
            }
            if (msg.text) content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            messagesHtml += `
                <div class="message ${isOwn ? 'message-own' : ''}" data-msg-id="${msg.id}" data-msg-from="${msg.from}" data-file-url="${msg.fileUrl || ''}" data-file-name="${msg.fileName || ''}">
                    <div class="message-bubble">
                        ${content}
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        });
        messagesHtml += `</div>`;
        mainDiv.innerHTML = `
            <div class="chat-header">
                <div class="chat-header-avatar">${chatUser.avatar}</div>
                <div class="chat-header-info">
                    <h3>${escapeHtml(currentChat)} ${chatUser.online ? '<span class="online-dot"></span>' : ''}</h3>
                    <p>${chatUser.online ? 'онлайн' : 'офлайн'}</p>
                </div>
            </div>
            ${messagesHtml}
            <div class="input-area" style="padding:16px 20px; background:rgba(30,40,50,0.4); border-top:1px solid rgba(255,255,255,0.1); display:flex; gap:14px;">
                <div class="input-wrapper" style="flex:1; background:rgba(0,0,0,0.3); border-radius:40px; padding:10px 16px; display:flex; gap:12px;">
                    <input type="text" id="messageInput" placeholder="Сообщение" style="flex:1; background:none; border:none; color:white; font-size:15px; outline:none;">
                    <label class="file-btn" id="fileLabel" style="font-size:24px; cursor:pointer;">📎</label>
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <button class="send-btn" id="sendBtn" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6); border:none; width:48px; height:48px; border-radius:50%; font-size:22px; cursor:pointer;">➤</button>
            </div>
        `;

        // Обработка клика по изображению
        document.querySelectorAll('.message-image').forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                showLightbox(img.src);
            });
        });

        // Контекстное меню для сообщений
        document.querySelectorAll('.message').forEach(msgEl => {
            msgEl.addEventListener('contextmenu', (e) => {
                const msgId = msgEl.dataset.msgId;
                const msgFrom = msgEl.dataset.msgFrom;
                const fileUrl = msgEl.dataset.fileUrl;
                const fileName = msgEl.dataset.fileName;
                const isOwn = msgFrom === currentUser.username;
                const items = [];
                if (fileUrl) {
                    items.push({
                        label: '📥 Скачать файл',
                        action: () => window.open(fileUrl, '_blank')
                    });
                }
                if (isOwn) {
                    items.push({
                        label: '🗑 Удалить сообщение',
                        action: () => deleteMessage(msgId)
                    });
                } else if (!isOwn && fileUrl) {
                    // для чужих только скачать
                }
                if (items.length) showContextMenu(e, items);
            });
        });

        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileLabel = document.getElementById('fileLabel');
        const fileInput = document.getElementById('fileInput');

        const send = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                const up = await uploadFile(file);
                if (up.success) {
                    await sendMessage(text, up.fileUrl, up.fileName);
                    fileInput.value = '';
                } else alert('Ошибка файла');
            } else if (text) {
                await sendMessage(text);
            }
            msgInput.value = '';
            const msgsDiv = document.getElementById('messagesList');
            if (msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
        };
        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') send(); };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => send();

        setTimeout(() => {
            const msgsDiv = document.getElementById('messagesList');
            if (msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }, 100);
    }

    // Модалка аватара
    function showAvatarModal() {
        const modal = document.getElementById('avatarModal');
        if (!modal) return;
        modal.style.display = 'flex';
        const grid = document.getElementById('emojiGrid');
        if (grid && grid.children.length === 0) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉'];
            emojis.forEach(e => {
                const div = document.createElement('div');
                div.className = 'emoji-option';
                div.textContent = e;
                div.onclick = () => {
                    updateAvatar(e);
                    modal.style.display = 'none';
                };
                grid.appendChild(div);
            });
            document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
        }
    }

    // Авторизация
    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2>DanuMes</h2>
                    <div class="tabs">
                        <div class="tab active" id="loginTab">Вход</div>
                        <div class="tab" id="regTab">Регистрация</div>
                    </div>
                    <div id="loginPanel">
                        <input type="text" id="loginUsername" placeholder="Логин">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <div id="loginError" class="error-text"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="regPanel" style="display:none;">
                        <input type="text" id="regUsername" placeholder="Логин">
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <div id="regError" class="error-text"></div>
                        <button id="doReg" class="auth-btn">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('regPanel').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('regTab').classList.remove('active');
        };
        document.getElementById('regTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('regPanel').style.display = 'block';
            document.getElementById('regTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        };
        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar };
                await loadChats();
                startMessenger();
            } else {
                document.getElementById('loginError').innerText = res.error;
            }
        };
        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) {
                alert('Регистрация успешна! Войдите.');
                document.getElementById('loginTab').click();
            } else {
                document.getElementById('regError').innerText = res.error;
            }
        };
    }

    function startMessenger() {
        document.getElementById('app').innerHTML = `
            <div class="messenger">
                <div class="sidebar" id="sidebar"></div>
                <div class="chat-main" id="chatMain"></div>
            </div>
            <div id="avatarModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); align-items:center; justify-content:center; z-index:1000;">
                <div class="modal-content" style="background:rgba(30,40,50,0.9); border-radius:32px; padding:24px; width:320px; text-align:center;">
                    <h3 style="color:white; margin-bottom:16px;">Выбери аватар</h3>
                    <div class="emoji-grid" id="emojiGrid" style="display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:20px;"></div>
                    <button id="closeModal" class="close-modal" style="background:#3b82f6; border:none; padding:10px; border-radius:28px; color:white; width:100%;">Закрыть</button>
                </div>
            </div>
        `;
        renderSidebar();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => {
            if (currentChat) loadMessagesWith(currentChat);
            loadChats();
        }, 3000);
        // Привязываем модалку аватара
        const profileBtn = document.getElementById('profileBtn');
        if (profileBtn) profileBtn.addEventListener('click', showAvatarModal);
        else setTimeout(() => {
            document.getElementById('profileBtn')?.addEventListener('click', showAvatarModal);
        }, 100);
    }

    renderAuth();
</script>
</body>
</html>
