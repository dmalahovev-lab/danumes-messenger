<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes Messenger</title>
    <style>
        /* КАНОНИЧНЫЙ BENTO-ДИЗАЙН С DANUMES.VERCEL.APP */
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1f2833;
            --accent-color: #45f3ff;
            --text-color: #c5c6c7;
            --btn-color: #b388ff;
            --btn-hover: #9575cd;
            --admin-color: #a855f7;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* Bento-карточка авторизации */
        #auth-container { 
            background: linear-gradient(145deg, #151c24, #1f2833); 
            padding: 40px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 0 30px rgba(69, 243, 255, 0.15); 
            text-align: center; 
            border: 1px solid rgba(69, 243, 255, 0.1);
        }

        .auth-title { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--accent-color); 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .auth-input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 2px solid #2f3e46; 
            border-radius: 8px; 
            background-color: #0b0c10; 
            color: #ffffff; 
            font-size: 16px; 
            outline: none;
            transition: border-color 0.2s;
        }

        .auth-input:focus { 
            border-color: var(--accent-color); 
        }

        /* Святая оригинальная фиолетовая кнопка */
        .auth-btn { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--btn-color); 
            border: none; 
            border-radius: 8px; 
            color: #0b0c10; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            margin-bottom: 15px; 
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(179, 136, 255, 0.3);
        }

        .auth-btn:hover { 
            background-color: var(--btn-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(179, 136, 255, 0.5);
        }

        .auth-switch { 
            color: #8b9bb4; 
            font-size: 14px; 
            cursor: pointer; 
            text-decoration: underline; 
        }

        .auth-switch:hover { 
            color: var(--accent-color); 
        }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС BENTO-ВЕРСТКИ */
        #app-container { display: none; width: 100%; height: 100vh; }
        .messenger-layout { display: flex; width: 100%; height: 100%; padding: 10px; gap: 10px; }
        
        .sidebar { 
            width: 320px; 
            background: #151c24; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .sidebar-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .search-bar { 
            width: 100%; 
            padding: 10px 14px; 
            background: var(--bg-color); 
            border: 1px solid #2f3e46; 
            border-radius: 8px; 
            color: #fff; 
            outline: none; 
        }
        .search-bar:focus { border-color: var(--accent-color); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 5px; }
        
        .chat-item { 
            padding: 14px 18px; 
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            transition: background 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: var(--panel-color); color: #fff; }
        .badge-admin { color: var(--admin-color); margin-left: 5px; font-weight: bold; }

        /* Окно чата */
        .chat-window { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #0c1119; 
            position: relative; 
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        
        .chat-header { 
            height: 65px; 
            background: #151c24; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        /* Фиксация кастомной прокрутки истории сообщений */
        .chat-messages { 
            flex: 1; 
            overflow-y: scroll; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding-bottom: 100px; 
        }
        
        /* Пузыри сообщений (макс. ширина 45%) */
        .message { 
            max-width: 45%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            word-wrap: break-word; 
            font-size: 15px; 
            position: relative; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .message.incoming { background: var(--panel-color); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.outgoing { background: #123c4d; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid rgba(69, 243, 255, 0.2); }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 6px; display: block; }
        
        /* Намертво зафиксированная панель ввода внизу */
        .input-panel { 
            position: absolute; 
            bottom: 10px; 
            left: 10px; 
            right: 10px; 
            height: 70px; 
            background: #151c24; 
            padding: 15px; 
            display: flex; 
            gap: 12px; 
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            align-items: center; 
            z-index: 10; 
        }
        
        .message-input { 
            flex: 1; 
            padding: 10px 14px; 
            background: var(--bg-color); 
            border: 1px solid #2f3e46; 
            border-radius: 6px; 
            color: #fff; 
            outline: none; 
            resize: none; 
            height: 40px; 
            font-size: 14px;
        }
        .message-input:focus { border-color: var(--accent-color); }
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--accent-color); }

        /* Всплывающие плашки контекстного меню и уведомлений */
        #custom-context-menu { display: none; position: absolute; z-index: 1000; background: #1f2833; border: 1px solid #2f3e46; border-radius: 8px; padding: 4px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 170px; }
        #ctx-delete-btn { width: 100%; text-align: left; background: none; border: none; color: #ff4d4d; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: bold; }
        #ctx-delete-btn:hover { background: rgba(255, 77, 77, 0.1); }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #151c24; color: #fff; padding: 14px 24px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 14px; animation: slideIn 0.2s ease forwards; border-left: 4px solid var(--accent-color); }
        
        #group-modal, #call-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #151c24; padding: 30px; border-radius: 16px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #2f3e46; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
        
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- ФОРМА АВТОРИЗАЦИИ (Святой код переменных user и pass) -->
    <div id="auth-container">
        <div class="auth-title" id="auth-header-text">Вход в DanuMes</div>
        <input type="text" id="username" class="auth-input" placeholder="Имя пользователя" autocomplete="off">
        <input type="password" id="password" class="auth-input" placeholder="Пароль">
        <button id="main-auth-btn" class="auth-btn">Войти</button>
        <div id="auth-toggle" class="auth-switch">Нет аккаунта? Создать</div>
    </div>

    <!-- Основной клиент Bento-мессенджера -->
    <div id="app-container">
        <div class="messenger-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <input type="text" id="search" class="search-bar" placeholder="Поиск людей...">
                    <button id="open-group-modal-btn" style="width:100%; margin-top:10px; background:var(--panel-color); color:#fff; border:none; padding:8px; cursor:pointer; border-radius:6px; font-weight:bold;">+ Создать группу</button>
                </div>
                <div class="chat-list" id="chats"></div>
            </div>
            <div class="chat-window">
                <div class="chat-header">
                    <h3 id="current-chat-title">Выберите чат</h3>
                    <button id="call-btn" style="display: none; background: none; border: none; font-size: 24px; cursor: pointer;" title="Позвонить">📞</button>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="input-panel">
                    <button class="icon-btn" id="img-btn">🖼️</button>
                    <input type="file" id="file-input" accept="image/*" style="display:none;">
                    <textarea class="message-input" id="msg-input" placeholder="Напишите сообщение... (Enter для отправки)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню удаления -->
    <div id="custom-context-menu">
        <button id="ctx-delete-btn">🗑️ Удалить сообщение</button>
    </div>

    <div id="toast-container"></div>

    <!-- Модалка звонка WebRTC -->
    <div id="call-modal">
        <div class="modal-content" style="border: 1px solid var(--accent-color);">
            <div style="font-size: 45px; margin-bottom: 15px;">📞</div>
            <h3 id="caller-name" style="margin-bottom: 25px; font-size: 18px; color: #fff;">Входящий вызов...</h3>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="accept-call-btn" style="background: #2ecc71; color: white; border: none; padding: 12px 26px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 15px;">Принять</button>
                <button id="reject-call-btn" style="background: #e74c3c; color: white; border: none; padding: 12px 26px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 15px;">Сбросить</button>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        const socket = io();
        let currentUser = null;
        let activeChat = { type: null, id: null };
        let isSelectionForRegister = false;
        let selectedMessageId = null;
        let cachedUsersList = [];
        
        let localStream = null, peerConnection = null, currentCallSession = null, ringtoneInterval = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:://google.com' }] };

        function showToast(text, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(type === 'error') toast.style.borderLeftColor = '#ff4d4d';
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function playNotifySound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            } catch(e){}
        }

        function playRingtone() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                ringtoneInterval = setInterval(() => {
                    let osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                }, 1000);
            } catch(e){}
        }
        function stopRingtone() { clearInterval(ringtoneInterval); }

        // Переключение режимов Вход / Регистрация
        document.getElementById('auth-toggle').addEventListener('click', () => {
            isSelectionForRegister = !isSelectionForRegister;
            document.getElementById('auth-header-text').innerText = isSelectionForRegister ? 'Регистрация в DanuMes' : 'Вход в DanuMes';
            document.getElementById('main-auth-btn').innerText = isSelectionForRegister ? 'Создать аккаунт' : 'Войти';
            document.getElementById('auth-toggle').innerText = isSelectionForRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать';
        });

        // ИСПРАВЛЕННЫЙ СВЯТОЙ КОД АВТОРИЗАЦИИ
        document.getElementById('main-auth-btn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return showToast('Заполните поля', 'error');

            const targetUrl = isSelectionForRegister ? '/api/register' : '/api/login';
            
            try {
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                const data = await response.json();

                if (response.ok) {
                    currentUser = { username: user };
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                    showToast(`Вход выполнен успешно!`);
                    socket.emit('register_user', user);
                    buildSidebarStructure();
                } else {
                    showToast(data.message || 'Ошибка авторизации', 'error');
                }
            } catch (err) {
                showToast('Ошибка подключения к серверу. Проверьте статус Render.', 'error');
            }
        });

        function buildSidebarStructure() {
            const chatsContainer = document.getElementById('chats');
            chatsContainer.innerHTML = '';
            
            const newsDiv = document.createElement('div');
            newsDiv.className = 'chat-item';
            newsDiv.innerHTML = `<span>📢 DanuMes news</span>`;
            newsDiv.onclick = () => selectChat('news', 'danumes_news', 'DanuMes news');
            chatsContainer.appendChild(newsDiv);

            socket.emit('get_online_users');
        }

        socket.on('update_users', (users) => {
            cachedUsersList = users;
            renderSidebarList(users);
        });

        function renderSidebarList(users) {
            const chatsContainer = document.getElementById('chats');
            const items = chatsContainer.querySelectorAll('.chat-item');
            items.forEach((item, index) => { if(index > 0) item.remove(); });

            users.forEach(u => {
                if (u !== currentUser.username) {
                    const div = document.createElement('div');
                    div.className = 'chat-item' + (activeChat.id === u ? ' active' : '');
                    let adminBadge = u === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
                    div.innerHTML = `<span>👤 ${u}${adminBadge}</span>`;
                    div.onclick = () => selectChat('private', u, u);
                    chatsContainer.appendChild(div);
                }
            });
        }

        // Живой поиск в сайдбаре
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = cachedUsersList.filter(u => u.toLowerCase().includes(val));
            renderSidebarList(filtered);
        });

        function selectChat(type, id, title) {
            activeChat = { type, id };
            const items = document.querySelectorAll('.chat-item');
            items.forEach(el => el.classList.remove('active'));
            
            let adminMark = id === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
            document.getElementById('current-chat-title').innerHTML = title + adminMark;
            document.getElementById('chat-messages').innerHTML = '';
            
            const callBtn = document.getElementById('call-btn');
            if (type === 'private' && id !== 'danumes_news') {
                callBtn.style.display = 'inline-block';
            } else {
                callBtn.style.display = 'none';
            }
            socket.emit('load_messages', { type, id });
        }

        socket.on('messages_history', (messages) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = '';
            messages.forEach(renderSingleMessage);
            box.scrollTop = box.scrollHeight;
        });

        function renderSingleMessage(msg) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isOwn = msg.author === currentUser.username;
            
            div.className = `message ${isOwn ? 'outgoing' : 'incoming'}`;
            div.dataset.id = msg.id;
            div.dataset.author = msg.author;
            
            let adminMark = msg.author === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
            let content = `<strong>${msg.author}${adminMark}:</strong><br>`;
            
            if (msg.text) content += `<span>${msg.text}</span>`;
            if (msg.image) content += `<img src="${msg.image}">`;
            
            div.innerHTML = content;
            box.appendChild(div);
        }

        // Отправка по Enter
        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = e.target.value.trim();
                if (!text || !activeChat.id) return;
                
                if (activeChat.id === 'danumes_news' && currentUser.username !== 'Danumala') {
                    showToast('Писать в этот канал может только админ Danumala', 'error');
                    e.target.value = '';
                    return;
                }

                socket.emit('send_msg', { type: activeChat.type, to: activeChat.id, text: text });
                e.target.value = '';
            }
        });

        // Картинки в Base64
        document.getElementById('img-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files;
            if (!file || !activeChat.id) return;
            const reader = new FileReader();
            reader.onload = () => {
                socket.emit('send_msg', { type: activeChat.type, to: activeChat.id, image: reader.result });
            };
            reader.readAsDataURL(file);
        });

        socket.on('new_msg', (msg) => {
            if ((activeChat.type === msg.type && (activeChat.id === msg.to || activeChat.id === msg.author)) || (msg.type === 'news' && activeChat.id === 'danumes_news')) {
                renderSingleMessage(msg);
                const box = document.getElementById('chat-messages');
                box.scrollTop = box.scrollHeight;
            }
            if (msg.author !== currentUser.username) playNotifySound();
        });

        // Контекстное меню удаления
        const ctxMenu = document.getElementById('custom-context-menu');
        document.getElementById('chat-messages').addEventListener('contextmenu', (e) => {
            const msgEl = e.target.closest('.message');
            if (!msgEl) return;

            const author = msgEl.dataset.author;
            if (currentUser.username === 'Danumala' || currentUser.username === author) {
                e.preventDefault();
                selectedMessageId = msgEl.dataset.id;
                ctxMenu.style.left = `${e.pageX}px`;
                ctxMenu.style.top = `${e.pageY}px`;
                ctxMenu.style.display = 'block';
            }
        });

        document.addEventListener('click', () => ctxMenu.style.display = 'none');

        document.getElementById('ctx-delete-btn').addEventListener('click', () => {
            if (!selectedMessageId) return;
            socket.emit('req_delete_message', { messageId: selectedMessageId, user: currentUser.username });
        });

        socket.on('msg_deleted', (messageId) => {
            const el = document.querySelector(`[data-id="${messageId}"]`);
            if (el) el.remove();
        });

        // WebRTC Сигналинг звонков
        document.getElementById('call-btn').addEventListener('click', async () => {
            showToast(`Вызов ${activeChat.id}...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            socket.emit('call_init', { to: activeChat.id, from: currentUser.username });
        });

        socket.on('call_incoming', (data) => {
            currentCallSession = data;
            document.getElementById('caller-name').innerText = `Вам звонит ${data.from}`;
            document.getElementById('call-modal').style.display = 'flex';
            playRingtone();
        });

        document.getElementById('accept-call-btn').addEventListener('click', async () => {
            stopRingtone();
            document.getElementById('call-modal').style.display = 'none';
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            
            peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams; };
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice_candidate', { to: currentCallSession.from, candidate: e.candidate });
            };
            socket.emit('call_accepted', { to: currentCallSession.from, from: currentUser.username });
        });

        socket.on('start_handshake', async (data) => {
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            
            peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams; };
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice_candidate', { to: data.from, candidate: e.candidate });
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('rtc_offer', { to: data.from, offer: offer });
        });

        socket.on('receive_offer', async (data) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const ans = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(ans);
            socket.emit('rtc_answer', { to: data.from, answer: ans });
        });

        socket.on('receive_answer', async (data) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        });

        socket.on('receive_ice', async (data) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        });

        const endCallUI = () => {
            stopRingtone();
            document.getElementById('call-modal').style.display = 'none';
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            showToast('Звонок завершен');
        };

        document.getElementById('reject-call-btn').addEventListener('click', () => {
            if(currentCallSession) socket.emit('call_rejected', { to: currentCallSession.from });
            endCallUI();
        });

        socket.on('call_ended', endCallUI);
        
        document.getElementById('open-group-modal-btn').addEventListener('click', () => showToast('Функция создания групп в разработке'));
    </script>
</body>
</html>
