<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — отладка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
            color: #e5e7eb;
        }
        .messenger { display: flex; height: 100vh; width: 100%; background: rgba(15, 25, 35, 0.4); backdrop-filter: blur(10px); }
        .sidebar {
            width: 300px;
            background: rgba(30, 40, 50, 0.5);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .profile-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 32px;
        }
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .chat-item:hover { background: rgba(255,255,255,0.1); }
        .chat-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; font-size: 16px; }
        .chat-lastmsg { font-size: 13px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            height: 70px;
            padding: 0 20px;
            background: rgba(30, 40, 50, 0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .chat-header-avatar { font-size: 44px; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 75%;
        }
        .message-own { align-self: flex-end; flex-direction: row-reverse; }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            background: rgba(40,50,65,0.7);
            font-size: 15px;
        }
        .message-own .message-bubble {
            background: linear-gradient(135deg, rgba(59,130,246,0.8), rgba(139,92,246,0.8));
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 22px;
        }
        .message-time { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 6px; }
        .input-area {
            padding: 16px 20px;
            background: rgba(30, 40, 50, 0.4);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 14px;
        }
        .input-wrapper {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
        }
        #messageInput {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 4000;
            animation: fadeInOut 3s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
        }
        .auth-card {
            background: rgba(30,40,50,0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 460px;
        }
        .auth-card h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 56px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        .auth-form input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 16px;
            margin-bottom: 20px;
            color: white;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-text { color: #f87171; font-size: 13px; text-align: center; margin-top: -8px; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    let currentUser = null;
    let currentChat = null;
    let currentChatType = 'user';
    let messages = [];
    let chats = [];
    let channels = [];
    let searchQuery = '';
    let pollInterval = null;

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) {
            opts.body = data;
        }
        const res = await fetch(url, opts);
        return res.json();
    }

    async function loadChats() {
        if (!currentUser) return;
        const userChats = await api('GET', `/get-chats/${currentUser.username}`);
        const channelList = await api('GET', '/get-channels');
        channels = channelList || [];
        let all = [];
        channels.forEach(ch => {
            all.push({ type: 'channel', id: ch.id, name: ch.name, avatar: ch.avatar, lastMessage: ch.lastMessage || 'Нет сообщений', lastTime: ch.lastTime });
        });
        (userChats || []).forEach(uc => {
            all.push({ type: 'user', id: uc.username, name: uc.username, avatar: uc.avatar, online: uc.online, verified: uc.verified, lastMessage: uc.lastMessage || 'Нет сообщений', lastTime: uc.lastTime });
        });
        all.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
        chats = all;
        renderSidebar();
    }

    async function loadMessages() {
        if (!currentUser || !currentChat) {
            showToast('❌ Нет currentChat для загрузки');
            return;
        }
        showToast(`📥 Загружаем сообщения для ${currentChat}`);
        try {
            if (currentChatType === 'user') {
                const res = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                messages = res || [];
            } else {
                const res = await api('GET', `/get-channel-messages/${currentChat}`);
                messages = res || [];
            }
            showToast(`✅ Загружено ${messages.length} сообщений`);
            renderMessages();
        } catch(e) {
            showToast(`❌ Ошибка загрузки: ${e.message}`);
        }
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if (!text && !fileUrl) return;
        showToast(`📤 Отправка сообщения: "${text.substring(0,30)}"`);
        try {
            if (currentChatType === 'user') {
                await api('POST', '/send-message', {
                    from: currentUser.username,
                    to: currentChat,
                    text: text || '',
                    fileUrl,
                    fileName
                });
            } else {
                await api('POST', '/send-channel-message', {
                    channelId: currentChat,
                    from: currentUser.username,
                    text: text || '',
                    fileUrl,
                    fileName
                });
            }
            showToast(`✅ Сообщение отправлено`);
            await loadMessages();
            await loadChats();
        } catch(e) {
            showToast(`❌ Ошибка отправки: ${e.message}`);
        }
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        renderSidebar();
        showToast('Аватар обновлён');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function renderSidebar() {
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        let html = `
            <div class="sidebar-header">
                <div class="logo">DanuMes (отладка)</div>
                <button class="profile-btn" id="profileBtn">${currentUser.avatar}</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск">
            </div>
            <div class="chats-list" id="chatsList">
        `;
        chats.forEach(chat => {
            const activeClass = (currentChat === chat.id && currentChatType === chat.type) ? 'active' : '';
            let nameHtml = escapeHtml(chat.name);
            if (chat.type === 'user' && chat.verified) nameHtml += ' ✓';
            if (chat.type === 'user' && chat.online) nameHtml += ' ●';
            html += `<div class="chat-item ${activeClass}" data-type="${chat.type}" data-id="${chat.id}">
                        <div class="chat-avatar">${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameHtml}</div>
                            <div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div>
                        </div>
                    </div>`;
        });
        html += `</div>`;
        sidebarDiv.innerHTML = html;

        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                const newType = el.dataset.type;
                const newId = el.dataset.id;
                if (!newId) return;
                showToast(`🖱️ Клик по чату: ${newId}`);
                currentChatType = newType;
                currentChat = newId;
                messages = [];
                renderChat();
                loadMessages();
                renderSidebar();
            });
        });

        document.getElementById('profileBtn').onclick = () => {
            const emoji = prompt('Введи эмодзи для аватара (например 😀)', currentUser.avatar);
            if (emoji) updateAvatar(emoji);
        };
    }

    function renderMessages() {
        const container = document.getElementById('messagesList');
        if (!container) return;
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">💬 Нет сообщений. Напишите первое!</div>';
            return;
        }
        let html = '';
        messages.forEach(msg => {
            const isOwn = msg.from === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            html += `<div class="message ${isOwn ? 'message-own' : ''}">
                        <div class="message-bubble">
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
        showToast(`🎨 Отрисовано ${messages.length} сообщений`);
    }

    function renderChat() {
        const mainDiv = document.getElementById('chatMain');
        if (!mainDiv) return;
        if (!currentChat) {
            mainDiv.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; opacity:0.6;">✨ Выберите чат ✨</div>`;
            return;
        }
        const chatInfo = chats.find(c => c.id === currentChat && c.type === currentChatType) || { name: currentChat, avatar: '💬' };
        mainDiv.innerHTML = `
            <div class="chat-header">
                <div class="chat-header-avatar">${chatInfo.avatar}</div>
                <h3>${escapeHtml(chatInfo.name)}</h3>
            </div>
            <div class="messages-area" id="messagesList"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение">
                    <label class="file-btn" id="fileLabel">📎</label>
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        `;
        
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileLabel = document.getElementById('fileLabel');
        const fileInput = document.getElementById('fileInput');
        
        const send = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                const up = await uploadFile(file);
                if (up.success) {
                    await sendMessage(text, up.fileUrl, up.fileName);
                    fileInput.value = '';
                }
            } else if (text) {
                await sendMessage(text);
            }
            msgInput.value = '';
        };
        
        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') { e.preventDefault(); send(); } };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => send();
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2>DanuMes</h2>
                    <div class="tabs">
                        <div class="tab active" id="loginTab">Вход</div>
                        <div class="tab" id="regTab">Регистрация</div>
                    </div>
                    <div id="loginPanel" class="auth-form">
                        <input type="text" id="loginUsername" placeholder="Логин">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <div id="loginError" class="error-text"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="regPanel" class="auth-form" style="display:none;">
                        <input type="text" id="regUsername" placeholder="Логин">
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <div id="regError" class="error-text"></div>
                        <button id="doReg" class="auth-btn">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'flex';
            document.getElementById('regPanel').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('regTab').classList.remove('active');
        };
        document.getElementById('regTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('regPanel').style.display = 'flex';
            document.getElementById('regTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        };
        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
                await loadChats();
                startMessenger();
                showToast(`Добро пожаловать, ${username}!`);
            } else {
                document.getElementById('loginError').innerText = res.error;
            }
        };
        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) {
                showToast('Регистрация успешна! Теперь войдите.');
                document.getElementById('loginTab').click();
            } else {
                document.getElementById('regError').innerText = res.error;
            }
        };
    }

    function startMessenger() {
        document.getElementById('app').innerHTML = `
            <div class="messenger">
                <div class="sidebar" id="sidebar"></div>
                <div class="chat-main" id="chatMain"></div>
            </div>
        `;
        renderSidebar();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => {
            if (currentChat) loadMessages();
            loadChats();
        }, 3000);
    }

    renderAuth();
</script>
</body>
</html>
