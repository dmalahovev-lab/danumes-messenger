<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DanuMes — Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0f;
      color: #e1e1e1;
      height: 100vh;
      overflow: hidden;
    }

    /* Твои цвета из Figma */
    :root {
      --bg: #0a0a0f;
      --sidebar: #111116;
      --header: #1a1a24;
      --chat-bg: #13131a;
      --msg-own: #2b5278;
      --msg-other: #1e1e2a;
      --input-bg: #1a1a24;
      --text: #e1e1e1;
      --text-secondary: #8a8a9a;
      --border: #1e1e2a;
      --accent: #2b5278;
      --online: #4caf50;
      --verified: #4caf50;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Левая панель чатов */
    .sidebar {
      width: 320px;
      background: #111116;
      border-right: 1px solid #1e1e2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Верхняя часть с аватаром и настройками */
    .sidebar-header {
      padding: 20px 16px;
      background: #1a1a24;
      border-bottom: 1px solid #1e1e2a;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: #2b5278;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
      flex: 1;
    }

    .settings-icon {
      background: none;
      border: none;
      color: #8a8a9a;
      font-size: 22px;
      cursor: pointer;
      padding: 6px;
    }

    /* Поиск */
    .search-box {
      padding: 12px 16px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 12px;
      color: #e1e1e1;
      font-size: 14px;
    }

    .search-input:focus {
      outline: none;
      border-color: #2b5278;
    }

    /* Список чатов */
    .chats-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-section {
      padding: 12px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #8a8a9a;
      text-transform: uppercase;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chat-item:hover {
      background: #1a1a24;
    }

    .chat-item.active {
      background: #2b5278;
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      background: #0a0a0f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      position: relative;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #4caf50;
      border-radius: 50%;
      border: 2px solid #111116;
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-name {
      font-weight: 600;
      font-size: 15px;
    }

    .chat-message {
      font-size: 12px;
      color: #8a8a9a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Правая панель чата */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #13131a;
    }

    .chat-header {
      padding: 16px 20px;
      background: #1a1a24;
      border-bottom: 1px solid #1e1e2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-avatar {
      width: 44px;
      height: 44px;
      background: #0a0a0f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .chat-header-name {
      font-weight: 600;
      font-size: 17px;
    }

    .chat-header-status {
      font-size: 12px;
      color: #8a8a9a;
    }

    /* Сообщения */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 70%;
      display: flex;
      flex-direction: column;
    }

    .message-own {
      align-self: flex-end;
    }

    .message-other {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 18px;
    }

    .message-own .message-bubble {
      background: #2b5278;
      border-bottom-right-radius: 4px;
    }

    .message-other .message-bubble {
      background: #1e1e2a;
      border-bottom-left-radius: 4px;
    }

    .message-sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #2b5278;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message-meta {
      font-size: 10px;
      color: #8a8a9a;
      margin-top: 4px;
    }

    /* Файлы */
    .message-file {
      margin-top: 6px;
    }

    .message-file img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Реакции */
    .reactions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .reaction {
      background: #1a1a24;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .reaction.active {
      background: #2b5278;
    }

    /* Ввод сообщения */
    .input-area {
      padding: 16px 20px;
      background: #1a1a24;
      border-top: 1px solid #1e1e2a;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 24px;
      color: #e1e1e1;
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }

    .message-input:focus {
      outline: none;
      border-color: #2b5278;
    }

    .input-btn {
      width: 42px;
      height: 42px;
      background: #2b5278;
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    /* Контекстное меню */
    .context-menu {
      position: fixed;
      background: #111116;
      border: 1px solid #1e1e2a;
      border-radius: 12px;
      z-index: 1000;
      min-width: 180px;
      overflow: hidden;
    }

    .context-menu-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .context-menu-item:hover {
      background: #2b5278;
    }

    /* Модальные окна */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {
      background: #111116;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #1e1e2a;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 12px;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 12px;
      color: #e1e1e1;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .modal-btn-primary {
      background: #2b5278;
      color: white;
    }

    /* Панель стикеров */
    .sticker-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: #111116;
      border-radius: 20px;
      padding: 16px;
      z-index: 99;
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      max-width: 280px;
      border: 1px solid #1e1e2a;
    }

    .sticker-panel.show {
      display: grid;
    }

    .sticker {
      font-size: 32px;
      cursor: pointer;
      padding: 6px;
      text-align: center;
      border-radius: 12px;
    }

    .sticker:hover {
      background: #2b5278;
    }

    /* Запись голоса */
    .voice-recording {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0a0a0f;
      padding: 8px 16px;
      border-radius: 24px;
      margin-bottom: 8px;
    }

    .recording-timer {
      color: #e74c3c;
    }

    /* Уведомления */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a24;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 3000;
      border: 1px solid #1e1e2a;
    }

    /* Логин */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0a0a0f;
    }

    .login-card {
      background: #111116;
      padding: 40px;
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #1e1e2a;
    }

    .login-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      color: #2b5278;
    }

    .login-input {
      width: 100%;
      padding: 14px;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 14px;
      color: #e1e1e1;
      margin-bottom: 14px;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #2b5278;
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .switch-mode {
      text-align: center;
      margin-top: 20px;
      cursor: pointer;
      color: #2b5278;
      font-size: 14px;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2b5278;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    let currentUser = null;
    let currentChat = null;
    let currentChatType = null;
    let currentGroupId = null;
    let allUsers = [];
    let allGroups = [];
    let allChannels = [];
    let messages = [];
    let lastMsgId = null;
    let isSending = false;
    let currentAudio = null;

    const VERIFIED = ['Danumala', 'RunFly'];
    const REACTIONS = ['👍', '❤️', '😂', '😮', '😢', '😡'];
    const STICKERS = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','❤️','🔥','✨','⭐','🎉','🎈','🎵','🎸','⚽','🏀','🌈','🍕'];

    function toast(msg) {
      let t = document.querySelector('.toast');
      if (t) t.remove();
      t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function api(method, url, data) {
      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: data ? JSON.stringify(data) : undefined
        });
        return await res.json();
      } catch (e) {
        return { success: false, error: e.message };
      }
    }

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    function formatDate(ts) { if (!ts) return ''; return new Date(ts).toLocaleDateString(); }

    async function loadChats() {
      if (!currentUser) return;
      const [users, groups, channels] = await Promise.all([
        api('GET', '/get-users'),
        api('GET', `/get-groups/${currentUser.username}`),
        api('GET', `/get-channels/${currentUser.username}`)
      ]);
      allUsers = Array.isArray(users) ? users.filter(u => u.username !== currentUser.username) : [];
      allGroups = Array.isArray(groups) ? groups : [];
      allChannels = Array.isArray(channels) ? channels : [];
      renderSidebar();
    }

    async function loadMessages() {
      if (!currentUser || !currentChat) return;
      let fetched = [];
      if (currentChatType === 'group') {
        const r = await api('GET', `/get-group-messages/${currentGroupId}`);
        fetched = Array.isArray(r) ? r : [];
      } else if (currentChatType === 'channel') {
        const r = await api('GET', `/get-channel-messages/${currentGroupId}`);
        fetched = Array.isArray(r) ? r : [];
      } else {
        const r = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
        fetched = Array.isArray(r) ? r : [];
      }
      const newId = fetched.length ? fetched[fetched.length-1].id : null;
      if (newId !== lastMsgId) {
        lastMsgId = newId;
        messages = fetched;
        renderMessages();
      }
    }

    async function sendMessage(text, file = null) {
      if (isSending) { toast('Подождите...'); return; }
      if (!text && !file) return;
      if (currentChatType === 'channel' && currentChannelCreator !== currentUser?.username) {
        toast('⛔ Только автор канала');
        return;
      }
      isSending = true;
      const tempId = Date.now();
      const temp = { id: tempId, from_user: currentUser.username, text: text || (file ? `📎 ${file.name}` : ''), file_url: file?.url, timestamp: new Date().toISOString(), isTemp: true };
      messages.push(temp);
      renderMessages();

      let ep, pl;
      if (currentChatType === 'group') {
        ep = '/send-group-message';
        pl = { groupId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
      } else if (currentChatType === 'channel') {
        ep = '/send-channel-message';
        pl = { channelId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
      } else {
        ep = '/send-message';
        pl = { from: currentUser.username, to: currentChat, text: text || '', fileUrl: file?.url, fileName: file?.name };
      }
      const res = await api('POST', ep, pl);
      if (res.success) { await loadMessages(); }
      else { toast('Ошибка'); messages = messages.filter(m => m.id !== tempId); renderMessages(); }
      isSending = false;
    }

    async function sendFromInput() {
      const i = document.getElementById('msgInput');
      const t = i?.value.trim();
      if (t) { await sendMessage(t); i.value = ''; }
    }

    async function editMsg(id, newText) {
      const r = await api('PUT', `/edit-message/${id}`, { text: newText });
      if (r.success) { await loadMessages(); toast('Изменено'); }
      else toast('Ошибка');
    }

    async function deleteMsg(id) {
      if (!confirm('Удалить?')) return;
      const r = await api('DELETE', `/delete-message/${id}`);
      if (r.success) { await loadMessages(); toast('Удалено'); }
      else toast('Ошибка');
    }

    async function addReaction(mid, reaction, type) {
      const r = await api('POST', '/add-reaction', { messageId: parseInt(mid), userId: currentUser.username, reaction, type });
      if (r.success) await loadMessages();
    }

    async function getReactions(mid, type) {
      const r = await api('GET', `/get-reactions/${mid}/${type}`);
      return Array.isArray(r) ? r : [];
    }

    let mediaRec = null;
    let audioChunks = [];
    let isRec = false;
    let recTimer = null;
    let recSec = 0;

    async function startVoice() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        audioChunks = [];
        mediaRec.ondataavailable = e => audioChunks.push(e.data);
        mediaRec.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = async () => await sendMessage('🎤 Голосовое', { url: reader.result, name: 'voice.webm', type: 'audio/webm' });
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t => t.stop());
          document.querySelector('.voice-recording')?.remove();
        };
        mediaRec.start();
        isRec = true;
        recSec = 0;
        const inputArea = document.querySelector('.input-area');
        const rd = document.createElement('div');
        rd.className = 'voice-recording';
        rd.innerHTML = `<span>🎙️ Запись:</span><span class="recording-timer">0:00</span><button class="input-btn" onclick="stopVoice()" style="background:#e74c3c;width:36px;height:36px;">⏹️</button>`;
        inputArea.insertBefore(rd, inputArea.firstChild);
        recTimer = setInterval(() => {
          recSec++;
          const t = document.querySelector('.recording-timer');
          if (t) t.textContent = `${Math.floor(recSec/60)}:${(recSec%60).toString().padStart(2,'0')}`;
        }, 1000);
      } catch(e) { toast('Нет микрофона'); }
    }

    function stopVoice() {
      if (mediaRec && isRec) { mediaRec.stop(); isRec = false; clearInterval(recTimer); }
    }

    async function createGroup() {
      const name = document.getElementById('groupName')?.value.trim();
      if (!name) { toast('Введите название'); return; }
      const selected = Array.from(document.querySelectorAll('.user-select:checked')).map(cb => cb.value);
      const r = await api('POST', '/create-group', { name, creator: currentUser.username, members: selected });
      if (r.success) {
        closeModal(); await loadChats(); toast(`Группа "${name}" создана`);
        if (r.group) selectChat(r.group.name, 'group', r.group.id);
      } else toast('Ошибка');
    }

    async function createChannel() {
      const name = document.getElementById('channelName')?.value.trim();
      if (!name) { toast('Введите название'); return; }
      const r = await api('POST', '/create-channel', { name, creator: currentUser.username });
      if (r.success) {
        closeModal(); await loadChats(); toast(`Канал "${name}" создан`);
        if (r.channel) selectChat(r.channel.name, 'channel', r.channel.id, r.channel.created_by);
      } else toast('Ошибка');
    }

    async function subscribeChannel(id, name, creator) {
      const r = await api('POST', '/subscribe-channel', { channelId: id, userId: currentUser.username });
      if (r.success) {
        toast(`Подписка на ${name}`);
        await loadChats();
        selectChat(name, 'channel', id, creator);
        const search = document.getElementById('searchInput');
        if (search) search.value = '';
        renderSidebar();
      } else toast('Ошибка');
    }

    function selectChat(chatId, type, gid = null, creator = null) {
      if (currentChat === chatId && currentChatType === type) return;
      currentChat = chatId;
      currentChatType = type;
      currentGroupId = gid;
      currentChannelCreator = creator;
      lastMsgId = null;
      renderSidebar();
      renderChatArea();
      loadMessages();
    }

    async function updateAvatar(avatar) {
      const r = await api('POST', '/update-avatar', { username: currentUser.username, avatar });
      if (r.success) {
        currentUser.avatar = avatar;
        renderSidebar();
        if (currentChatType === 'user') renderChatArea();
        toast('Аватар обновлён');
      }
      closeModal();
    }

    function showProfile(user) {
      if (!user) return;
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `<div class="modal-content" style="text-align:center;"><div class="avatar" style="width:100px;height:100px;font-size:48px;margin:0 auto 20px;">${user.avatar || '👤'}</div><div class="modal-title" style="font-size:28px;">${escapeHtml(user.username)}${VERIFIED.includes(user.username) ? ' ✓' : ''}</div><div class="profile-status" style="margin-bottom:20px;">${user.online ? '🟢 В сети' : '⚫ Не в сети'}</div><div class="modal-buttons"><button class="modal-btn modal-btn-primary" onclick="this.parentElement.parentElement.parentElement.remove(); selectChat('${user.username}', 'user', null)">💬 Написать</button><button class="modal-btn" onclick="this.parentElement.parentElement.parentElement.remove()">Закрыть</button></div></div>`;
      document.body.appendChild(modal);
    }

    function viewImage(url) {
      const v = document.createElement('div');
      v.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:5000;cursor:pointer';
      v.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%;border-radius:16px;"><button style="position:absolute;top:20px;right:30px;font-size:40px;background:none;border:none;color:white;cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`;
      v.onclick = (e) => { if (e.target === v) v.remove(); };
      document.body.appendChild(v);
    }

    function showContextMenu(e, mid, from, text, url) {
      e.preventDefault();
      document.querySelector('.context-menu')?.remove();
      const isOwn = from === currentUser.username;
      const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      if (isOwn || isAuthor) {
        const edit = document.createElement('div'); edit.className = 'context-menu-item'; edit.textContent = '✏️ Редактировать'; edit.onclick = () => { const newText = prompt('Новый текст:', text); if (newText && newText !== text) editMsg(mid, newText); menu.remove(); }; menu.appendChild(edit);
        const del = document.createElement('div'); del.className = 'context-menu-item'; del.textContent = '🗑️ Удалить'; del.onclick = () => { deleteMsg(mid); menu.remove(); }; menu.appendChild(del);
      }
      const react = document.createElement('div'); react.className = 'context-menu-item'; react.textContent = '😊 Реакция'; react.onclick = () => { menu.remove(); showReactionMenu(e, mid); }; menu.appendChild(react);
      if (url && url !== 'undefined') { const down = document.createElement('div'); down.className = 'context-menu-item'; down.textContent = '📥 Скачать'; down.onclick = () => { window.open(url, '_blank'); menu.remove(); }; menu.appendChild(down); }
      document.body.appendChild(menu);
      setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
    }

    function showReactionMenu(e, mid) {
      document.querySelector('.reaction-menu')?.remove();
      const menu = document.createElement('div');
      menu.className = 'reaction-menu';
      menu.style.cssText = 'position:fixed;background:#111116;border:1px solid #1e1e2a;border-radius:30px;z-index:1001;display:flex;gap:10px;padding:8px 16px;';
      menu.style.left = e.clientX + 'px';
      menu.style.top = (e.clientY - 50) + 'px';
      REACTIONS.forEach(emoji => {
        const opt = document.createElement('div');
        opt.className = 'reaction-option';
        opt.textContent = emoji;
        opt.style.cssText = 'font-size:26px;cursor:pointer;padding:5px;';
        opt.onclick = () => { addReaction(mid, emoji, currentChatType); menu.remove(); };
        menu.appendChild(opt);
      });
      document.body.appendChild(menu);
      setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
    }

    let currentModal = null;
    function showModal(c) { if (currentModal) currentModal.remove(); const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<div class="modal-content">${c}</div>`; document.body.appendChild(m); currentModal = m; }
    function closeModal() { if (currentModal) currentModal.remove(); currentModal = null; }

    function showAvatarModal() {
      const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👨‍💻','👩‍💻','💼','🎮','📚','🎨','⚽','🎵'];
      showModal(`<div class="modal-title">Выберите аватар</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;">${emojis.map(e => `<div style="font-size:40px;text-align:center;cursor:pointer;padding:8px;" onclick="updateAvatar('${e}')">${e}</div>`).join('')}</div><div class="modal-buttons"><button class="modal-btn" onclick="closeModal()">Закрыть</button></div>`);
    }

    function showGroupModal() {
      if (allUsers.length === 0) { toast('Нет других пользователей'); return; }
      showModal(`<div class="modal-title">Создать группу</div><input type="text" class="modal-input" id="groupName" placeholder="Название"><div style="margin-bottom:12px;">Участники:</div><div style="max-height:180px;overflow-y:auto;margin-bottom:20px;">${allUsers.map(u => `<div style="padding:6px 0;"><label><input type="checkbox" class="user-select" value="${u.username}"> ${escapeHtml(u.username)}</label></div>`).join('')}</div><div class="modal-buttons"><button class="modal-btn" onclick="closeModal()">Отмена</button><button class="modal-btn modal-btn-primary" onclick="createGroup()">Создать</button></div>`);
    }

    function showChannelModal() {
      showModal(`<div class="modal-title">Создать канал</div><input type="text" class="modal-input" id="channelName" placeholder="Название"><div class="modal-buttons"><button class="modal-btn" onclick="closeModal()">Отмена</button><button class="modal-btn modal-btn-primary" onclick="createChannel()">Создать</button></div>`);
    }

    function openSettings() {
      showModal(`<div class="modal-title">Настройки</div><div style="padding:12px;background:#0a0a0f;border-radius:12px;margin-bottom:20px;"><div style="font-size:13px;color:#8a8a9a;">Информация</div><div style="margin-top:6px;">DanuMes v2.0 — Современный мессенджер</div></div><div class="modal-buttons"><button class="modal-btn modal-btn-primary" onclick="closeModal()">Закрыть</button></div>`);
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
      
      let myChats = [];
      allUsers.forEach(u => myChats.push({ id: u.username, name: u.username, type: 'user', avatar: u.avatar || '👤', online: u.online, verified: u.verified, preview: u.online ? 'В сети' : 'Не в сети', lastMsg: null, date: null }));
      allGroups.forEach(g => myChats.push({ id: g.id, name: g.name, type: 'group', groupId: g.id, avatar: '👥', preview: 'Группа' }));
      allChannels.forEach(c => myChats.push({ id: c.id, name: c.name, type: 'channel', channelId: c.id, created_by: c.created_by, avatar: '📢', preview: 'Канал' }));
      
      let filtered = myChats;
      if (search) filtered = myChats.filter(c => c.name.toLowerCase().includes(search));
      
      let searchResults = [];
      if (search) {
        const existingIds = myChats.map(c => c.type === 'user' ? c.name : (c.type === 'channel' ? c.id : null)).filter(Boolean);
        allChannels.forEach(c => { if (c.name.toLowerCase().includes(search) && !myChats.some(m => m.type === 'channel' && m.id === c.id)) searchResults.push({ type: 'channel', id: c.id, name: c.name, created_by: c.created_by }); });
        allUsers.forEach(u => { if (u.username.toLowerCase().includes(search) && !myChats.some(m => m.type === 'user' && m.name === u.username)) searchResults.push({ type: 'user', username: u.username, avatar: u.avatar || '👤', online: u.online, verified: u.verified }); });
      }
      
      const isVerified = VERIFIED.includes(currentUser?.username);
      const userChats = filtered.filter(c => c.type === 'user');
      const groupChats = filtered.filter(c => c.type === 'group');
      const channelChats = filtered.filter(c => c.type === 'channel');
      
      sidebar.innerHTML = `
        <div class="sidebar-header">
          <div class="user-row">
            <div class="avatar" onclick="showAvatarModal()">${currentUser?.avatar || '👤'}</div>
            <div class="user-name">${escapeHtml(currentUser?.username || '')}${isVerified ? ' ✓' : ''}</div>
            <button class="settings-icon" onclick="openSettings()">⚙️</button>
          </div>
        </div>
        <div class="search-box">
          <input type="text" class="search-input" id="searchInput" placeholder="Поиск..." oninput="renderSidebar()">
        </div>
        <div class="chats-list">
          ${groupChats.length ? `<div class="chat-section">ГРУППЫ</div>${groupChats.map(c => `<div class="chat-item ${currentChat === c.name && currentChatType === 'group' ? 'active' : ''}" onclick="selectChat('${c.name}', 'group', ${c.groupId})"><div class="chat-avatar">👥</div><div class="chat-info"><div class="chat-name">${escapeHtml(c.name)}</div><div class="chat-message">Группа</div></div></div>`).join('')}` : ''}
          ${channelChats.length ? `<div class="chat-section">КАНАЛЫ</div>${channelChats.map(c => `<div class="chat-item ${currentChat === c.name && currentChatType === 'channel' ? 'active' : ''}" onclick="selectChat('${c.name}', 'channel', ${c.channelId}, '${c.created_by || ''}')"><div class="chat-avatar">📢</div><div class="chat-info"><div class="chat-name">${escapeHtml(c.name)}</div><div class="chat-message">Канал</div></div></div>`).join('')}` : ''}
          ${userChats.length ? `<div class="chat-section">ЛИЧНЫЕ СООБЩЕНИЯ</div>${userChats.map(c => `<div class="chat-item ${currentChat === c.name && currentChatType === 'user' ? 'active' : ''}" onclick="selectChat('${c.name}', 'user', null)"><div class="chat-avatar">${c.avatar}${c.online ? '<div class="online-dot"></div>' : ''}</div><div class="chat-info"><div class="chat-name">${escapeHtml(c.name)}${c.verified ? ' ✓' : ''}</div><div class="chat-message">${c.preview}</div></div></div>`).join('')}` : ''}
          ${searchResults.length ? `<div class="chat-section">РЕЗУЛЬТАТЫ ПОИСКА</div>${searchResults.map(r => r.type === 'channel' ? `<div class="chat-item" onclick="subscribeChannel(${r.id}, '${r.name.replace(/'/g,"\\'")}', '${r.created_by}')"><div class="chat-avatar">📢</div><div class="chat-info"><div class="chat-name">${escapeHtml(r.name)}</div><div class="chat-message">🔍 Нажмите подписаться</div></div></div>` : `<div class="chat-item" onclick="selectChat('${r.username}', 'user', null)"><div class="chat-avatar">${r.avatar}${r.online ? '<div class="online-dot"></div>' : ''}</div><div class="chat-info"><div class="chat-name">${escapeHtml(r.username)}${r.verified ? ' ✓' : ''}</div><div class="chat-message">${r.online ? 'В сети' : 'Не в сети'}</div></div></div>`).join('')}</div>` : ''}
        </div>
        <div id="stickerPanel" class="sticker-panel">${STICKERS.map(s => `<div class="sticker" onclick="sendMessage('${s}'); toggleSticker()">${s}</div>`).join('')}</div>
      `;
    }

    async function renderMessages() {
      const container = document.getElementById('messagesContainer');
      if (!container) return;
      if (!messages.length) { container.innerHTML = '<div style="text-align:center;padding:60px;opacity:0.6;">Нет сообщений</div>'; return; }
      
      const rm = new Map();
      for (const m of messages) {
        if (!m.isTemp) { const r = await getReactions(m.id, currentChatType); rm.set(m.id, r); }
        else rm.set(m.id, []);
      }
      
      let html = '';
      for (const m of messages) {
        const isOwn = m.from_user === currentUser.username;
        const reacts = rm.get(m.id) || [];
        const userReact = reacts.find(r => r.user_id === currentUser.username);
        const rg = {};
        reacts.forEach(r => { rg[r.reaction] = (rg[r.reaction] || 0) + 1; });
        
        let fh = '';
        if (m.file_url) {
          if (m.file_url.startsWith('data:image/')) fh = `<div class="message-file"><img src="${m.file_url}" onclick="viewImage('${m.file_url}')"></div>`;
          else fh = `<div class="message-file"><a href="${m.file_url}" download>📎 ${escapeHtml(m.file_name || 'файл')}</a></div>`;
        }
        
        let rh = '';
        for (const [e,c] of Object.entries(rg)) { const a = userReact?.reaction === e ? 'active' : ''; rh += `<span class="reaction ${a}" onclick="addReaction(${m.id}, '${e}', '${currentChatType}')">${e}${c>1 ? c : ''}</span>`; }
        
        html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${m.id}">${!isOwn && (currentChatType === 'group' || currentChatType === 'channel') ? `<div class="message-sender">${escapeHtml(m.from_user)}${m.from_user === currentChannelCreator ? ' 👑' : ''}</div>` : ''}<div class="message-bubble" oncontextmenu="showContextMenu(event, ${m.id}, '${m.from_user}', '${escapeHtml(m.text || '').replace(/'/g,"\\'")}', '${m.file_url || ''}')"><div class="message-text">${escapeHtml(m.text || '')}</div>${fh}</div><div class="message-meta">${m.isTemp ? '🕐 отправляется...' : formatTime(m.timestamp)}</div><div class="reactions">${rh}</div></div>`;
      }
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function renderChatArea() {
      const ca = document.getElementById('chatArea');
      if (!ca) return;
      let status = '', verified = false;
      const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
      const canWrite = currentChatType !== 'channel' || isAuthor;
      if (currentChatType === 'group') status = 'Группа';
      else if (currentChatType === 'channel') status = `Канал • автор: ${currentChannelCreator || '?'}`;
      else if (currentChat) { const u = allUsers.find(u => u.username === currentChat); status = u?.online ? 'В сети' : 'Не в сети'; verified = u?.verified || false; }
      ca.innerHTML = `<div class="chat-header"><div class="chat-header-avatar">${currentChatType === 'user' ? (allUsers.find(u=>u.username===currentChat)?.avatar || '👤') : (currentChatType === 'channel' ? '📢' : '👥')}</div><div><div class="chat-header-name">${escapeHtml(currentChat || 'Выберите чат')}${verified ? ' ✓' : ''}</div><div class="chat-header-status">${status}</div></div></div><div class="messages-container" id="messagesContainer">${!currentChat ? '<div style="text-align:center;padding:60px;opacity:0.6;">Выберите чат</div>' : ''}</div><div class="input-area"><div class="input-wrapper"><button class="input-btn" onclick="document.getElementById(\'fileInput\').click()" style="background:#0a0a0f;">📎</button><input type="file" id="fileInput" style="display:none;" onchange="uploadFile()"><button class="input-btn" onclick="startVoice()" style="background:#0a0a0f;">🎙️</button><button class="input-btn" onclick="toggleSticker()" style="background:#0a0a0f;">😊</button><textarea class="message-input" id="msgInput" placeholder="${canWrite ? (currentChat ? 'Сообщение...' : 'Выберите чат') : 'Только автор канала'}" ${!currentChat || !canWrite ? 'disabled' : ''} rows="1"></textarea><button class="input-btn" onclick="sendFromInput()" ${!currentChat || !canWrite ? 'disabled' : ''}>➤</button></div></div>`;
      if (currentChat && canWrite) { const i = document.getElementById('msgInput'); if (i) i.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); } }); }
    }

    function uploadFile() {
      const i = document.getElementById('fileInput');
      const f = i.files[0];
      if (!f) return;
      if (f.size > 10*1024*1024) { toast('Файл >10MB'); return; }
      const r = new FileReader();
      r.onloadend = () => sendMessage('', { url: r.result, name: f.name, type: f.type });
      r.readAsDataURL(f);
      i.value = '';
    }

    function toggleSticker() { document.getElementById('stickerPanel')?.classList.toggle('show'); }

    let isLogin = true;
    function renderAuth() { document.getElementById('app').innerHTML = `<div class="login-container"><div class="login-card"><div class="login-title">DanuMes</div><input type="text" class="login-input" id="authUser" placeholder="Имя"><input type="password" class="login-input" id="authPass" placeholder="Пароль"><button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Регистрация'}</button><div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div></div></div>`; }
    function toggleMode() { isLogin = !isLogin; renderAuth(); }
    async function submitAuth() {
      const u = document.getElementById('authUser').value.trim();
      const p = document.getElementById('authPass').value;
      if (!u || !p) { toast('Заполните поля'); return; }
      const r = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username: u, password: p });
      if (r.success) {
        if (isLogin) { currentUser = { username: r.username, avatar: r.avatar || '👤', verified: r.verified }; renderMain(); }
        else { toast('Регистрация успешна! Войдите'); isLogin = true; renderAuth(); }
      } else toast(r.error || 'Ошибка');
    }
    async function renderMain() {
      document.getElementById('app').innerHTML = `<div class="app"><div class="sidebar" id="sidebar"></div><div class="chat-area" id="chatArea"></div></div>`;
      await loadChats();
      if (allGroups.length) selectChat(allGroups[0].name, 'group', allGroups[0].id);
      else if (allUsers.length) selectChat(allUsers[0].username, 'user', null);
      setInterval(() => { loadMessages(); loadChats(); }, 5000);
    }

    window.addReaction = addReaction;
    window.updateAvatar = updateAvatar;
    window.selectChat = selectChat;
    window.showGroupModal = showGroupModal;
    window.showChannelModal = showChannelModal;
    window.createGroup = createGroup;
    window.createChannel = createChannel;
    window.sendMessage = sendMessage;
    window.sendFromInput = sendFromInput;
    window.showAvatarModal = showAvatarModal;
    window.closeModal = closeModal;
    window.submitAuth = submitAuth;
    window.toggleMode = toggleMode;
    window.showContextMenu = showContextMenu;
    window.startVoice = startVoice;
    window.stopVoice = stopVoice;
    window.toggleSticker = toggleSticker;
    window.viewImage = viewImage;
    window.showProfile = showProfile;
    window.uploadFile = uploadFile;
    window.subscribeChannel = subscribeChannel;
    window.openSettings = openSettings;

    renderAuth();
  </script>
</body>
</html>
