<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Мессенджер с звонками</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.2s, color 0.2s;
        }
        body.dark {
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
            color: #e5e7eb;
        }
        body.light {
            background: radial-gradient(circle at 20% 30%, #e0e7ff, #f0f4f8);
            color: #1f2937;
        }
        .messenger {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        body.dark .messenger { background: rgba(15, 25, 35, 0.4); backdrop-filter: blur(10px); }
        body.light .messenger { background: rgba(245, 245, 255, 0.6); backdrop-filter: blur(10px); }
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid;
        }
        body.dark .sidebar { background: rgba(30, 40, 50, 0.5); border-color: rgba(255,255,255,0.1); }
        body.light .sidebar { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.05); }
        .sidebar-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid;
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .theme-toggle, .profile-btn, .create-group-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            font-size: 20px;
        }
        .profile-btn {
            width: 48px;
            height: 48px;
            font-size: 32px;
        }
        .create-group-btn {
            font-size: 24px;
        }
        .call-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid;
        }
        .search-box input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            outline: none;
        }
        body.dark .search-box input { color: white; background: rgba(0,0,0,0.3); }
        body.light .search-box input { color: #1f2937; background: rgba(0,0,0,0.05); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        body.dark .chat-item:hover { background: rgba(255,255,255,0.1); }
        body.light .chat-item:hover { background: rgba(0,0,0,0.05); }
        .chat-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .verified-badge { font-size: 14px; color: #3b82f6; }
        .chat-lastmsg {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid;
        }
        body.dark .chat-header { background: rgba(30, 40, 50, 0.4); border-color: rgba(255,255,255,0.1); }
        body.light .chat-header { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.05); }
        .chat-header-avatar { font-size: 44px; cursor: pointer; }
        .chat-header-info { flex: 1; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 75%;
            position: relative;
        }
        .message-own { align-self: flex-end; flex-direction: row-reverse; }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            font-size: 15px;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body.dark .message-bubble { background: rgba(40,50,65,0.7); color: #f0f3f8; }
        body.light .message-bubble { background: rgba(255,255,255,0.8); color: #1f2937; }
        .message-own .message-bubble {
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 22px;
        }
        body.dark .message-own .message-bubble { background: linear-gradient(135deg, rgba(59,130,246,0.8), rgba(139,92,246,0.8)); }
        body.light .message-own .message-bubble { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .message-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 6px;
        }
        .file-attach {
            display: inline-block;
            margin-top: 6px;
            background: rgba(0,0,0,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        .message-image {
            max-width: 250px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 6px;
        }
        .input-area {
            padding: 16px 20px;
            display: flex;
            gap: 14px;
            border-top: 1px solid;
        }
        body.dark .input-area { background: rgba(30, 40, 50, 0.4); border-color: rgba(255,255,255,0.1); }
        body.light .input-area { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.05); }
        .input-wrapper {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            background: none;
            border: none;
            font-size: 15px;
            outline: none;
        }
        body.dark #messageInput { color: white; }
        body.light #messageInput { color: #1f2937; }
        .file-btn, .emoji-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            color: white;
        }
        .context-menu {
            position: fixed;
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 6px 0;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .context-menu div {
            padding: 10px 16px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }
        .context-menu div:hover { background: rgba(59,130,246,0.6); }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 16px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(30,40,50,0.95);
            border-radius: 32px;
            padding: 24px;
            width: 320px;
            text-align: center;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .emoji-option {
            font-size: 32px;
            cursor: pointer;
            text-align: center;
            padding: 6px;
            border-radius: 12px;
        }
        .emoji-option:hover { background: rgba(255,255,255,0.2); }
        .close-modal {
            background: #3b82f6;
            border: none;
            padding: 10px;
            border-radius: 28px;
            color: white;
            width: 100%;
            cursor: pointer;
        }
        .group-modal .modal-content {
            width: 400px;
        }
        .group-modal input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }
        .members-list {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .member-item input {
            width: auto;
            margin: 0;
        }
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: rgba(30,40,50,0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 460px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        body.light .auth-card {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .auth-card h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 56px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: rgba(255,255,255,0.7);
        }
        body.light .tab { color: rgba(0,0,0,0.6); }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }
        body.dark .input-group input { color: white; }
        body.light .input-group input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #1f2937; }
        .input-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        .error-text { color: #f87171; font-size: 13px; text-align: center; margin-top: -8px; }
        @media (max-width: 680px) {
            .sidebar { width: 80px; }
            .chat-info, .logo { display: none; }
            .chat-avatar { width: 48px; height: 48px; font-size: 26px; }
            .auth-card { width: 90%; padding: 32px 24px; }
        }

        /* Стили для звонков */
        .call-notification, .call-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 12px 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 5000;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .call-notification button, .call-controls button {
            background: #3b82f6;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .call-controls button.mute-btn {
            background: #6b7280;
        }
        .call-controls button.end-call {
            background: #ef4444;
        }
        .call-video {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 320px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            z-index: 5000;
            border: 2px solid #3b82f6;
        }
        .call-video video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body class="dark">
<div id="app"></div>
<script>
    // ---- Глобальные переменные ----
    let currentUser = null;
    let currentChat = null;
    let currentChatType = 'user';
    let messages = [];
    let chats = [];
    let groups = [];
    let channels = [];
    let allUsers = [];
    let searchQuery = '';
    let pollInterval = null;
    let searchTimeout = null;
    let peer = null;
    let currentCall = null;
    let localStream = null;
    let remoteStream = null;
    let pendingCall = null;      // { from, call }
    let activeCallNotification = false;

    // ---- Инициализация темы ----
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') document.body.classList.add('light');
        else document.body.classList.add('dark');
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    // ---- API вызовы ----
    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) {
            opts.body = data;
        }
        const res = await fetch(url, opts);
        return res.json();
    }

    // ---- Загрузка данных ----
    async function loadAllUsers() {
        const res = await api('GET', '/get-users');
        allUsers = res || [];
    }

    async function loadChatsAndChannels() {
        if (!currentUser) return;
        try {
            const userChats = await api('GET', `/get-chats/${currentUser.username}`);
            const channelList = await api('GET', '/get-channels');
            channels = channelList || [];
            const groupList = await api('GET', `/get-groups/${currentUser.username}`);
            groups = groupList || [];
            
            let all = [];
            channels.forEach(ch => {
                all.push({ type: 'channel', id: ch.id, name: ch.name, avatar: ch.avatar, lastMessage: ch.lastMessage || 'Нет сообщений', lastTime: ch.lastTime });
            });
            groups.forEach(g => {
                all.push({ type: 'group', id: g.id, name: g.name, avatar: g.avatar, lastMessage: g.lastMessage || 'Нет сообщений', lastTime: g.lastTime });
            });
            (userChats || []).forEach(uc => {
                all.push({ type: 'user', id: uc.username, name: uc.username, avatar: uc.avatar, online: uc.online, verified: uc.verified, lastMessage: uc.lastMessage || 'Нет сообщений', lastTime: uc.lastTime });
            });
            all.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
            chats = all;
            renderSidebar();
        } catch(e) { console.error(e); }
    }

    async function loadMessages() {
        if (!currentUser || !currentChat) return;
        try {
            let data;
            if (currentChatType === 'user') {
                data = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'channel') {
                data = await api('GET', `/get-channel-messages/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'group') {
                data = await api('GET', `/get-group-messages/${currentChat}`);
                messages = data || [];
            }
            renderMessages();
        } catch(e) { console.error(e); }
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if ((!text && !fileUrl)) return;
        try {
            if (currentChatType === 'user') {
                await api('POST', '/send-message', { from: currentUser.username, to: currentChat, text: text || '', fileUrl, fileName });
            } else if (currentChatType === 'channel') {
                await api('POST', '/send-channel-message', { channelId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
            } else if (currentChatType === 'group') {
                await api('POST', '/send-group-message', { groupId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
            }
            await loadMessages();
            await loadChatsAndChannels();
        } catch(e) { console.error(e); }
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        renderSidebar();
        const headerAvatar = document.querySelector('.chat-header-avatar');
        if (headerAvatar) headerAvatar.textContent = emoji;
    }

    async function deleteMessage(msgId) {
        if (currentChatType === 'user') await api('DELETE', `/delete-message/${msgId}`);
        else if (currentChatType === 'channel') await api('DELETE', `/delete-channel-message/${msgId}`);
        else if (currentChatType === 'group') await api('DELETE', `/delete-group-message/${msgId}`);
        await loadMessages();
        await loadChatsAndChannels();
    }

    async function createGroup(name, memberUsernames) {
        const res = await api('POST', '/create-group', { name, createdBy: currentUser.username, members: memberUsernames });
        if (res.success) {
            await loadChatsAndChannels();
            currentChat = res.groupId;
            currentChatType = 'group';
            await loadMessages();
            renderSidebar();
            renderChat();
        } else {
            alert('Ошибка создания группы');
        }
    }

    // ---- Звонки (PeerJS) ----
    function initPeer() {
        if (peer) return;
        const peerId = currentUser.username + '_' + Date.now();
        peer = new Peer(peerId, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        peer.on('call', async (call) => {
            // Если уже есть активный звонок или ожидающий, не беспокоим
            if (currentCall || pendingCall) {
                call.close();
                return;
            }
            const fromUsername = call.peer.split('_')[0];
            // Показываем встроенное уведомление о звонке
            showCallNotification(fromUsername, call);
        });
        peer.on('error', (err) => console.error('Peer error:', err));
    }

    function showCallNotification(fromUsername, call) {
        if (activeCallNotification) return;
        activeCallNotification = true;
        const notif = document.createElement('div');
        notif.className = 'call-notification';
        notif.id = 'callNotification';
        notif.innerHTML = `
            <span>📞 Входящий звонок от <strong>${escapeHtml(fromUsername)}</strong></span>
            <button id="acceptCallBtn">Принять</button>
            <button id="rejectCallBtn" style="background:#6b7280;">Отклонить</button>
        `;
        document.body.appendChild(notif);
        const acceptBtn = notif.querySelector('#acceptCallBtn');
        const rejectBtn = notif.querySelector('#rejectCallBtn');
        const handleAccept = async () => {
            notif.remove();
            activeCallNotification = false;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    remoteStream = remoteStream;
                    showCallUI(fromUsername, call, localStream, remoteStream);
                });
                currentCall = call;
                pendingCall = null;
            } catch(e) {
                console.error(e);
                alert('Не удалось получить доступ к микрофону');
                call.close();
            }
        };
        const handleReject = () => {
            notif.remove();
            activeCallNotification = false;
            call.close();
            pendingCall = null;
        };
        acceptBtn.onclick = handleAccept;
        rejectBtn.onclick = handleReject;
        pendingCall = { from: fromUsername, call };
    }

    function startCall(targetUsername) {
        if (!peer) initPeer();
        if (currentCall) {
            alert('У вас уже активен звонок');
            return;
        }
        // Сначала запрашиваем микрофон, чтобы потом передать в call
        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                localStream = stream;
                // Отправляем системное сообщение с нашим peerId
                const callMessage = `__CALL__${peer.id}`;
                sendMessage(callMessage, null, null).then(() => {
                    alert('Запрос звонка отправлен. Ожидайте ответа...');
                    // Через некоторое время, если нет ответа, очищаем стрим
                    setTimeout(() => {
                        if (!currentCall && localStream) {
                            localStream.getTracks().forEach(t => t.stop());
                            localStream = null;
                        }
                    }, 30000);
                });
            })
            .catch(e => {
                alert('Не удалось получить доступ к микрофону');
                console.error(e);
            });
    }

    function showCallUI(partnerName, call, localStream, remoteStream) {
        // Удаляем старый UI, если есть
        const oldUI = document.getElementById('callControls');
        if (oldUI) oldUI.remove();
        const oldVideo = document.getElementById('remoteVideoDiv');
        if (oldVideo) oldVideo.remove();

        const controls = document.createElement('div');
        controls.id = 'callControls';
        controls.className = 'call-controls';
        controls.innerHTML = `
            <span>🔊 Звонок с ${escapeHtml(partnerName)}</span>
            <button class="mute-btn" id="muteMicrophoneBtn">🔇 Выкл. микро</button>
            <button class="end-call" id="endCallBtn">📞 Завершить</button>
        `;
        document.body.appendChild(controls);

        let muted = false;
        const muteBtn = controls.querySelector('#muteMicrophoneBtn');
        muteBtn.onclick = () => {
            if (localStream) {
                muted = !muted;
                localStream.getAudioTracks().forEach(track => track.enabled = !muted);
                muteBtn.textContent = muted ? '🔊 Вкл. микро' : '🔇 Выкл. микро';
            }
        };
        const endBtn = controls.querySelector('#endCallBtn');
        endBtn.onclick = () => {
            if (call) call.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (remoteStream) remoteStream.getTracks().forEach(t => t.stop());
            controls.remove();
            const vid = document.getElementById('remoteVideoDiv');
            if (vid) vid.remove();
            currentCall = null;
            localStream = null;
            remoteStream = null;
        };
        // Если есть видео (в будущем), можно добавить
        if (remoteStream) {
            const videoDiv = document.createElement('div');
            videoDiv.id = 'remoteVideoDiv';
            videoDiv.className = 'call-video';
            const video = document.createElement('video');
            video.srcObject = remoteStream;
            video.autoplay = true;
            videoDiv.appendChild(video);
            document.body.appendChild(videoDiv);
        }
    }

    // Обработка системных сообщений звонка (только один раз)
    let processedCallMessages = new Set();
    function handleIncomingCallMessage(msg) {
        if (msg.text && msg.text.startsWith('__CALL__') && msg.from !== currentUser.username) {
            const callId = msg.text;
            if (processedCallMessages.has(callId)) return;
            processedCallMessages.add(callId);
            const callerPeerId = msg.text.substring(9);
            // Инициируем звонок со стороны получателя
            if (!peer) initPeer();
            // Небольшая задержка, чтобы убедиться, что peer готов
            setTimeout(() => {
                if (currentCall || pendingCall) return;
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(stream => {
                        localStream = stream;
                        const call = peer.call(callerPeerId, stream);
                        call.on('stream', (remoteStream) => {
                            showCallUI(msg.from, call, localStream, remoteStream);
                        });
                        currentCall = call;
                        // Показываем уведомление о начале звонка (можно не показывать, т.к. идёт сразу)
                    })
                    .catch(e => {
                        console.error(e);
                        alert('Не удалось получить доступ к микрофону для ответа на звонок');
                    });
            }, 1000);
        }
    }

    // ---- Рендер интерфейса ----
    function renderSidebar() {
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        let filtered = chats.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
        let html = `
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <div class="header-buttons">
                    <button class="create-group-btn" id="createGroupBtn">👥+</button>
                    <button class="theme-toggle" id="themeToggle">🌓</button>
                    <button class="profile-btn" id="profileBtn">${currentUser.avatar}</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск" value="${escapeHtml(searchQuery)}">
            </div>
            <div class="chats-list" id="chatsList">
        `;
        filtered.forEach(chat => {
            const activeClass = (currentChat === chat.id && currentChatType === chat.type) ? 'active' : '';
            let nameHtml = escapeHtml(chat.name);
            if (chat.type === 'user' && chat.verified) nameHtml += ' <span class="verified-badge">✓</span>';
            if (chat.type === 'user' && chat.online) nameHtml += ' <span class="online-dot"></span>';
            html += `<div class="chat-item ${activeClass}" data-type="${chat.type}" data-id="${chat.id}">
                        <div class="chat-avatar">${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameHtml}</div>
                            <div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div>
                        </div>
                    </div>`;
        });
        html += `</div>`;
        sidebarDiv.innerHTML = html;

        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                const newType = el.dataset.type;
                const newId = el.dataset.id;
                if (!newId) return;
                currentChatType = newType;
                currentChat = newId;
                messages = [];
                renderChat();
                loadMessages();
                renderSidebar();
            });
        });

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                if (searchTimeout) clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => { searchQuery = e.target.value; renderSidebar(); }, 300);
            });
        }
        const profileBtn = document.getElementById('profileBtn');
        if (profileBtn) profileBtn.onclick = () => { document.getElementById('avatarModal').style.display = 'flex'; };
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) themeBtn.onclick = toggleTheme;
        const createGroupBtn = document.getElementById('createGroupBtn');
        if (createGroupBtn) createGroupBtn.onclick = showCreateGroupModal;
    }

    function renderMessages() {
        const container = document.getElementById('messagesList');
        if (!container) return;
        if (!currentChat) {
            container.innerHTML = `<div style="text-align:center; opacity:0.5; padding:20px;">Выберите чат</div>`;
            return;
        }
        if (!messages || messages.length === 0) {
            container.innerHTML = `<div style="text-align:center; opacity:0.5; padding:20px;">Нет сообщений. Напишите первое!</div>`;
            return;
        }
        let html = '';
        messages.forEach(msg => {
            const isOwn = msg.from_user === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let content = '';
            if (msg.file_url && isImageFile(msg.file_name)) {
                content += `<img src="${msg.file_url}" class="message-image" data-url="${msg.file_url}">`;
            } else if (msg.file_url) {
                content += `<a href="${msg.file_url}" download class="file-attach" data-url="${msg.file_url}">📎 ${escapeHtml(msg.file_name || 'Файл')}</a>`;
            }
            if (msg.text) {
                if (msg.text.startsWith('__CALL__')) {
                    content += `<div class="message-text" style="opacity:0.6;">🔔 Запрос звонка</div>`;
                } else {
                    content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
                }
            }
            let senderName = '';
            if (currentChatType === 'group' && !isOwn) {
                senderName = `<div class="message-sender">${escapeHtml(msg.from_user)}</div>`;
            }
            html += `<div class="message ${isOwn ? 'message-own' : ''}" data-msg-id="${msg.id}" data-msg-from="${msg.from_user}" data-file-url="${msg.file_url || ''}">
                        <div class="message-bubble">
                            ${senderName}
                            ${content}
                            <div class="message-time">${time}</div>
                        </div>
                    </div>`;
            // Обработка входящего вызова
            if (msg.text && msg.text.startsWith('__CALL__') && !isOwn) {
                handleIncomingCallMessage({ from: msg.from_user, text: msg.text });
            }
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.message-image').forEach(img => {
            img.addEventListener('click', (e) => { e.stopPropagation(); showLightbox(img.src); });
        });
        document.querySelectorAll('.message').forEach(msgEl => {
            msgEl.addEventListener('contextmenu', (e) => {
                const msgId = msgEl.dataset.msgId;
                const msgFrom = msgEl.dataset.msgFrom;
                const fileUrl = msgEl.dataset.fileUrl;
                const isOwn = msgFrom === currentUser.username;
                const items = [];
                if (fileUrl) items.push({ label: '📥 Скачать файл', action: () => window.open(fileUrl, '_blank') });
                if (isOwn) items.push({ label: '🗑 Удалить сообщение', action: () => deleteMessage(msgId) });
                if (items.length) showContextMenu(e, items);
            });
        });
        container.scrollTop = container.scrollHeight;
    }

    function renderChat() {
        const mainDiv = document.getElementById('chatMain');
        if (!mainDiv) return;
        if (!currentChat) {
            mainDiv.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; opacity:0.6;">✨ Выберите чат ✨</div>`;
            return;
        }
        let chatInfo = { name: currentChat, avatar: '💬' };
        if (currentChatType === 'user') {
            const found = chats.find(c => c.type === 'user' && c.id === currentChat);
            if (found) chatInfo = found;
        } else if (currentChatType === 'channel') {
            const found = chats.find(c => c.type === 'channel' && c.id === currentChat);
            if (found) chatInfo = found;
        } else if (currentChatType === 'group') {
            const found = chats.find(c => c.type === 'group' && c.id === currentChat);
            if (found) chatInfo = found;
        }
        const callButtonHtml = (currentChatType === 'user') ? `<button class="call-btn" id="callBtn">📞</button>` : '';
        mainDiv.innerHTML = `
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-avatar" id="chatHeaderAvatar">${chatInfo.avatar}</div>
                <div class="chat-header-info"><h3>${escapeHtml(chatInfo.name)}</h3></div>
                ${callButtonHtml}
            </div>
            <div class="messages-area" id="messagesList"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <label class="file-btn" id="fileLabel">📎</label>
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div id="emojiPicker" class="emoji-picker" style="display:none; position:absolute; bottom:70px; left:20px; background:rgba(30,40,50,0.95); backdrop-filter:blur(20px); border-radius:20px; padding:12px; width:280px; z-index:1500; border:1px solid rgba(255,255,255,0.2);">
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
        `;
        
        renderMessages();
        
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileLabel = document.getElementById('fileLabel');
        const fileInput = document.getElementById('fileInput');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const emojiGrid = document.getElementById('emojiGrid');
        const callBtn = document.getElementById('callBtn');
        
        if (callBtn) {
            callBtn.onclick = () => {
                if (currentChat && currentChatType === 'user') {
                    startCall(currentChat);
                }
            };
        }
        
        if (emojiGrid && emojiGrid.children.length === 0) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉','😍','🤔','😂','🥲','😭','😡','🥺','🤯','💀','👾','🎈','🍕','⚽','🎵','📷','🔒'];
            emojis.forEach(e => {
                const div = document.createElement('div');
                div.className = 'emoji-option';
                div.textContent = e;
                div.onclick = () => {
                    msgInput.value += e;
                    msgInput.focus();
                    emojiPicker.style.display = 'none';
                };
                emojiGrid.appendChild(div);
            });
        }
        emojiBtn.onclick = (e) => {
            e.stopPropagation();
            emojiPicker.style.display = emojiPicker.style.display === 'flex' ? 'none' : 'flex';
        };
        document.addEventListener('click', (e) => {
            if (emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.style.display = 'none';
        });
        
        const send = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                const up = await uploadFile(file);
                if (up.success) {
                    await sendMessage(text, up.fileUrl, up.fileName);
                    fileInput.value = '';
                }
            } else if (text) {
                await sendMessage(text);
            }
            msgInput.value = '';
            msgInput.focus();
        };
        
        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => send();
        msgInput.focus();
    }

    // ---- Модалка аватара (исправленная) ----
    function showAvatarModal() {
        const modal = document.getElementById('avatarModal');
        if (!modal) return;
        modal.style.display = 'flex';
        const grid = document.getElementById('avatarEmojiGrid');
        if (grid && grid.children.length === 0) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉'];
            emojis.forEach(e => {
                const div = document.createElement('div');
                div.className = 'emoji-option';
                div.textContent = e;
                div.style.fontSize = '32px';
                div.style.cursor = 'pointer';
                div.onclick = () => { updateAvatar(e); modal.style.display = 'none'; };
                grid.appendChild(div);
            });
            const closeBtn = document.getElementById('closeAvatarModal');
            if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
        }
    }

    function showCreateGroupModal() {
        const modal = document.getElementById('groupModal');
        if (!modal) return;
        modal.style.display = 'flex';
        const membersContainer = document.getElementById('groupMembersList');
        if (membersContainer && membersContainer.children.length === 0 && allUsers.length) {
            allUsers.forEach(u => {
                if (u.username !== currentUser.username) {
                    const div = document.createElement('div');
                    div.className = 'member-item';
                    div.innerHTML = `<input type="checkbox" value="${u.username}" id="member_${u.username}"> <label for="member_${u.username}">${escapeHtml(u.username)}</label>`;
                    membersContainer.appendChild(div);
                }
            });
        }
        const createBtn = document.getElementById('confirmCreateGroup');
        const cancelBtn = document.getElementById('cancelCreateGroup');
        const groupNameInput = document.getElementById('groupNameInput');
        const newCreateHandler = async () => {
            const name = groupNameInput.value.trim();
            if (!name) { alert('Введите название группы'); return; }
            const selected = [];
            document.querySelectorAll('#groupMembersList input:checked').forEach(cb => selected.push(cb.value));
            await createGroup(name, selected);
            modal.style.display = 'none';
            groupNameInput.value = '';
            document.querySelectorAll('#groupMembersList input').forEach(cb => cb.checked = false);
            createBtn.removeEventListener('click', newCreateHandler);
            cancelBtn.removeEventListener('click', cancelHandler);
        };
        const cancelHandler = () => {
            modal.style.display = 'none';
            groupNameInput.value = '';
            document.querySelectorAll('#groupMembersList input').forEach(cb => cb.checked = false);
            createBtn.removeEventListener('click', newCreateHandler);
            cancelBtn.removeEventListener('click', cancelHandler);
        };
        createBtn.addEventListener('click', newCreateHandler);
        cancelBtn.addEventListener('click', cancelHandler);
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2>DanuMes</h2>
                    <div class="tabs">
                        <div class="tab active" id="loginTab">Вход</div>
                        <div class="tab" id="regTab">Регистрация</div>
                    </div>
                    <div id="loginPanel" class="auth-form">
                        <div class="input-group"><input type="text" id="loginUsername" placeholder="Логин"></div>
                        <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
                        <div id="loginError" class="error-text"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="regPanel" class="auth-form" style="display:none;">
                        <div class="input-group"><input type="text" id="regUsername" placeholder="Логин"></div>
                        <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
                        <div id="regError" class="error-text"></div>
                        <button id="doReg" class="auth-btn">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'flex';
            document.getElementById('regPanel').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('regTab').classList.remove('active');
        };
        document.getElementById('regTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('regPanel').style.display = 'flex';
            document.getElementById('regTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        };
        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
                await loadAllUsers();
                await loadChatsAndChannels();
                startMessenger();
            } else {
                document.getElementById('loginError').innerText = res.error;
            }
        };
        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) {
                alert('Регистрация успешна! Теперь войдите.');
                document.getElementById('loginTab').click();
            } else {
                document.getElementById('regError').innerText = res.error;
            }
        };
    }

    function startMessenger() {
        document.getElementById('app').innerHTML = `
            <div class="messenger">
                <div class="sidebar" id="sidebar"></div>
                <div class="chat-main" id="chatMain"></div>
            </div>
            <div id="avatarModal" class="modal">
                <div class="modal-content">
                    <h3 style="color:white; margin-bottom:16px;">Выбери аватар</h3>
                    <div class="emoji-grid" id="avatarEmojiGrid" style="display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:20px;"></div>
                    <button id="closeAvatarModal" class="close-modal">Закрыть</button>
                </div>
            </div>
            <div id="groupModal" class="modal group-modal">
                <div class="modal-content">
                    <h3 style="color:white; margin-bottom:16px;">Создать группу</h3>
                    <input type="text" id="groupNameInput" placeholder="Название группы">
                    <div class="members-list" id="groupMembersList"></div>
                    <button id="confirmCreateGroup" class="close-modal" style="margin-bottom:8px;">Создать</button>
                    <button id="cancelCreateGroup" class="close-modal" style="background:#6b7280;">Отмена</button>
                </div>
            </div>
        `;
        renderSidebar();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => {
            if (currentChat) loadMessages();
            loadChatsAndChannels();
            loadAllUsers();
        }, 3000);
        setTimeout(() => {
            const profileBtn = document.getElementById('profileBtn');
            if (profileBtn) profileBtn.onclick = showAvatarModal;
        }, 100);
        initPeer();
    }

    // Вспомогательные функции
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function isImageFile(fileName) { return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(fileName); }

    let activeMenu = null;
    function showContextMenu(e, items) {
        if (activeMenu) activeMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        items.forEach(item => {
            const option = document.createElement('div');
            option.textContent = item.label;
            option.onclick = (ev) => { ev.stopPropagation(); item.action(); menu.remove(); activeMenu = null; };
            menu.appendChild(option);
        });
        document.body.appendChild(menu);
        let left = e.clientX, top = e.clientY;
        if (left + menu.offsetWidth > window.innerWidth) left = window.innerWidth - menu.offsetWidth - 10;
        if (top + menu.offsetHeight > window.innerHeight) top = window.innerHeight - menu.offsetHeight - 10;
        menu.style.left = left + 'px';
        menu.style.top = top + 'px';
        activeMenu = menu;
        const closeMenu = () => { if(activeMenu) activeMenu.remove(); activeMenu = null; document.removeEventListener('click', closeMenu); };
        setTimeout(() => document.addEventListener('click', closeMenu), 10);
        e.preventDefault();
    }

    function showLightbox(url) {
        let lb = document.getElementById('lightbox');
        if (!lb) {
            lb = document.createElement('div');
            lb.id = 'lightbox';
            lb.className = 'lightbox';
            lb.innerHTML = '<img src="">';
            lb.onclick = () => lb.style.display = 'none';
            document.body.appendChild(lb);
        }
        lb.style.display = 'flex';
        lb.querySelector('img').src = url;
    }

    initTheme();
    renderAuth();
</script>
