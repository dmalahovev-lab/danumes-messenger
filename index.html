<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — тест входа</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: rgba(30,40,50,0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 460px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .auth-card h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 56px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: rgba(255,255,255,0.7);
        }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            color: #e5e7eb;
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .error-text { color: #f87171; font-size: 13px; text-align: center; margin-top: -8px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 5000;
            animation: fadeInOut 3s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    let currentUser = null;

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        }
        const res = await fetch(url, opts);
        return res.json();
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-card">
                <h2>DanuMes</h2>
                <div class="tabs">
                    <div class="tab active" id="loginTab">Вход</div>
                    <div class="tab" id="regTab">Регистрация</div>
                </div>
                <div id="loginPanel" class="auth-form">
                    <div class="input-group"><input type="text" id="loginUsername" placeholder="Логин"></div>
                    <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
                    <div id="loginError" class="error-text"></div>
                    <button id="doLogin" class="auth-btn">Войти</button>
                </div>
                <div id="regPanel" class="auth-form" style="display:none;">
                    <div class="input-group"><input type="text" id="regUsername" placeholder="Логин"></div>
                    <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
                    <div id="regError" class="error-text"></div>
                    <button id="doReg" class="auth-btn">Зарегистрироваться</button>
                </div>
            </div>
        `;

        const loginTab = document.getElementById('loginTab');
        const regTab = document.getElementById('regTab');
        const loginPanel = document.getElementById('loginPanel');
        const regPanel = document.getElementById('regPanel');
        loginTab.onclick = () => {
            loginPanel.style.display = 'flex';
            regPanel.style.display = 'none';
            loginTab.classList.add('active');
            regTab.classList.remove('active');
        };
        regTab.onclick = () => {
            loginPanel.style.display = 'none';
            regPanel.style.display = 'flex';
            regTab.classList.add('active');
            loginTab.classList.remove('active');
        };

        // КНОПКА ВОЙТИ
        const doLogin = document.getElementById('doLogin');
        doLogin.onclick = async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
                showToast(`Добро пожаловать, ${username}!`);
                // После входа можно запустить полноценный мессенджер, но для теста просто покажем приветствие
                document.getElementById('app').innerHTML = `<div style="text-align:center; padding:40px;"><h2>Вы вошли как ${username}</h2><button id="logoutBtn">Выйти</button></div>`;
                document.getElementById('logoutBtn').onclick = () => {
                    currentUser = null;
                    renderAuth();
                };
            } else {
                document.getElementById('loginError').innerText = res.error;
            }
        };

        // КНОПКА РЕГИСТРАЦИИ
        const doReg = document.getElementById('doReg');
        doReg.onclick = async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) {
                showToast('Регистрация успешна! Теперь войдите.');
                loginTab.click();
            } else {
                document.getElementById('regError').innerText = res.error;
            }
        };
    }

    renderAuth();
</script>
</body>
</html>v
