<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danumes</title>
    <style>
        :root { --bg: #121212; --p-bg: #1e1e1e; --p-brd: #333; --txt: #fff; --gray: #aaa; --purp: #b388ff; --in-bg: #2a2a2a; }
        body { background-color: var(--bg); color: var(--txt); font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #auth-container { background: linear-gradient(145deg, #1e1e1e, #252525); padding: 40px; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 360px; }
        .auth-title { font-size: 24px; font-weight: bold; color: var(--purp); margin-bottom: 25px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 5px; background-color: var(--in-bg); color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        .auth-input:focus { border-color: var(--purp); }
        .auth-btn { width: 100%; padding: 12px; background-color: var(--purp); border: none; border-radius: 5px; color: #121212; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; margin-bottom: 15px; }
        .auth-btn:hover { background-color: #9575cd; }
        .auth-switch { color: var(--gray); font-size: 14px; cursor: pointer; text-decoration: underline; }
        #app-container { display: none; width: 100%; height: 100vh; padding: 24px; }
        .messenger-layout { display: flex; width: 100%; height: 100%; gap: 20px; }
        .sidebar { width: 320px; background: var(--p-bg); border-radius: 12px; border: 1px solid var(--p-brd); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .sidebar-header { padding: 20px 15px 10px 15px; }
        .sidebar-actions { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn-sm { flex: 1; padding: 6px; background: #2a2a2a; border: none; border-radius: 5px; color: #fff; cursor: pointer; font-size: 12px; }
        .search-bar { width: 100%; padding: 10px 12px; background-color: var(--in-bg); border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 14px; outline: none; }
        .chat-list { flex: 1; overflow-y: auto; padding: 5px; }
        .chat-item { padding: 14px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .chat-item:hover, .chat-item.active { background: rgba(179,136,255,0.1); }
        .chat-item-info { flex: 1; min-width: 0; }
        .chat-item-title { font-weight: bold; font-size: 15px; display: flex; align-items: center; justify-content: space-between; }
        .chat-item-sub { font-size: 12px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-window { flex: 1; background: var(--p-bg); border-radius: 12px; border: 1px solid var(--p-brd); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .chat-header { height: 65px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--p-brd); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #2a2a2a; color: var(--purp); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; object-fit: cover; border: 1px solid rgba(179,136,255,0.2); }
        .status-dot { font-size: 13px; color: #2ecc71; margin-top: 2px; }
        .call-icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #ff457d; }
        .chat-messages { flex: 1; overflow-y: scroll; padding: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .message { max-width: 45%; padding: 10px 14px; border-radius: 12px; word-wrap: break-word; font-size: 15px; line-height: 1.4; position: relative; }
        .message.incoming { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.outgoing { background: #3c1e6d; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .tick { font-size: 11px; color: var(--purp); margin-left: 5px; }
        .input-panel { position: absolute; bottom: 15px; left: 15px; right: 15px; height: 60px; background: #141220; border-radius: 30px; padding: 0 10px 0 15px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--p-brd); z-index: 10; }
        .img-btn-wrapper { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; background: rgba(179,136,255,0.1); cursor: pointer; }
        .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--purp); }
        .message-input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }
        .submit-btn { background: linear-gradient(90deg, #46145e, #290b40); border: none; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .badge-admin { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: #a855f7; color: #fff; font-size: 10px; font-weight: bold; border-radius: 50%; margin-left: 4px; box-shadow: 0 0 6px #a855f7; }
        #custom-context-menu { display: none; position: absolute; z-index: 1000; background: #1c192e; border: 1px solid #3c1e6d; border-radius: 5px; padding: 4px 0; min-width: 140px; }
        #ctx-delete-btn { width: 100%; text-align: left; background: none; border: none; color: #ff4d4d; padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: bold; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: #1c192e; color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 13px; border-left: 4px solid var(--purp); }
        #call-modal, #profile-overlay, #group-create-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #131124; padding: 30px; border-radius: 16px; width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--p-brd); }
        .call-actions-grid { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .call-btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .btn-accept { background: #2ecc71; color: white; } .btn-reject { background: #e74c3c; color: white; } .btn-mute { background: #34495e; color: white; } .btn-mute.active { background: #e67e22; }
        .group-user-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; text-align: left; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="auth-container">
        <div class="auth-title" id="auth-header-text">Вход в DanuMes</div>
        <input type="text" id="username" class="auth-input" placeholder="Имя пользователя">
        <input type="password" id="password" class="auth-input" placeholder="Пароль">
        <button id="main-auth-btn" class="auth-btn">Войти</button>
        <div id="auth-toggle" class="auth-switch">Нет аккаунта? Создать</div>
    </div>
    <div id="app-container">
        <div class="messenger-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Danumes</h2><div class="sidebar-sub">Danumes Платформа</div>
                    <input type="text" id="search" class="search-bar" placeholder="Поиск людей...">
                    <div class="sidebar-actions">
                        <button class="action-btn-sm" id="open-group-modal-btn">👥 Группа</button>
                        <button class="action-btn-sm" id="open-profile-btn">⚙️ Профиль</button>
                    </div>
                </div>
                <div class="chat-list" id="chats"></div>
            </div>
            <div class="chat-window">
                <div class="chat-header">
                    <div class="user-info">
                        <div class="avatar" id="header-avatar">?</div>
                        <div>
                            <h3 id="current-chat-title">Выберите чат</h3>
                            <div class="status-dot" id="header-status" style="display:none;">● Онлайн <span id="typing-indicator" style="color:var(--purp); margin-left:4px; display:none; font-size:12px;">(печатает...)</span></div>
                        </div>
                    </div>
                    <button id="call-btn" class="call-icon-btn" style="display: none;">📞</button>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="input-panel">
                    <div class="img-btn-wrapper" id="img-btn"><button class="icon-btn">📎</button></div>
                    <input type="file" id="file-input" accept="image/*" style="display:none;">
                    <input type="text" class="message-input" id="msg-input" placeholder="Написать сообщение...">
                    <button class="submit-btn" id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>
    <div id="custom-context-menu"><button id="ctx-delete-btn">🗑️ Удалить</button></div>
    <div id="toast-container"></div>
    <div id="call-modal">
        <div class="modal-content">
            <div style="font-size: 45px; margin-bottom: 12px;">📞</div>
            <h3 id="call-status-title" style="color:#fff; font-size:18px;">Входящий вызов</h3>
            <p id="caller-name" style="color:var(--gray); font-size:15px; margin-top:5px;"></p>
            <div class="call-actions-grid">
                <button id="accept-call-btn" class="call-btn-round btn-accept">✔</button>
                <button id="mute-call-btn" class="call-btn-round btn-mute" style="display:none;">🎙</button>
                <button id="reject-call-btn" class="call-btn-round btn-reject">✖</button>
            </div>
        </div>
    </div>
    <div id="profile-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Настройки профиля</h3>
            <div style="display:flex; justify-content:center; margin-bottom:15px;"><img id="profile-avatar-preview" class="avatar" style="width:70px; height:70px; font-size:28px;" src="" alt="?"></div>
            <button class="auth-btn" id="upload-avatar-trigger" style="margin:5px 0; padding:10px;">Выбрать фото профиля</button>
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
            <button class="auth-btn" id="close-profile-btn" style="background:#444; margin-top:10px; padding:10px; color:#fff;">Закрыть</button>
        </div>
    </div>
    <div id="group-create-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Создать группу</h3>
            <input type="text" id="group-name-input" class="auth-input" placeholder="Название группы" style="margin-top:0;">
            <div id="group-users-selection" style="max-height:160px; overflow-y:auto; margin:15px 0; padding:5px; background:#1e1e1e; border-radius:5px;"></div>
            <button class="auth-btn" id="submit-create-group" style="margin:5px 0; padding:10px;">Создать группу</button>
            <button class="auth-btn" id="close-group-modal" style="background:#444; margin-top:5px; padding:10px; color:#fff;">Отмена</button>
        </div>
    </div>
    <audio id="remote-audio" autoplay></audio>
    <script>
        let socket = null, currentUser = null, activeChat = { type: null, id: null };
        let isSelectionForRegister = false, selectedMessageId = null, cachedUsersList = [], cachedGroupsList = [];
        let localStream = null, peerConnection = null, currentCallSession = null, ringtoneInterval = null;
        let isMuted = false, typingTimeout = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:://google.com' }] };

        function showToast(t) { const c = document.getElementById('toast-container'); const tr = document.createElement('div'); tr.className = 'toast'; tr.innerText = t; c.appendChild(tr); setTimeout(() => tr.remove(), 4000); }
        function playRingtone() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); ringtoneInterval = setInterval(() => { let o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(440, ctx.currentTime); g.gain.setValueAtTime(0.2, ctx.currentTime); o.start(); o.stop(ctx.currentTime + 0.3); }, 1000); } catch(e){} }
        function stopRingtone() { clearInterval(ringtoneInterval); }

        document.getElementById('auth-toggle').addEventListener('click', () => {
            isSelectionForRegister = !isSelectionForRegister;
            document.getElementById('auth-header-text').innerText = isSelectionForRegister ? 'Регистрация в DanuMes' : 'Вход в DanuMes';
            document.getElementById('main-auth-btn').innerText = isSelectionForRegister ? 'Создать аккаунт' : 'Войти';
            document.getElementById('auth-toggle').innerText = isSelectionForRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать';
        });

        document.getElementById('main-auth-btn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return showToast('Заполните все поля');
            const targetUrl = isSelectionForRegister ? '/api/register' : '/api/login';
            try {
                const response = await fetch(targetUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user, pass }) });
                if (response.ok) {
                    currentUser = { username: user };
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    initSocketChannels();
                } else { const d = await response.json(); showToast(d.message || 'Ошибка авторизации'); }
            } catch (err) { showToast('Ошибка подключения.'); }
        });

        function initSocketChannels() {
            socket = io({ transports: ['websocket'], upgrade: false });
            socket.on('connect', () => { socket.emit('register_user', currentUser.username); });
            socket.on('auth_success_data', (data) => { if(data.avatar) { document.getElementById('profile-avatar-preview').src = data.avatar; } });
            socket.on('update_users', (users) => { cachedUsersList = users; renderMasterSidebar(); });
            socket.on('update_groups', (groups) => { cachedGroupsList = groups; renderMasterSidebar(); });
            socket.on('messages_history', (messages) => { const box = document.getElementById('chat-messages'); box.innerHTML = ''; messages.forEach(renderSingleMessage); box.scrollTop = box.scrollHeight; if(activeChat.type==='private') socket.emit('mark_as_read', { chatWith: activeChat.id }); });
            socket.on('new_msg', (msg) => {
                if ((activeChat.type === msg.type && (activeChat.id === msg.to || activeChat.id === msg.author)) || (msg.type === 'group' && activeChat.type === 'group' && activeChat.id === msg.to) || (msg.type === 'news' && activeChat.id === 'danumes_news')) {
                    renderSingleMessage(msg); document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                    if(activeChat.type==='private' && msg.author !== currentUser.username) socket.emit('mark_as_read', { chatWith: activeChat.id });
                }
            });
            socket.on('msg_deleted', (messageId) => { const el = document.querySelector(`[data-id="${messageId}"]`); if (el) el.remove(); });
            socket.on('chat_read_by_recipient', (data) => { if(activeChat.type==='private' && activeChat.id === data.readBy) { document.querySelectorAll('.message.outgoing .tick').forEach(t => t.innerText = '✓✓'); } });
            socket.on('user_typing_broadcast', (data) => { if(activeChat.type==='private' && activeChat.id === data.from) { document.getElementById('typing-indicator').style.display = data.isTyping ? 'inline' : 'none'; } });
            
            socket.on('call_incoming', (data) => { currentCallSession = data; document.getElementById('call-status-title').innerText = "Входящий вызов"; document.getElementById('caller-name').innerText = `Звонит ${data.from}`; document.getElementById('accept-call-btn').style.display = 'flex'; document.getElementById('mute-call-btn').style.display = 'none'; document.getElementById('call-modal').style.display = 'flex'; playRingtone(); });
            socket.on('start_handshake', async (data) => {
                peerConnection = new RTCPeerConnection(rtcConfig); localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams; };
                peerConnection.onicecandidate = (e) => { if (e.candidate) socket.emit('ice_candidate', { to: data.from, candidate: e.candidate }); };
                const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer); socket.emit('rtc_offer', { to: data.from, offer: offer });
            });
            socket.on('receive_offer', async (data) => {
                if(!peerConnection) { peerConnection = new RTCPeerConnection(rtcConfig); localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream)); peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams; }; peerConnection.onicecandidate = (e) => { if (e.candidate) socket.emit('ice_candidate', { to: data.from, candidate: e.candidate }); }; }
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer)); const ans = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(ans); socket.emit('rtc_answer', { to: data.from, answer: ans });
            });
            socket.on('receive_answer', async (data) => { if(peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); });
            socket.on('receive_ice', async (data) => { if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); });
            socket.on('call_ended', endCallUI);
        }

        function renderMasterSidebar() {
            const container = document.getElementById('chats'); container.innerHTML = '';
            
            const news = document.createElement('div'); news.className = 'chat-item' + (activeChat.id==='danumes_news'?' active':'');
            news.innerHTML = `<div class="avatar">📢</div><div class="chat-item-info"><div class="chat-item-title">Danumes News</div><div class="chat-item-sub">Официальный канал</div></div>`;
            news.onclick = () => selectChat('news', 'danumes_news', 'Danumes News', '📢');
            container.appendChild(news);

            cachedGroupsList.forEach(g => {
                const div = document.createElement('div'); div.className = 'chat-item' + (activeChat.id===g.id?' active':'');
                div.innerHTML = `<div class="avatar">👥</div><div class="chat-item-info"><div class="chat-item-title">${g.name}</div><div class="chat-item-sub">Групповой чат</div></div>`;
                div.onclick = () => selectChat('group', g.id, g.name, '👥');
                container.appendChild(div);
            });

            cachedUsersList.forEach(u => {
                if (u.username !== currentUser.username) {
                    const div = document.createElement('div'); div.className = 'chat-item' + (activeChat.id===u.username?' active':'');
                    let badge = u.username === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
                    let av = u.avatar ? `<img src="${u.avatar}" class="avatar">` : `<div class="avatar">${u.username.charAt(0).toUpperCase()}</div>`;
                    div.innerHTML = `${av}<div class="chat-item-info"><div class="chat-item-title">${u.username}${badge}</div><div class="chat-item-sub">Нажмите для общения</div></div>`;
                    div.onclick = () => selectChat('private', u.username, u.username, av);
                    container.appendChild(div);
                }
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filteredUsers = cachedUsersList.filter(u => u.username.toLowerCase().includes(query));
            const container = document.getElementById('chats');
            container.querySelectorAll('.chat-item').forEach((item, idx) => { if(idx > 0 && !item.innerHTML.includes('👥')) item.style.display = 'none'; });
            renderSidebarListFiltered(filteredUsers);
        });

        function renderSidebarListFiltered(users) {
            const container = document.getElementById('chats');
            users.forEach(u => {
                if (u.username !== currentUser.username) {
                    let item = Array.from(container.children).find(c => c.innerHTML.includes(u.username));
                    if(item) item.style.display = 'flex';
                }
            });
        }

        function selectChat(type, id, title, avatarHTML) {
            activeChat = { type, id }; document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            let currentItem = Array.from(document.getElementById('chats').children).find(c => c.innerHTML.includes(title));
            if(currentItem) currentItem.classList.add('active');

            let badge = id === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
            document.getElementById('current-chat-title').innerHTML = title + badge;
            
            const headerAvatar = document.getElementById('header-avatar');
            if(avatarHTML.includes('img')) headerAvatar.outerHTML = avatarHTML.replace('class="avatar"', 'id="header-avatar" class="avatar"');
            else { headerAvatar.outerHTML = `<div id="header-avatar" class="avatar">${title.charAt(0).toUpperCase()}</div>`; }

            document.getElementById('header-status').style.display = type === 'private' ? 'block' : 'none';
            document.getElementById('typing-indicator').style.display = 'none';
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('call-btn').style.display = (type === 'private' && id !== 'danumes_news') ? 'inline-block' : 'none';
            if (socket) { socket.emit('load_messages', { type, id }); if(type==='private') socket.emit('mark_as_read', { chatWith: id }); }
        }

        function renderSingleMessage(msg) {
            const box = document.getElementById('chat-messages'); const div = document.createElement('div'); const isOwn = msg.author === currentUser.username; div.className = `message ${isOwn ? 'outgoing' : 'incoming'}`; div.dataset.id = msg.id; div.dataset.author = msg.author;
            let adminMark = msg.author === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
            let tickMark = isOwn && activeChat.type === 'private' ? `<span class="tick">${msg.read ? '✓✓' : '✓'}</span>` : '';
            let content = `<strong>${msg.author}${adminMark}:</strong><br>`; if (msg.text) content += `<span>${msg.text}</span>`; if (msg.image) content += `<img src="${msg.image}">`; content += tickMark; div.innerHTML = content; box.appendChild(div);
        }

        const sendMessage = () => { const input = document.getElementById('msg-input'); const text = input.value.trim(); if (!text || !activeChat.id) return; if (activeChat.id === 'danumes_news' && currentUser.username !== 'Danumala') return showToast('Писать сюда может только админ.'); if (socket) { socket.emit('send_msg', { type: activeChat.type, to: activeChat.id, text: text }); socket.emit('typing_status', { type: activeChat.type, to: activeChat.id, isTyping: false }); } input.value = ''; };
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('msg-input').addEventListener('input', () => { if(activeChat.type==='private' && socket) { socket.emit('typing_status', { type: activeChat.type, to: activeChat.id, isTyping: true }); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { socket.emit('typing_status', { type: activeChat.type, to: activeChat.id, isTyping: false }); }, 2000); } });

        document.getElementById('img-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files; if (!file || !activeChat.id) return;
            const reader = new FileReader(); reader.onload = (event) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } canvas.width = width; canvas.height = height;
