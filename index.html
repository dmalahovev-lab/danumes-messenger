<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c15;
            height: 100vh;
            overflow: hidden;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0f121f, #07090f);
        }

        /* Боковая панель (стекло) */
        .sidebar {
            width: 320px;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Шапка профиля */
        .profile-section {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .profile-section:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .profile-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }
        .profile-info h3 {
            color: #f0f3fa;
            font-size: 18px;
            font-weight: 600;
        }
        .profile-info p {
            color: #8b92b0;
            font-size: 13px;
            margin-top: 4px;
        }

        /* Поиск */
        .search-box {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .search-box input {
            width: 100%;
            background: rgba(10, 12, 21, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 30px;
            color: #f0f3fa;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #6c5ce7;
            background: rgba(10, 12, 21, 0.8);
        }
        .search-box input::placeholder {
            color: #5a607a;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin: 0 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.15s;
        }
        .chat-item:hover {
            background: rgba(108, 92, 231, 0.15);
        }
        .chat-item.active {
            background: rgba(108, 92, 231, 0.25);
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4a4f6a, #2d3142);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .chat-avatar[data-avatar="Danumala"] {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }
        .chat-avatar[data-avatar="RunFly"] {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 600;
            color: #f0f3fa;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .verified-badge {
            font-size: 12px;
            color: #6c5ce7;
        }
        .chat-lastmsg {
            font-size: 12px;
            color: #8b92b0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        /* Нижняя панель с кнопками */
        .bottom-bar {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
        }
        .bottom-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            color: #a0a5c0;
        }
        .bottom-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            color: #c084fc;
        }

        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 12, 21, 0.3);
            backdrop-filter: blur(8px);
        }
        .chat-header {
            height: 70px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(18, 22, 35, 0.4);
        }
        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, #4a4f6a, #2d3142);
            cursor: pointer;
        }
        .chat-header-avatar[data-avatar="Danumala"] {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }
        .chat-header-avatar[data-avatar="RunFly"] {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }
        .chat-header-info h3 {
            color: #f0f3fa;
            font-size: 18px;
            font-weight: 600;
        }
        .chat-header-info p {
            color: #8b92b0;
            font-size: 12px;
            margin-top: 2px;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            max-width: 70%;
        }
        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-bubble {
            padding: 12px 18px;
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            font-size: 14px;
            line-height: 1.45;
            background: rgba(30, 34, 55, 0.8);
            backdrop-filter: blur(4px);
            color: #f0f3fa;
        }
        .message-own .message-bubble {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 24px;
        }
        .message-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 6px;
        }
        .file-attach {
            display: inline-block;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            text-decoration: none;
            color: #c084fc;
        }
        .message-image {
            max-width: 220px;
            max-height: 180px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 6px;
        }

        /* Панель ввода */
        .input-area {
            padding: 20px 24px;
            background: rgba(18, 22, 35, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .input-wrapper {
            flex: 1;
            background: rgba(10, 12, 21, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 44px;
            padding: 10px 18px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            background: none;
            border: none;
            color: #f0f3fa;
            font-size: 14px;
            outline: none;
        }
        .file-btn, .emoji-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #8b92b0;
            transition: 0.1s;
        }
        .file-btn:hover, .emoji-btn:hover {
            color: #c084fc;
        }
        .send-btn {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            color: white;
            transition: 0.1s;
        }
        .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.4);
        }

        /* Контекстное меню */
        .context-menu {
            position: fixed;
            background: rgba(18, 22, 35, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .context-menu div {
            padding: 10px 16px;
            cursor: pointer;
            color: #f0f3fa;
            font-size: 14px;
            transition: 0.05s;
        }
        .context-menu div:hover {
            background: rgba(108, 92, 231, 0.3);
        }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px;
            width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-content h3 {
            color: #f0f3fa;
            margin-bottom: 20px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .emoji-option {
            font-size: 32px;
            cursor: pointer;
            padding: 6px;
            border-radius: 12px;
            transition: 0.05s;
        }
        .emoji-option:hover {
            background: rgba(108, 92, 231, 0.3);
        }
        .close-modal {
            background: #6c5ce7;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            width: 100%;
            cursor: pointer;
            font-weight: 500;
        }
        .group-modal .modal-content {
            width: 420px;
        }
        .group-modal input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin-bottom: 20px;
            background: rgba(10, 12, 21, 0.8);
            color: #f0f3fa;
            outline: none;
        }
        .members-list {
            max-height: 220px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .settings-section {
            margin-bottom: 20px;
            text-align: left;
        }
        .settings-section h4 {
            color: #f0f3fa;
            margin-bottom: 10px;
        }
        .settings-section input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: rgba(10, 12, 21, 0.8);
            color: #f0f3fa;
            outline: none;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2237;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 5000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }
        @media (max-width: 680px) {
            .sidebar { width: 80px; }
            .profile-info, .chat-info, .chat-lastmsg { display: none; }
            .profile-avatar { width: 48px; height: 48px; font-size: 24px; }
            .chat-avatar { width: 44px; height: 44px; font-size: 22px; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let currentChat = null;
    let currentChatType = 'user';
    let messages = [];
    let chats = [];
    let groups = [];
    let channels = [];
    let allUsers = [];
    let searchQuery = '';
    let pollInterval = null;
    let searchTimeout = null;

    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.background = '#dc2626';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) {
            opts.body = data;
        }
        const res = await fetch(url, opts);
        return res.json();
    }

    // ========== ЗАГРУЗКА ДАННЫХ ==========
    async function loadAllUsers() {
        const res = await api('GET', '/get-users');
        allUsers = res || [];
    }

    async function loadChatsAndChannels() {
        if (!currentUser) return;
        try {
            const userChats = await api('GET', `/get-chats/${currentUser.username}`);
            const channelList = await api('GET', '/get-channels');
            const groupList = await api('GET', `/get-groups/${currentUser.username}`);
            channels = channelList || [];
            groups = groupList || [];
            let all = [];
            channels.forEach(ch => all.push({ type: 'channel', id: ch.id, name: ch.name, avatar: ch.avatar, lastMessage: ch.lastMessage || 'Нет сообщений', lastTime: ch.lastTime }));
            groups.forEach(g => all.push({ type: 'group', id: g.id, name: g.name, avatar: g.avatar, lastMessage: g.lastMessage || 'Нет сообщений', lastTime: g.lastTime }));
            (userChats || []).forEach(uc => all.push({ type: 'user', id: uc.username, name: uc.username, avatar: uc.avatar, online: uc.online, verified: uc.verified, lastMessage: uc.lastMessage || 'Нет сообщений', lastTime: uc.lastTime }));
            all.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
            chats = all;
            renderSidebar();
        } catch(e) { console.error(e); }
    }

    async function loadMessages() {
        if (!currentUser || !currentChat) return;
        try {
            let data;
            if (currentChatType === 'user') {
                data = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'channel') {
                data = await api('GET', `/get-channel-messages/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'group') {
                data = await api('GET', `/get-group-messages/${currentChat}`);
                messages = data || [];
            }
            renderMessages();
        } catch(e) { console.error(e); }
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if ((!text && !fileUrl)) return;
        try {
            if (currentChatType === 'user') {
                await api('POST', '/send-message', { from: currentUser.username, to: currentChat, text: text || '', fileUrl, fileName });
            } else if (currentChatType === 'channel') {
                await api('POST', '/send-channel-message', { channelId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
            } else if (currentChatType === 'group') {
                await api('POST', '/send-group-message', { groupId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
            }
            await loadMessages();
            await loadChatsAndChannels();
        } catch(e) { console.error(e); }
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        renderSidebar();
        const headerAvatar = document.querySelector('.chat-header-avatar');
        if (headerAvatar) headerAvatar.textContent = emoji;
        showToast('Аватар обновлён');
    }

    async function deleteMessage(msgId) {
        if (currentChatType === 'user') await api('DELETE', `/delete-message/${msgId}`);
        else if (currentChatType === 'channel') await api('DELETE', `/delete-channel-message/${msgId}`);
        else if (currentChatType === 'group') await api('DELETE', `/delete-group-message/${msgId}`);
        await loadMessages();
        await loadChatsAndChannels();
        showToast('Сообщение удалено');
    }

    async function createGroup(name, memberUsernames) {
        const res = await api('POST', '/create-group', { name, createdBy: currentUser.username, members: memberUsernames });
        if (res.success) {
            await loadChatsAndChannels();
            currentChat = res.groupId;
            currentChatType = 'group';
            await loadMessages();
            renderSidebar();
            renderChat();
            showToast('Группа создана');
        } else {
            showToast('Ошибка создания группы', true);
        }
    }

    // ========== РЕНДЕР ФУНКЦИИ ==========
    function renderSidebar() {
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        let filtered = chats;
        if (searchQuery.trim()) {
            const query = searchQuery.toLowerCase();
            filtered = chats.filter(c => c.name.toLowerCase().includes(query));
            const matchingUsers = allUsers.filter(u => u.username.toLowerCase().includes(query) && !chats.some(c => c.type === 'user' && c.id === u.username));
            matchingUsers.forEach(u => {
                filtered.push({
                    type: 'user', id: u.username, name: u.username, avatar: u.avatar, online: u.online,
                    verified: u.verified, lastMessage: 'Нет сообщений', lastTime: null
                });
            });
        }
        let html = `
            <div class="profile-section" id="profileSection">
                <div class="profile-avatar">${currentUser.avatar}</div>
                <div class="profile-info">
                    <h3>${escapeHtml(currentUser.username)}</h3>
                    <p>${currentUser.verified ? 'Верифицирован' : ''}</p>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск" value="${escapeHtml(searchQuery)}">
            </div>
            <div class="chats-list" id="chatsList">
        `;
        filtered.forEach(chat => {
            const activeClass = (currentChat === chat.id && currentChatType === chat.type) ? 'active' : '';
            let nameHtml = escapeHtml(chat.name);
            if (chat.type === 'user' && chat.verified) nameHtml += ' <span class="verified-badge">✓</span>';
            if (chat.type === 'user' && chat.online) nameHtml += ' <span class="online-dot"></span>';
            let avatarAttr = (chat.type === 'user' && (chat.name === 'Danumala' || chat.name === 'RunFly')) ? `data-avatar="${chat.name}"` : '';
            html += `<div class="chat-item ${activeClass}" data-type="${chat.type}" data-id="${chat.id}">
                        <div class="chat-avatar" ${avatarAttr}>${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameHtml}</div>
                            <div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div>
                        </div>
                    </div>`;
        });
        html += `</div>
            <div class="bottom-bar">
                <button class="bottom-btn" id="createGroupBtn">👥</button>
                <button class="bottom-btn" id="settingsBtn">⚙️</button>
            </div>
        `;
        sidebarDiv.innerHTML = html;

        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                currentChatType = el.dataset.type;
                currentChat = el.dataset.id;
                messages = [];
                renderChat();
                loadMessages();
                renderSidebar();
            });
        });
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                if (searchTimeout) clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => { searchQuery = e.target.value; renderSidebar(); }, 300);
            });
        }
        document.getElementById('profileSection').onclick = showSettingsModal;
        document.getElementById('createGroupBtn').onclick = showCreateGroupModal;
        document.getElementById('settingsBtn').onclick = showSettingsModal;
    }

    function renderMessages() {
        const container = document.getElementById('messagesList');
        if (!container) return;
        if (!currentChat) {
            container.innerHTML = `<div style="text-align:center; opacity:0.5; padding:20px;">Выберите чат</div>`;
            return;
        }
        if (!messages || messages.length === 0) {
            container.innerHTML = `<div style="text-align:center; opacity:0.5; padding:20px;">Нет сообщений. Напишите первое!</div>`;
            return;
        }
        let html = '';
        messages.forEach(msg => {
            const isOwn = msg.from_user === currentUser.username;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let content = '';
            if (msg.file_url && /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(msg.file_name)) {
                content += `<img src="${msg.file_url}" class="message-image" data-url="${msg.file_url}">`;
            } else if (msg.file_url) {
                content += `<a href="${msg.file_url}" download class="file-attach" data-url="${msg.file_url}">📎 ${escapeHtml(msg.file_name || 'Файл')}</a>`;
            }
            if (msg.text) content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            let senderName = (currentChatType === 'group' && !isOwn) ? `<div class="message-sender">${escapeHtml(msg.from_user)}</div>` : '';
            html += `<div class="message ${isOwn ? 'message-own' : ''}" data-msg-id="${msg.id}" data-msg-from="${msg.from_user}" data-file-url="${msg.file_url || ''}">
                        <div class="message-bubble">
                            ${senderName}
                            ${content}
                            <div class="message-time">${time}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.message-image').forEach(img => img.addEventListener('click', (e) => { e.stopPropagation(); showLightbox(img.src); }));
        document.querySelectorAll('.message').forEach(el => {
            el.addEventListener('contextmenu', (e) => {
                const msgId = el.dataset.msgId, msgFrom = el.dataset.msgFrom, isOwn = msgFrom === currentUser.username;
                const items = [];
                if (isOwn) items.push({ label: '🗑 Удалить', action: () => deleteMessage(msgId) });
                if (items.length) showContextMenu(e, items);
            });
        });
        container.scrollTop = container.scrollHeight;
    }

    function renderChat() {
        const mainDiv = document.getElementById('chatMain');
        if (!mainDiv) return;
        if (!currentChat) {
            mainDiv.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; opacity:0.6;">✨ Выберите чат ✨</div>`;
            return;
        }
        let chatInfo = { name: currentChat, avatar: '💬' };
        const found = chats.find(c => c.id === currentChat && c.type === currentChatType);
        if (found) chatInfo = found;
        let avatarAttr = (currentChatType === 'user' && (chatInfo.name === 'Danumala' || chatInfo.name === 'RunFly')) ? `data-avatar="${chatInfo.name}"` : '';
        mainDiv.innerHTML = `
            <div class="chat-header">
                <div class="chat-header-avatar" ${avatarAttr}>${chatInfo.avatar}</div>
                <div class="chat-header-info">
                    <h3>${escapeHtml(chatInfo.name)}</h3>
                    <p>${chatInfo.online ? 'онлайн' : 'офлайн'}</p>
                </div>
            </div>
            <div class="messages-area" id="messagesList"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <label class="file-btn" id="fileLabel">📎</label>
                    <input type="file" id="fileInput" style="display:none">
                </div>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div id="emojiPicker" class="emoji-picker" style="display:none; position:absolute; bottom:80px; left:24px; background:rgba(18,22,35,0.95); backdrop-filter:blur(20px); border-radius:20px; padding:12px; width:280px; z-index:1500; border:1px solid rgba(255,255,255,0.1);">
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
        `;
        renderMessages();
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileLabel = document.getElementById('fileLabel'), fileInput = document.getElementById('fileInput');
        const emojiBtn = document.getElementById('emojiBtn'), emojiPicker = document.getElementById('emojiPicker'), emojiGrid = document.getElementById('emojiGrid');
        if (emojiGrid && !emojiGrid.children.length) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉','😍','🤔','😂','🥲','😭','😡','🥺','🤯','💀','👾','🎈','🍕','⚽','🎵','📷','🔒'];
            emojis.forEach(e => { const div = document.createElement('div'); div.className = 'emoji-option'; div.textContent = e; div.onclick = () => { msgInput.value += e; msgInput.focus(); emojiPicker.style.display = 'none'; }; emojiGrid.appendChild(div); });
        }
        emojiBtn.onclick = (e) => { e.stopPropagation(); emojiPicker.style.display = emojiPicker.style.display === 'flex' ? 'none' : 'flex'; };
        document.addEventListener('click', (e) => { if (emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.style.display = 'none'; });
        
        const send = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                const up = await uploadFile(file);
                if (up.success) { await sendMessage(text, up.fileUrl, up.fileName); fileInput.value = ''; }
            } else if (text) { await sendMessage(text); }
            msgInput.value = '';
            msgInput.focus();
        };
        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => send();
        msgInput.focus();
    }

    // ========== НАСТРОЙКИ ==========
    function showSettingsModal() {
        let modal = document.getElementById('settingsModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'settingsModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Настройки</h3>
                <div class="settings-section">
                    <h4>Аватар</h4>
                    <div class="emoji-grid" id="settingsAvatarGrid"></div>
                </div>
                <div class="settings-section">
                    <h4>Имя пользователя</h4>
                    <input type="text" id="newUsernameInput" placeholder="Новое имя">
                    <button id="changeUsernameBtn" class="close-modal" style="margin-top:10px;">Изменить</button>
                </div>
                <div class="settings-section">
                    <h4>Тема</h4>
                    <button id="darkThemeBtn" class="close-modal" style="background:#3b82f6; margin-bottom:8px;">🌙 Тёмная</button>
                    <button id="lightThemeBtn" class="close-modal" style="background:#3b82f6;">☀️ Светлая</button>
                </div>
                <button id="closeSettingsModal" class="close-modal">Закрыть</button>
            </div>
        `;
        const avatarGrid = document.getElementById('settingsAvatarGrid');
        if (avatarGrid && avatarGrid.children.length === 0) {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👑','🚀','⭐','❤️','💎','🔥','👍','🎉'];
            emojis.forEach(e => { const div = document.createElement('div'); div.className = 'emoji-option'; div.textContent = e; div.onclick = () => { updateAvatar(e); modal.style.display = 'none'; }; avatarGrid.appendChild(div); });
        }
        document.getElementById('changeUsernameBtn').onclick = () => {
            const newName = document.getElementById('newUsernameInput').value.trim();
            if (newName) updateUsername(newName);
            modal.style.display = 'none';
        };
        document.getElementById('darkThemeBtn').onclick = () => {
            document.body.classList.remove('light', 'dark');
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            modal.style.display = 'none';
        };
        document.getElementById('lightThemeBtn').onclick = () => {
            document.body.classList.remove('light', 'dark');
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
            modal.style.display = 'none';
        };
        document.getElementById('closeSettingsModal').onclick = () => modal.style.display = 'none';
    }

    async function updateUsername(newUsername) {
        const res = await api('POST', '/update-username', { oldUsername: currentUser.username, newUsername });
        if (res.success) {
            currentUser.username = newUsername;
            renderSidebar();
            showToast('Имя изменено');
        } else {
            showToast(res.error || 'Ошибка', true);
        }
    }

    function showCreateGroupModal() {
        const modal = document.getElementById('groupModal');
        if (!modal) return;
        modal.style.display = 'flex';
        const membersContainer = document.getElementById('groupMembersList');
        if (membersContainer && membersContainer.children.length === 0 && allUsers.length) {
            allUsers.forEach(u => {
                if (u.username !== currentUser.username) {
                    const div = document.createElement('div');
                    div.className = 'member-item';
                    div.innerHTML = `<input type="checkbox" value="${u.username}" id="member_${u.username}"> <label for="member_${u.username}">${escapeHtml(u.username)}</label>`;
                    membersContainer.appendChild(div);
                }
            });
        }
        const createBtn = document.getElementById('confirmCreateGroup');
        const cancelBtn = document.getElementById('cancelCreateGroup');
        const groupNameInput = document.getElementById('groupNameInput');
        const newCreateHandler = async () => {
            const name = groupNameInput.value.trim();
            if (!name) { showToast('Введите название', true); return; }
            const selected = [];
            document.querySelectorAll('#groupMembersList input:checked').forEach(cb => selected.push(cb.value));
            await createGroup(name, selected);
            modal.style.display = 'none';
            groupNameInput.value = '';
            document.querySelectorAll('#groupMembersList input').forEach(cb => cb.checked = false);
            createBtn.removeEventListener('click', newCreateHandler);
            cancelBtn.removeEventListener('click', cancelHandler);
        };
        const cancelHandler = () => {
            modal.style.display = 'none';
            groupNameInput.value = '';
            document.querySelectorAll('#groupMembersList input').forEach(cb => cb.checked = false);
            createBtn.removeEventListener('click', newCreateHandler);
            cancelBtn.removeEventListener('click', cancelHandler);
        };
        createBtn.addEventListener('click', newCreateHandler);
        cancelBtn.addEventListener('click', cancelHandler);
    }

    // ========== ВХОД И СТАРТ ==========
    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2>DanuMes</h2>
                    <div class="tabs">
                        <div class="tab active" id="loginTab">Вход</div>
                        <div class="tab" id="regTab">Регистрация</div>
                    </div>
                    <div id="loginPanel" class="auth-form">
                        <input type="text" id="loginUsername" placeholder="Логин">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <div id="loginError" class="error-text"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="regPanel" class="auth-form" style="display:none;">
                        <input type="text" id="regUsername" placeholder="Логин">
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <div id="regError" class="error-text"></div>
                        <button id="doReg" class="auth-btn">Зарегистрироваться</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'flex';
            document.getElementById('regPanel').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('regTab').classList.remove('active');
        };
        document.getElementById('regTab').onclick = () => {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('regPanel').style.display = 'flex';
            document.getElementById('regTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        };
        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await api('POST', '/login-attempt', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
                await loadAllUsers();
                await loadChatsAndChannels();
                startMessenger();
                showToast(`Добро пожаловать, ${username}!`);
            } else {
                document.getElementById('loginError').innerText = res.error;
            }
        };
        document.getElementById('doReg').onclick = async () => {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await api('POST', '/register-attempt', { username, password });
            if (res.success) {
                alert('Регистрация успешна! Теперь войдите.');
                document.getElementById('loginTab').click();
            } else {
                document.getElementById('regError').innerText = res.error;
            }
        };
    }

    function startMessenger() {
        document.getElementById('app').innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar"></div>
                <div class="chat-main" id="chatMain"></div>
            </div>
            <div id="groupModal" class="modal group-modal">
                <div class="modal-content">
                    <h3>Создать группу</h3>
                    <input type="text" id="groupNameInput" placeholder="Название">
                    <div class="members-list" id="groupMembersList"></div>
                    <button id="confirmCreateGroup" class="close-modal" style="margin-bottom:8px;">Создать</button>
                    <button id="cancelCreateGroup" class="close-modal" style="background:#6b7280;">Отмена</button>
                </div>
            </div>
            <div id="lightbox" class="lightbox"><img src=""></div>
        `;
        renderSidebar();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => { if (currentChat) loadMessages(); loadChatsAndChannels(); loadAllUsers(); }, 3000);
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') document.body.classList.add('light');
        else document.body.classList.add('dark');
    }

    // ========== ОБЩИЕ ВСПОМОГАТЕЛЬНЫЕ ==========
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    let activeMenu = null;
    function showContextMenu(e, items) {
        if (activeMenu) activeMenu.remove();
        const menu = document.createElement('div'); menu.className = 'context-menu';
        items.forEach(item => { const option = document.createElement('div'); option.textContent = item.label; option.onclick = (ev) => { ev.stopPropagation(); item.action(); menu.remove(); activeMenu = null; }; menu.appendChild(option); });
        document.body.appendChild(menu);
        let left = e.clientX, top = e.clientY;
        if (left + menu.offsetWidth > window.innerWidth) left = window.innerWidth - menu.offsetWidth - 10;
        if (top + menu.offsetHeight > window.innerHeight) top = window.innerHeight - menu.offsetHeight - 10;
        menu.style.left = left + 'px'; menu.style.top = top + 'px';
        activeMenu = menu;
        const closeMenu = () => { if(activeMenu) activeMenu.remove(); activeMenu = null; document.removeEventListener('click', closeMenu); };
        setTimeout(() => document.addEventListener('click', closeMenu), 10);
        e.preventDefault();
    }
    function showLightbox(url) {
        let lb = document.getElementById('lightbox');
        if (!lb) return;
        lb.style.display = 'flex'; lb.querySelector('img').src = url;
        lb.onclick = () => lb.style.display = 'none';
    }

    renderAuth();
</script>
