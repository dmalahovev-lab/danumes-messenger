<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danumes Messenger</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Подключение Socket.io с сервера для стабильной связи -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0b0813;
            color: #f1f1f1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- СТИЛИ ДЛЯ СТРАНИЦЫ ВХОДА --- */
        .brand-logo-title {
            position: absolute;
            top: 40px;
            left: 50px;
            font-size: 2rem;
            font-weight: 500;
            color: #d1ceda;
        }

        .auth-card {
            background: linear-gradient(145deg, #13101c, #0e0b16);
            padding: 45px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #1a162b;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .auth-card h2 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background-color: #1e1b29;
            border: 1px solid #28243c;
            border-radius: 30px;
            color: #f1f1f1;
            font-size: 0.95rem;
            margin-bottom: 18px;
            outline: none;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #3c1464, #4c1c7a);
            color: #f1f1f1;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #726e8a;
        }

        .toggle-link span {
            color: #9c82cc;
            cursor: pointer;
            margin-left: 5px;
        }

        /* --- СТИЛИ ДЛЯ ОРИГИНАЛЬНОЙ ГЛАВНОЙ СТРАНИЦЫ (ИЗ СКРИНШОТА) --- */
        #messenger-layout {
            display: none; /* Откроется после логина */
            width: 100%;
            height: 100vh;
            grid-template-columns: 350px 1fr;
            background-color: #08060d;
        }

        /* Левая панель */
        .sidebar {
            background-color: #0b0813;
            border-right: 1px solid #141122;
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-name {
            font-size: 1.1rem;
            color: #8c889e;
        }

        .sidebar h1 {
            font-size: 2rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .create-group-btn {
            background-color: #151224;
            border: 1px solid #221d38;
            color: #a39fbc;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .channel-item {
            border-top: 1px solid #141122;
            border-bottom: 1px solid #141122;
            padding: 20px 0;
            margin-top: 20px;
            cursor: pointer;
        }

        .channel-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .channel-subtitle {
            font-size: 0.9rem;
            color: #4f4b62;
        }

        /* Правая панель чата */
        .chat-area {
            display: flex;
            flex-direction: column;
            background-color: #08060d;
            height: 100vh;
        }

        .chat-header {
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #141122;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #112033;
            border: 1px solid #1b3252;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: #5294e2;
        }

        .user-status-block {
            display: flex;
            flex-direction: column;
        }

        .user-name-text {
            font-size: 1.2rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .online-indicator {
            font-size: 0.85rem;
            color: #616161;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-indicator::before {
            content: "●";
            color: #4b8053;
        }

        .call-logo-placeholder {
            color: #6a667d;
            font-size: 1rem;
        }

        /* Сетка вывода сообщений */
        .messages-viewport {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-msg {
            max-width: 65%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .chat-msg.received {
            background-color: #131020;
            align-self: flex-start;
            border: 1px solid #1c1830;
        }

        .chat-msg.transmitted {
            background: linear-gradient(135deg, #371461, #471a7d);
            align-self: flex-end;
            border: 1px solid #551f96;
        }

        .msg-sender-title {
            font-size: 0.8rem;
            color: #9c82cc;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .msg-time-stamp {
            font-size: 0.7rem;
            color: #5d5973;
            text-align: right;
            margin-top: 4px;
        }

        /* Нижняя панель ввода */
        .footer-input-zone {
            padding: 25px 30px;
            display: flex;
            align-items: center;
            background-color: #08060d;
        }

        .input-wrapper-inner {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            background-color: #13101c;
            border: 1px solid #1d1a2e;
            border-radius: 30px;
            padding: 5px 10px;
            margin-right: 15px;
        }

        .attachment-btn {
            background: none;
            border: none;
            color: #7262a6;
            font-size: 0.85rem;
            padding: 10px 15px;
            cursor: pointer;
        }

        .main-chat-input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 10px;
            color: #f1f1f1;
            font-size: 1rem;
            outline: none;
        }

        .main-chat-input::placeholder {
            color: #3b374d;
        }

        .purple-submit-btn {
            background: linear-gradient(90deg, #441673, #571c94);
            border: none;
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(87, 28, 148, 0.3);
        }

        .verified-badge-star {
            color: #a382ec;
        }
    </style>
</head>
<body>

    <div class="brand-logo-title" id="brand-logo-text">Danumes</div>

    <!-- ОКНО АВТОРИЗАЦИИ (ТВОЙ ДИЗАЙН) -->
    <div id="auth-screen" class="auth-card">
        <div id="login-box">
            <h2>Вход</h2>
            <input type="text" id="login-user" class="input-field" placeholder="Логин">
            <input type="password" id="login-pass" class="input-field" placeholder="Пароль">
            <button class="action-btn" id="btn-login-action">Войти в аккаунт</button>
            <div class="toggle-link">
                Нет аккаунта? <span onclick="toggleAuth(true)">Зарегистрироваться</span>
            </div>
        </div>

        <div id="register-box" style="display: none;">
            <h2>Регистрация</h2>
            <input type="text" id="reg-user" class="input-field" placeholder="Придумайте логин">
            <input type="password" id="reg-pass" class="input-field" placeholder="Придумайте пароль">
            <button class="action-btn" id="btn-reg-action">Создать аккаунт</button>
            <div class="toggle-link">
                Уже есть аккаунт? <span onclick="toggleAuth(false)">Войти</span>
            </div>
        </div>
    </div>

    <!-- ГЛАВНАЯ СТРАНИЦА ЧАТА (ДИЗАЙН С ТВОЕГО СКРИНШОТА) -->
    <div id="messenger-layout">
        <!-- Левая колонка -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div>
                    <div class="brand-name">Danumes</div>
                    <h1>Чаты</h1>
                </div>
                <button class="create-group-btn">Создать группу</button>
            </div>

            <div class="channel-item">
                <div class="channel-title">Danumes News</div>
                <div class="channel-subtitle" id="news-last-msg">Последнее сообщение канала</div>
            </div>
        </div>

        <!-- Правая колонка -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-user-info">
                    <div class="user-avatar-circle" id="chat-header-avatar">П</div>
                    <div class="user-status-block">
                        <div class="user-name-text">
                            <span id="chat-header-username">Пользователь</span>
                            <span id="verified-star-icon" class="verified-badge-star" style="display: none;">✔</span>
                        </div>
                        <div class="online-indicator">Онлайн</div>
                    </div>
                </div>
                <div class="call-logo-placeholder">Вставь тут логотип звонка</div>
            </div>

            <!-- Лента сообщений -->
            <div class="messages-viewport" id="messages-view">
                <!-- Сюда подгружаются сообщения -->
            </div>

            <!-- Нижняя панель ввода (Из твоего скриншота) -->
            <div class="footer-input-zone">
                <div class="input-wrapper-inner">
                    <button class="attachment-btn">Вставь скрепку тут</button>
                    <input type="text" id="chat-message-input" class="main-chat-input" placeholder="Напишите сообщение...">
                </div>
                <button class="purple-submit-btn" id="chat-send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <!-- ИНТЕГРАЦИЯ ЛОГИКИ СОКЕТОВ С ТВОИМ ДИЗАЙНОМ -->
    <script>
        const socket = io('https://onrender.com');
        let sessionUser = null;

        function toggleAuth(showRegister) {
            document.getElementById('login-box').style.display = showRegister ? 'none' : 'block';
            document.getElementById('register-box').style.display = showRegister ? 'block' : 'none';
        }

        // Авторизация
        document.getElementById('btn-login-action').addEventListener('click', () => {
            const username = document.getElementById('login-user').value.trim();
            const password = document.getElementById('login-pass').value.trim();
            if (username && password) {
                socket.emit('login-attempt', { username, password });
            }
        });

        document.getElementById('btn-reg-action').addEventListener('click', () => {
            const username = document.getElementById('reg-user').value.trim();
            if (username) {
                sessionUser = { username, hasVerifiedBadge: false, hasNewsAccess: false };
                initMessengerScreen();
            }
        });

        socket.on('login-success', (userData) => {
            sessionUser = userData;
            initMessengerScreen();
        });

        socket.on('login-failure', () => {
            const username = document.getElementById('login-user').value.trim();
            sessionUser = { username, hasVerifiedBadge: false, hasNewsAccess: false };
            initMessengerScreen();
        });

        // Переход в мессенджер
        function initMessengerScreen() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('brand-logo-text').style.display = 'none'; // Скрываем верхний логотип
            document.getElementById('messenger-layout').style.display = 'grid';

            // Настраиваем шапку чата под залогиненного пользователя
            document.getElementById('chat-header-username').innerText = sessionUser.username;
            document.getElementById('chat-header-avatar').innerText = sessionUser.username.charAt(0).toUpperCase();

            if (sessionUser.hasVerifiedBadge) {
                document.getElementById('verified-star-icon').style.display = 'inline';
            }
        }

        // Отправка сообщений по нажатию на твою фиолетовую кнопку
        document.getElementById('chat-send-btn').addEventListener('click', pushMessage);
        document.getElementById('chat-message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') pushMessage();
        });

        function pushMessage() {
            const input = document.getElementById('chat-message-input');
            if (input.value.trim() && sessionUser) {
                socket.emit('send-message', {
                    username: sessionUser.username,
                    text: input.value.trim()
                });
                input.value = '';
            }
        }

        // Загрузка переписки из Cloudflare KV Pairs
        socket.on('init-messages', (history) => {
            const container = document.getElementById('messages-view');
            container.innerHTML = '';
            if (history && history.length > 0) {
                history.forEach(m => drawMessage(m));
                document.getElementById('news-last-msg').innerText = history[history.length - 1].text;
            }
        });

        socket.on('new-message', (m) => {
            drawMessage(m);
            document.getElementById('news-last-msg').innerText = m.text;
        });

        function drawMessage(m) {
            const container = document.getElementById('messages-view');
            const isMyOwn = sessionUser && m.username === sessionUser.username;

            const msgNode = document.createElement('div');
            msgNode.className = `chat-msg ${isMyOwn ? 'transmitted' : 'received'}`;

            const star = m.isVerified ? ' <span class="verified-badge-star">✔</span>' : '';

            msgNode.innerHTML = `
                <div class="msg-sender-title">${m.username}${star}</div>
                <div>${m.text}</div>
                <div class="msg-time-stamp">${m.time || ''}</div>
            `;
            container.appendChild(msgNode);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
