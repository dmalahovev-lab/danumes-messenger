<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальный мессенджер</title>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #070a12;
            --bg-glass: rgba(15, 22, 42, 0.7);
            --bg-sidebar: rgba(10, 15, 30, 0.8);
            --bg-active: rgba(255, 255, 255, 0.06);
            --bg-chat-user: #6366f1;
            --bg-chat-friend: rgba(255, 255, 255, 0.04);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(243, 244, 246, 0.9);
            --bg-active: rgba(0, 0, 0, 0.05);
            --bg-chat-user: #4f46e5;
            --bg-chat-friend: rgba(0, 0, 0, 0.04);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .auth-card { background: var(--bg-glass); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; box-shadow: var(--shadow); backdrop-filter: blur(20px); position: relative; }
        .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin: 10px 0; outline: none; font-size: 16px; text-align: center;}
        
        .auth-buttons-row { display: flex; gap: 12px; margin-top: 10px; }
        .auth-btn { flex: 1; padding: 14px; border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .auth-btn.login { background: #6366f1; }
        .auth-btn.register { background: #10b981; }

        .error-toast { display: none; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 14px; font-weight: 500; text-align: center; }

        .app-container { width: 100vw; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(20px); display: flex; overflow: hidden; }
        .nav-rail { width: 72px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-btn { width: 48px; height: 48px; border-radius: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; flex-direction: column; gap: 4px;}
        .nav-btn:hover, .nav-btn.active { background: var(--bg-active); color: var(--text-main); }
        .nav-btn.active { color: #6366f1; border: 1px solid var(--border-color); }
        .nav-btn.logout-btn { color: #ef4444; margin-top: 10px; }
        .nav-btn.logout-btn:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        
        .nav-profile-trigger { margin-top: auto; font-size: 24px; background: var(--bg-active); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); cursor: pointer; }

        .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-color); }
        
        .logo-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .add-group-btn { background: var(--bg-active); border: 1px solid var(--border-color); color: var(--text-main); font-size: 18px; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .add-group-btn:hover { background: rgba(255,255,255,0.15); }

        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); padding: 10px 16px 10px 40px; border-radius: 12px; color: var(--text-main); outline: none; }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); font-style: normal; }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .list-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 8px 12px; text-transform: uppercase; margin-top: 10px;}
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--bg-active); }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px;}
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-status-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-actions { display: flex; gap: 4px; }
        .action-btn { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .action-btn.primary { background: #6366f1; color: white; border: none; }

        .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chat-window { flex: 1; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; background: var(--bg-main); }
        
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-sidebar); }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; height: calc(100vh - 170px); }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        .message-bubble { max-width: 55%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; }
        .sent .message-bubble { background: var(--bg-chat-user); color: white; border-bottom-right-radius: 4px; }
        .received .message-bubble { background: var(--bg-chat-friend); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #ef4444; border: none; color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; }
        .sent .delete-msg-btn { left: -75px; } 
        .received .delete-msg-btn { right: -75px; }
        .message-wrapper:hover .delete-msg-btn { opacity: 1; }

        .input-area { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; height: 80px; background: var(--bg-sidebar); align-items: center;}
        .message-input { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; color: var(--text-main); outline: none;}
        .send-btn { background: #6366f1; color: white; border: none; border-radius: 12px; padding: 0 20px; height: 100%; font-weight: bold; cursor: pointer;}

        .group-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .group-modal-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: var(--shadow); }
        .group-users-selector { max-height: 180px; overflow-y: auto; margin: 15px 0; padding: 10px; background: var(--bg-main); border-radius: 10px; border: 1px solid var(--border-color); }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .mobile-hidden { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2 class="logo" style="font-size: 32px; margin-bottom: 20px; display: inline-block;">DanuMes</h2>
            <div class="error-toast" id="errorToast"></div>
            <input type="text" class="auth-input" id="usernameInput" placeholder="Логин..." autofocus autocomplete="off">
            <input type="password" class="auth-input" id="passwordInput" placeholder="Пароль..." autocomplete="off">
            <div class="auth-buttons-row">
                <button class="auth-btn login" onclick="handleLoginClick()">Войти</button>
                <button class="auth-btn register" onclick="handleRegisterClick()">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
    <div class="app-container">
        <!-- НАВИГАЦИОННАЯ ПАНЕЛЬ -->
        <div class="nav-rail">
            <button class="nav-btn active" id="navHome" onclick="goHome()"><span>🏠</span>ЧАТЫ</button>
            <button class="nav-btn" onclick="toggleTheme()"><span>🌗</span>ТЕМА</button>
            <button class="nav-btn logout-btn" onclick="logOut()"><span>🚪</span>ВЫЙТИ</button>
            <div class="nav-profile-trigger" id="profileTrigger">🤖</div>
        </div>

        <!-- САЙДБАР КОНТАКТОВ И ГРУПП -->
        <div class="sidebar" id="sidebarContainer">
            <div class="sidebar-header">
                <div class="logo-row">
                    <span class="logo" id="greetingName">DanuMes</span>
                    <button class="add-group-btn" onclick="openGroupModal()">+</button>
                </div>
                <div class="search-box">
                    <i class="search-icon">🔍</i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск глобальных контактов..." oninput="handleSearch(this.value)">
                </div>
            </div>
            <div class="chats-list" id="chatsListContainer">
                <!-- Сюда динамически рендерится список через JS -->
            </div>
        </div>

        <!-- ПРИВЕТСТВЕННЫЙ ЭКРАН -->
        <div class="home-screen" id="homeScreen">
            <h1 class="logo" style="font-size: 40px; margin-bottom: 10px;">DanuMes</h1>
            <p style="color: var(--text-muted);">Выберите чат или группу слева для начала общения.</p>
        </div>

        <!-- ОКНО ТЕКУЩЕГО ЧАТА -->
        <div class="chat-window hidden mobile-hidden" id="chatWindow">
            <div class="chat-header">
                <div class="avatar" id="activeAvatar">👤</div>
                <div class="chat-info">
                    <div class="chat-name" id="activeChatName">Собеседник</div>
                    <div class="chat-status-text" id="activeChatStatus">В сети</div>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <!-- Сюда прилетают сообщения -->
            </div>
            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">▶</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ ГРУППЫ -->
    <div class="group-modal" id="groupModal">
        <div class="group-modal-card">
            <h3 style="margin-bottom: 15px;">Создать новую группу</h3>
            <input type="text" class="auth-input" id="groupNameInput" placeholder="Название группы..." style="text-align: left; background: var(--bg-main);">
            <div style="font-size: 13px; color: var(--text-muted); font-weight: bold; margin-top: 10px;">ВЫБЕРИТЕ УЧАСТНИКОВ:</div>
            <div class="group-users-selector" id="groupUsersSelector">
                <!-- Чекбоксы участников генерируются тут -->
            </div>
            <div class="auth-buttons-row">
                <button class="auth-btn register" onclick="submitCreateGroup()">Создать</button>
                <button class="auth-btn login" style="background: #ef4444;" onclick="closeGroupModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- ВСЯ ЛОГИКА СКРИПТОВ НАХОДИТСЯ СТРОГО ТУТ (ПОД DOM) -->
    <script>
        let myInfo = { name: "", avatar: "🤖", status: "" };
        let globalUsers = [];
        let createdGroups = new Set();
        let localFriends = new Set();
        let activeChatName = null;

        function showAuthNotification(msg, isSuccess = false) {
            const toast = document.getElementById('errorToast');
            if (!toast) return;
            toast.textContent = msg;
            toast.style.display = 'block';
            if (isSuccess) {
                toast.style.background = 'rgba(16, 185, 129, 0.2)';
                toast.style.borderColor = '#10b981';
                toast.style.color = '#a7f3d0';
            } else {
                toast.style.background = 'rgba(239, 68, 68, 0.2)';
                toast.style.borderColor = '#ef4444';
                toast.style.color = '#fca5a5';
            }
        }

        async function handleRegisterClick() {
            const userInput = document.getElementById('usernameInput');
            const passInput = document.getElementById('passwordInput');
            if (!userInput || !passInput) return;

            const user = userInput.value.trim();
            const pass = passInput.value.trim();

            if (!user || !pass) {
                return showAuthNotification("Заполните все поля", false);
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                const data = await response.json();
                showAuthNotification(data.msg, data.success);
            } catch (err) {
                console.error(err);
                showAuthNotification("Ошибка соединения с сервером Render", false);
            }
        }

        async function handleLoginClick() {
            const userInput = document.getElementById('usernameInput');
            const passInput = document.getElementById('passwordInput');
            if (!userInput || !passInput) return;

            const user = userInput.value.trim();
            const pass = passInput.value.trim();

            if (!user || !pass) {
                return showAuthNotification("Заполните все поля", false);
            }

            await performLogin(user, pass, false);
        }

        async function performLogin(user, pass, isAuto = false) {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                const data = await response.json();

                if (data.success) {
                    myInfo = data.user;
                    localStorage.setItem('danumes_user', user);
                    localStorage.setItem('danumes_pass', pass);

                    const greeting = document.getElementById('greetingName');
                    if (greeting) greeting.textContent = myInfo.name;

                    const profile = document.getElementById('profileTrigger');
                    if (profile) profile.textContent = myInfo.avatar;

                    const authCardScreen = document.getElementById('authScreen');
                    if (authCardScreen) authCardScreen.style.display = 'none';

                    await loadUsersList();

                    if (window.chatInterval) clearInterval(window.chatInterval);
                    window.chatInterval = setInterval(refreshChatData, 3000);
                } else {
                    if (!isAuto) showAuthNotification(data.msg, false);
                }
            } catch (err) {
                console.error(err);
                if (!isAuto) showAuthNotification("Ошибка соединения с сервером Render", false);
            }
        }

        function checkAutoLogin() {
            const savedUser = localStorage.getItem('danumes_user');
            const savedPass = localStorage.getItem('danumes_pass');
            if (savedUser && savedPass) {
                performLogin(savedUser, savedPass, true);
            }
        }

        function logOut() {
            localStorage.removeItem('danumes_user');
            localStorage.removeItem('danumes_pass');
            window.location.reload();
        }

        async function loadUsersList() {
            try {
                const resUsers = await fetch('/api/users');
                const users = await resUsers.json();
                globalUsers = users.filter(u => u.name !== myInfo.name);

                const resGroups = await fetch('/api/groups');
                const groupsArray = await resGroups.json();
                createdGroups = new Set(groupsArray);

                const searchInp = document.getElementById('searchInput');
                renderLists(searchInp ? searchInp.value : '');
            } catch (err) {
                console.error(err);
            }
        }

        async function refreshChatData() {
            await loadUsersList();
            if (activeChatName) {
                await loadChatHistory();
            }
        }

        function handleSearch(val) {
            renderLists(val);
        }

        function renderLists(filterText = '') {
            const container = document.getElementById('chatsListContainer');
            if (!container) return;
            container.innerHTML = '';
            const lowerFilter = filterText.toLowerCase().trim();

            // 1. БЛОК ГРУПП
            const groupSectionTitle = document.createElement('div');
            groupSectionTitle.className = 'list-section-title';
            groupSectionTitle.textContent = 'Мои группы';
            container.appendChild(groupSectionTitle);

            let hasGroups = false;
            createdGroups.forEach(gName => {
                if (lowerFilter === '' || gName.toLowerCase().includes(lowerFilter)) {
                    hasGroups = true;
                    const item = document.createElement('div');
                    item.className = `chat-item ${activeChatName === gName ? 'active' : ''}`;
                    item.onclick = () => openChat(gName, true);
                    item.innerHTML = `
                        <div class="avatar" style="background:linear-gradient(135deg, #10b981, #059669)">👥</div>
                        <div class="chat-info">
                            <div class="chat-name">${gName}</div>
                            <div class="chat-status-text">Групповой чат</div>
                        </div>
                    `;
                    container.appendChild(item);
                }
            });
            if (!hasGroups) groupSectionTitle.style.display = 'none';

            // 2. БЛОК КОНТАКТОВ
            const contactSectionTitle = document.createElement('div');
            contactSectionTitle.className = 'list-section-title';
            contactSectionTitle.textContent = 'Контакты';
            container.appendChild(contactSectionTitle);

            let hasContacts = false;
            globalUsers.forEach(user => {
                if (lowerFilter === '' || user.name.toLowerCase().includes(lowerFilter)) {
                    hasContacts = true;
                    const item = document.createElement('div');
                    item.className = `chat-item ${activeChatName === user.name ? 'active' : ''}`;
                    item.onclick = () => openChat(user.name, false);
                    item.innerHTML = `
                        <div class="avatar">${user.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${user.name}</div>
                            <div class="chat-status-text">${user.status}</div>
                        </div>
                    `;
                    container.appendChild(item);
                }
            });
            if (!hasContacts) contactSectionTitle.style.display = 'none';
        }

        async function openChat(name, isGroup = false) {
            activeChatName = name;

            const home = document.getElementById('homeScreen');
            const chatWin = document.getElementById('chatWindow');
            const sidebar = document.getElementById('sidebarContainer');

            if (home) home.classList.add('hidden');
            if (chatWin) chatWin.classList.remove('hidden');

            if (window.innerWidth <= 768) {
                if (sidebar) sidebar.classList.add('mobile-hidden');
                if (chatWin) chatWin.classList.remove('mobile-hidden');
            }

            renderLists(document.
