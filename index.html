<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Видеозвонки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-page); color: var(--text-primary); height: 100vh; overflow: hidden; }

        body[data-theme="blue"] {
            --bg-page: #0a1628; --bg-sidebar: rgba(15,26,46,0.95); --bg-header: rgba(23,33,43,0.9);
            --bg-chat: #0e1621; --bg-message-own: #2b5278; --bg-message-other: #182533;
            --bg-input: #17212b; --text-primary: #e1e1e1; --text-secondary: #8a8a9a;
            --border: rgba(31,44,58,0.5); --accent: #2b5278; --accent-glow: rgba(43,82,120,0.4);
            --accent-hover: #3a6b99; --online: #4caf50; --verified: #4caf50;
            --shadow: 0 8px 32px rgba(0,0,0,0.3); --glass-bg: rgba(23,33,43,0.8);
        }
        body[data-theme="light"] {
            --bg-page: #eef2f5; --bg-sidebar: rgba(255,255,255,0.95); --bg-header: rgba(255,255,255,0.9);
            --bg-chat: #eef2f5; --bg-message-own: #e4e6eb; --bg-message-other: #ffffff;
            --bg-input: #ffffff; --text-primary: #111111; --text-secondary: #65676b;
            --border: rgba(228,230,235,0.8); --accent: #0088cc; --accent-glow: rgba(0,136,204,0.3);
            --accent-hover: #0099e6; --online: #31a24c; --verified: #31a24c;
            --shadow: 0 8px 32px rgba(0,0,0,0.1); --glass-bg: rgba(255,255,255,0.8);
        }
        body[data-theme="dark"] {
            --bg-page: #0f0f11; --bg-sidebar: rgba(26,26,36,0.95); --bg-header: rgba(32,32,42,0.9);
            --bg-chat: #15151c; --bg-message-own: #2b5278; --bg-message-other: #20202a;
            --bg-input: #20202a; --text-primary: #e1e1e1; --text-secondary: #8a8a9a;
            --border: rgba(42,42,54,0.5); --accent: #2b5278; --accent-glow: rgba(43,82,120,0.4);
            --accent-hover: #3a6b99; --online: #4caf50; --verified: #4caf50;
            --shadow: 0 8px 32px rgba(0,0,0,0.3); --glass-bg: rgba(32,32,42,0.8);
        }
        body[data-theme="purple"] {
            --bg-page: #1a0b2e; --bg-sidebar: rgba(32,18,64,0.95); --bg-header: rgba(42,26,74,0.9);
            --bg-chat: #150828; --bg-message-own: #6c3483; --bg-message-other: #2a1a4a;
            --bg-input: #2a1a4a; --text-primary: #e1d5f0; --text-secondary: #a890c0;
            --border: rgba(53,37,90,0.5); --accent: #8e44ad; --accent-glow: rgba(142,68,173,0.4);
            --accent-hover: #a569bd; --online: #2ecc71; --verified: #f39c12;
            --shadow: 0 8px 32px rgba(0,0,0,0.3); --glass-bg: rgba(42,26,74,0.8);
        }
        body[data-theme="pink"] {
            --bg-page: #2d132c; --bg-sidebar: rgba(61,31,60,0.95); --bg-header: rgba(77,42,76,0.9);
            --bg-chat: #250f24; --bg-message-own: #b83b5e; --bg-message-other: #3d1f3c;
            --bg-input: #4d2a4c; --text-primary: #ffd9e6; --text-secondary: #d48aaa;
            --border: rgba(90,53,88,0.5); --accent: #e84393; --accent-glow: rgba(232,67,147,0.4);
            --accent-hover: #f0629e; --online: #2ecc71; --verified: #f1c40f;
            --shadow: 0 8px 32px rgba(0,0,0,0.3); --glass-bg: rgba(77,42,76,0.8);
        }

        .app { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: var(--bg-sidebar); backdrop-filter: blur(10px); border-right: 1px solid var(--border); display: flex; flex-direction: column; margin: 8px 0 8px 8px; border-radius: 28px; }
        .sidebar-header { padding: 20px 16px; background: var(--bg-header); border-bottom: 1px solid var(--border); border-radius: 28px 28px 0 0; }
        .user-card { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; cursor: pointer; }
        .avatar { width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: all 0.3s; box-shadow: var(--shadow); }
        .user-info { flex: 1; }
        .username { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 6px; }
        .verified-badge { color: var(--verified); font-size: 16px; }
        .user-status { font-size: 12px; color: var(--online); margin-top: 4px; }
        .action-buttons { display: flex; gap: 8px; position: relative; }
        .action-btn { flex: 1; padding: 8px; background: var(--bg-page); border: none; border-radius: 20px; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .action-btn:hover { background: var(--accent); transform: translateY(-2px); }
        .plus-menu { position: absolute; bottom: 50px; right: 0; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 8px 0; min-width: 180px; z-index: 100; display: none; }
        .plus-menu.show { display: block; }
        .plus-menu-item { padding: 12px 20px; cursor: pointer; transition: all 0.15s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .plus-menu-item:hover { background: var(--accent); padding-left: 28px; }
        .search-container { padding: 12px 16px; }
        .search-input { width: 100%; padding: 12px 16px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 28px; color: var(--text-primary); font-size: 14px; }
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-section { padding: 8px 16px 4px; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
        .chat-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; cursor: pointer; transition: all 0.25s; margin: 4px 0; border-radius: 20px; position: relative; }
        .chat-item:hover { background: var(--bg-header); transform: translateX(4px); }
        .chat-item.active { background: var(--accent); box-shadow: 0 4px 12px var(--accent-glow); }
        .delete-chat-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); opacity: 0; transition: all 0.2s; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 12px; }
        .chat-item:hover .delete-chat-btn { opacity: 1; }
        .delete-chat-btn:hover { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .chat-avatar { width: 52px; height: 52px; background: var(--bg-page); border-radius: 26px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; flex-shrink: 0; }
        .online-indicator { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: var(--online); border-radius: 6px; border: 2px solid var(--bg-sidebar); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .chat-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); margin: 8px 8px 8px 0; border-radius: 28px; overflow: hidden; }
        .chat-header { padding: 16px 24px; background: var(--bg-header); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .chat-header-left { display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .chat-header-avatar { width: 48px; height: 48px; background: var(--bg-page); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
        .chat-header-name { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 6px; }
        .chat-header-status { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
        .call-buttons { display: flex; gap: 8px; }
        .call-btn { background: var(--accent); border: none; border-radius: 50%; width: 40px; height: 40px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
        .call-btn:hover { transform: scale(1.05); background: var(--accent-hover); }
        .call-btn.video-call { background: #2ecc71; }

        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; display: flex; flex-direction: column; animation: messageSlide 0.3s; }
        @keyframes messageSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .message-own { align-self: flex-end; }
        .message-other { align-self: flex-start; }
        .message-bubble { padding: 12px 18px; border-radius: 24px; cursor: pointer; transition: all 0.2s; }
        .message-own .message-bubble { background: var(--bg-message-own); border-bottom-right-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .message-other .message-bubble { background: var(--bg-message-other); border-bottom-left-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 6px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
        .message-text { font-size: 14px; line-height: 1.45; word-wrap: break-word; }
        .message-meta { font-size: 10px; color: var(--text-secondary); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
        .message-file img { max-width: 220px; max-height: 160px; border-radius: 20px; cursor: pointer; }
        .reactions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .reaction-badge { background: var(--bg-header); border-radius: 40px; padding: 4px 12px; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s; }
        .reaction-badge:hover { background: var(--accent); transform: scale(1.08); }
        .reaction-badge.active { background: var(--accent); }

        .input-area { padding: 16px 24px; background: var(--bg-header); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .message-input { flex: 1; padding: 14px 20px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 30px; color: var(--text-primary); font-size: 15px; resize: none; font-family: inherit; max-height: 100px; }
        .message-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-btn { width: 48px; height: 48px; background: var(--accent); border: none; border-radius: 30px; color: white; cursor: pointer; font-size: 20px; transition: all 0.2s; }
        .input-btn:hover { background: var(--accent-hover); transform: scale(1.08); }

        .context-menu { position: fixed; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; z-index: 1000; min-width: 220px; overflow: hidden; animation: menuPop 0.2s; }
        .context-menu-item { padding: 12px 20px; cursor: pointer; transition: all 0.15s; font-size: 14px; }
        .context-menu-item:hover { background: var(--accent); padding-left: 28px; }

        .video-call-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .video-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; width: 100%; height: 80%; }
        .video-item { position: relative; background: #1a1a2e; border-radius: 20px; overflow: hidden; min-width: 300px; min-height: 200px; }
        .video-item video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .call-controls { display: flex; gap: 20px; margin-top: 20px; }
        .call-control-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; transition: all 0.2s; }
        .call-control-btn.end-call { background: #e74c3c; color: white; }
        .call-control-btn.mic { background: #2c3e50; color: white; }
        .call-control-btn.cam { background: #2c3e50; color: white; }
        .call-control-btn:hover { transform: scale(1.05); }

        .profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .profile-card { background: var(--glass-bg); border-radius: 40px; padding: 32px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .profile-avatar { width: 120px; height: 120px; background: var(--accent); border-radius: 60px; display: flex; align-items: center; justify-content: center; font-size: 64px; margin: 0 auto 20px; cursor: pointer; }
        .profile-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .profile-status { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
        .profile-stats { display: flex; justify-content: space-around; margin-bottom: 24px; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
        .profile-stat-label { font-size: 12px; color: var(--text-secondary); }
        .profile-actions { display: flex; gap: 12px; justify-content: center; }
        .profile-btn { padding: 10px 24px; border: none; border-radius: 30px; cursor: pointer; font-size: 14px; transition: all 0.2s; background: var(--accent); color: white; }
        .profile-btn:hover { transform: scale(1.05); }

        .avatar-expanded { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 6000; cursor: pointer; }
        .avatar-expanded div { font-size: 200px; background: var(--accent); border-radius: 50%; padding: 40px; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: var(--glass-bg); border-radius: 32px; padding: 28px; width: 90%; max-width: 420px; border: 1px solid var(--border); }
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 14px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 20px; color: var(--text-primary); margin-bottom: 16px; }

        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(20px); padding: 14px 28px; border-radius: 40px; font-size: 14px; z-index: 3000; border: 1px solid var(--border); animation: toastSlide 0.3s; }
        @keyframes toastSlide { from { opacity: 0; transform: translateX(-50%) translateY(30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .login-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-page); }
        .login-card { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 48px; border-radius: 48px; width: 100%; max-width: 420px; border: 1px solid var(--border); }
        .login-title { font-size: 42px; font-weight: 800; margin-bottom: 36px; text-align: center; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-input { width: 100%; padding: 16px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 28px; color: var(--text-primary); margin-bottom: 16px; }
        .login-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 32px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .switch-mode { text-align: center; margin-top: 24px; cursor: pointer; color: var(--accent); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        @media (max-width: 768px) { .sidebar { position: fixed; left: -340px; top: 8px; height: calc(100% - 16px); z-index: 100; transition: left 0.3s; } .sidebar.open { left: 8px; } .message { max-width: 85%; } }
    </style>
</head>
<body data-theme="blue">
    <div id="app"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let currentGroupId = null;
        let currentChatAvatar = null;
        let currentChannelCreator = null;
        let allUsers = [];
        let allGroups = [];
        let allChannels = [];
        let messages = [];
        let editingMessageId = null;
        let updateInterval = null;
        let pendingFile = null;
        let socket = null;

        // WebRTC переменные
        let localStream = null;
        let peerConnection = null;
        let currentCallTarget = null;

        const VERIFIED_USERS = ['Danumala', 'RunFly'];
        const REACTIONS = ['👍', '❤️', '😂', '😮', '😢', '😡'];
        const STICKERS = ['😀', '😎', '🥳', '😺', '🐶', '🦊', '🐼', '🐨', '❤️', '🔥', '✨', '⭐', '🎉', '🎈', '🎵', '🎸', '⚽', '🏀', '🌈', '🍕'];

        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function showToast(msg) { let t = document.querySelector('.toast'); if (t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        async function api(method, url, data) { try { const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: data ? JSON.stringify(data) : undefined }); return await res.json(); } catch(e) { return { success: false, error: e.message }; } }
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function formatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        // ========== ВИДЕОЗВОНКИ ==========
        async function startVideoCall(targetUser) {
            if (!targetUser) return;
            currentCallTarget = targetUser;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                showCallUI(targetUser, 'video');
                socket.emit('call-user', { to: targetUser, from: currentUser.username, type: 'video' });
                createPeerConnection(targetUser, true);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            } catch(err) { showToast('Ошибка доступа к камере/микрофону'); }
        }

        async function startAudioCall(targetUser) {
            if (!targetUser) return;
            currentCallTarget = targetUser;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                showCallUI(targetUser, 'audio');
                socket.emit('call-user', { to: targetUser, from: currentUser.username, type: 'audio' });
                createPeerConnection(targetUser, true);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            } catch(err) { showToast('Ошибка доступа к микрофону'); }
        }

        function createPeerConnection(targetUser, isCaller) {
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { to: targetUser, candidate: event.candidate });
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };
        }

        function showCallUI(targetUser, type) {
            const container = document.createElement('div');
            container.className = 'video-call-container';
            container.id = 'callContainer';
            container.innerHTML = `
                <div class="video-grid">
                    <div class="video-item" id="localVideoContainer">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <div class="video-label">Вы</div>
                    </div>
                    <div class="video-item" id="remoteVideoContainer">
                        <video id="remoteVideo" autoplay playsinline></video>
                        <div class="video-label">${escapeHtml(targetUser)}</div>
                    </div>
                </div>
                <div class="call-controls">
                    <button class="call-control-btn mic" onclick="toggleMic()">🎤</button>
                    ${type === 'video' ? '<button class="call-control-btn cam" onclick="toggleCamera()">📷</button>' : ''}
                    <button class="call-control-btn end-call" onclick="endCall()">📞</button>
                </div>
            `;
            document.body.appendChild(container);
            document.getElementById('localVideo').srcObject = localStream;
        }

        function toggleMic() { if (localStream) { const track = localStream.getAudioTracks()[0]; if (track) { track.enabled = !track.enabled; const btn = document.querySelector('.call-control-btn.mic'); if (btn) btn.textContent = track.enabled ? '🎤' : '🔇'; } } }
        function toggleCamera() { if (localStream) { const track = localStream.getVideoTracks()[0]; if (track) { track.enabled = !track.enabled; const btn = document.querySelector('.call-control-btn.cam'); if (btn) btn.textContent = track.enabled ? '📷' : '🚫'; } } }
        function endCall() {
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (currentCallTarget) { socket.emit('end-call', { to: currentCallTarget }); currentCallTarget = null; }
            const container = document.getElementById('callContainer');
            if (container) container.remove();
            showToast('Звонок завершён');
        }

        // ========== ПРОФИЛЬ ==========
        function showUserProfile(user) {
            if (!user) return;
            const modal = document.createElement('div');
            modal.className = 'profile-modal';
            modal.innerHTML = `
                <div class="profile-card">
                    <div class="profile-avatar" onclick="viewAvatarExpanded('${user.avatar || '👤'}', '${escapeHtml(user.username)}')">${user.avatar || '👤'}</div>
                    <div class="profile-name">${escapeHtml(user.username)}${VERIFIED_USERS.includes(user.username) ? '<span class="verified-badge">✓</span>' : ''}</div>
                    <div class="profile-status">${user.online ? '🟢 В сети' : '⚫ Не в сети'}</div>

        async function loadMessages() {
            if (!currentUser || !currentChat) return;

            else if (currentChatType === 'channel') { const r = await api('GET', `/get-channel-messages/${currentGroupId}`); fetched = Array.isArray(r) ? r : []; }
            else { const r = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`); fetched = Array.isArray(r) ? r : []; }
            let changed = fetched.length !== messages.length;
            if (!changed) { for (let i = 0; i < fetched.length; i++) { if (JSON.stringify(fetched[i]) !== JSON.stringify(messages[i])) { changed = true; break; } } }

        async function sendMessage(text, fileData = null) {
            if (!text && !fileData && !pendingFile) return;
            if (currentChatType === 'channel' && currentChannelCreator !== currentUser.username) { showToast('⛔ Только автор канала может писать'); return; }
            let endpoint, payload;
            if (currentChatType === 'group') { endpoint = '/send-group-message'; payload = { groupId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: fileData?.url || pendingFile?.url, fileName: fileData?.name || pendingFile?.name, fileType: fileData?.type || pendingFile?.type }; }
            else if (currentChatType === 'channel') { endpoint = '/send-channel-message'; payload = { channelId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: fileData?.url || pendingFile?.url, fileName: fileData?.name || pendingFile?.name, fileType: fileData?.type || pendingFile?.type }; }
            else { endpoint = '/send-message'; payload = { from: currentUser.username, to: currentChat, text: text || '', fileUrl: fileData?.url || pendingFile?.url, fileName: fileData?.name || pendingFile?.name, fileType: fileData?.type || pendingFile?.type }; }

nfo"><div class="chat-name">${escapeHtml(g.name)}</div><div class="chat-preview">Группа</div></div><button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${g.name}', 'group', ${g.id})">✕</button></div>`).join('')}` : ''}${fUsers.length ? `<div class="chat-section">ЛИЧНЫЕ</div>${fUsers.map(u => `<div class="chat-item ${currentChat === u.username ? 'active' : ''}" onclick="selectChat('${u.username}', 'user', null)"><div class="chat-avatar">${u.avatar || '👤'}${u.online ? '<div class="online-indicator"></div>' : ''}</div><div class="chat-info"><div class="chat-name">${escapeHtml(u.username)}${u.verified ? '<span class="verified-badge">✓</span>' : ''}</div><div class="chat-preview">${u.online ? 'В сети' : 'Не в сети'}</div></div><button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${u.username}', 'user', null)">✕</button></div>`).join('')}` : ''}</div><div id="stickerPanel" class="sticker-panel" style="display:none;position:fixed;bottom:80px;right:20px;background:var(--glass-bg);border-radius:24px;padding:16px;z-index:99;grid-template-columns:repeat(5,1fr);gap:12px;max-width:300px;">${STICKERS.map(s => `<div class="sticker" style="font-size:36px;cursor:pointer;padding:8px;text-align:center;" onclick="sendMessage('${s}'); toggleStickerPanel()">${s}</div>`).join('')}</div>`;

        async function renderMessages() {

            for (const msg of messages) { const reacts = await loadReactions(msg.id, currentChatType); reactionsMap.set(msg.id, reacts); }
            let html = '';
            for (const msg of messages) {
                const isOwn = msg.from_user === currentUser.username;
                const reacts = reactionsMap.get(msg.id) || [];
                const userReact = reacts.find(r => r.user_id === currentUser.username);
                const reactGroups = {};
                reacts.forEach(r => { reactGroups[r.reaction] = (reactGroups[r.reaction] || 0) + 1; });
                let fileHtml = '';
                if (msg.file_url && msg.file_url.startsWith('data:image/')) { fileHtml = `<div class="message-file"><img src="${msg.file_url}" onclick="viewImage('${msg.file_url}')"></div>`; }
                let reactsHtml = '';
                for (const [emoji, count] of Object.entries(reactGroups)) { const active = userReact?.reaction === emoji ? 'active' : ''; reactsHtml += `<span class="reaction-badge ${active}" onclick="addReaction(${msg.id}, '${emoji}', '${currentChatType}')">${emoji}${count > 1 ? count : ''}</span>`; }
                html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${msg.id}">${!isOwn && (currentChatType === 'group' || currentChatType === 'channel') ? `<div class="message-sender">${escapeHtml(msg.from_user)}</div>` : ''}<div class="message-bubble" oncontextmenu="showContextMenu(event, ${msg.id}, '${msg.from_user}', '${escapeHtml(msg.text || '').replace(/'/g, "\\'")}', '${msg.file_url || ''}')"><div class="message-text">${escapeHtml(msg.text || '')}</div>${fileHtml}</div><div class="message-meta">${formatTime(msg.timestamp)}${msg.edited ? ' ✎' : ''}</div><div class="reactions">${reactsHtml}</div></div>`;

            container.scrollTop = container.scrollHeight;

        // ========== WEBSOCKET ==========
        function initWebSocket() {
            socket = io();
            socket.on('connect', () => { socket.emit('register', currentUser.username); });
            socket.on('incoming-call', ({ from, type }) => {
                if (confirm(`${from} звонит вам (${type === 'video' ? '🎥 видео' : '🎙️ аудио'}). Ответить?`)) {
                    startAnswerCall(from, type);
                } else { socket.emit('end-call', { to: from }); }
            });
            socket.on('call-answered', async (answer) => {
                if (peerConnection) { await peerConnection.setRemoteDescription(answer); }
            });
            socket.on('ice-candidate', async (candidate) => {
                if (peerConnection) { try { await peerConnection.addIceCandidate(candidate); } catch(e) {} }
            });
            socket.on('call-ended', () => { endCall(); showToast('Звонок завершён собеседником'); });
        }

        async function startAnswerCall(from, type) {
            currentCallTarget = from;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
                showCallUI(from, type);
                createPeerConnection(from, false);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('answer-call', { to: from, answer: offer });
            } catch(err) { showToast('Ошибка'); }
        }

        // ========== АУТЕНТИФИКАЦИЯ ==========
        let isLogin = true;
        function renderAuth() { document.getElementById('app').innerHTML = `<div class="login-container"><div class="login-card"><div class="login-title">DanuMes</div><input type="text" class="login-input" id="authUser" placeholder="Имя"><input type="password" class="login-input" id="authPass" placeholder="Пароль"><button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Регистрация'}</button><div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div></div></div>`; }
        function toggleMode() { isLogin = !isLogin; renderAuth(); }
        async function submitAuth() {
            const user = document.getElementById('authUser').value.trim();
            const pass = document.getElementById('authPass').value;
            if (!user || !pass) { showToast('Заполните поля'); return; }
            const res = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username: user, password: pass });
            if (res.success) {
                if (isLogin) { currentUser = { username: res.username, avatar: res.avatar || '👤', verified: res.verified }; initWebSocket(); renderMain(); }
                else { showToast('Регистрация успешна! Войдите'); isLogin = true; renderAuth(); }
            } else showToast(res.error || 'Ошибка');
        }
        async function renderMain() {
            document.getElementById('app').innerHTML = `<div class="app"><div class="sidebar" id="sidebar"></div><div class="chat-area" id="chatArea"></div></div>`;
            await loadChats();
            if (allChannels.length > 0) selectChat(allChannels[0].name, 'channel', allChannels[0].id, allChannels[0].created_by);
            else if (allGroups.length > 0) selectChat(allGroups[0].name, 'group', allGroups[0].id);
            else if (allUsers.length > 0) selectChat(allUsers[0].username, 'user', null);
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => { loadMessages(); loadChats(); }, 5000);
        }

        window.addReaction = addReaction;
        window.setTheme = setTheme;
        window.selectChat = selectChat;
        window.showCreateGroupModal = showCreateGroupModal;
        window.showCreateChannelModal = showCreateChannelModal;
        window.sendMessage = sendMessage;
        window.sendMessageFromInput = sendMessageFromInput;
        window.showUserProfile = showUserProfile;
        window.viewAvatarExpanded = viewAvatarExpanded;
        window.startMessageFromProfile = startMessageFromProfile;
        window.startVideoCall = startVideoCall;
        window.startAudioCall = startAudioCall;
        window.toggleMic = toggleMic;
        window.toggleCamera = toggleCamera;
        window.endCall = endCall;
        window.viewImage = viewImage;
        window.toggleStickerPanel = toggleStickerPanel;
        window.togglePlusMenu = togglePlusMenu;
        window.submitAuth = submitAuth;
        window.toggleMode = toggleMode;
        window.closeModal = closeModal;
        window.saveEdit = saveEdit;
        window.cancelEdit = cancelEdit;

        renderAuth();
    </script>
</body>
</html>
