<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DanuMes — Мессенджер</title>
  
  <!-- Отключаем кеш -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      /* Для iOS — безопасные зоны */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ===== ТЕМЫ С УЧЁТОМ STATUS BAR ===== */
    body[data-theme="dark"] {
      --bg-main: #0B0B0C;
      --bg-sidebar: #121214;
      --bg-element: #1A1A1E;
      --accent: #5826FF;
      --text-main: #FFFFFF;
      --text-muted: #66666E;
      --border: #2A2A2E;
      --status-bar-bg: #0B0B0C;
    }

    body[data-theme="light"] {
      --bg-main: #F5F5F5;
      --bg-sidebar: #FFFFFF;
      --bg-element: #E8E8E8;
      --accent: #5826FF;
      --text-main: #111111;
      --text-muted: #666666;
      --border: #DDDDDD;
      --status-bar-bg: #F5F5F5;
    }

    body[data-theme="blue"] {
      --bg-main: #0A1628;
      --bg-sidebar: #0F1A2E;
      --bg-element: #17212B;
      --accent: #2B5278;
      --text-main: #E1E1E1;
      --text-muted: #8A8A9A;
      --border: #1F2C3A;
      --status-bar-bg: #0A1628;
    }

    body[data-theme="purple"] {
      --bg-main: #1A0B2E;
      --bg-sidebar: #201240;
      --bg-element: #2A1A4A;
      --accent: #8E44AD;
      --text-main: #E1D5F0;
      --text-muted: #A890C0;
      --border: #35255A;
      --status-bar-bg: #1A0B2E;
    }

    body[data-theme="pink"] {
      --bg-main: #2D132C;
      --bg-sidebar: #3D1F3C;
      --bg-element: #4D2A4C;
      --accent: #E84393;
      --text-main: #FFD9E6;
      --text-muted: #D48AAA;
      --border: #5A3558;
      --status-bar-bg: #2D132C;
    }

    /* Покраска status bar на iOS */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: env(safe-area-inset-top);
      background: var(--status-bar-bg);
      z-index: 1000;
      pointer-events: none;
    }

    /* ОСНОВНОЙ ЛЕЙАУТ */
    .app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* САЙДБАР */
    .sidebar {
      width: 320px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ТЕЛЕФОН */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: env(safe-area-inset-top);
        left: 0;
        width: 100%;
        height: calc(100% - env(safe-area-inset-top));
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        border-right: none;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-overlay {
        position: fixed;
        top: env(safe-area-inset-top);
        left: 0;
        width: 100%;
        height: calc(100% - env(safe-area-inset-top));
        background: rgba(0,0,0,0.5);
        z-index: 99;
        display: none;
      }
      .sidebar-overlay.open {
        display: block;
      }
      .back-button {
        display: flex !important;
      }
      .chat-area {
        width: 100%;
      }
    }

    /* ПК */
    @media (min-width: 769px) {
      .sidebar {
        margin: 8px 0 8px 8px;
        border-radius: 28px;
      }
      .chat-area {
        margin: 8px 8px 8px 0;
        border-radius: 28px;
      }
      .back-button {
        display: none !important;
      }
    }

    .sidebar-header {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 24px;
      font-weight: 600;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    .settings-btn, .logout-btn {
      width: 36px;
      height: 36px;
      background: var(--bg-element);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
    }

    .settings-btn:hover, .logout-btn:hover {
      background: var(--accent);
      color: white;
    }

    .logout-btn:hover {
      background: #ef4444;
    }

    .plus-btn {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: 50px;
      right: 16px;
      background: var(--bg-element);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 0;
      min-width: 180px;
      display: none;
      z-index: 100;
    }

    .dropdown-menu.show { display: block; }
    .dropdown-item { padding: 10px 16px; cursor: pointer; }
    .dropdown-item:hover { background: var(--accent); }

    .search-container { padding: 12px 16px; }
    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-element);
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      font-size: 14px;
    }
    .search-input::placeholder { color: var(--text-muted); }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .chat-section {
      padding: 12px 8px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      cursor: pointer;
      border-radius: 8px;
      position: relative;
    }

    .chat-item:hover { background: var(--bg-element); }
    .chat-item.active { background: var(--bg-element); }

    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--bg-element);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
      flex-shrink: 0;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg-sidebar);
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chat-status { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .delete-chat {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      opacity: 0;
    }
    .chat-item:hover .delete-chat { opacity: 1; }

    /* ЧАТ */
    .chat-area {
      flex: 1;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .chat-header {
      padding: 16px 20px;
      background: var(--bg-sidebar);
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .back-button {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 24px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      display: none;
    }

    .chat-header-avatar {
      width: 44px;
      height: 44px;
      background: var(--bg-element);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-name { font-weight: 600; font-size: 17px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chat-header-status { font-size: 12px; color: var(--text-muted); }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 75%;
      display: flex;
      flex-direction: column;
    }
    .message-own { align-self: flex-end; }
    .message-other { align-self: flex-start; }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--bg-element);
      cursor: pointer;
    }
    .message-own .message-bubble { background: var(--accent); }

    .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
    .message-text { font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .message-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    .message-file { margin-top: 6px; }
    .message-file img { max-width: 200px; max-height: 150px; border-radius: 12px; cursor: pointer; }

    .voice-message { display: flex; align-items: center; gap: 10px; min-width: 180px; flex-wrap: wrap; }
    .voice-play {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
    }
    .voice-timeline { flex: 1; height: 4px; background: var(--border); border-radius: 2px; min-width: 80px; }
    .voice-progress { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; }
    .voice-duration { font-size: 11px; color: var(--text-muted); min-width: 40px; }

    .reactions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .reaction {
      background: var(--bg-element);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .reaction:hover { background: var(--accent); }
    .reaction.active { background: var(--accent); }

    .input-area {
      padding: 16px 20px;
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
    }
    .input-wrapper { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .message-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-element);
      border: none;
      border-radius: 24px;
      color: var(--text-main);
      font-size: 14px;
      resize: none;
      font-family: inherit;
      max-height: 100px;
      min-width: 120px;
    }
    .input-btn {
      width: 42px;
      height: 42px;
      background: var(--bg-element);
      border: none;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }
    .input-btn:hover { background: var(--accent); color: white; }
    .input-btn.send-btn { background: var(--accent); color: white; }

    /* МОДАЛКИ */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: var(--bg-sidebar);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      border: 1px solid var(--border);
    }
    .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    .modal-input {
      width: 100%;
      padding: 12px;
      background: var(--bg-element);
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      margin-bottom: 16px;
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .modal-btn-primary { background: var(--accent); color: white; }
    .modal-btn-cancel { background: var(--bg-element); color: var(--text-muted); }

    .context-menu {
      position: fixed;
      background: var(--bg-element);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 180px;
      overflow: hidden;
      z-index: 1000;
    }
    .context-menu-item { padding: 10px 16px; cursor: pointer; }
    .context-menu-item:hover { background: var(--accent); }

    .sticker-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--bg-element);
      border-radius: 16px;
      padding: 16px;
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      max-width: 280px;
      border: 1px solid var(--border);
      z-index: 99;
    }
    .sticker-panel.show { display: grid; }
    .sticker { font-size: 32px; cursor: pointer; padding: 6px; text-align: center; border-radius: 8px; }

    .voice-recording {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-element);
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .recording-timer { color: #ef4444; }

    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    }
    .profile-card {
      background: var(--bg-sidebar);
      border-radius: 24px;
      padding: 32px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 20px;
      cursor: pointer;
    }
    .profile-name { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .profile-status { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-element);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 3000;
      white-space: nowrap;
    }

    /* ЛОГИН */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      padding: 20px;
    }
    .login-card {
      background: var(--bg-sidebar);
      padding: 40px;
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
    }
    .login-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      color: var(--accent);
    }
    .login-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-element);
      border: none;
      border-radius: 12px;
      color: var(--text-main);
      margin-bottom: 14px;
      font-size: 16px;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .switch-mode {
      text-align: center;
      margin-top: 20px;
      cursor: pointer;
      color: var(--accent);
    }
    .saved-accounts {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .saved-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .saved-account {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-element);
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .saved-account:hover { background: var(--accent); }
    .saved-avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
  </style>
</head>
<body data-theme="dark">
  <div id="app"></div>

  <script>
    // ===== СОХРАНЕНИЕ АККАУНТОВ =====
    const SAVED_ACCOUNTS_KEY = 'danumes_saved_accounts';
    const CURRENT_USER_KEY = 'danumes_current_user';
    
    function saveAccount(username, password, avatar) {
      const accounts = JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
      if (!accounts.find(a => a.username === username)) {
        accounts.push({ username, password, avatar: avatar || '👤' });
        localStorage.setItem(SAVED_ACCOUNTS_KEY, JSON.stringify(accounts));
      }
    }
    
    function getSavedAccounts() {
      return JSON.parse(localStorage.getItem(SAVED_ACCOUNTS_KEY) || '[]');
    }
    
    function saveCurrentUser(user) {
      if (user) {
        localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
      } else {
        localStorage.removeItem(CURRENT_USER_KEY);
      }
    }
    
    function getCurrentUser() {
      const saved = localStorage.getItem(CURRENT_USER_KEY);
      return saved ? JSON.parse(saved) : null;
    }
    
    function clearCurrentUser() {
      localStorage.removeItem(CURRENT_USER_KEY);
    }

    let currentUser = null;
    let currentChat = null;
    let currentChatType = null;
    let currentGroupId = null;
    let currentChannelCreator = null;
    let isSubscribed = false;
    let allUsers = [];
    let allGroups = [];
    let allChannels = [];
    let subscribedChannels = [];
    let messages = [];
    let isSending = false;
    let dropdownOpen = false;
    let currentVoiceAudio = null;

    const VERIFIED = ['Danumala', 'RunFly'];
    const REACTIONS = ['👍', '❤️', '😂', '😮', '😢', '😡'];
    const STICKERS = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','❤️','🔥','✨','⭐','🎉','🎈','🎵','🎸','⚽','🏀','🌈','🍕'];

    function toast(msg) {
      let t = document.querySelector('.toast');
      if (t) t.remove();
      t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function api(method, url, data) {
      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: data ? JSON.stringify(data) : undefined
        });
        return await res.json();
      } catch (e) {
        return { success: false, error: e.message };
      }
    }

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    async function loadChats(force = false) {
      if (!currentUser) return;
      
      const [users, groups, channels] = await Promise.all([
        api('GET', '/get-users'),
        api('GET', `/get-groups/${currentUser.username}`),
        api('GET', `/get-channels/${currentUser.username}`)
      ]);
      
      allUsers = Array.isArray(users) ? users.filter(u => u.username !== currentUser.username) : [];
      allGroups = Array.isArray(groups) ? groups : [];
      allChannels = Array.isArray(channels) ? channels : [];
      
      const subs = await api('GET', `/get-user-subscriptions/${currentUser.username}`);
      subscribedChannels = Array.isArray(subs) ? subs : [];
      
      renderSidebar();
    }

    async function loadMessages(force = false) {
      if (!currentUser || !currentChat) return;
      
      let fetched = [];
      if (currentChatType === 'group') {
        const r = await api('GET', `/get-group-messages/${currentGroupId}`);
        fetched = Array.isArray(r) ? r : [];
      } else if (currentChatType === 'channel') {
        const r = await api('GET', `/get-channel-messages/${currentGroupId}`);
        fetched = Array.isArray(r) ? r : [];
      } else {
        const r = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
        fetched = Array.isArray(r) ? r : [];
      }
      
      messages = fetched;
      renderMessages();
    }

    async function sendMessage(text, file = null) {
      if (isSending) { toast('Подождите...'); return; }
      if (!text && !file) return;
      if (currentChatType === 'channel' && currentChannelCreator !== currentUser?.username) {
        toast('⛔ Только автор канала');
        return;
      }
      isSending = true;
      
      const tempId = Date.now();

    // Голосовые
    let mediaRec = null;
    let audioChunks = [];
    let isRec = false;
    let recTimer = null;
    let recSec = 0;

    async function startVoice() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        audioChunks = [];
        mediaRec.ondataavailable = e => audioChunks.push(e.data);
        mediaRec.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = async () => {
            await sendMessage('🎤 Голосовое сообщение', { url: reader.result, name: 'voice.webm', type: 'audio/webm' });
          };
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t => t.stop());
          document.querySelector('.voice-recording')?.remove();
        };
        mediaRec.start();
        isRec = true;
        recSec = 0;
        const inputArea = document.querySelector('.input-area');
        const rd = document.createElement('div');
        rd.className = 'voice-recording';
        rd.innerHTML = `<span>🎙️ Запись:</span><span class="recording-timer">0:00</span><button class="input-btn" onclick="stopVoice()" style="background:#ef4444;">⏹️</button>`;
        inputArea.insertBefore(rd, inputArea.firstChild);
        recTimer = setInterval(() => {
          recSec++;
          const t = document.querySelector('.recording-timer');
          if (t) t.textContent = `${Math.floor(recSec/60)}:${(recSec%60).toString().padStart(2,'0')}`;
        }, 1000);
      } catch(e) { toast('Нет микрофона'); }
    }

    function stopVoice() {
      if (mediaRec && isRec) { mediaRec.stop(); isRec = false; clearInterval(recTimer); }
    }

    function playVoice(url, btn, progressDiv, durationSpan) {
      if (currentVoiceAudio) {
        currentVoiceAudio.pause();
        currentVoiceAudio = null;
        if (btn) btn.textContent = '▶️';
        return;
      }
      const audio = new Audio(url);
      currentVoiceAudio = audio;
      audio.play();
      btn.textContent = '⏸️';
      
      audio.onloadedmetadata = () => {
        const duration = audio.duration;
        const minutes = Math.floor(duration / 60);
        const seconds = Math.floor(duration % 60);
        if (durationSpan) durationSpan.textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;
      };
      
      audio.ontimeupdate = () => {
        if (progressDiv && audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressDiv.style.width = percent + '%';
        }
      };
      
      audio.onended = () => {
        btn.textContent = '▶️';
        if (progressDiv) progressDiv.style.width = '0%';
        currentVoiceAudio = null;
      };
      
      audio.onerror = () => {
        toast('Ошибка');
        btn.textContent = '▶️';
        currentVoiceAudio = null;
      };
    }

    async function renderMessages() {

      if (!messages.length) { 
        if (currentChat) {

        }
        return; 
      }
      
      const rm = new Map();
      for (const m of messages) {
        if (!m.isTemp) { const r = await getReactions(m.id, currentChatType); rm.set(m.id, r); }
        else rm.set(m.id, []);
      }
      
      let html = '';
      for (const m of messages) {
        const isOwn = m.from_user === currentUser.username;
        const reacts = rm.get(m.id) || [];
        const userReact = reacts.find(r => r.user_id === currentUser.username);
        const rg = {};
        reacts.forEach(r => { rg[r.reaction] = (rg[r.reaction] || 0) + 1; });
        
        let fh = '';
        if (m.file_url) {
          if (m.file_url.startsWith('data:image/')) {
            fh = `<div class="message-file"><img src="${m.file_url}" onclick="viewImage('${m.file_url}')"></div>`;
          } else if (m.file_url.startsWith('data:audio/')) {
            fh = `<div class="voice-message">
              <button class="voice-play" onclick="playVoice('${m.file_url}', this, document.getElementById('progress_${m.id}'), document.getElementById('duration_${m.id}'))">▶️</button>
              <div class="voice-timeline">
                <div class="voice-progress" id="progress_${m.id}"></div>
              </div>
              <span class="voice-duration" id="duration_${m.id}">--:--</span>
            </div>`;
          } else {
            fh = `<div class="message-file"><a href="${m.file_url}" download>📎 ${escapeHtml(m.file_name || 'файл')}</a></div>`;
          }
        }
        
        let rh = '';
        for (const [e,c] of Object.entries(rg)) { const a = userReact?.reaction === e ? 'active' : ''; rh += `<span class="reaction ${a}" onclick="addReaction(${m.id}, '${e}', '${currentChatType}')">${e}${c>1 ? c : ''}</span>`; }
        
        html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${m.id}">${!isOwn && (currentChatType === 'group' || currentChatType === 'channel') ? `<div class="message-sender">${escapeHtml(m.from_user)}${m.from_user === currentChannelCreator ? ' 👑' : ''}</div>` : ''}<div class="message-bubble" oncontextmenu="showMessageContextMenu(event, ${m.id}, '${m.from_user}', '${escapeHtml(m.text || '').replace(/'/g,"\\'")}')"><div class="message-text">${escapeHtml(m.text || '')}</div>${fh}</div><div class="message-meta">${m.isTemp ? '🕐 отправляется...' : formatTime(m.timestamp)}</div><div class="reactions">${rh}</div></div>`;
      }
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function renderChatArea() {
      const ca = document.getElementById('chatArea');
      if (!ca) return;
      
      if (!currentChat) {
        ca.innerHTML = `<div class="empty-state">Выберите чат</div>`;
        return;
      }
      
      let status = '', verified = false;
      const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
      const canWrite = currentChatType !== 'channel' || isAuthor;
      
      if (currentChatType === 'group') status = 'Группа';
      else if (currentChatType === 'channel') status = `Автор: ${currentChannelCreator || '?'}`;
      else if (currentChat) { 
        const u = allUsers.find(u => u.username === currentChat); 
        status = u?.online ? 'В сети' : 'Не в сети'; 
        verified = u?.verified || false; 
      }
      
      const showSubscribeButton = currentChatType === 'channel' && !isAuthor;
      
      ca.innerHTML = `
        <div class="chat-header">
          <button class="back-button" onclick="openSidebar()">←</button>
          <div class="chat-header-avatar" onclick="showProfile(allUsers.find(u=>u.username===currentChat)||{username:currentChat,avatar:currentChatAvatar,online:true})">
            ${currentChatType === 'user' ? (allUsers.find(u=>u.username===currentChat)?.avatar || '👤') : (currentChatType === 'channel' ? '📢' : '👥')}
          </div>
          <div class="chat-header-info">
            <div class="chat-header-name">${escapeHtml(currentChat)}${verified ? ' ✓' : ''}</div>
            <div class="chat-header-status">${status}</div>
          </div>
          ${showSubscribeButton ? `
            <button class="subscribe-btn" onclick="${isSubscribed ? `unsubscribeFromChannel(${currentGroupId}, '${currentChat}')` : `subscribeToChannel(${currentGroupId}, '${currentChat}', '${currentChannelCreator}')`}">
              ${isSubscribed ? 'Отписаться' : 'Подписаться'}
            </button>
          ` : ''}
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        ${!showSubscribeButton ? `
          <div class="input-area">
            <div class="input-wrapper">
              <button class="input-btn" onclick="document.getElementById('fileInput').click()">📎</button>
              <input type="file" id="fileInput" style="display:none;" onchange="uploadFile()">
              <button class="input-btn" onclick="startVoice()">🎙️</button>
              <textarea class="message-input" id="msgInput" placeholder="${canWrite ? (currentChat ? 'Сообщение...' : 'Выберите чат') : 'Только автор'}" ${!currentChat || !canWrite ? 'disabled' : ''} rows="1"></textarea>
              <button class="input-btn send-btn" onclick="sendFromInput()" ${!currentChat || !canWrite ? 'disabled' : ''}>➤</button>
            </div>
          </div>
        ` : ''}
        <div class="sidebar-overlay" onclick="closeSidebar()"></div>
      `;
      
      renderMessages();
      
      if (currentChat && canWrite && !showSubscribeButton) { 
        const i = document.getElementById('msgInput'); 
        if (i) i.addEventListener('keypress', e => { 
          if (e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            sendFromInput(); 
          } 
        }); 
      }
    }

    function uploadFile() {
      const i = document.getElementById('fileInput');
      const f = i.files[0];
      if (!f) return;
      if (f.size > 10*1024*1024) { toast('Файл >10MB'); return; }
      const r = new FileReader();
      r.onloadend = () => sendMessage('', { url: r.result, name: f.name, type: f.type });
      r.readAsDataURL(f);
      i.value = '';
    }

    function toggleSticker() { document.getElementById('stickerPanel')?.classList.toggle('show'); }

    async function deleteChat(id, type, gid) {
      if (!confirm(`Удалить чат?`)) return;
      if (type === 'group' && gid) { await api('POST', '/leave-group', { groupId: gid, userId: currentUser.username }); await loadChats(true); }
      if (currentChat === id) { currentChat = null; renderChatArea(); }
      renderSidebar();
    }

    let isLogin = true;
    
    function renderAuth() {
      const savedAccounts = getSavedAccounts();
      
      document.getElementById('app').innerHTML = `
        <div class="login-container">
          <div class="login-card">
            <div class="login-title">DanuMes</div>
            <input type="text" class="login-input" id="authUser" placeholder="Имя">
            <input type="password" class="login-input" id="authPass" placeholder="Пароль">
            <button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Зарегистрироваться'}</button>
            <div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div>
            ${savedAccounts.length > 0 ? `
              <div class="saved-accounts">
                <div class="saved-title">Сохранённые аккаунты</div>
                ${savedAccounts.map(acc => `
                  <div class="saved-account" onclick="document.getElementById('authUser').value='${acc.username}'; document.getElementById('authPass').value='${acc.password}'; submitAuth()">
                    <div class="saved-avatar">${acc.avatar || '👤'}</div>
                    <div class="saved-name">${escapeHtml(acc.username)}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function toggleMode() { 
      isLogin = !isLogin; 
      renderAuth(); 
    }
    
    async function submitAuth() {
      const u = document.getElementById('authUser').value.trim();
      const p = document.getElementById('authPass').value;
      if (!u || !p) { toast('Заполните поля'); return; }
      
      const r = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username: u, password: p });
      if (r.success) {
        if (isLogin) { 
          currentUser = { username: r.username, avatar: r.avatar || '👤', verified: r.verified };
          saveAccount(u, p, r.avatar);
          saveCurrentUser(currentUser);
          renderMain(); 
        } else { 
          toast('Регистрация успешна! Войдите'); 
          isLogin = true; 
          renderAuth(); 
        }
      } else toast(r.error || 'Ошибка');
    }
    
    async function renderMain() {
      document.getElementById('app').innerHTML = `
        <div class="app">
          <div class="sidebar" id="sidebar"></div>
          <div class="chat-area" id="chatArea"></div>
        </div>
      `;
      await loadChats(true);
      if (allGroups.length) selectChat(allGroups[0].name, 'group', allGroups[0].id);
      else if (allUsers.length) selectChat(allUsers[0].username, 'user', null);
      
      const savedTheme = localStorage.getItem('theme') || 'dark';
      setTheme(savedTheme);
      
      setInterval(() => { loadMessages(); loadChats(); }, 5000);
    }

    // ===== АВТОВХОД =====
    const savedUser = getCurrentUser();
    if (savedUser) {
      currentUser = savedUser;
      renderMain();
    } else {
      renderAuth();
    }

    window.addReaction = addReaction;
    window.updateAvatar = updateAvatar;
    window.setTheme = setTheme;
    window.selectChat = selectChat;
    window.subscribeToChannel = subscribeToChannel;
    window.unsubscribeFromChannel = unsubscribeFromChannel;
    window.showGroupModal = showGroupModal;
    window.showChannelModal = showChannelModal;
    window.createGroup = createGroup;
    window.createChannel = createChannel;
    window.sendMessage = sendMessage;
    window.sendFromInput = sendFromInput;
    window.showAvatarModal = showAvatarModal;
    window.closeModal = closeModal;
    window.submitAuth = submitAuth;
    window.toggleMode = toggleMode;
    window.showMessageContextMenu = showMessageContextMenu;
    window.startVoice = startVoice;
    window.stopVoice = stopVoice;
    window.playVoice = playVoice;
    window.viewImage = viewImage;
    window.showProfile = showProfile;
    window.uploadFile = uploadFile;
    window.toggleDropdown = toggleDropdown;
    window.openSettings = openSettings;
    window.toggleSticker = toggleSticker;
    window.deleteChat = deleteChat;
    window.logout = logout;
    window.openSidebar = openSidebar;
    window.closeSidebar = closeSidebar;
  </script>
</body>
</html>
