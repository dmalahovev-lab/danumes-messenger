<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes Messenger</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1f2833;
            --accent-color: #45f3ff;
            --text-color: #c5c6c7;
            --admin-color: #a855f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Красивое неоновое окно входа */
        #auth-container { background: var(--panel-color); padding: 40px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 0 25px rgba(69, 243, 255, 0.2); text-align: center; border: 1px solid rgba(69, 243, 255, 0.1); }
        .auth-title { margin-bottom: 25px; font-size: 28px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.5px; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 18px; background: #121212; border: 2px solid #2f3e46; border-radius: 8px; color: #fff; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .auth-input:focus { border-color: var(--accent-color); }
        .auth-btn { width: 100%; padding: 14px; background: var(--accent-color); border: none; border-radius: 8px; color: #0b0c10; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(69, 243, 255, 0.3); }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(69, 243, 255, 0.5); }
        .auth-switch { color: #8b9bb4; font-size: 14px; cursor: pointer; transition: color 0.2s; }
        .auth-switch:hover { color: var(--accent-color); }

        /* Основной интерфейс приложения */
        #app-container { display: none; width: 100%; height: 100vh; }
        .messenger-layout { display: flex; width: 100%; height: 100%; }
        
        /* Стили Сайдбара */
        .sidebar { width: 320px; background: var(--panel-color); border-right: 1px solid #2f3e46; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #2f3e46; }
        .search-bar { width: 100%; padding: 10px 14px; background: #121212; border: 1px solid #2f3e46; border-radius: 8px; color: #fff; outline: none; }
        .search-bar:focus { border-color: var(--accent-color); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 16px 20px; border-bottom: 1px solid #1a222d; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
        .chat-item:hover, .chat-item.active { background: #24303f; }
        .badge-admin { color: var(--admin-color); font-weight: bold; margin-left: 5px; }

        /* Окно сообщений */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #0c1119; position: relative; }
        .chat-header { height: 70px; background: var(--panel-color); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #2f3e46; }
        .chat-messages { flex: 1; overflow-y: scroll; padding: 25px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        
        /* Пузыри сообщений (макс. ширина 45%) */
        .message { max-width: 45%; padding: 12px 16px; border-radius: 12px; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        .message.incoming { background: var(--panel-color); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.outgoing { background: #1f4068; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid rgba(69, 243, 255, 0.2); }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
        
        /* Зафиксированная панель ввода внизу */
        .input-panel { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: var(--panel-color); padding: 18px 25px; display: flex; gap: 15px; border-top: 1px solid #2f3e46; align-items: center; z-index: 10; }
        .message-input { flex: 1; padding: 12px; background: #121212; border: 1px solid #2f3e46; border-radius: 8px; color: #fff; outline: none; resize: none; height: 44px; font-size: 15px; }
        .message-input:focus { border-color: var(--accent-color); }
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--accent-color); transition: transform 0.1s; }
        .icon-btn:hover { transform: scale(1.1); }

        /* Контекстное меню, тосты и модалки */
        #custom-context-menu { display: none; position: absolute; z-index: 1000; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 4px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); min-width: 170px; }
        #ctx-delete-btn { width: 100%; text-align: left; background: none; border: none; color: #ff4d4d; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: bold; }
        #ctx-delete-btn:hover { background: rgba(255, 77, 77, 0.1); }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #1f2833; color: #fff; padding: 14px 24px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 14px; animation: slideIn 0.2s ease-out forwards; border-left: 4px solid var(--accent-color); }
        
        #group-modal, #call-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--panel-color); padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #2f3e46; }
        
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- Форма входа/регистрации -->
    <div id="auth-container">
        <div class="auth-title" id="auth-header-text">Вход в DanuMes</div>
        <input type="text" id="username" class="auth-input" placeholder="Имя пользователя" autocomplete="off">
        <input type="password" id="password" class="auth-input" placeholder="Пароль">
        <button id="main-auth-btn" class="auth-btn">Войти</button>
        <div id="auth-toggle" class="auth-switch">Нет аккаунта? Создать аккаунт</div>
    </div>

    <!-- Основной интерфейс чата -->
    <div id="app-container">
        <div class="messenger-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <input type="text" id="search" class="search-bar" placeholder="Поиск людей...">
                    <button id="open-group-modal-btn" style="width:100%; margin-top:12px; background:#121212; color:var(--accent-color); border:1px solid #2f3e46; padding:8px; cursor:pointer; border-radius:6px; font-weight:bold;">+ Создать группу</button>
                </div>
                <div class="chat-list" id="chats"></div>
            </div>
            <div class="chat-window">
                <div class="chat-header">
                    <h3 id="current-chat-title">Выберите чат из списка</h3>
                    <button id="call-btn" style="display: none; background: none; border: none; font-size: 24px; cursor: pointer;" title="Позвонить">📞</button>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="input-panel">
                    <button class="icon-btn" id="img-btn">🖼️</button>
                    <input type="file" id="file-input" accept="image/*" style="display:none;">
                    <textarea class="message-input" id="msg-input" placeholder="Напишите сообщение... (Enter для отправки)"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню удаления -->
    <div id="custom-context-menu">
        <button id="ctx-delete-btn">🗑️ Удалить сообщение</button>
    </div>

    <div id="toast-container"></div>

    <!-- Модалка создания групп -->
    <div id="group-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px; color:var(--accent-color);">Новая группа</h3>
            <input type="text" id="group-name-input" class="auth-input" placeholder="Название группы">
            <div id="group-users-list" style="text-align:left; max-height:150px; overflow-y:auto; margin-bottom:15px; padding:8px; background:#121212; border-radius:8px;"></div>
            <button id="create-group-submit" class="auth-btn">Создать</button>
            <button id="close-group-modal" class="auth-btn" style="background:#444; color:#fff; box-shadow:none;">Отмена</button>
        </div>
    </div>

    <!-- Модалка звонка -->
    <div id="call-modal">
        <div class="modal-content" style="background: #121212; border: 1px solid var(--accent-color);">
            <div style="font-size: 50px; margin-bottom: 15px; animation: pulse 1s infinite;">📞</div>
            <h3 id="caller-name" style="margin-bottom: 25px; font-size: 20px; color:#fff;">Входящий вызов...</h3>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="accept-call-btn" style="background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px;">Принять</button>
                <button id="reject-call-btn" style="background: #e74c3c; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px;">Сбросить</button>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        const socket = io();
        let currentUser = null;
        let activeChat = { type: null, id: null };
        let isSelectionForRegister = false;
        let selectedMessageId = null;
        let allUsersCached = [];
        
        let localStream = null, peerConnection = null, currentCallSession = null, ringtoneInterval = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:://google.com' }] };

        function showToast(text, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(type === 'error') toast.style.borderLeftColor = '#ff4d4d';
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function playNotifySound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.12);
            } catch(e){}
        }

        function playRingtone() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                ringtoneInterval = setInterval(() => {
                    let osc = ctx.createOscillator(), gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                }, 1000);
            } catch(e){}
        }
         Miz()
        function stopRingtone() { clearInterval(ringtoneInterval); }

        // Переключение Вход / Регистрация
        document.getElementById('auth-toggle').addEventListener('click', () => {
            isSelectionForRegister = !isSelectionForRegister;
            document.getElementById('auth-header-text').innerText = isSelectionForRegister ? 'Регистрация' : 'Вход в DanuMes';
            document.getElementById('main-auth-btn').innerText = isSelectionForRegister ? 'Создать аккаунт' : 'Войти';
            document.getElementById('auth-toggle').innerText = isSelectionForRegister ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать аккаунт';
        });

        // СВЯТОЙ КОД АВТОРИЗАЦИИ (строго user и pass, оригинальные эндпоинты)
        document.getElementById('main-auth-btn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return showToast('Заполните все поля', 'error');

            const url = isSelectionForRegister ? '/api/register' : '/api/login';
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                
                const data = await response.json();

                if (response.ok) {
                    currentUser = { username: user };
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                    showToast(`Вы успешно вошли как ${user}`);
                    socket.emit('register_user', user);
                    initSidebar();
                } else {
                    showToast(data.message || 'Ошибка авторизации', 'error');
                }
            } catch (err) {
                showToast('Ошибка сервера. Проверьте логи деплоя Render.', 'error');
            }
        });

        function initSidebar() {
            const chatsContainer = document.getElementById('chats');
            chatsContainer.innerHTML = '';
            
            const newsDiv = document.createElement('div');
            newsDiv.className = 'chat-item';
            newsDiv.innerHTML = `<span>📢 DanuMes news</span>`;
            newsDiv.onclick = () => selectChat('news', 'danumes_news', 'DanuMes news');
            chatsContainer.appendChild(newsDiv);

            socket.emit('get_online_users');
        }

        socket.on('update_users', (users) => {
            allUsersCached = users;
            renderUsersList(users);
        });

        function renderUsersList(users) {
            const chatsContainer = document.getElementById('chats');
            const items = chatsContainer.querySelectorAll('.chat-item');
            items.forEach((item, index) => { if(index > 0) item.remove(); });

            users.forEach(u => {
                if (u !== currentUser.username) {
                    const div = document.createElement('div');
                    div.className = 'chat-item' + (activeChat.id === u ? ' active' : '');
                    let adminBadge = u === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
                    div.innerHTML = `<span>👤 ${u}${adminBadge}</span>`;
                    div.onclick = () => selectChat('private', u, u);
                    chatsContainer.appendChild(div);
                }
            });
        }

        // Живой поиск в сайдбаре на лету
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = allUsersCached.filter(u => u.toLowerCase().includes(query));
            renderUsersList(filtered);
        });

        function selectChat(type, id, title) {
            activeChat = { type, id };
            
            const items = document.querySelectorAll('.chat-item');
            items.forEach(el => el.classList.remove('active'));
            
            document.getElementById('current-chat-title').innerHTML = title + (id === 'Danumala' ? '<span class="badge-admin">✓</span>' : '');
            document.getElementById('chat-messages').innerHTML = '';
            
            const callBtn = document.getElementById('call-btn');
            if (type === 'private' && id !== 'danumes_news') {
                callBtn.style.display = 'inline-block';
            } else {
                callBtn.style.display = 'none';
            }

            socket.emit('load_messages', { type, id });
        }

        socket.on('messages_history', (messages) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = '';
            messages.forEach(renderSingleMessage);
            box.scrollTop = box.scrollHeight;
        });

        function renderSingleMessage(msg) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isOwn = msg.author === currentUser.username;
            
            div.className = `message ${isOwn ? 'outgoing' : 'incoming'}`;
            div.dataset.id = msg.id;
            div.dataset.author = msg.author;
            
            let adminMark = msg.author === 'Danumala' ? '<span class="badge-admin">✓</span>' : '';
            let content = `<strong>${msg.author}${adminMark}:</strong><br>`;
            
            if (msg.text) content += `<span>${msg.text}</span>`;
            if (msg.image) content += `<img src="${msg.image}">`;
            
            div.innerHTML = content;
            box.appendChild(div);
        }

        // Отправка сообщений по Enter
        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = e.target.value.trim();
                if (!text || !activeChat.id) return;
                
                if (activeChat.id === 'danumes_news' && currentUser.username !== 'Danumala') {
                    showToast('Писать сюда может только администратор Danumala', 'error');
                    e.target.value = '';
                    return;
                }

                socket.emit('send_msg', {
                    type: activeChat.type,
                    to: activeChat.id,
                    text: text
                });
                e.target.value = '';
            }
        });

        // Base64 Картинки
        document.getElementById('img-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !activeChat.id) return;
            const reader = new FileReader();
            reader.onload = () => {
                socket.emit('send_msg', {
                    type: activeChat.type,
                    to: activeChat.id,
                    image: reader.result
                });
            };
            reader.readAsDataURL(file);
        });

        socket.on('new_msg', (msg) => {
            if ((activeChat.type === msg.type && (activeChat.id === msg.to || activeChat.id === msg.author)) || (msg.type === 'news' && activeChat.id === 'danumes_news')) {
                renderSingleMessage(msg);
                const box = document.getElementById('chat-messages');
                box.scrollTop = box.scrollHeight;
            }
            if (msg.author !== currentUser.username) playNotifySound();
        });

        // Контекстное меню и удаление сообщений у всех участников
        const ctxMenu = document.getElementById('custom-context-menu');
        document.getElementById('chat-messages').addEventListener('contextmenu', (e) => {
            const msgEl = e.target.closest('.message');
            if (!msgEl) return;

            const author = msgEl.dataset.author;
            if (currentUser.username === 'Danumala' || currentUser.username === author) {
                e.preventDefault();
                selectedMessageId = msgEl.dataset.id;
                ctxMenu.style.left = `${e.pageX}px`;
                ctxMenu.style.top = `${e.pageY}px`;
                ctxMenu.style.display = 'block';
            }
        });

        document.addEventListener('click', () => ctxMenu.style.display = 'none');

        document.getElementById('ctx-delete-btn').addEventListener('click', () => {
            if (!selectedMessageId) return;
            socket.emit('req_delete_message', { messageId: selectedMessageId, user: currentUser.username });
        });

        socket.on('msg_deleted', (messageId) => {
            const el = document.querySelector(`[data-id="${messageId}"]`);
            if (el) el.remove();
        });

        // WebRTC аудиозвонки сигналинг
        document.getElementById('call-btn').addEventListener('click', async () => {
            showToast(`Вызов пользователя ${activeChat.id}...`);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            socket.emit('call_init', { to: activeChat.id, from: currentUser.username });
        });

        socket.on('call_incoming', (data) => {
            currentCallSession = data;
            document.getElementById('caller-name').innerText = `Вам звонит ${data.from}`;
            document.getElementById('call-modal').style.display = 'flex';
            playRingtone();
        });

        document.getElementById('accept-call-btn').addEventListener('click', async () => {
            stopRingtone();
            document.getElementById('call-modal').style.display = 'none';
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            
            peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams[0]; };
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice_candidate', { to: currentCallSession.from, candidate: e.candidate });
            };
            socket.emit('call_accepted', { to: currentCallSession.from, from: currentUser.username });
        });

        socket.on('start_handshake', async (data) => {
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            
            peerConnection.ontrack = (e) => { document.getElementById('remote-audio').srcObject = e.streams[0]; };
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice_candidate', { to: data.from, candidate: e.candidate });
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('rtc_offer', { to: data.from, offer: offer });
        });

        socket.on('receive_offer', async (data) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const ans = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(ans);
            socket.emit('rtc_answer', { to: data.from, answer: ans });
        });

        socket.on('receive_answer', async (data) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        });

        socket.on('receive_ice', async (data) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        });

        const closeCallChannels = () => {
            stopRingtone();
            document.getElementById('call-modal').style.display = 'none';
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            showToast('Звонок завершен');
        };

        document.getElementById('reject-call-btn').addEventListener('click', () => {
            if(currentCallSession) socket.emit('call_rejected', { to: currentCallSession.from });
            closeCallChannels();
        });

        socket.on('call_ended', closeCallChannels);

        document.getElementById('open-group-modal-btn').addEventListener('click', () => document.getElementById('group-modal').style.display = 'flex');
        document.getElementById('close-group-modal').addEventListener('click', () => document.getElementById('group-modal').style.display = 'none');
    </script>
</body>
</html>
