<script>
    const SERVER_URL = 'https://onrender.com';
    let currentUser = localStorage.getItem('danumes_user') || null;
    let activeChat = null;
    let isGroupChat = false;
    let serverData = { users: {}, messages: [], groups: [] };

    if (currentUser) { showMessenger(); }

    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    async function authAction(endpoint) {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert('Заполните поля');
        try {
            const r = await fetch(`${SERVER_URL}/api/${endpoint}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: u, pass: p })
            });
            const d = await r.json();
            if(d.success) {
                if(endpoint === 'login') {
                    currentUser = u;
                    localStorage.setItem('danumes_user', u);
                    showMessenger();
                } else { alert('Регистрация успешна'); }
            } else { alert(d.error || 'Ошибка'); }
        } catch(e) { alert('Ошибка сети'); }
    }

    function showMessenger() {
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('app-screen').classList.add('active');
        document.getElementById('profile-name').innerText = currentUser;
        startSync();
    }

    function startSync() { syncData(); setInterval(syncData, 3000); }

    async function syncData() {
        if(!currentUser) return;
        try {
            const r = await fetch(`${SERVER_URL}/api/sync`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: currentUser })
            });
            serverData = await r.json();
            renderSidebar();
            renderMessages();
        } catch(e){}
    }

    function renderSidebar() {
        const container = document.getElementById('friends-list');
        container.innerHTML = '';

        // Отображение созданных групп для ВСЕХ аккаунтов
        if (serverData.groups) {
            serverData.groups.forEach(g => {
                const div = document.createElement('div');
                div.className = `friend-item ${activeChat === g.name && isGroupChat ? 'active' : ''}`;
                div.onclick = () => selectChat(g.name, true);
                div.innerHTML = `
                    <div class="avatar-fallback" style="background: rgba(168,85,247,0.2); color:#a855f7;">#</div>
                    <div style="flex:1;">
                        <div style="font-weight:500;">${g.name}</div>
                        <div style="font-size:11px; color:#a855f7;">Групповой чат</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Отображение друзей
        Object.keys(serverData.users).forEach(u => {
            if(u === currentUser) return;
            const isOnline = serverData.users[u].online;
            const div = document.createElement('div');
            div.className = `friend-item ${activeChat === u && !isGroupChat ? 'active' : ''}`;
            div.onclick = () => selectChat(u, false);
            div.innerHTML = `
                <div class="avatar-fallback">${u.substr(0,2).toUpperCase()}</div>
                <div style="flex:1;">
                    <div style="font-weight:500;">${u}</div>
                    <div style="font-size:11px; color:${isOnline?'#10b981':'#6b7280'}">${isOnline?'В сети':'Не в сети'}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function selectChat(name, isGroup) {
        activeChat = name;
        isGroupChat = isGroup;
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-status').innerText = isGroup ? 'Публичная группа' : 'Личные сообщения';
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('messages-container');
        if(!activeChat) return;
        const currentScroll = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;
        container.innerHTML = '';

        const filtered = serverData.messages.filter(m => {
            if(isGroupChat) return m.isGroup && m.to === activeChat;
            return !m.isGroup && ((m.from === currentUser && m.to === activeChat) || (m.from === activeChat && m.to === currentUser));
        });

        filtered.forEach(m => {
            const div = document.createElement('div');
            const isOut = m.from === currentUser;
            div.className = `message-row ${isOut ? 'outbound' : 'inbound'}`;
            div.innerHTML = `
                <div class="message-bubble">
                    ${!isOut && isGroupChat ? `<div style="font-size:11px; color:#3b82f6; font-weight:600; margin-bottom:2px;">@${m.from}</div>` : ''}
                    <div>${m.text}</div>
                    <div class="message-time">${new Date(m.timestamp || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `;
            container.appendChild(div);
        });
        if(currentScroll) container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if(!text || !activeChat) return;
        try {
            await fetch(`${SERVER_URL}/api/messages/send`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: currentUser, to: activeChat, text: text, isGroup: isGroupChat })
            });
            input.value = '';
            syncData();
        } catch(e){}
    }

    // --- ОТПРАВКА СООБЩЕНИЙ ПО НАЖАТИЮ ENTER ---
    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    // Привязываем функцию к инпуту после загрузки страницы
    document.addEventListener("DOMContentLoaded", () => {
        const input = document.getElementById('message-input');
        if (input) {
            input.addEventListener('keypress', handleKeyPress);
        }
    });

    function openCreateGroupModal() {
        const name = prompt('Введите название новой группы:');
        if(!name) return;
        createGroup(name.trim());
    }

    async function createGroup(name) {
        try {
            const r = await fetch(`${SERVER_URL}/api/groups/create`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, creator: currentUser })
            });
            const d = await r.json();
            if(d.success) { syncData(); } else { alert(d.error); }
        } catch(e){}
    }

    function logout() { localStorage.removeItem('danumes_user'); location.reload(); }
</script>
