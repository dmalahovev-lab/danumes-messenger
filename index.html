<!DOCTYPE html>
<html>
<head>
    <title>DanuMes тест</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: white; }
        .chat { max-width: 600px; margin: 0 auto; }
        .message { margin: 10px 0; padding: 8px; background: #16213e; border-radius: 8px; }
        .own { background: #0f3460; text-align: right; }
        input, button { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    let currentUser = null;
    let currentChat = 'RunFly';

    async function api(method, url, data) {
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: data ? JSON.stringify(data) : undefined
        });
        return res.json();
    }

    async function loadMessages() {
        const res = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
        const messages = res;
        const container = document.getElementById('messages');
        if (!container) return;
        container.innerHTML = messages.map(m => `
            <div class="message ${m.from_user === currentUser.username ? 'own' : ''}">
                <strong>${m.from_user}:</strong> ${m.text}
                <small>${new Date(m.timestamp).toLocaleTimeString()}</small>
            </div>
        `).join('');
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        await api('POST', '/send-message', {
            from: currentUser.username,
            to: currentChat,
            text: text
        });
        input.value = '';
        loadMessages();
    }

    async function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const res = await api('POST', '/login-attempt', { username, password });
        if (res.success) {
            currentUser = { username: res.username, avatar: res.avatar, verified: res.verified };
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('chatDiv').style.display = 'block';
            loadMessages();
            setInterval(loadMessages, 3000);
        } else {
            alert('Ошибка: ' + res.error);
        }
    }

    document.getElementById('app').innerHTML = `
        <div id="loginDiv" class="chat">
            <h2>DanuMes вход</h2>
            <input type="text" id="loginUsername" placeholder="Логин"><br>
            <input type="password" id="loginPassword" placeholder="Пароль"><br>
            <button onclick="login()">Войти</button>
        </div>
        <div id="chatDiv" class="chat" style="display:none;">
            <h2>Чат с <span id="chatName">RunFly</span></h2>
            <div id="messages"></div>
            <input type="text" id="messageInput" placeholder="Сообщение">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    `;
</script>
</body>
</html>
