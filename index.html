<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Современный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ========== 5 ТЕМ ========== */
        body[data-theme="blue"] {
            --bg-page: #0a1628;
            --bg-sidebar: rgba(15, 26, 46, 0.95);
            --bg-header: rgba(23, 33, 43, 0.9);
            --bg-chat: #0e1621;
            --bg-message-own: #2b5278;
            --bg-message-other: #182533;
            --bg-input: #17212b;
            --text-primary: #e1e1e1;
            --text-secondary: #8a8a9a;
            --border: rgba(31, 44, 58, 0.5);
            --accent: #2b5278;
            --accent-glow: rgba(43, 82, 120, 0.4);
            --accent-hover: #3a6b99;
            --online: #4caf50;
            --verified: #4caf50;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --glass-bg: rgba(23, 33, 43, 0.8);
        }

        body[data-theme="light"] {
            --bg-page: #eef2f5;
            --bg-sidebar: rgba(255,255,255,0.95);
            --bg-header: rgba(255,255,255,0.9);
            --bg-chat: #eef2f5;
            --bg-message-own: #e4e6eb;
            --bg-message-other: #ffffff;
            --bg-input: #ffffff;
            --text-primary: #111111;
            --text-secondary: #65676b;
            --border: rgba(228, 230, 235, 0.8);
            --accent: #0088cc;
            --accent-glow: rgba(0,136,204,0.3);
            --accent-hover: #0099e6;
            --online: #31a24c;
            --verified: #31a24c;
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
            --glass-bg: rgba(255,255,255,0.8);
        }

        body[data-theme="dark"] {
            --bg-page: #0f0f11;
            --bg-sidebar: rgba(26, 26, 36, 0.95);
            --bg-header: rgba(32, 32, 42, 0.9);
            --bg-chat: #15151c;
            --bg-message-own: #2b5278;
            --bg-message-other: #20202a;
            --bg-input: #20202a;
            --text-primary: #e1e1e1;
            --text-secondary: #8a8a9a;
            --border: rgba(42, 42, 54, 0.5);
            --accent: #2b5278;
            --accent-glow: rgba(43,82,120,0.4);
            --accent-hover: #3a6b99;
            --online: #4caf50;
            --verified: #4caf50;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --glass-bg: rgba(32,32,42,0.8);
        }

        body[data-theme="purple"] {
            --bg-page: #1a0b2e;
            --bg-sidebar: rgba(32, 18, 64, 0.95);
            --bg-header: rgba(42, 26, 74, 0.9);
            --bg-chat: #150828;
            --bg-message-own: #6c3483;
            --bg-message-other: #2a1a4a;
            --bg-input: #2a1a4a;
            --text-primary: #e1d5f0;
            --text-secondary: #a890c0;
            --border: rgba(53, 37, 90, 0.5);
            --accent: #8e44ad;
            --accent-glow: rgba(142,68,173,0.4);
            --accent-hover: #a569bd;
            --online: #2ecc71;
            --verified: #f39c12;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --glass-bg: rgba(42,26,74,0.8);
        }

        body[data-theme="pink"] {
            --bg-page: #2d132c;
            --bg-sidebar: rgba(61, 31, 60, 0.95);
            --bg-header: rgba(77, 42, 76, 0.9);
            --bg-chat: #250f24;
            --bg-message-own: #b83b5e;
            --bg-message-other: #3d1f3c;
            --bg-input: #4d2a4c;
            --text-primary: #ffd9e6;
            --text-secondary: #d48aaa;
            --border: rgba(90, 53, 88, 0.5);
            --accent: #e84393;
            --accent-glow: rgba(232,67,147,0.4);
            --accent-hover: #f0629e;
            --online: #2ecc71;
            --verified: #f1c40f;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --glass-bg: rgba(77,42,76,0.8);
        }

        .app { display: flex; height: 100vh; }

        /* Сайдбар - максимальные закругления */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            margin: 8px 0 8px 8px;
            border-radius: 28px;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: var(--bg-header);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            border-radius: 28px 28px 0 0;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow);
        }

        .avatar:hover { transform: scale(1.05) rotate(5deg); }

        .user-info { flex: 1; }
        .username { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 6px; }
        .verified-badge { color: var(--verified); font-size: 16px; filter: drop-shadow(0 0 4px var(--verified)); }
        .user-status { font-size: 12px; color: var(--online); margin-top: 4px; }

        .action-buttons { display: flex; gap: 8px; }
        .action-btn {
            flex: 1; padding: 8px; background: var(--bg-page); border: none;
            border-radius: 20px; color: var(--text-primary); cursor: pointer; font-size: 13px;
            transition: all 0.2s ease; backdrop-filter: blur(5px);
        }
        .action-btn:hover { background: var(--accent); transform: translateY(-2px); }

        .search-container { padding: 12px 16px; }
        .search-input {
            width: 100%; padding: 12px 16px; background: var(--bg-page);
            border: 1px solid var(--border); border-radius: 28px;
            color: var(--text-primary); font-size: 14px;
            transition: all 0.2s ease;
        }
        .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .chats-list { flex: 1; overflow-y: auto; padding: 8px 8px 16px 8px; }
        .chat-section { padding: 8px 16px 4px; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        .chat-item {
            display: flex; align-items: center; gap: 14px; padding: 12px 16px;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin: 4px 0; border-radius: 20px;
        }
        .chat-item:hover { background: var(--bg-header); transform: translateX(4px); }
        .chat-item.active { background: var(--accent); box-shadow: 0 4px 12px var(--accent-glow); }

        .chat-avatar {
            width: 52px; height: 52px; background: var(--bg-page); border-radius: 26px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            position: relative; flex-shrink: 0; transition: all 0.2s;
        }
        .online-indicator {
            position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px;
            background: var(--online); border-radius: 6px; border: 2px solid var(--bg-sidebar);
            box-shadow: 0 0 0 2px var(--bg-sidebar);
        }

        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .chat-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }

        /* Область чата */
        .chat-area {
            flex: 1; display: flex; flex-direction: column; background: var(--bg-chat);
            margin: 8px 8px 8px 0; border-radius: 28px; overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px; background: var(--bg-header); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px;
        }
        .chat-header-avatar {
            width: 48px; height: 48px; background: var(--bg-page); border-radius: 24px;
            display: flex; align-items: center; justify-content: center; font-size: 26px;
        }
        .chat-header-name { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 6px; }
        .chat-header-status { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

        /* Сообщения */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .message {
            max-width: 70%; display: flex; flex-direction: column;
            animation: messageSlide 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message-own { align-self: flex-end; }
        .message-other { align-self: flex-start; }

        .message-bubble {
            padding: 12px 18px; border-radius: 24px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .message-own .message-bubble { 
            background: var(--bg-message-own); 
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message-other .message-bubble { 
            background: var(--bg-message-other); 
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message-bubble:hover { transform: scale(1.02); }

        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 6px; color: var(--accent); }
        .message-text { font-size: 14px; line-height: 1.45; word-wrap: break-word; }
        .message-meta { font-size: 10px; color: var(--text-secondary); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
        .message-edited { font-style: italic; }

        .message-file { margin-top: 8px; }
        .message-file a { color: var(--accent); text-decoration: none; font-size: 13px; }
        .message-file img { max-width: 220px; max-height: 160px; border-radius: 20px; cursor: pointer; transition: transform 0.2s; }
        .message-file img:hover { transform: scale(1.02); }

        /* Реакции */
        .reactions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .reaction-badge {
            background: var(--bg-header); border-radius: 40px; padding: 4px 12px; font-size: 14px;
            display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }
        .reaction-badge:hover { background: var(--accent); transform: scale(1.08) translateY(-2px); }
        .reaction-badge.active { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        /* Ввод */
        .input-area {
            padding: 16px 24px; background: var(--bg-header); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .message-input {
            flex: 1; padding: 14px 20px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 30px; color: var(--text-primary); font-size: 15px; resize: none; font-family: inherit;
            max-height: 100px; transition: all 0.2s;
        }
        .message-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-btn {
            width: 48px; height: 48px; background: var(--accent); border: none; border-radius: 30px;
            color: white; cursor: pointer; font-size: 20px; transition: all 0.2s ease;
        }
        .input-btn:hover { background: var(--accent-hover); transform: scale(1.08) rotate(5deg); }

        /* Меню */
        .context-menu {
            position: fixed; background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow);
            z-index: 1000; min-width: 220px; overflow: hidden;
            animation: menuPop 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes menuPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .context-menu-item { padding: 12px 20px; cursor: pointer; transition: all 0.15s; font-size: 14px; }
        .context-menu-item:hover { background: var(--accent); padding-left: 28px; }

        .reaction-menu {
            position: fixed; background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 50px; z-index: 1001;
            display: flex; gap: 12px; padding: 12px 20px; animation: menuPop 0.2s ease;
        }
        .reaction-option { font-size: 28px; cursor: pointer; padding: 5px; transition: all 0.15s; }
        .reaction-option:hover { transform: scale(1.3) rotate(10deg); }

        /* Модалки */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border-radius: 32px; padding: 28px; width: 90%; max-width: 420px;
            border: 1px solid var(--border); animation: modalSlide 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes modalSlide { from { transform: translateY(-30px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 14px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 20px; color: var(--text-primary); margin-bottom: 16px; font-size: 15px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn { padding: 12px 24px; border: none; border-radius: 30px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .modal-btn-primary { background: var(--accent); color: white; }
        .modal-btn-primary:hover { transform: scale(1.05); background: var(--accent-hover); }

        .edit-input {
            width: 100%; padding: 12px 16px; background: var(--bg-page); border: 1px solid var(--accent);
            border-radius: 24px; color: var(--text-primary); font-size: 14px; margin-bottom: 12px;
        }

        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(20px); padding: 14px 28px;
            border-radius: 40px; font-size: 14px; z-index: 3000; border: 1px solid var(--border);
            animation: toastSlide 0.3s ease; font-weight: 500;
        }
        @keyframes toastSlide { from { opacity: 0; transform: translateX(-50%) translateY(30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .login-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-page); }
        .login-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); padding: 48px; border-radius: 48px;
            width: 100%; max-width: 420px; border: 1px solid var(--border);
            animation: modalSlide 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .login-title { font-size: 42px; font-weight: 800; margin-bottom: 36px; text-align: center; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .login-input { width: 100%; padding: 16px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 28px; color: var(--text-primary); margin-bottom: 16px; font-size: 16px; transition: all 0.2s; }
        .login-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .login-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 32px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .login-btn:hover { transform: translateY(-2px); background: var(--accent-hover); box-shadow: 0 8px 20px var(--accent-glow); }
        .switch-mode { text-align: center; margin-top: 24px; cursor: pointer; color: var(--accent); font-size: 14px; transition: all 0.2s; }
        .switch-mode:hover { transform: scale(1.05); text-decoration: underline; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -340px; top: 8px; height: calc(100% - 16px); z-index: 100; transition: left 0.3s ease; }
            .sidebar.open { left: 8px; }
            .message { max-width: 85%; }
            .chat-area { margin: 8px; }
        }
    </style>
</head>
<body data-theme="blue">
    <div id="app"></div>

    <script>
        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let currentGroupId = null;
        let currentChatAvatar = null;
        let allUsers = [];
        let allGroups = [];
        let messages = [];
        let editingMessageId = null;
        let updateInterval = null;
        let pendingFile = null;

        const VERIFIED_USERS = ['Danumala', 'RunFly'];
        const REACTIONS = ['👍', '❤️', '😂', '😮', '😢', '😡'];

        function showToast(msg) {
            let toast = document.querySelector('.toast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function api(method, url, data) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (data) options.body = JSON.stringify(data);
                const res = await fetch(url, options);
                return await res.json();
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function formatTime(ts) { if (!ts) return ''; const d = new Date(ts); return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        async function loadChats() {
            if (!currentUser) return;
            const users = await api('GET', '/get-users');
            allUsers = Array.isArray(users) ? users.filter(u => u.username !== currentUser.username) : [];
            const groups = await api('GET', `/get-groups/${currentUser.username}`);
            allGroups = Array.isArray(groups) ? groups : [];
            renderSidebar();
        }

        async function loadMessages() {
            if (!currentUser || !currentChat) return;
            let fetchedMessages = [];
            if (currentChatType === 'group' && currentGroupId) {
                const res = await api('GET', `/get-group-messages/${currentGroupId}`);
                fetchedMessages = Array.isArray(res) ? res : [];
            } else {
                const res = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                fetchedMessages = Array.isArray(res) ? res : [];
            }
            
            let hasChanges = fetchedMessages.length !== messages.length;
            if (!hasChanges) {
                for (let i = 0; i < fetchedMessages.length; i++) {
                    if (JSON.stringify(fetchedMessages[i]) !== JSON.stringify(messages[i])) {
                        hasChanges = true;
                        break;
                    }
                }
            }
            if (hasChanges) { messages = fetchedMessages; renderMessages(); }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input?.value.trim();
            if (!text && !pendingFile) return;
            
            const endpoint = currentChatType === 'group' ? '/send-group-message' : '/send-message';
            const payload = currentChatType === 'group' ? {
                groupId: currentGroupId, from: currentUser.username, text: text || '',
                fileUrl: pendingFile?.url, fileName: pendingFile?.name, fileType: pendingFile?.type
            } : {
                from: currentUser.username, to: currentChat, text: text || '',
                fileUrl: pendingFile?.url, fileName: pendingFile?.name, fileType: pendingFile?.type
            };
            
            const res = await api('POST', endpoint, payload);
            if (res.success) {
                if (input) input.value = '';
                pendingFile = null;
                await loadMessages();
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            } else showToast('Ошибка: ' + (res.error || 'Неизвестно'));
        }

        function uploadFile() {
            const input = document.getElementById('fileInput');
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { showToast('Файл слишком большой (макс 10MB)'); return; }
            const reader = new FileReader();
            reader.onloadend = function() {
                pendingFile = { url: reader.result, name: file.name, type: file.type };
                const msgInput = document.getElementById('msgInput');
                if (msgInput) { msgInput.value = '📎 ' + file.name; msgInput.focus(); }
                showToast('Файл готов к отправке');
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        async function editMessage(id, newText) {
            const res = await api('PUT', `/edit-message/${id}`, { text: newText });
            if (res.success) { await loadMessages(); showToast('Сообщение изменено'); }
            else showToast('Ошибка редактирования');
        }

        async function deleteMessage(id) {
            if (!confirm('Удалить сообщение?')) return;
            const res = await api('DELETE', `/delete-message/${id}`);
            if (res.success) { await loadMessages(); showToast('Сообщение удалено'); }
            else showToast('Ошибка удаления');
        }

        async function addReaction(msgId, reaction, type) {
            const res = await api('POST', '/add-reaction', {
                messageId: parseInt(msgId), userId: currentUser.username, reaction, type
            });
            if (res.success) await loadMessages();
        }

        async function loadReactions(msgId, type) {
            const res = await api('GET', `/get-reactions/${msgId}/${type}`);
            return Array.isArray(res) ? res : [];
        }

        async function createGroup() {
            const name = document.getElementById('groupName')?.value.trim();
            if (!name) { showToast('Введите название'); return; }
            const selected = Array.from(document.querySelectorAll('.user-select:checked')).map(cb => cb.value);
            const res = await api('POST', '/create-group', { name, creator: currentUser.username, members: selected });
            if (res.success) {
                closeModal();
                await loadChats();
                showToast(`Группа "${name}" создана`);
                if (res.group) selectChat(res.group.name, 'group', res.group.id);
            } else showToast('Ошибка: ' + (res.error || 'Неизвестно'));
        }

        function selectChat(chatId, type, groupId = null) {
            if (currentChat === chatId && currentChatType === type) return;
            currentChat = chatId;
            currentChatType = type;
            currentGroupId = groupId;
            editingMessageId = null;
            if (type === 'user') {
                const user = allUsers.find(u => u.username === chatId);
                currentChatAvatar = user?.avatar || '👤';
            } else currentChatAvatar = '👥';
            renderSidebar();
            renderChatArea();
            loadMessages();
        }

        async function updateAvatar(avatar) {
            const res = await api('POST', '/update-avatar', { username: currentUser.username, avatar });
            if (res.success) {
                currentUser.avatar = avatar;
                renderSidebar();
                if (currentChatType === 'user') { currentChatAvatar = avatar; renderChatArea(); }
                showToast('Аватар обновлён');
            }
            closeModal();
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function showContextMenu(e, msgId, msgFrom, msgText, fileUrl) {
            e.preventDefault();
            e.stopPropagation();
            const existing = document.querySelector('.context-menu');
            if (existing) existing.remove();
            const isOwn = msgFrom === currentUser.username;
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            
            if (isOwn) {
                const edit = document.createElement('div');
                edit.className = 'context-menu-item';
                edit.textContent = '✏️ Редактировать';
                edit.onclick = () => { startEditing(msgId, msgText); menu.remove(); };
                menu.appendChild(edit);
                const del = document.createElement('div');
                del.className = 'context-menu-item';
                del.textContent = '🗑️ Удалить';
                del.onclick = () => { deleteMessage(msgId); menu.remove(); };
                menu.appendChild(del);
            }
            const react = document.createElement('div');
            react.className = 'context-menu-item';
            react.textContent = '😊 Поставить реакцию';
            react.onclick = (ev) => { ev.stopPropagation(); menu.remove(); showReactionMenu(e, msgId); };
            menu.appendChild(react);
            if (fileUrl && fileUrl !== 'undefined') {
                const down = document.createElement('div');
                down.className = 'context-menu-item';
                down.textContent = '📥 Скачать файл';
                down.onclick = () => { window.open(fileUrl, '_blank'); menu.remove(); };
                menu.appendChild(down);
            }
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
        }

        function showReactionMenu(e, msgId) {
            const existing = document.querySelector('.reaction-menu');
            if (existing) existing.remove();
            const menu = document.createElement('div');
            menu.className = 'reaction-menu';
            menu.style.left = e.clientX + 'px';
            menu.style.top = (e.clientY - 50) + 'px';
            REACTIONS.forEach(emoji => {
                const opt = document.createElement('div');
                opt.className = 'reaction-option';
                opt.textContent = emoji;
                opt.onclick = () => { addReaction(msgId, emoji, currentChatType); menu.remove(); };
                menu.appendChild(opt);
            });
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
        }

        let currentModal = null;
        function showModal(content) { if (currentModal) currentModal.remove(); const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content">${content}</div>`; document.body.appendChild(modal); currentModal = modal; }
        function closeModal() { if (currentModal) currentModal.remove(); currentModal = null; }

        function showAvatarPicker() {
            const emojis = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','👨‍💻','👩‍💻','💼','🎮','📚','🎨','⚽','🎵'];
            showModal(`<div class="modal-title">Выберите аватар</div><div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px;">${emojis.map(e => `<div style="font-size: 44px; text-align: center; cursor: pointer; padding: 12px; border-radius: 20px; transition: all 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onclick="updateAvatar('${e}')">${e}</div>`).join('')}</div><div class="modal-buttons"><button class="modal-btn" onclick="closeModal()">Закрыть</button></div>`);
        }

        function showCreateGroupModal() {
            if (allUsers.length === 0) { showToast('Нет других пользователей'); return; }
            showModal(`<div class="modal-title">Создать группу</div><input type="text" class="modal-input" id="groupName" placeholder="Название группы"><div style="margin-bottom: 12px;">👥 Выберите участников:</div><div style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;">${allUsers.map(u => `<div style="padding: 10px 0;"><label style="display: flex; align-items: center; gap: 12px; cursor: pointer;"><input type="checkbox" class="user-select" value="${u.username}" style="width: 18px; height: 18px;"> <span>${escapeHtml(u.username)}</span></label></div>`).join('')}</div><div class="modal-buttons"><button class="modal-btn" onclick="closeModal()">Отмена</button><button class="modal-btn modal-btn-primary" onclick="createGroup()">Создать</button></div>`);
        }

        function startEditing(msgId, curText) {
            editingMessageId = msgId;
            const msgDiv = document.querySelector(`.message[data-mid="${msgId}"]`);
            if (!msgDiv) return;
            const bubble = msgDiv.querySelector('.message-bubble');
            if (!bubble) return;
            bubble.innerHTML = `<input type="text" class="edit-input" id="editInput" value="${escapeHtml(curText)}"><div style="display: flex; gap: 12px; margin-top: 12px;"><button class="modal-btn modal-btn-primary" onclick="saveEdit(${msgId})">💾 Сохранить</button><button class="modal-btn" onclick="cancelEdit(${msgId})">❌ Отмена</button></div>`;
            const inp = document.getElementById('editInput');
            if (inp) { inp.focus(); inp.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveEdit(msgId); }); }
        }

        async function saveEdit(msgId) {
            const inp = document.getElementById('editInput');
            const newText = inp?.value.trim();
            if (newText) await editMessage(msgId, newText);
            editingMessageId = null;
            await loadMessages();
        }

        function cancelEdit(msgId) { editingMessageId = null; loadMessages(); }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const fGroups = allGroups.filter(g => g.name.toLowerCase().includes(search));
            const fUsers = allUsers.filter(u => u.username.toLowerCase().includes(search));
            const isVerified = VERIFIED_USERS.includes(currentUser?.username);
            sidebar.innerHTML = `<div class="sidebar-header"><div class="user-card"><div class="avatar" onclick="showAvatarPicker()">${currentUser?.avatar || '👤'}</div><div class="user-info"><div class="username">${escapeHtml(currentUser?.username || '')}${isVerified ? '<span class="verified-badge">✓</span>' : ''}</div><div class="user-status">● В сети</div></div></div><div class="action-buttons"><select class="action-btn" id="themeSelect" onchange="setTheme(this.value)"><option value="blue">💙 Blue</option><option value="light">☀️ Light</option><option value="dark">🌙 Dark</option><option value="purple">💜 Purple</option><option value="pink">🌸 Pink</option></select><button class="action-btn" onclick="showCreateGroupModal()">➕ Группа</button></div></div><div class="search-container"><input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск..." oninput="renderSidebar()"></div><div class="chats-list">${fGroups.length ? `<div class="chat-section">ГРУППЫ</div>${fGroups.map(g => `<div class="chat-item ${currentChat === g.name ? 'active' : ''}" onclick="selectChat('${g.name.replace(/'/g, "\\'")}', 'group', ${g.id})"><div class="chat-avatar">👥</div><div class="chat-info"><div class="chat-name">${escapeHtml(g.name)}</div><div class="chat-preview">Группа</div></div></div>`).join('')}` : ''}${fUsers.length ? `<div class="chat-section">ЛИЧНЫЕ</div>${fUsers.map(u => `<div class="chat-item ${currentChat === u.username ? 'active' : ''}" onclick="selectChat('${u.username}', 'user', null)"><div class="chat-avatar">${u.avatar || '👤'}${u.online ? '<div class="online-indicator"></div>' : ''}</div><div class="chat-info"><div class="chat-name">${escapeHtml(u.username)}${u.verified ? '<span class="verified-badge">✓</span>' : ''}</div><div class="chat-preview">${u.online ? 'В сети' : 'Не в сети'}</div></div></div>`).join('')}` : ''}</div>`;
            const saved = localStorage.getItem('theme') || 'blue';
            const sel = document.getElementById('themeSelect');
            if (sel) sel.value = saved;
            setTheme(saved);
        }

        async function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            if (!messages.length) { container.innerHTML = '<div style="text-align: center; padding: 60px; opacity: 0.6;">✨ Нет сообщений</div>'; return; }
            
            const reactionsMap = new Map();
            for (const msg of messages) {
                const reacts = await loadReactions(msg.id, currentChatType);
                reactionsMap.set(msg.id, reacts);
            }
            
            let html = '';
            for (const msg of messages) {
                const isOwn = msg.from_user === currentUser.username;
                const reacts = reactionsMap.get(msg.id) || [];
                const userReact = reacts.find(r => r.user_id === currentUser.username);
                const reactGroups = {};
                reacts.forEach(r => { reactGroups[r.reaction] = (reactGroups[r.reaction] || 0) + 1; });
                let fileHtml = '';
                if (msg.file_url) {
                    if (msg.file_url.startsWith('data:image/')) fileHtml = `<div class="message-file"><img src="${msg.file_url}" onclick="window.open('${msg.file_url}','_blank')"></div>`;
                    else if (msg.file_url.startsWith('data:')) fileHtml = `<div class="message-file"><a href="${msg.file_url}" download="${escapeHtml(msg.file_name || 'файл')}">📎 ${escapeHtml(msg.file_name || 'Файл')}</a></div>`;
                }
                let reactsHtml = '';
                for (const [emoji, count] of Object.entries(reactGroups)) {
                    const active = userReact?.reaction === emoji ? 'active' : '';
                    reactsHtml += `<span class="reaction-badge ${active}" onclick="addReaction(${msg.id}, '${emoji}', '${currentChatType}')">${emoji}${count > 1 ? `<span style="font-size: 11px; margin-left: 4px;">${count}</span>` : ''}</span>`;
                }
                html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${msg.id}">${!isOwn && currentChatType === 'group' ? `<div class="message-sender">${escapeHtml(msg.from_user)}</div>` : ''}<div class="message-bubble" oncontextmenu="showContextMenu(event, ${msg.id}, '${msg.from_user}', '${escapeHtml(msg.text || '').replace(/'/g, "\\'")}', '${msg.file_url || ''}')"><div class="message-text">${escapeHtml(msg.text || '')}</div>${fileHtml}</div><div class="message-meta">${formatTime(msg.timestamp)}${msg.edited ? '<span class="message-edited">✎ изменено</span>' : ''}</div><div class="reactions">${reactsHtml}</div></div>`;
            }
            container.innerHTML = html;
            const shouldScroll = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
            if (shouldScroll) container.scrollTop = container.scrollHeight;
        }

        function renderChatArea() {
            const chatArea = document.getElementById('chatArea');
            if (!chatArea) return;
            let status = '';
            let isVerified = false;
            if (currentChatType === 'group') status = 'Группа';
            else if (currentChat) {
                const user = allUsers.find(u => u.username === currentChat);
                status = user?.online ? '🟢 В сети' : '⚫ Не в сети';
                isVerified = user?.verified || false;
            }
            chatArea.innerHTML = `<div class="chat-header"><div class="chat-header-avatar">${currentChatAvatar || '👤'}</div><div><div class="chat-header-name">${escapeHtml(currentChat || 'Выберите чат')}${isVerified ? '<span class="verified-badge">✓</span>' : ''}</div><div class="chat-header-status">${status}</div></div></div><div class="messages-container" id="messagesContainer">${!currentChat ? '<div style="text-align: center; padding: 60px; opacity: 0.6;">💬 Выберите чат</div>' : ''}</div><div class="input-area"><div class="input-wrapper"><button class="input-btn" onclick="document.getElementById(\'fileInput\').click()" style="background: var(--bg-page);">📎</button><input type="file" id="fileInput" style="display: none;" onchange="uploadFile()"><textarea class="message-input" id="msgInput" placeholder="${currentChat ? 'Сообщение...' : 'Выберите чат'}" ${!currentChat ? 'disabled' : ''} rows="1"></textarea><button class="input-btn" onclick="sendMessage()" ${!currentChat ? 'disabled' : ''}>➤</button></div></div>`;
            if (currentChat) document.getElementById('msgInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        }

        let isLogin = true;
        function renderAuth() {
            document.getElementById('app').innerHTML = `<div class="login-container"><div class="login-card"><div class="login-title">DanuMes</div><input type="text" class="login-input" id="authUser" placeholder="Имя"><input type="password" class="login-input" id="authPass" placeholder="Пароль"><button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Регистрация'}</button><div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div></div></div>`;
        }
        function toggleMode() { isLogin = !isLogin; renderAuth(); }
        async function submitAuth() {
            const username = document.getElementById('authUser').value.trim();
            const password = document.getElementById('authPass').value;
            if (!username || !password) { showToast('Заполните поля'); return; }
            const res = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username, password });
            if (res.success) {
                if (isLogin) { currentUser = { username: res.username, avatar: res.avatar || '👤', verified: res.verified }; renderMain(); }
                else { showToast('Регистрация успешна! Войдите'); isLogin = true; renderAuth(); }
            } else showToast(res.error || 'Ошибка');
        }
        async function renderMain() {
            document.getElementById('app').innerHTML = `<div class="app"><div class="sidebar" id="sidebar"></div><div class="chat-area" id="chatArea"></div></div>`;
            await loadChats();
            if (allGroups.length > 0) selectChat(allGroups[0].name, 'group', allGroups[0].id);
            else if (allUsers.length > 0) selectChat(allUsers[0].username, 'user', null);
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => { loadMessages(); loadChats(); }, 5000);
        }

        window.addReaction = addReaction;
        window.updateAvatar = updateAvatar;
        window.setTheme = setTheme;
        window.selectChat = selectChat;
        window.showCreateGroupModal = showCreateGroupModal;
        window.createGroup = createGroup;
        window.sendMessage = sendMessage;
        window.showAvatarPicker = showAvatarPicker;
        window.closeModal = closeModal;
        window.submitAuth = submitAuth;
        window.toggleMode = toggleMode;
        window.showContextMenu = showContextMenu;
        window.uploadFile = uploadFile;
        window.saveEdit = saveEdit;
        window.cancelEdit = cancelEdit;
        window.startEditing = startEditing;
        window.editMessage = editMessage;
        window.deleteMessage = deleteMessage;

        renderAuth();
    </script>
</body>
</html>
