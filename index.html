<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DanuMes — Gemini design</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0B0B0C;
      color: #FFFFFF;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== CSS VARIABLES ===== */
    :root {
      --bg-main: #0B0B0C;
      --bg-sidebar: #121214;
      --bg-element: #1A1A1E;
      --accent-color: #5826FF;
      --text-main: #FFFFFF;
      --text-muted: #66666E;
      --border-radius: 8px;
    }

    /* ===== MAIN LAYOUT ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 320px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Sidebar header */
    .sidebar-header {
      padding: 20px 16px 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-main);
    }

    .plus-btn {
      width: 36px;
      height: 36px;
      background: var(--accent-color);
      border: none;
      border-radius: var(--border-radius);
      color: white;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .plus-btn:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    /* Dropdown menu */
    .dropdown-menu {
      position: absolute;
      top: 50px;
      right: 16px;
      background: var(--bg-element);
      border: 1px solid #2A2A2E;
      border-radius: var(--border-radius);
      padding: 8px 0;
      min-width: 180px;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .dropdown-item:hover {
      background: var(--accent-color);
    }

    /* Search */
    .search-container {
      padding: 8px 16px 16px 16px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-element);
      border: none;
      border-radius: var(--border-radius);
      color: var(--text-main);
      font-size: 14px;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      outline: none;
      outline: 1px solid var(--accent-color);
    }

    /* Chats list */
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .chat-section {
      padding: 12px 8px 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: var(--border-radius);
    }

    .chat-item:hover {
      background: var(--bg-element);
    }

    .chat-item.active {
      background: var(--bg-element);
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      background: var(--bg-element);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 500;
      position: relative;
      flex-shrink: 0;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg-sidebar);
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-status {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .write-btn {
      background: var(--accent-color);
      border: none;
      border-radius: var(--border-radius);
      padding: 6px 12px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .write-btn:hover {
      opacity: 0.85;
    }

    .delete-chat {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--border-radius);
      opacity: 0;
      transition: all 0.2s;
    }

    .chat-item:hover .delete-chat {
      opacity: 1;
    }

    .delete-chat:hover {
      background: rgba(239,68,68,0.2);
      color: #ef4444;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      flex: 1;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 16px;
    }

    /* Chat header (profile) */
    .chat-header {
      padding: 16px 24px;
      background: var(--bg-sidebar);
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #1A1A1E;
    }

    .chat-header-avatar {
      width: 48px;
      height: 48px;
      background: var(--bg-element);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-header-status {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Messages */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 70%;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-own {
      align-self: flex-end;
    }

    .message-other {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      background: var(--bg-element);
    }

    .message-own .message-bubble {
      background: var(--accent-color);
    }

    .message-sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--accent-color);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* File messages */
    .message-file {
      margin-top: 6px;
    }

    .message-file img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Voice messages */
    .voice-message {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 180px;
    }

    .voice-play {
      width: 32px;
      height: 32px;
      background: var(--accent-color);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    .voice-timeline {
      flex: 1;
      height: 4px;
      background: #2A2A2E;
      border-radius: 2px;
    }

    .voice-progress {
      height: 100%;
      background: var(--accent-color);
      border-radius: 2px;
      width: 0%;
    }

    /* Reactions */
    .reactions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .reaction {
      background: var(--bg-element);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .reaction:hover {
      background: var(--accent-color);
    }

    .reaction.active {
      background: var(--accent-color);
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      background: var(--bg-sidebar);
      border-top: 1px solid #1A1A1E;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-element);
      border: none;
      border-radius: var(--border-radius);
      color: var(--text-main);
      font-size: 14px;
      resize: none;
      font-family: inherit;
      max-height: 100px;
    }

    .message-input:focus {
      outline: none;
      outline: 1px solid var(--accent-color);
    }

    .input-btn {
      width: 42px;
      height: 42px;
      background: var(--accent-color);
      border: none;
      border-radius: var(--border-radius);
      color: white;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }

    .input-btn:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    /* Context menu */
    .context-menu {
      position: fixed;
      background: var(--bg-element);
      border: 1px solid #2A2A2E;
      border-radius: var(--border-radius);
      z-index: 1000;
      min-width: 180px;
      overflow: hidden;
    }

    .context-menu-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }

    .context-menu-item:hover {
      background: var(--accent-color);
    }

    .reaction-menu {
      position: fixed;
      background: var(--bg-element);
      border: 1px solid #2A2A2E;
      border-radius: 30px;
      z-index: 1001;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
    }

    .reaction-option {
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {
      background: var(--bg-sidebar);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #2A2A2E;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 12px;
      background: var(--bg-element);
      border: none;
      border-radius: var(--border-radius);
      color: var(--text-main);
      margin-bottom: 16px;
    }

    .modal-input:focus {
      outline: 1px solid var(--accent-color);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 14px;
    }

    .modal-btn-primary {
      background: var(--accent-color);
      color: white;
    }

    /* Stickers */
    .sticker-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--bg-element);
      border-radius: 12px;
      padding: 16px;
      z-index: 99;
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      max-width: 280px;
      border: 1px solid #2A2A2E;
    }

    .sticker-panel.show {
      display: grid;
    }

    .sticker {
      font-size: 32px;
      cursor: pointer;
      padding: 6px;
      text-align: center;
      border-radius: 8px;
    }

    .sticker:hover {
      background: var(--accent-color);
    }

    /* Voice recording */
    .voice-recording {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-element);
      padding: 8px 16px;
      border-radius: var(--border-radius);
      margin-bottom: 8px;
    }

    .recording-timer {
      color: #ef4444;
    }

    /* Profile modal */
    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    }

    .profile-card {
      background: var(--bg-sidebar);
      border-radius: 16px;
      padding: 32px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      border: 1px solid #2A2A2E;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      background: var(--accent-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 20px;
      cursor: pointer;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .profile-status {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-element);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 3000;
      border: 1px solid #2A2A2E;
    }

    /* Login */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-main);
    }

    .login-card {
      background: var(--bg-sidebar);
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #2A2A2E;
    }

    .login-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      color: var(--accent-color);
    }

    .login-input {
      width: 100%;
      padding: 14px;
      background: var(--bg-element);
      border: none;
      border-radius: var(--border-radius);
      color: var(--text-main);
      margin-bottom: 14px;
    }

    .login-input:focus {
      outline: 1px solid var(--accent-color);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent-color);
      border: none;
      border-radius: var(--border-radius);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .switch-mode {
      text-align: center;
      margin-top: 20px;
      cursor: pointer;
      color: var(--accent-color);
      font-size: 14px;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent-color);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    let currentUser = null;
    let currentChat = null;
    let currentChatType = null;
    let currentGroupId = null;
    let currentChannelCreator = null;
    let allUsers = [];
    let allGroups = [];
    let allChannels = [];
    let messages = [];
    let lastMsgId = null;
    let isSending = false;
    let currentAudio = null;
    let dropdownOpen = false;

    const VERIFIED = ['Danumala', 'RunFly'];
    const REACTIONS = ['👍', '❤️', '😂', '😮', '😢', '😡'];
    const STICKERS = ['😀','😎','🥳','😺','🐶','🦊','🐼','🐨','❤️','🔥','✨','⭐','🎉','🎈','🎵','🎸','⚽','🏀','🌈','🍕'];

    function toast(msg) {
      let t = document.querySelector('.toast');
      if (t) t.remove();
      t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    async function api(method, url, data) {
      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: data ? JSON.stringify(data) : undefined
        });
        return await res.json();
      } catch (e) {
        return { success: false, error: e.message };
      }
    }

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

    async function loadChats() {
      if (!currentUser) return;
      const [users, groups, channels] = await Promise.all([
        api('GET', '/get-users'),
        api('GET', `/get-groups/${currentUser.username}`),
        api('GET', `/get-channels/${currentUser.username}`)
      ]);
      allUsers = Array.isArray(users) ? users.filter(u => u.username !== currentUser.username) : [];
      allGroups = Array.isArray(groups) ? groups : [];
      allChannels = Array.isArray(channels) ? channels : [];
      renderSidebar();
    }

    async function loadMessages() {
      if (!currentUser || !currentChat) return;
      let fetched = [];
      if (currentChatType === 'group') {
        const r = await api('GET', `/get-group-messages/${currentGroupId}`);
        fetched = Array.isArray(r) ? r : [];
      } else if (currentChatType === 'channel') {
        const r = await api('GET', `/get-channel-messages/${currentGroupId}`);
        fetched = Array.isArray(r) ? r : [];
      } else {
        const r = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
        fetched = Array.isArray(r) ? r : [];
      }
      const newId = fetched.length ? fetched[fetched.length-1].id : null;
      if (newId !== lastMsgId) {
        lastMsgId = newId;
        messages = fetched;
        renderMessages();
      }
    }

    async function sendMessage(text, file = null) {
      if (isSending) { toast('Подождите...'); return; }
      if (!text && !file) return;
      if (currentChatType === 'channel' && currentChannelCreator !== currentUser?.username) {
        toast('⛔ Только автор канала');
        return;
      }
      isSending = true;
      const tempId = Date.now();
      const temp = { id: tempId, from_user: currentUser.username, text: text || (file ? `📎 ${file.name}` : ''), file_url: file?.url, timestamp: new Date().toISOString(), isTemp: true };
      messages.push(temp);
      renderMessages();

      let ep, pl;
      if (currentChatType === 'group') {
        ep = '/send-group-message';
        pl = { groupId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
      } else if (currentChatType === 'channel') {
        ep = '/send-channel-message';
        pl = { channelId: currentGroupId, from: currentUser.username, text: text || '', fileUrl: file?.url, fileName: file?.name };
      } else {
        ep = '/send-message';
        pl = { from: currentUser.username, to: currentChat, text: text || '', fileUrl: file?.url, fileName: file?.name };
      }
      const res = await api('POST', ep, pl);
      if (res.success) { await loadMessages(); }
      else { toast('Ошибка'); messages = messages.filter(m => m.id !== tempId); renderMessages(); }
      isSending = false;
    }

    async function sendFromInput() {
      const i = document.getElementById('msgInput');
      const t = i?.value.trim();
      if (t) { await sendMessage(t); i.value = ''; }
    }

    async function editMsg(id, newText) {
      const r = await api('PUT', `/edit-message/${id}`, { text: newText });
      if (r.success) { await loadMessages(); toast('Изменено'); }
      else toast('Ошибка');
    }

    async function deleteMsg(id) {
      if (!confirm('Удалить?')) return;
      const r = await api('DELETE', `/delete-message/${id}`);
      if (r.success) { await loadMessages(); toast('Удалено'); }
      else toast('Ошибка');
    }

    async function addReaction(mid, reaction, type) {
      const r = await api('POST', '/add-reaction', { messageId: parseInt(mid), userId: currentUser.username, reaction, type });
      if (r.success) await loadMessages();
    }

    async function getReactions(mid, type) {
      const r = await api('GET', `/get-reactions/${mid}/${type}`);
      return Array.isArray(r) ? r : [];
    }

    let mediaRec = null;
    let audioChunks = [];
    let isRec = false;
    let recTimer = null;
    let recSec = 0;

    async function startVoice() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        audioChunks = [];
        mediaRec.ondataavailable = e => audioChunks.push(e.data);
        mediaRec.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = async () => await sendMessage('🎤 Голосовое', { url: reader.result, name: 'voice.webm', type: 'audio/webm' });
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t => t.stop());
          document.querySelector('.voice-recording')?.remove();
        };
        mediaRec.start();
        isRec = true;
        recSec = 0;
        const inputArea = document.querySelector('.input-area');
        const rd = document.createElement('div');
        rd.className = 'voice-recording';
        rd.innerHTML = `<span>🎙️ Запись:</span><span class="recording-timer">0:00</span><button class="input-btn" onclick="stopVoice()" style="background:#ef4444;">⏹️</button>`;
        inputArea.insertBefore(rd, inputArea.firstChild);
        recTimer = setInterval(() => {
          recSec++;
          const t = document.querySelector('.recording-timer');
          if (t) t.textContent = `${Math.floor(recSec/60)}:${(recSec%60).toString().padStart(2,'0')}`;
        }, 1000);
      } catch(e) { toast('Нет микрофона'); }
    }

    function stopVoice() {
      if (mediaRec && isRec) { mediaRec.stop(); isRec = false; clearInterval(recTimer); }
    }

    async function createGroup() {
      const name = document.getElementById('groupName')?.value.trim();
      if (!name) { toast('Введите название'); return; }
      const selected = Array.from(document.querySelectorAll('.user-select:checked')).map(cb => cb.value);
      const r = await api('POST', '/create-group', { name, creator: currentUser.username, members: selected });
      if (r.success) {
        closeModal(); await loadChats(); toast(`Группа "${name}" создана`);
        if (r.group) selectChat(r.group.name, 'group', r.group.id);
      } else toast('Ошибка');
    }

    async function createChannel() {
      const name = document.getElementById('channelName')?.value.trim();
      if (!name) { toast('Введите название'); return; }
      const r = await api('POST', '/create-channel', { name, creator: currentUser.username });
      if (r.success) {
        closeModal(); await loadChats(); toast(`Канал "${name}" создан`);
        if (r.channel) selectChat(r.channel.name, 'channel', r.channel.id, r.channel.created_by);
      } else toast('Ошибка');
    }

    async function subscribeChannel(id, name, creator) {
      const r = await api('POST', '/subscribe-channel', { channelId: id, userId: currentUser.username });
      if (r.success) {
        toast(`Подписка на ${name}`);
        await loadChats();
        selectChat(name, 'channel', id, creator);
        const search = document.getElementById('searchInput');
        if (search) search.value = '';
        renderSidebar();
      } else toast('Ошибка');
    }

    function selectChat(chatId, type, gid = null, creator = null) {
      if (currentChat === chatId && currentChatType === type) return;
      currentChat = chatId;
      currentChatType = type;
      currentGroupId = gid;
      currentChannelCreator = creator;
      lastMsgId = null;
      renderSidebar();
      renderChatArea();
      loadMessages();
    }

    async function updateAvatar(avatar) {
      const r = await api('POST', '/update-avatar', { username: currentUser.username, avatar });
      if (r.success) {
        currentUser.avatar = avatar;
        renderSidebar();
        if (currentChatType === 'user') renderChatArea();
        toast('Аватар обновлён');
      }
      closeModal();
    }

      if (!user) return;
      const modal = document.createElement('div');
      modal.className = 'profile-modal';

    function showContextMenu(e, mid, from, text, url) {
      e.preventDefault();
      document.querySelector('.context-menu')?.remove();
      const isOwn = from === currentUser.username;
      const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      if (isOwn || isAuthor) {
        const edit = document.createElement('div'); edit.className = 'context-menu-item'; edit.textContent = '✏️ Редактировать'; edit.onclick = () => { const newText = prompt('Новый текст:', text); if (newText && newText !== text) editMsg(mid, newText); menu.remove(); }; menu.appendChild(edit);
        const del = document.createElement('div'); del.className = 'context-menu-item'; del.textContent = '🗑️ Удалить'; del.onclick = () => { deleteMsg(mid); menu.remove(); }; menu.appendChild(del);

      const react = document.createElement('div'); react.className = 'context-menu-item'; react.textContent = '😊 Реакция'; react.onclick = () => { menu.remove(); showReactionMenu(e, mid); }; menu.appendChild(react);

      document.querySelector('.reaction-menu')?.remove();
      const menu = document.createElement('div');
      menu.className = 'reaction-menu';
      menu.style.left = e.clientX + 'px';
      menu.style.top = (e.clientY - 50) + 'px';
      REACTIONS.forEach(emoji => {
        const opt = document.createElement('div');
        opt.className = 'reaction-option';

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
      
      let myChats = [];
      allUsers.forEach(u => myChats.push({ id: u.username, name: u.username, type: 'user', avatar: u.avatar || '👤', online: u.online, verified: u.verified, status: u.online ? 'В сети' : 'Не в сети' }));
      allGroups.forEach(g => myChats.push({ id: g.id, name: g.name, type: 'group', groupId: g.id, avatar: '👥', status: 'Группа' }));
      allChannels.forEach(c => myChats.push({ id: c.id, name: c.name, type: 'channel', channelId: c.id, created_by: c.created_by, avatar: '📢', status: 'Канал' }));
      
      let filtered = myChats;
      if (searchTerm.length > 0) {
        filtered = myChats.filter(c => c.name.toLowerCase().includes(searchTerm));
      }
      
      let searchResults = [];
      if (searchTerm.length > 0) {
        allChannels.forEach(c => { 
          if (c.name.toLowerCase().includes(searchTerm) && !myChats.some(m => m.type === 'channel' && m.id === c.id)) {
            searchResults.push({ type: 'channel', id: c.id, name: c.name, created_by: c.created_by });
          }
        });
        allUsers.forEach(u => { 
          if (u.username.toLowerCase().includes(searchTerm) && !myChats.some(m => m.type === 'user' && m.name === u.username)) {
            searchResults.push({ type: 'user', username: u.username, avatar: u.avatar || '👤', online: u.online, verified: u.verified });
          }
        });
      }
      
      const isVerified = VERIFIED.includes(currentUser?.username);
      const userChats = filtered.filter(c => c.type === 'user');
      const groupChats = filtered.filter(c => c.type === 'group');
      const channelChats = filtered.filter(c => c.type === 'channel');
      
      sidebar.innerHTML = `
        <div class="sidebar-header">
          <h2>Чаты</h2>
          <div style="position: relative;">
            <button class="plus-btn" onclick="toggleDropdown()">+</button>
            <div id="dropdownMenu" class="dropdown-menu">
              <div class="dropdown-item" onclick="showGroupModal(); closeDropdown()">Создать группу</div>

          ${groupChats.length ? `<div class="chat-section">ГРУППЫ</div>${groupChats.map(c => `
            <div class="chat-item ${currentChat === c.name && currentChatType === 'group' ? 'active' : ''}" onclick="selectChat('${c.name}', 'group', ${c.groupId})">
              <div class="chat-avatar">👥</div>
              <div class="chat-info">
                <div class="chat-name">${escapeHtml(c.name)}</div>
                <div class="chat-status">Группа</div>
              </div>
            </div>
          `).join('')}` : ''}
          ${channelChats.length ? `<div class="chat-section">КАНАЛЫ</div>${channelChats.map(c => `
            <div class="chat-item ${currentChat === c.name && currentChatType === 'channel' ? 'active' : ''}" onclick="selectChat('${c.name}', 'channel', ${c.channelId}, '${c.created_by || ''}')">
              <div class="chat-avatar">📢</div>
              <div class="chat-info">
                <div class="chat-name">${escapeHtml(c.name)}</div>
                <div class="chat-status">Канал</div>
              </div>
            </div>
          `).join('')}` : ''}
          ${userChats.length ? `<div class="chat-section">ЛИЧНЫЕ СООБЩЕНИЯ</div>${userChats.map(c => `
            <div class="chat-item ${currentChat === c.name && currentChatType === 'user' ? 'active' : ''}" onclick="selectChat('${c.name}', 'user', null)">
              <div class="chat-avatar">${c.avatar}${c.online ? '<div class="online-dot"></div>' : ''}</div>
              <div class="chat-info">
                <div class="chat-name">${escapeHtml(c.name)}${c.verified ? ' ✓' : ''}</div>
                <div class="chat-status">${c.status}</div>
              </div>
              <button class="write-btn" onclick="event.stopPropagation(); selectChat('${c.name}', 'user', null)">Написать</button>
              <button class="delete-chat" onclick="event.stopPropagation(); deleteChat('${c.name}', 'user', null)">✕</button>
            </div>
          `).join('')}` : ''}
          ${searchResults.length ? `<div class="chat-section">РЕЗУЛЬТАТЫ ПОИСКА</div>${searchResults.map(r => r.type === 'channel' ? `
            <div class="chat-item" onclick="subscribeChannel(${r.id}, '${r.name.replace(/'/g,"\\'")}', '${r.created_by}')">
              <div class="chat-avatar">📢</div>
              <div class="chat-info">
                <div class="chat-name">${escapeHtml(r.name)}</div>
                <div class="chat-status">🔍 Нажмите подписаться</div>
              </div>
            </div>
          ` : `
            <div class="chat-item" onclick="selectChat('${r.username}', 'user', null)">
              <div class="chat-avatar">${r.avatar}${r.online ? '<div class="online-dot"></div>' : ''}</div>
              <div class="chat-info">
                <div class="chat-name">${escapeHtml(r.username)}${r.verified ? ' ✓' : ''}</div>
                <div class="chat-status">${r.online ? 'В сети' : 'Не в сети'}</div>
              </div>
              <button class="write-btn" onclick="event.stopPropagation(); selectChat('${r.username}', 'user', null)">Написать</button>
            </div>
          `).join('')}</div>` : ''}

      document.addEventListener('click', function(e) {
        const menu = document.getElementById('dropdownMenu');
        const btn = e.target.closest('.plus-btn');
        if (menu && !btn && dropdownOpen) {
          menu.classList.remove('show');
          dropdownOpen = false;
        }
      });
    }

    async function renderMessages() {
      const container = document.getElementById('messagesContainer');
      if (!container) return;
      if (!messages.length) { 
        if (currentChat) {
          container.innerHTML = '<div class="empty-state">Нет сообщений</div>';
        } else {
          container.innerHTML = '<div class="empty-state">Выберите чат</div>';
        }
        return; 
      }
      
      const rm = new Map();
      for (const m of messages) {
        if (!m.isTemp) { const r = await getReactions(m.id, currentChatType); rm.set(m.id, r); }
        else rm.set(m.id, []);
      }
      
      let html = '';
      for (const m of messages) {
        const isOwn = m.from_user === currentUser.username;
        const reacts = rm.get(m.id) || [];
        const userReact = reacts.find(r => r.user_id === currentUser.username);
        const rg = {};
        reacts.forEach(r => { rg[r.reaction] = (rg[r.reaction] || 0) + 1; });
        
        let fh = '';
        if (m.file_url) {
          if (m.file_url.startsWith('data:image/')) fh = `<div class="message-file"><img src="${m.file_url}" onclick="viewImage('${m.file_url}')"></div>`;
          else fh = `<div class="message-file"><a href="${m.file_url}" download>📎 ${escapeHtml(m.file_name || 'файл')}</a></div>`;
        }
        
        let rh = '';
        for (const [e,c] of Object.entries(rg)) { const a = userReact?.reaction === e ? 'active' : ''; rh += `<span class="reaction ${a}" onclick="addReaction(${m.id}, '${e}', '${currentChatType}')">${e}${c>1 ? c : ''}</span>`; }
        
        html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}" data-mid="${m.id}">${!isOwn && (currentChatType === 'group' || currentChatType === 'channel') ? `<div class="message-sender">${escapeHtml(m.from_user)}${m.from_user === currentChannelCreator ? ' 👑' : ''}</div>` : ''}<div class="message-bubble" oncontextmenu="showContextMenu(event, ${m.id}, '${m.from_user}', '${escapeHtml(m.text || '').replace(/'/g,"\\'")}', '${m.file_url || ''}')"><div class="message-text">${escapeHtml(m.text || '')}</div>${fh}</div><div class="message-meta">${m.isTemp ? '🕐 отправляется...' : formatTime(m.timestamp)}</div><div class="reactions">${rh}</div></div>`;
      }
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    function renderChatArea() {
      const ca = document.getElementById('chatArea');
      if (!ca) return;
      
      if (!currentChat) {
        ca.innerHTML = `<div class="empty-state">Выберите чат</div>`;
        return;
      }
      
      let status = '', verified = false;
      const isAuthor = currentChatType === 'channel' && currentChannelCreator === currentUser?.username;
      const canWrite = currentChatType !== 'channel' || isAuthor;
      
      if (currentChatType === 'group') status = 'Группа';
      else if (currentChatType === 'channel') status = `Автор: ${currentChannelCreator || '?'}`;
      else if (currentChat) { 
        const u = allUsers.find(u => u.username === currentChat); 
        status = u?.online ? 'В сети' : 'Не в сети'; 
        verified = u?.verified || false; 
      }
      
      ca.innerHTML = `
        <div class="chat-header">
          <div class="chat-header-avatar" onclick="showProfile(allUsers.find(u=>u.username===currentChat)||{username:currentChat,avatar:currentChatAvatar,online:true})">
            ${currentChatType === 'user' ? (allUsers.find(u=>u.username===currentChat)?.avatar || '👤') : (currentChatType === 'channel' ? '📢' : '👥')}
          </div>
          <div class="chat-header-info">
            <div class="chat-header-name">${escapeHtml(currentChat)}${verified ? ' ✓' : ''}</div>
            <div class="chat-header-status">${status}</div>
          </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <button class="input-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="file" id="fileInput" style="display:none;" onchange="uploadFile()">
            <button class="input-btn" onclick="startVoice()">🎙️</button>
            <button class="input-btn" onclick="toggleSticker()">😊</button>
            <textarea class="message-input" id="msgInput" placeholder="${canWrite ? (currentChat ? 'Сообщение...' : 'Выберите чат') : 'Только автор канала'}" ${!currentChat || !canWrite ? 'disabled' : ''} rows="1"></textarea>
            <button class="input-btn" onclick="sendFromInput()" ${!currentChat || !canWrite ? 'disabled' : ''}>➤</button>
          </div>
        </div>
      `;
      
      renderMessages();
      
      if (currentChat && canWrite) { 
        const i = document.getElementById('msgInput'); 
        if (i) i.addEventListener('keypress', e => { 
          if (e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            sendFromInput(); 
          } 
        }); 
      }
    }

    function uploadFile() {
      const i = document.getElementById('fileInput');
      const f = i.files[0];
      if (!f) return;
      if (f.size > 10*1024*1024) { toast('Файл >10MB'); return; }
      const r = new FileReader();
      r.onloadend = () => sendMessage('', { url: r.result, name: f.name, type: f.type });
      r.readAsDataURL(f);
      i.value = '';
    }

    function toggleSticker() { document.getElementById('stickerPanel')?.classList.toggle('show'); }

    async function deleteChat(id, type, gid) {
      if (!confirm(`Удалить чат?`)) return;
      if (type === 'group' && gid) { await api('POST', '/leave-group', { groupId: gid, userId: currentUser.username }); await loadChats(); }
      if (currentChat === id) { currentChat = null; renderChatArea(); }
      renderSidebar();
    }

    let isLogin = true;
    function renderAuth() { document.getElementById('app').innerHTML = `<div class="login-container"><div class="login-card"><div class="login-title">DanuMes</div><input type="text" class="login-input" id="authUser" placeholder="Имя"><input type="password" class="login-input" id="authPass" placeholder="Пароль"><button class="login-btn" onclick="submitAuth()">${isLogin ? 'Войти' : 'Регистрация'}</button><div class="switch-mode" onclick="toggleMode()">${isLogin ? 'Нет аккаунта?' : 'Уже есть?'}</div></div></div>`; }
    function toggleMode() { isLogin = !isLogin; renderAuth(); }
    async function submitAuth() {
      const u = document.getElementById('authUser').value.trim();
      const p = document.getElementById('authPass').value;
      if (!u || !p) { toast('Заполните поля'); return; }
      const r = await api('POST', isLogin ? '/login-attempt' : '/register-attempt', { username: u, password: p });
      if (r.success) {
        if (isLogin) { currentUser = { username: r.username, avatar: r.avatar || '👤', verified: r.verified }; renderMain(); }
        else { toast('Регистрация успешна! Войдите'); isLogin = true; renderAuth(); }
      } else toast(r.error || 'Ошибка');
    }
    async function renderMain() {
      document.getElementById('app').innerHTML = `<div class="app"><div class="sidebar" id="sidebar"></div><div class="chat-area" id="chatArea"></div></div>`;
      await loadChats();
      if (allGroups.length) selectChat(allGroups[0].name, 'group', allGroups[0].id);
      else if (allUsers.length) selectChat(allUsers[0].username, 'user', null);
      setInterval(() => { loadMessages(); loadChats(); }, 5000);
    }

    window.subscribeChannel = subscribeChannel;
    window.toggleDropdown = toggleDropdown;
    window.closeDropdown = closeDropdown;

    renderAuth();
  </script>
