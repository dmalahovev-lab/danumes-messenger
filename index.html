<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальный Мессенджер</title>
    <!-- Загружаем Socket.io локально с самого сервера, это защитит от любых 404 ошибок -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #070a12;
            --bg-glass: rgba(15, 22, 42, 0.7);
            --bg-sidebar: rgba(10, 15, 30, 0.8);
            --bg-active: rgba(255, 255, 255, 0.06);
            --bg-chat-user: #6366f1;
            --bg-chat-friend: rgba(255, 255, 255, 0.04);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(243, 244, 246, 0.9);
            --bg-active: rgba(0, 0, 0, 0.05);
            --bg-chat-user: #4f46e5;
            --bg-chat-friend: rgba(0, 0, 0, 0.04);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        
        /* Авторизационный экран */
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .auth-card { background: var(--bg-glass); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; box-shadow: var(--shadow); backdrop-filter: blur(20px); }
        .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin: 10px 0; outline: none; font-size: 16px; text-align: center;}
        
        /* Красивая плашка ошибки */
        .error-toast { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 15px; display: none; text-align: center; font-weight: 500; }

        .auth-buttons-row { display: flex; gap: 12px; margin-top: 15px; }
        .auth-btn { flex: 1; padding: 14px; border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .auth-btn.login { background: #6366f1; }
        .auth-btn.login:hover { background: #4f46e5; }
        .auth-btn.register { background: #10b981; }
        .auth-btn.register:hover { background: #059669; }

        /* Стили главного интерфейса */
        .app-container { width: 100vw; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(20px); display: flex; overflow: hidden; }
        .nav-rail { width: 72px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-btn { width: 48px; height: 48px; border-radius: 14px; background: none; border: none; font-size: 20px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-active); color: var(--text-main); }
        .nav-btn.active { color: #6366f1; border: 1px solid var(--border-color); }
        
        .nav-profile-trigger { margin-top: auto; font-size: 24px; cursor: pointer; background: var(--bg-active); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); }

        .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); padding: 10px 16px 10px 40px; border-radius: 12px; color: var(--text-main); outline: none; }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .list-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 8px 12px; text-transform: uppercase; }
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--bg-active); }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px;}
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-status-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-actions { display: flex; gap: 4px; }
        .action-btn { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .action-btn.primary { background: #6366f1; color: white; border: none; }

        .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-sidebar); position: relative; }
        
        /* Статус печатает */
        .typing-indicator-text { font-size: 12px; color: #10b981; font-weight: 500; margin-top: 2px; display: none; }

        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        .message-bubble { max-width: 55%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; word-wrap: break-word; }
        .sent .message-bubble { background: var(--bg-chat-user); color: white; border-bottom-right-radius: 4px; }
        .received .message-bubble { background: var(--bg-chat-friend); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #ef4444; border: none; color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; z-index: 10; }
        .sent .delete-msg-btn { left: -75px; } 
        .received .delete-msg-btn { right: -75px; }
        .message-wrapper:hover .delete-msg-btn { opacity: 1; }

        .input-area { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; background: var(--bg-sidebar); }
        .message-input { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); padding: 14px 20px; border-radius: 12px; color: var(--text-main); outline: none; }
        .send-btn { background: #6366f1; border: none; color: white; padding: 13px 20px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; }

        /* Окно профиля */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .profile-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; box-shadow: var(--shadow); position: relative;}
        .profile-avatar-select { display: flex; justify-content: center; gap: 12px; margin: 16px 0; font-size: 28px; }
        .avatar-opt { cursor: pointer; padding: 6px; border-radius: 10px; border: 1px solid transparent; }
        .avatar-opt.selected { border-color: #6366f1; background: var(--bg-active); }
        .profile-input { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; outline: none; font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
        .profile-save-btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <!-- Экран входа / регистрации -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2 class="logo" style="font-size:32px; margin-bottom:10px;">DanuMes</h2>
            <p style="color:var(--text-muted); margin-bottom: 15px;">Авторизация в глобальной сети</p>
            
            <div class="error-toast" id="errorToast"></div>

            <input type="text" class="auth-input" id="usernameInput" placeholder="Логин..." autocomplete="off">
            <input type="password" class="auth-input" id="passwordInput" placeholder="Пароль...">
            
            <div class="auth-buttons-row">
                <button class="auth-btn login" id="loginBtn">Войти</button>
                <button class="auth-btn register" id="registerBtn">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Настройки профиля -->
    <div class="modal-overlay hidden" id="profileModal">
        <div class="profile-card">
            <button class="close-modal-btn" id="closeProfileBtn">✕</button>
            <h3 style="margin-bottom:14px; font-size:18px;">Настройки профиля</h3>
            
            <label style="font-size:13px; color:var(--text-muted)">Выберите аватарку</label>
            <div class="profile-avatar-select">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🤖')">🤖</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🥷')">🥷</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐱')">🐱</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🔥')">🔥</span>
            </div>

            <label style="font-size:13px; color:var(--text-muted)">Ваш статус</label>
            <input type="text" class="profile-input" id="statusInput" placeholder="Что нового?">

            <button class="profile-save-btn" id="saveProfileBtn">Сохранить</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Навигация -->
        <nav class="nav-rail">
            <button class="nav-btn active" id="navHome">🏠</button>
            <button class="nav-btn" id="themeToggle">☀️</button>
            <div class="nav-profile-trigger" id="profileTrigger">🤖</div>
        </nav>

        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <div class="search-box">
                    <span style="position:absolute; left:14px; color:var(--text-muted)">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск людей в сети...">
                </div>
            </div>
            <div class="chats-list">
                <div class="list-section-title">Мои друзья</div>
                <div id="friendsList"></div>
                <div class="list-section-title hidden" id="globalTitle" style="margin-top: 16px;">В сети</div>
                <div id="globalList"></div>
            </div>
        </aside>

        <!-- Главный экран -->
        <div class="home-screen" id="homeScreen">
            <span style="font-size: 50px;">💬</span>
            <h2 style="margin-top:10px;">Добро пожаловать, <span id="greetingName">Пользователь</span></h2>
            <p style="color:var(--text-muted); max-width:320px; margin-top:5px;">Найдите людей через глобальный поиск слева, чтобы начать переписку.</p>
        </div>

        <!-- Окно чата -->
        <main class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <div class="avatar" id="activeAvatar">🤖</div>
                <div>
                    <h4 id="activeChatName"></h4>
                    <span id="activeChatStatus" style="font-size: 12px; color: var(--text-muted);">Доступен</span>
                    <div class="typing-indicator-text" id="typingIndicator">печатает...</div>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение...">
                <button class="send-btn" id="sendBtn">➔</button>
            </div>
        </main>
    </div>

    <!-- Аудио уведомления (чистый сгенерированный звук через Web Audio API, файлы не нужны!) -->
    <script>
        function playNotifySound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // Ре-нота
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // Ля-нота
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            } catch(e) {}
        }
    </script>

    <script>
        // Проверяем, загрузился ли socket.io
        if (typeof io === 'undefined') {
            alert("Критическая ошибка: сервер Socket.io недоступен. Попробуйте перезагрузить страницу.");
        }

        const socket = io();
        let myInfo = { name: "", status: "Доступен", avatar: "🤖" };
        let activeChatName = null;
        let globalUsers = [];
        let localFriends = new Set();
        let selectedAvatarSymbol = "🤖";
        let typingTimeout = null;

        const authScreen = document.getElementById('authScreen');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const errorToast = document.getElementById('errorToast');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');

        function showAuthError(text) {
            errorToast.textContent = text;
            errorToast.style.display = 'block';
        }

        // Логика нажатия Кнопки РЕГИСТРАЦИЯ
        registerBtn.onclick = () => {
            errorToast.style.display = 'none';
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!username || !password) return showAuthError("Заполните все поля!");
            
            socket.emit('register_account', { username, password });
        };

        // Логика нажатия Кнопки ВХОД
        loginBtn.onclick = () => {
            errorToast.style.display = 'none';
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!username || !password) return showAuthError("Заполните все поля!");
            
            socket.emit('login_account', { username, password });
        };

        // Ответы сервера на авторизацию
        socket.on('auth_error', (msg) => showAuthError(msg));
        
        socket.on('auth_success', () => {
            authScreen.classList.add('hidden');
        });

        socket.on('init_self', (data) => {
            myInfo = data;
            document.getElementById('greetingName').textContent = data.name;
            document.getElementById('profileTrigger').textContent = data.avatar;
            document.getElementById('statusInput').value = data.status;
        });

        // Управление профилем
        const profileModal = document.getElementById('profileModal');
        document.getElementById('profileTrigger').onclick = () => profileModal.classList.remove('hidden');
        document.getElementById('closeProfileBtn').onclick = () => profileModal.classList.add('hidden');
        
        window.selectAvatar = function(element, emo) {
            document.querySelectorAll('.avatar-opt').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedAvatarSymbol = emo;
        };

        document.getElementById('saveProfileBtn').onclick = () => {
            socket.emit('update_profile', {
                status: document.getElementById('statusInput').value.trim() || "Доступен",
                avatar: selectedAvatarSymbol
            });
            profileModal.classList.add('hidden');
        };

        // Списки пользователей и чаты
        socket.on('update_users_list', (users) => {
            globalUsers = users.filter(u => u.name !== myInfo.name);
            renderLists(document.getElementById('searchInput').value);
        });

        function renderLists(filter = "") {
            const friendsList = document.getElementById('friendsList');
            const globalList = document.getElementById('globalList');
            const globalTitle = document.getElementById('globalTitle');

            friendsList.innerHTML = "";
            globalList.innerHTML = "";
            let hasGlobal = false;

            globalUsers.forEach(user => {
                const isMatch = user.name.toLowerCase().includes(filter.toLowerCase());
                if (!isMatch) return;

                if (localFriends.has(user.name)) {
                    const item = document.createElement('div');
                    item.className = `chat-item ${activeChatName === user.name ? 'active' : ''}`;
                    item.onclick = () => openChat(user.name);
                    item.innerHTML = `
                        <div class="avatar">${user.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${user.name} ${user.isOnline ? '🟢' : '⚫'}</div>
                            <div class="chat-status-text">${user.status}</div>
                        </div>
                    `;
                    friendsList.appendChild(item);
                } else if (user.isOnline) {
                    hasGlobal = true;
                    const item = document.createElement('div');
                    item.className = "chat-item";
                    item.style.cursor = "default";
                    item.innerHTML = `
                        <div class="avatar">${user.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${user.name} 🟢</div>
                            <div class="chat-status-text">${user.status}</div>
                        </div>
                        <div class="search-actions">
                            <button class="action-btn primary" onclick="addFriend('${user.name}')">Добавить</button>
                            <button class="action-btn" onclick="writeToUser('${user.name}')">Чат</button>
                        </div>
                    `;
                    globalList.appendChild(item);
                }
            });

            if (filter.trim() !== "" && hasGlobal) globalTitle.classList.remove('hidden');
            else globalTitle.classList.add('hidden');
        }

        window.addFriend = function(name) { localFriends.add(name); renderLists(); };
        window.writeToUser = function(name) { localFriends.add(name); openChat(name); document.getElementById('searchInput').value = ""; renderLists(); };

        function openChat(name) {
            activeChatName = name;
            const userData = globalUsers.find(u => u.name === name);
            
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('chatWindow').classList.remove('hidden');
            document.getElementById('navHome').classList.remove('active');
            
            document.getElementById('activeChatName').textContent = name;
            document.getElementById('activeAvatar').textContent = userData ? userData.avatar : "🤖";
            document.getElementById('activeChatStatus').textContent = userData ? userData.status : "Доступен";
            
            // Запрашиваем историю сообщений из базы сервера
            socket.emit('get_chat_history', name);
            renderLists();
        }

        socket.on('chat_history_response', (history) => {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = "";
            
            history.forEach((msg, index) => {
                const wrapper = document.createElement('div');
                const isMe = msg.sender === myInfo.name;
                wrapper.className = `message-wrapper ${isMe ? 'sent' : 'received'}`;
                wrapper.innerHTML = `
                    <div class="message-bubble">
                        <strong style="font-size:11px; display:block; margin-bottom:2px; opacity:0.7;">${msg.sender}</strong>
                        ${msg.text}
                        <button class="delete-msg-btn" onclick="deleteMessage(${index})">✕</button>
                    </div>
                `;
                messagesArea.appendChild(wrapper);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });

        window.deleteMessage = function(index) {
            if (activeChatName) {
                socket.emit('delete_message', { targetUser: activeChatName, index: index });
            }
        };

        // Статус синхронизации после удаления
        socket.on('message_deleted_sync', () => {
            if (activeChatName) socket.emit('get_chat_history', activeChatName);
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChatName) return;

            socket.emit('send_direct_message', { toUser: activeChatName, text: text });
            input.value = "";
            socket.emit('typing_status', { toUser: activeChatName, isTyping: false });
        }

        socket.on('message_sent_confirm', () => {
            socket.emit('get_chat_history', activeChatName);
        });

        socket.on('receive_direct_message', (msg) => {
            localFriends.add(msg.from);
            playNotifySound(); // Играем сгенерированный звук
            if (activeChatName === msg.from) {
                socket.emit('get_chat_history', activeChatName);
            }
            renderLists();
        });

        // Отслеживание печатания текста
        document.getElementById('messageInput').oninput = () => {
            if (!activeChatName) return;
            socket.emit('typing_status', { toUser: activeChatName, isTyping: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing_status', { toUser: activeChatName, isTyping: false });
            }, 2000);
        };

        socket.on('user_typing', (data) => {
            const indicator = document.getElementById('typingIndicator');
            if (activeChatName === data.fromUser && data.isTyping) {
                indicator.style.display = 'block';
            } else {
                indicator.style.display = 'none';
            }
        });

        document.getElementById('navHome').onclick = function() {
            activeChatName = null;
            this.classList.add('active');
            document.getElementById('homeScreen').classList.remove('hidden');
            document.getElementById('chatWindow').classList.add('hidden');
            renderLists();
        };

        document.getElementById('searchInput').oninput = (e) => renderLists(e.target.value);
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        document.getElementById('themeToggle').onclick = function() {
            const html = document.documentElement;
            const target = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', target);
            this.textContent = target === 'dark' ? '☀️' : '🌙';
        };
    </script>
</body>
</html>
