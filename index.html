<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.2s, color 0.2s;
        }
        body.dark {
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
            color: #e5e7eb;
        }
        body.light {
            background: radial-gradient(circle at 20% 30%, #e0e7ff, #f0f4f8);
            color: #1f2937;
        }
        .messenger {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        body.dark .messenger { background: rgba(15, 25, 35, 0.4); backdrop-filter: blur(10px); }
        body.light .messenger { background: rgba(245, 245, 255, 0.6); backdrop-filter: blur(10px); }
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid;
        }
        body.dark .sidebar { background: rgba(30, 40, 50, 0.5); border-color: rgba(255,255,255,0.1); }
        body.light .sidebar { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.05); }
        .sidebar-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 1px solid;
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            font-size: 20px;
        }
        .profile-btn {
            width: 48px;
            height: 48px;
            font-size: 32px;
        }
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid;
        }
        .search-box input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            outline: none;
        }
        body.dark .search-box input { color: white; background: rgba(0,0,0,0.3); }
        body.light .search-box input { color: #1f2937; background: rgba(0,0,0,0.05); }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        body.dark .chat-item:hover { background: rgba(255,255,255,0.1); }
        body.light .chat-item:hover { background: rgba(0,0,0,0.05); }
        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #4b5563, #6b7280);
        }
        .chat-avatar[data-avatar="Danumala"] { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .chat-avatar[data-avatar="RunFly"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .verified-badge { font-size: 14px; color: #3b82f6; }
        .chat-lastmsg {
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }
        .bottom-bar {
            padding: 12px 16px;
            border-top: 1px solid;
            display: flex;
            gap: 12px;
            justify-content: space-around;
        }
        .bottom-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.1s;
        }
        body.dark .bottom-btn { color: #e5e7eb; }
        body.light .bottom-btn { color: #1f2937; }
        .bottom-btn:hover { background: rgba(0,0,0,0.1); }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid;
        }
        body.dark .chat-header { background: rgba(30, 40, 50, 0.4); border-color: rgba(255,255,255,0.1); }
        body.light .chat-header { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.05); }
        .chat-header-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            background: linear-gradient(135deg, #4b5563, #6b7280);
        }
        .chat-header-avatar[data-avatar="Danumala"] { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .chat-header-avatar[data-avatar="RunFly"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .chat-header-info { flex: 1; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 75%;
            position: relative;
        }
        .message-own { align-self: flex-end; flex-direction: row-reverse; }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            font-size: 15px;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body.dark .message-bubble { background: rgba(40,50,65,0.7); color: #f0f3f8; }
        body.light .message-bubble { background: rgba(255,255,255,0.8); color: #1f2937; }
        .message-own .message-bubble {
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 22px;
        }
        body.dark .message-own .message-bubble { background: linear-gradient(135deg, rgba(59,130,246,0.8), rgba(139,92,246,0.8)); }
        body.light .message-own .message-bubble { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .message-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 6px;
        }
        .file-attach {
            display: inline-block;
            margin-top: 6px;
            background: rgba(0,0,0,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        .message-image {
            max-width: 250px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 6px;
        }
        .input-area {
            padding: 16px 20px;
            display: flex;
            gap: 14px;
            border-top: 1px solid;
        }
        body.dark .input-area { background: rgba(30, 40, 50, 0.4); border-color: rgba(255,255,255,0.1); }
        body.light .input-area { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.05); }
        .input-wrapper {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            background: none;
            border: none;
            font-size: 15px;
            outline: none;
        }
        body.dark #messageInput { color: white; }
        body.light #messageInput { color: #1f2937; }
        .file-btn, .emoji-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            color: white;
        }
        .context-menu {
            position: fixed;
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 6px 0;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .context-menu div {
            padding: 10px 16px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }
        .context-menu div:hover { background: rgba(59,130,246,0.6); }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: pointer;
        }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 16px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(30,40,50,0.95);
            border-radius: 32px;
            padding: 24px;
            width: 360px;
            text-align: center;
        }
        .modal-content h3 {
            color: white;
            margin-bottom: 20px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .emoji-option {
            font-size: 32px;
            cursor: pointer;
            text-align: center;
            padding: 6px;
            border-radius: 12px;
        }
        .emoji-option:hover { background: rgba(255,255,255,0.2); }
        .close-modal {
            background: #3b82f6;
            border: none;
            padding: 10px;
            border-radius: 28px;
            color: white;
            width: 100%;
            cursor: pointer;
        }
        .settings-section {
            margin-bottom: 20px;
            text-align: left;
        }
        .settings-section h4 {
            color: #e5e7eb;
            margin-bottom: 10px;
        }
        body.light .settings-section h4 { color: #1f2937; }
        .settings-section input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }
        body.light .settings-section input { background: rgba(0,0,0,0.05); color: #1f2937; }
        .gradient-option {
            display: inline-block;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 5px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .gradient-option.active { border-color: #3b82f6; }
        .group-modal .modal-content {
            width: 400px;
        }
        .group-modal input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }
        .members-list {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .member-item input {
            width: auto;
            margin: 0;
        }
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: rgba(30,40,50,0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 460px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        body.light .auth-card {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .auth-card h2 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 56px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: rgba(255,255,255,0.7);
        }
        body.light .tab { color: rgba(0,0,0,0.6); }
        .tab.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }
        body.dark .input-group input { color: white; }
        body.light .input-group input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #1f2937; }
        .input-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
        }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        .error-text { color: #f87171; font-size: 13px; text-align: center; margin-top: -8px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 5000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @media (max-width: 680px) {
            .sidebar { width: 80px; }
            .chat-info, .logo { display: none; }
            .chat-avatar { width: 48px; height: 48px; font-size: 26px; }
            .auth-card { width: 90%; padding: 32px 24px; }
        }
    </style>
</head>
<body class="dark">
<div id="app"></div>
<script>
    let currentUser = null;
    let currentChat = null;
    let currentChatType = 'user';
    let messages = [];
    let chats = [];
    let groups = [];
    let channels = [];
    let allUsers = [];
    let searchQuery = '';
    let pollInterval = null;
    let searchTimeout = null;
    let activeMenu = null;

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.background = '#dc2626';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') document.body.classList.add('light');
        else document.body.classList.add('dark');
    }

    async function api(method, url, data = null) {
        const opts = { method, headers: {} };
        if (data && !(data instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(data);
        } else if (data instanceof FormData) {
            opts.body = data;
        }
        const res = await fetch(url, opts);
        return res.json();
    }

    async function loadAllUsers() {
        const res = await api('GET', '/get-users');
        allUsers = res || [];
    }

    async function loadChatsAndChannels() {
        if (!currentUser) return;
        try {
            const userChats = await api('GET', `/get-chats/${currentUser.username}`);
            const channelList = await api('GET', '/get-channels');
            channels = channelList || [];
            const groupList = await api('GET', `/get-groups/${currentUser.username}`);
            groups = groupList || [];
            
            let all = [];
            channels.forEach(ch => {
                all.push({ type: 'channel', id: ch.id, name: ch.name, avatar: ch.avatar, lastMessage: ch.lastMessage || 'Нет сообщений', lastTime: ch.lastTime });
            });
            groups.forEach(g => {
                all.push({ type: 'group', id: g.id, name: g.name, avatar: g.avatar, lastMessage: g.lastMessage || 'Нет сообщений', lastTime: g.lastTime });
            });
            (userChats || []).forEach(uc => {
                all.push({ type: 'user', id: uc.username, name: uc.username, avatar: uc.avatar, online: uc.online, verified: uc.verified, lastMessage: uc.lastMessage || 'Нет сообщений', lastTime: uc.lastTime });
            });
            all.sort((a,b) => (b.lastTime || 0) - (a.lastTime || 0));
            chats = all;
            renderSidebar();
        } catch(e) { console.error(e); }
    }

    async function loadMessages() {
        if (!currentUser || !currentChat) return;
        try {
            let data;
            if (currentChatType === 'user') {
                data = await api('GET', `/get-messages/${currentUser.username}/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'channel') {
                data = await api('GET', `/get-channel-messages/${currentChat}`);
                messages = data || [];
            } else if (currentChatType === 'group') {
                data = await api('GET', `/get-group-messages/${currentChat}`);
                messages = data || [];
            }
            renderMessages();
        } catch(e) { console.error(e); }
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if ((!text && !fileUrl)) return;
        try {
            if (currentChatType === 'user') {
                await api('POST', '/send-message', { from: currentUser.username, to: currentChat, text: text || '', fileUrl, fileName });
            } else if (currentChatType === 'channel') {
                await api('POST', '/send-channel-message', { channelId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
            } else if (currentChatType === 'group') {
                await api('POST', '/send-group-message', { groupId: currentChat, from: currentUser.username, text: text || '', fileUrl, fileName });
            }
            await loadMessages();
            await loadChatsAndChannels();
        } catch(e) { console.error(e); }
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    async function updateAvatar(emoji) {
        await api('POST', '/update-avatar', { username: currentUser.username, avatar: emoji });
        currentUser.avatar = emoji;
        renderSidebar();
        const headerAvatar = document.querySelector('.chat-header-avatar');
        if (headerAvatar) headerAvatar.textContent = emoji;
        showToast('Аватар обновлён');
    }

    async function updateUsername(newUsername) {
        const res = await api('POST', '/update-username', { oldUsername: currentUser.username, newUsername });
        if (res.success) {
            currentUser.username = newUsername;
            renderSidebar();
            showToast('Имя изменено');
        } else showToast(res.error || 'Ошибка', true);
    }

    async function deleteMessage(msgId) {
        if (currentChatType === 'user') await api('DELETE', `/delete-message/${msgId}`);
        else if (currentChatType === 'channel') await api('DELETE', `/delete-channel-message/${msgId}`);
        else if (currentChatType === 'group') await api('DELETE', `/delete-group-message/${msgId}`);
        await loadMessages();
        await loadChatsAndChannels();
        showToast('Сообщение удалено');
    }

    async function createGroup(name, memberUsernames) {
        const res = await api('POST', '/create-group', { name, createdBy: currentUser.username, members: memberUsernames });
        if (res.success) {
            await loadChatsAndChannels();
            currentChat = res.groupId;
            currentChatType = 'group';
            await loadMessages();
            renderSidebar();
            renderChat();
            showToast('Группа создана');
        } else {
            showToast('Ошибка создания группы', true);
        }
    }

    function renderSidebar() {
        const sidebarDiv = document.getElementById('sidebar');
        if (!sidebarDiv) return;
        
        // Поиск с добавлением всех пользователей
        let filtered = chats;
        if (searchQuery.trim()) {
            const query = searchQuery.toLowerCase();
            filtered = chats.filter(c => c.name.toLowerCase().includes(query));
            const matchingUsers = allUsers.filter(u => u.username.toLowerCase().includes(query) && !chats.some(c => c.type === 'user' && c.id === u.username));
            matchingUsers.forEach(u => {
                filtered.push({
                    type: 'user', id: u.username, name: u.username, avatar: u.avatar, online: u.online,
                    verified: u.verified, lastMessage: 'Нет сообщений', lastTime: null
                });
            });
        }
        
        let html = `
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <div class="header-buttons">
                    <button class="icon-btn" id="createGroupBtn">👥+</button>
                    <button class="icon-btn" id="settingsBtn">⚙️</button>
                    <button class="profile-btn" id="profileBtn">${currentUser.avatar}</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск" value="${escapeHtml(searchQuery)}">
            </div>
            <div class="chats-list" id="chatsList">
        `;
        filtered.forEach(chat => {
            const activeClass = (currentChat === chat.id && currentChatType === chat.type) ? 'active' : '';
            let nameHtml = escapeHtml(chat.name);
            if (chat.type === 'user' && chat.verified) nameHtml += ' <span class="verified-badge">✓</span>';
            if (chat.type === 'user' && chat.online) nameHtml += ' <span class="online-dot"></span>';
            let avatarAttr = '';
            if (chat.type === 'user' && (chat.name === 'Danumala' || chat.name === 'RunFly')) {
                avatarAttr = `data-avatar="${chat.name}"`;
            } else {
                avatarAttr = `data-default="true"`;
            }
            html += `<div class="chat-item ${activeClass}" data-type="${chat.type}" data-id="${chat.id}">
                        <div class="chat-avatar" ${avatarAttr}>${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${nameHtml}</div>
                            <div class="chat-lastmsg">${escapeHtml(chat.lastMessage)}</div>
                        </div>
                    </div>`;
        });
        html += `</div>
            <div class="bottom-bar">
                <button class="bottom-btn" id="friendsBtn">👥</button>
                <button class="bottom-btn" id="themeToggleBtn">🌓</button>
            </div>
        `;
        sidebarDiv.innerHTML = html;

        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                const newType = el.dataset.type;
                const newId = el.dataset.id;
                if (!newId) return;
                currentChatType = newType;
                currentChat = newId;
                messages = [];
                renderChat();
                loadMessages();
                renderSidebar();
            });
        });

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                if (searchTimeout) clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => { searchQuery = e.target.value; renderSidebar(); }, 300);
            });
        }
        const profileBtn = document.getElementById('profileBtn');
        if (profileBtn) profileBtn.onclick = () => { document.getElementById('avatarModal').style.display = 'flex'; };
        const createGroupBtn = document.getElementById('createGroupBtn');
        if (createGroupBtn) createGroupBtn.onclick = showCreateGroupModal;
        const settingsBtn = document.getElementById('settingsBtn');
        if (settingsBtn) settingsBtn.onclick = showSettingsModal;
        const friendsBtn = document.getElementById('friendsBtn');
        if (friendsBtn) friendsBtn.onclick = showFriendsPanel;
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        if (themeToggleBtn) themeToggleBtn.onclick = () => {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light');
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        };
    }

    function showFriendsPanel() {
        let modal = document.getElementById('friendsModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'friendsModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Друзья</h3>
                <div class="settings-section">
                    <h4>Входящие заявки</h4>
                    <div id="friendRequestsList">Загрузка...</div>
                </div>
                <div class="settings-section">
                    <h4>Мои друзья</h4>
                    <div id="friendsList">Загрузка...</div>
                </div>
                <div class="settings-section">
                    <h4>Добавить друга</h4>
                    <input type="text" id="newFriendName" placeholder="Имя пользователя">
                    <button id="addFriendBtn" class="close-modal" style="margin-top:10px;">➕ Отправить заявку</button>
                </div>
                <button id="closeFriendsModal" class="close-modal">Закрыть</button>
            </div>
        `;
        
        loadFriendsData();
        
        document.getElementById('closeFriendsModal').onclick = () => modal.style.display = 'none';
        document.getElementById('addFriendBtn').onclick = async () => {
            const name = document.getElementById('newFriendName').value.trim();
            if (name) {
                const res = await api('POST', '/send-friend-request', { from: currentUser.username, to: name });
                if (res.success) showToast(`Заявка отправлена ${name}`);
                else showToast('Ошибка', true);
                loadFriendsData();
                document.getElementById('newFriendName').value = '';
            }
        };
    }
    
    async function loadFriendsData() {
        const requests = await api('GET', `/friend-requests/${currentUser.username}`);
        const friendsList = await api('GET', `/friends/${currentUser.username}`);
        
        const requestsDiv = document.getElementById('friendRequestsList');
        const friendsDiv = document.getElementById('friendsList');
        
        if (requestsDiv) {
            if (requests.received && requests.received.length) {
                requestsDiv.innerHTML = requests.received.map(r => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid rgba(255,255,255,0.1);">
                        <span>${escapeHtml(r.from_user)}</span>
                        <div>
                            <button onclick="acceptFriend('${r.from_user}')" style="background:#22c55e; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">✅</button>
                            <button onclick="rejectFriend('${r.from_user}')" style="background:#ef4444; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">❌</button>
                        </div>
                    </div>
                `).join('');
            } else {
                requestsDiv.innerHTML = '<div style="padding:8px; opacity:0.7;">Нет заявок</div>';
            }
        }
        
        if (friendsDiv) {
            if (friendsList && friendsList.length) {
                friendsDiv.innerHTML = friendsList.map(f => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px;
