<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальная сеть</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="unpkg.com"></script>
    <style>
        :root[data-theme="dark"] {
            --bg-main: #070a12;
            --bg-glass: rgba(15, 22, 42, 0.7);
            --bg-sidebar: rgba(10, 15, 30, 0.8);
            --bg-active: rgba(255, 255, 255, 0.06);
            --bg-chat-user: #6366f1;
            --bg-chat-friend: rgba(255, 255, 255, 0.04);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-sidebar: rgba(243, 244, 246, 0.9);
            --bg-active: rgba(0, 0, 0, 0.05);
            --bg-chat-user: #4f46e5;
            --bg-chat-friend: rgba(0, 0, 0, 0.04);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; display: flex; overflow: hidden; }
        
        /* Экран авторизации (Вкладки) */
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .auth-card { background: var(--bg-glass); border: 1px solid var(--border-color); padding: 35px; border-radius: 24px; text-align: center; width: 100%; max-width: 400px; box-shadow: var(--shadow); backdrop-filter: blur(20px); }
        
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .auth-tab { flex: 1; padding: 10px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; font-weight: 600; }
        .auth-tab.active { color: #6366f1; border-bottom: 2px solid #6366f1; }

        /* Плашка красивой ошибки */
        .alert-box { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 15px; text-align: center; font-weight: 500; display: none; }
        .alert-box.success { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #34d399; }

        .auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin-bottom: 12px; outline: none; font-size: 15px; }
        .auth-btn { width: 100%; padding: 14px; background: #6366f1; border: none; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .auth-btn:hover { background: #4f46e5; }

        /* Стили главного интерфейса */
        .app-container { width: 100vw; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(20px); display: flex; overflow: hidden; }
        .nav-rail { width: 72px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px; }
        .nav-btn { width: 48px; height: 48px; border-radius: 14px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover, .nav-btn.active { background: var(--bg-active); color: var(--text-main); }
        .nav-btn.active { color: #6366f1; border: 1px solid var(--border-color); }
        
        .nav-profile-trigger { margin-top: auto; font-size: 24px; cursor: pointer; background: var(--bg-active); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); }

        .sidebar { width: 360px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; display: flex; flex-direction: column; gap: 16px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border-color); padding: 10px 16px 10px 40px; border-radius: 12px; color: var(--text-main); outline: none; }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .list-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 8px 12px; text-transform: uppercase; }
        
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--bg-active); }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px;}
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .chat-status-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Кружок Онлайна */
        .online-badge { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-left: auto; }

        .search-actions { display: flex; gap: 4px; }
        .action-btn { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .action-btn.primary { background: #6366f1; color: white; border: none; }

        .home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .chat-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background: var(--bg-sidebar); }
        .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        .message-bubble { max-width: 55%; padding: 12px 16px; border-radius: 16px; font-size: 15px; position: relative; }
        .sent .message-bubble { background: var(--bg-chat-user); color: white; border-bottom-right-radius: 4px; }
        .received .message-bubble { background: var(--bg-chat-friend); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        
        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #ef4444; border: none; color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; }
        .sent .delete-msg-btn { left: -75px; } 
        .received .delete-msg-btn { right: -75px; }
        .message-wrapper:hover .delete-msg-btn { opacity: 1; }

        /* Поле ввода и статус Печатает */
        .chat-footer { background: var(--bg-sidebar); border-top: 1px solid var(--border-color); padding: 10px 24px 20px 24px; display: flex; flex-direction: column; gap: 4px; }
        .typing-indicator-text { font-size: 12px; color: #6366f1; height: 16px; font-weight: 500; }
        .input-area { display: flex; align-items: center; gap: 12px; }
        .message-input { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); padding: 14px 20px; border-radius: 12px; color: var(--text-main); outline: none; }
        .send-btn { background: #6366f1; border: none; color: white; padding: 13px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; }

        /* Модалка Профиля */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .profile-card { background: var(--bg-sidebar); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; width: 100%; max-width: 360px; box-shadow: var(--shadow); position: relative;}
        .profile-avatar-select { display: flex; justify-content: center; gap: 12px; margin: 16px 0; font-size: 28px; }
        .avatar-opt { cursor: pointer; padding: 6px; border-radius: 10px; border: 1px solid transparent; }
        .avatar-opt.selected { border-color: #6366f1; background: var(--bg-active); }
        .profile-input { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; outline: none; font-size: 14px; margin-top: 6px; margin-bottom: 20px; }
        .profile-save-btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .close-modal-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; }
    </style>
</head>
<body>

    <!-- Звуковые уведомления (Трендовый чистый звук) -->
    <audio id="msgSound" src="mixkit.co" preload="auto"></audio>

    <!-- Экран входа / Регистрации -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2 class="logo" style="font-size:32px; margin-bottom:20px;">DanuMes</h2>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLoginBtn" onclick="switchAuthTab('login')">Вход</button>
                <button class="auth-tab" id="tabRegisterBtn" onclick="switchAuthTab('register')">Регистрация</button>
            </div>

            <!-- Красивая плашка системных сообщений / ошибок -->
            <div class="alert-box" id="alertBox">Недействительный Логин/Пароль</div>

            <input type="text" class="auth-input" id="usernameInput" placeholder="Имя пользователя (Логин)..." autofocus>
            <input type="password" class="auth-input" id="passwordInput" placeholder="Пароль...">
            
            <button class="auth-btn" id="mainAuthActionBtn">Войти</button>
        </div>
    </div>

    <!-- Модальное окно Профиля -->
    <div class="modal-overlay hidden" id="profileModal">
        <div class="profile-card">
            <button class="close-modal-btn" id="closeProfileBtn"><i data-lucide="x"></i></button>
            <h3 style="margin-bottom:14px; font-size:18px;">Настройки профиля</h3>
            
            <label style="font-size:13px; color:var(--text-muted)">Выберите аватарку (Emoji)</label>
            <div class="profile-avatar-select">
                <span class="avatar-opt selected" onclick="selectAvatar(this, '🤖')">🤖</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🥷')">🥷</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🐱')">🐱</span>
                <span class="avatar-opt" onclick="selectAvatar(this, '🔥')">🔥</span>
            </div>

            <label style="font-size:13px; color:var(--text-muted)">Ваш статус</label>
            <input type="text" class="profile-input" id="statusInput" placeholder="Что у вас нового?">

            <button class="profile-save-btn" id="saveProfileBtn">Сохранить изменения</button>
        </div>
    </div>

    <div class="app-container">
        <nav class="nav-rail">
            <button class="nav-btn active" id="navHome"><i data-lucide="home"></i></button>
            <button class="nav-btn" id="themeToggle"><i data-lucide="sun" id="themeIcon"></i></button>
            <div class="nav-profile-trigger" id="profileTrigger" title="Мой профиль">🤖</div>
        </nav>

        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">DanuMes</div>
                <div class="search-box">
                    <i data-lucide="search" class="search-icon" style="width:16px;height:16px;"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск людей в сети...">
                </div>
            </div>
            <div class="chats-list">
                <div class="list-section-title" id="friendsTitle">Мои друзья</div>
                <div id="friendsList"></div>
                <div class="list-section-title hidden" id="globalTitle" style="margin-top: 16px;">Глобальный поиск (Все аккаунты)</div>
                <div id="globalList"></div>
            </div>
        </aside>

        <div class="home-screen" id="homeScreen">
            <i data-lucide="message-square" style="width: 64px; height: 64px; color: #6366f1;"></i>
            <h2>Добро пожаловать, <span id="greetingName">Пользователь</span></h2>
            <p>Вы подключены к глобальной сети. Найдите людей через глобальный поиск, чтобы начать чат.</p>
        </div>

        <main class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <div class="avatar" id="activeAvatar">🤖</div>
                <div>
                    <h4 id="activeChatName"></h4>
                    <span id="activeChatStatus" style="font-size: 12px; color: var(--text-muted);">Доступен</span>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea"></div>
            
            <div class="chat-footer">
                <!-- Текст статуса печатает -->
                <div class="typing-indicator-text" id="typingIndicator"></div>
                <div class="input-area">
                    <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение...">
                    <button class="send-btn" id="sendBtn"><i data-lucide="send" style="width:18px;height:18px;"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let myInfo = { name: "", status: "Доступен", avatar: "🤖" };
        let activeChatName = null;
        let globalUsers = [];
        let localFriends = new Set();
        let currentAuthMode = 'login'; // 'login' или 'register'
        let selectedAvatarSymbol = "🤖";
        let isTypingNow = false;
        let typingTimeout = null;

        const authScreen = document.getElementById('authScreen');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const mainAuthActionBtn = document.getElementById('mainAuthActionBtn');
        const alertBox = document.getElementById('alertBox');

        const profileModal = document.getElementById('profileModal');
        const profileTrigger = document.getElementById('profileTrigger');
        const statusInput = document.getElementById('statusInput');

        // Переключение вкладок Вход / Регистрация
        window.switchAuthTab = function(mode) {
            currentAuthMode = mode;
            alertBox.style.display = 'none';
            document.getElementById('tabLoginBtn').classList.toggle('active', mode === 'login');
            document.getElementById('tabRegisterBtn').classList.toggle('active', mode === 'register');
            mainAuthActionBtn.textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
        };

        // Обработка кнопки Входа / Регистрации
        mainAuthActionBtn.onclick = () => {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();
            
            if(!user || !pass) {
                showAlert('Заполните все поля!', false);
                return;
            }

            if(currentAuthMode === 'login') {
                socket.emit('login_account', { username: user, password: pass });
            } else {
                socket.emit('register_account', { username: user, password: pass });
            }
        };

        function showAlert(text, isSuccess) {
            alertBox.textContent = text;
            alertBox.style.display = 'block';
            alertBox.classList.toggle('success', isSuccess);
        }

        // Ответы от сервера по авторизации
        socket.on('auth_error', (text) => showAlert(text, false));
        socket.on('auth_success', (text) => {
            showAlert(text, true);
            switchAuthTab('login'); // переключаем на вход после успешной регистрации
        });

        socket.on('init_self', (data) => {
            myInfo = data;
            authScreen.classList.add('hidden'); // скрываем экран авторизации при успехе
            document.getElementById('greetingName').textContent = data.name;
            profileTrigger.textContent = data.
