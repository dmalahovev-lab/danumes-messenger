<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DanuMes — мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Основной контейнер */
        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background: #111827;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(75, 85, 99, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .chat-header {
            background: #1f2937;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        .logo h2 {
            color: #f3f4f6;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #374151;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .user-name {
            color: #e5e7eb;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            color: #f87171;
        }

        .logout-btn:hover {
            background: #4b5563;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #0f172a;
        }

        /* Сообщения */
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }

        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message-bubble {
            background: #1e293b;
            padding: 8px 14px;
            border-radius: 20px;
            border-top-left-radius: 4px;
            max-width: 100%;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .message-own .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-top-left-radius: 20px;
            border-top-right-radius: 4px;
        }

        .message-sender {
            font-size: 0.75rem;
            font-weight: bold;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .message-own .message-sender {
            color: #d9f99d;
        }

        .message-text {
            font-size: 0.95rem;
            color: #f3f4f6;
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.65rem;
            color: #9ca3af;
            text-align: right;
            margin-top: 4px;
        }

        .file-attachment {
            display: inline-block;
            margin-top: 6px;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-decoration: none;
            color: #a5f3fc;
        }

        .message-own .file-attachment {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Ввод */
        .input-area {
            background: #1f2937;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #374151;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #111827;
            border-radius: 40px;
            padding: 6px 18px;
            gap: 8px;
            border: 1px solid #374151;
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #e5e7eb;
            font-size: 0.95rem;
            outline: none;
        }

        .file-label {
            font-size: 22px;
            cursor: pointer;
            color: #9ca3af;
            transition: 0.2s;
        }
        .file-label:hover {
            color: #60a5fa;
        }
        #file-input {
            display: none;
        }

        .send-button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .send-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px #3b82f6;
        }

        /* Формы входа/регистрации */
        .auth-overlay {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: #1e293b;
            padding: 32px;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #334155;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #9ca3af;
            font-weight: 600;
        }
        .tab.active {
            color: #60a5fa;
            border-bottom: 3px solid #60a5fa;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .auth-form input {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .auth-form input:focus {
            border-color: #3b82f6;
        }
        .auth-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        .error-text {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // --- Состояние ---
    let currentUser = null;
    let messages = [];
    let pollInterval = null;

    // --- API вызовы (относительные пути) ---
    async function apiRequest(url, method = 'GET', data = null) {
        const options = { method, headers: {} };
        if (data) {
            options.headers['Content-Type'] = 'application/json';
            options.body = JSON.stringify(data);
        }
        const res = await fetch(url, options);
        return res.json();
    }

    async function loadMessages() {
        if (!currentUser) return;
        try {
            const data = await apiRequest('/get-messages');
            messages = data;
            renderChat();
        } catch(e) { console.error('load error', e); }
    }

    async function sendMessage(text, fileUrl = null, fileName = null) {
        if (!text && !fileUrl) return;
        await apiRequest('/send-message', 'POST', {
            username: currentUser.username,
            text: text || '',
            fileUrl,
            fileName
        });
        await loadMessages();
    }

    async function uploadFile(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload-file', { method: 'POST', body: fd });
        return res.json();
    }

    function formatTime(iso) {
        const d = new Date(iso);
        return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function getAvatar(username) {
        if (username === 'Danumala') return '👑';
        if (username === 'RunFly') return '🚀';
        return '👤';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function renderChat() {
        const messagesDiv = document.getElementById('messagesList');
        if (!messagesDiv) return;
        if (messages.length === 0) {
            messagesDiv.innerHTML = '<div style="text-align:center; color:#6b7280; margin-top:50px;">✨ Напишите первое сообщение ✨</div>';
            return;
        }
        let html = '';
        for (let msg of messages) {
            const isOwn = currentUser && msg.username === currentUser.username;
            const avatar = getAvatar(msg.username);
            const time = formatTime(msg.timestamp);
            let fileHtml = '';
            if (msg.fileUrl) {
                fileHtml = `<a href="${msg.fileUrl}" target="_blank" class="file-attachment">📎 ${escapeHtml(msg.fileName || 'Файл')}</a>`;
            }
            html += `
                <div class="message ${isOwn ? 'message-own' : ''}">
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-bubble">
                        <div class="message-sender">${escapeHtml(msg.username)}</div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        ${fileHtml}
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        }
        messagesDiv.innerHTML = html;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // --- Интерфейс чата после входа ---
    function initChatUI() {
        document.getElementById('app').innerHTML = `
            <div class="chat-container">
                <div class="chat-header">
                    <div class="logo">
                        <div class="logo-icon">💬</div>
                        <h2>DanuMes</h2>
                    </div>
                    <div class="user-panel">
                        <div class="user-avatar">${getAvatar(currentUser.username)}</div>
                        <span class="user-name">${escapeHtml(currentUser.username)}</span>
                        <button class="logout-btn" id="logoutButton">🚪</button>
                    </div>
                </div>
                <div class="messages-area" id="messagesList"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <label class="file-label" id="fileLabel">📎</label>
                        <input type="file" id="fileInput" style="display:none">
                    </div>
                    <button class="send-button" id="sendMessageBtn">➤</button>
                </div>
            </div>
        `;

        loadMessages();
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendMessageBtn');
        const fileLabel = document.getElementById('fileLabel');
        const fileInput = document.getElementById('fileInput');

        const sendCurrent = async () => {
            const text = msgInput.value.trim();
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const uploadRes = await uploadFile(file);
                if (uploadRes.success) {
                    await sendMessage(text, uploadRes.fileUrl, uploadRes.fileName);
                    fileInput.value = '';
                } else alert('Ошибка загрузки файла');
            } else if (text) {
                await sendMessage(text);
            }
            msgInput.value = '';
            msgInput.focus();
        };

        sendBtn.onclick = sendCurrent;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendCurrent(); };
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = () => sendCurrent();

        document.getElementById('logoutButton').onclick = () => {
            if (pollInterval) clearInterval(pollInterval);
            currentUser = null;
            renderAuthUI();
        };

        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(loadMessages, 3000);
    }

    // --- Формы входа/регистрации ---
    function renderAuthUI() {
        document.getElementById('app').innerHTML = `
            <div class="auth-overlay">
                <div class="auth-card">
                    <div class="tabs">
                        <div class="tab active" data-tab="login">Вход</div>
                        <div class="tab" data-tab="register">Регистрация</div>
                    </div>
                    <div id="loginForm" class="auth-form">
                        <input type="text" id="loginUsername" placeholder="Имя пользователя">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <div id="loginError" class="error-text"></div>
                        <button id="doLogin" class="auth-btn">Войти</button>
                    </div>
                    <div id="registerForm" class="auth-form" style="display:none">
                        <input type="text" id="regUsername" placeholder="Имя пользователя">
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <div id="regError" class="error-text"></div>
                        <button id="doRegister" class="auth-btn">Создать аккаунт</button>
                    </div>
                </div>
            </div>
        `;

        const loginDiv = document.getElementById('loginForm');
        const regDiv = document.getElementById('registerForm');
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const type = tab.dataset.tab;
                if (type === 'login') {
                    loginDiv.style.display = 'flex';
                    regDiv.style.display = 'none';
                } else {
                    loginDiv.style.display = 'none';
                    regDiv.style.display = 'flex';
                }
            };
        });

        document.getElementById('doLogin').onclick = async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const res = await apiRequest('/login-attempt', 'POST', { username, password });
            if (res.success) {
                currentUser = { username: res.username, avatar: res.avatar };
                initChatUI();
            } else {
                document.getElementById('loginError').innerText = res.error || 'Ошибка входа';
            }
        };

        document.getElementById('doRegister').onclick = async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const res = await apiRequest('/register-attempt', 'POST', { username, password });
            if (res.success) {
                alert('Регистрация успешна! Теперь войдите.');
                document.querySelector('.tab[data-tab="login"]').click();
            } else {
                document.getElementById('regError').innerText = res.error || 'Ошибка регистрации';
            }
        };
    }

    // --- Старт ---
    renderAuthUI();
</script>
</body>
</html>
