<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanuMes — Глобальный мессенджер</title>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --input-bg: rgba(31, 41, 55, 0.5);
            --msg-inbound: rgba(31, 41, 55, 0.8);
            --msg-outbound: #2563eb;
            --blur-effect: blur(12px);
        }

        [data-theme="light"] {
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(0, 0, 0, 0.08);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent-color: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --input-bg: rgba(243, 244, 246, 0.8);
            --msg-inbound: rgba(229, 231, 235, 0.8);
            --msg-outbound: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s, border-color 0.3s, transform 0.2s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
            /* Красивый фоновый градиент как на модных лендингах */
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
        }

        /* КРАСИВЫЕ КНОПКИ И ИНПУТЫ */
        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            border-radius: 10px;
            outline: none;
            backdrop-filter: var(--blur-effect);
        }
        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        button {
            padding: 12px 20px;
            background: var(--msg-outbound);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        button:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }
        button:active {
            transform: translateY(1px);
        }

        /* СТИЛЬ БЕНТО ДЛЯ ОКНА ВХОДА */
        .auth-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--blur-effect);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .auth-container h2 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #3b82f6, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* ИНТЕРФЕЙС МЕССЕНДЖЕРА В СТИЛЕ BENTO GRID */
        .messenger-container {
            display: none;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 40px);
            grid-template-columns: 340px 1fr;
            gap: 16px; /* Зазор между карточками Bento */
        }

        /* Левая карточка Bento */
        .sidebar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--blur-effect);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .theme-btn {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 12px;
            box-shadow: none;
        }

        .sidebar-menu {
            padding: 0 20px 15px 20px;
        }

        .create-group-btn {
            width: 100%;
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px dashed var(--card-border);
            box-shadow: none;
        }
        .create-group-btn:hover {
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.05);
        }

        .search-box {
            padding: 0 20px 15px 20px;
        }

        .list-section {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .list-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            color: var(--text-muted);
        }

        /* Элементы списка (друзья/группы) */
        .item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }
        .item:hover {
            background: var(--input-bg);
            border-color: var(--card-border);
        }
        .item.active {
            background: var(--accent-glow);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px; /* Квадратные аватарки со скруглением в стиле Bento */
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* Правая карточка Bento (Окно чата) */
        .chat-window {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--blur-effect);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .chat-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.01);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.05);
        }

        /* Стильные сообщения-облачка */
        .message {
            max-width: 55%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .message.inbound {
            background: var(--msg-inbound);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--card-border);
        }
        .message.outbound {
            background: var(--msg-outbound);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message .meta {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.01);
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 12px;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--blur-effect);
            padding: 30px;
            border-radius: 20px;
            width: 340px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            cursor: pointer;
            font-size: 22px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- ОКНО АВТОРИЗАЦИИ (BENTO-STYLE) -->
    <div class="auth-container" id="authBlock">
        <h2>DanuMes</h2>
        <div class="auth-subtitle">Вход в глобальную сеть общения</div>
        <div class="input-group">
            <label>Имя пользователя</label>
            <input type="text" id="usernameInput" placeholder="Ваш уникальный никнейм">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="passwordInput" placeholder="Ваш секретный пароль">
        </div>
        <div class="btn-row">
            <button onclick="login()" style="flex: 1.3;">Войти в чат</button>
            <button onclick="register()" style="flex: 1; background: var(--input-bg); color: var(--text-main);">Регистрация</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС МЕССЕНДЖЕРА -->
    <div class="messenger-container" id="messengerBlock">
        <!-- Левый блок Bento (Боковая панель) -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>DanuMes</h2>
                <button class="theme-btn" onclick="toggleTheme()">Сменить тему</button>
            </div>
            <div class="sidebar-menu">
                <button class="create-group-btn" onclick="openModal()">+ Создать группу</button>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Быстрый поиск чата...">
            </div>
            <div class="list-section">
                <h3>Мои группы</h3>
                <div id="groupsList"></div>
                <h3>Пользователи онлайн</h3>
                <div id="friendsList"></div>
            </div>
        </div>

        <!-- Правый блок Bento (Окно чата) -->
        <div class="chat-window">
            <div class="chat-header">
                <div class="avatar" id="activeChatAvatar">?</div>
                <div>
                    <h3 id="activeChatName" style="font-size: 16px; font-weight: 700;">Выберите, кому хотите написать</h3>
                    <span id="activeChatStatus" style="font-size: 12px; color: var(--text-muted);"></span>
                </div>
                <!-- Кнопка Выйти для сброса зависшей сессии -->
                <button onclick="logout()" style="margin-left: auto; padding: 6px 12px; font-size: 12px; background: var(--input-bg); color: var(--text-main); box-shadow: none;">Выйти</button>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: var(--text-muted); margin-top: auto; margin-bottom: auto; font-size: 14px;">
                    Выберите чат в левой панели Bento, чтобы начать диалог.
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Введите ваше сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ДЛЯ СОЗДАНИЯ ГРУППЫ -->
    <div class="modal" id="groupModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 style="margin-bottom: 20px; font-weight: 700;">Создать новую группу</h3>
            <div class="input-group">
                <label>Название группы</label>
                <input type="text" id="newGroupNameInput" placeholder="Например: Разработчики">
            </div>
            <button onclick="createGroup()" style="width: 100%;">Подтвердить создание</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://onrender.com';

        let currentUser = localStorage.getItem('danumes_user') || null;
        let activeChat = null;
        let isGroupChat = false;
        let serverData = { users: {}, messages: [], groups: [] };

        // Если сессия есть — проверяем, а не запускаем слепо
        if (currentUser) {
            showMessenger();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
        }

        function logout() {
            localStorage.removeItem('danumes_user');
            location.reload();
        }

        async function login() {
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            if (!u || !p) return alert('Заполните все поля');

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = u;
                    localStorage.setItem('danumes_user', u);
                    showMessenger();
                } else {
                    alert(data.error || 'Ошибка входа');
                }
            } catch (err) {
                alert('Не удалось подключиться. Возможно, сервер на Render запускается. Подождите минуту и повторите.');
            }
        }

        async function register() {
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            if (!u || !p) return alert('Заполните все поля');

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.success) {
                    alert('Регистрация успешна! Теперь вы можете войти под своим аккаунтом.');
                } else {
                    alert(data.error || 'Ошибка регистрации');
                }
            } catch (err) {
                alert('Ошибка соединения с сервером.');
            }
        }

        function showMessenger() {
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('messengerBlock').style.display = 'grid';
            startSync();
        }

        function startSync() {
            syncData();
            setInterval(syncData, 3000);
        }

        async function syncData() {
            if (!currentUser) return;
            try {
                const res = await fetch(`${API_URL}/api/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
                // Защита: если сервер принудительно обнулился, выкидываем на логин
                if (res.status === 404 || res.status === 500) return;
                
                serverData = await res.json();
                renderSidebar();
                renderMessages();
            } catch (e) {
                console.error("Ошибка синхронизации", e);
            }
        }

        function renderSidebar() {
            const fList = document.getElementById('friendsList');
            const gList = document.getElementById('groupsList');
            
            fList.innerHTML = '';
            gList.innerHTML = '';

            // Отображение пользователей в стиле Bento-карточек
            Object.keys(serverData.users).forEach(u => {
                if (u === currentUser) return;
                const isOnline = serverData.users[u].online;
                const div = document.createElement('div');
                div.className = `item ${activeChat === u && !isGroupChat ? 'active' : ''}`;
                div.onclick = () => selectChat(u, false);
                div.innerHTML = `
                    <div class="avatar">${u.substr(0,2).toUpperCase()}</div>
                    <div style="flex:1;">
                        <div style="font-weight:600; font-size:14px;">${u}</div>
                        <div style="font-size:11px; margin-top:2px; color:${isOnline ? '#10b981' : '#6b7280'}">
                            • ${isOnline ? 'Онлайн' : 'Был недавно'}
                        </div>
                    </div>
                `;
                fList.appendChild(div);
            });

            // Отображение групп
            if (serverData.groups) {
                serverData.groups.forEach(g => {
                    const div = document.createElement('div');
                    div.className = `item ${activeChat === g.name && isGroupChat ? 'active' : ''}`;
                    div.onclick = () => selectChat(g.name, true);
                    div.innerHTML = `
                        <div class="avatar" style="color: #10b981; background: rgba(16, 185, 129, 0.1);">#</div>
                        <div style="font-weight:600; font-size:14px;">${g.name}</div>
                    `;
                    gList.appendChild(div);
                });
            }
        }

        function selectChat(name, isGroup) {
            activeChat = name;
            isGroupChat = isGroup;
            document.getElementById('activeChatName').innerText = name;
            document.getElementById('activeChatAvatar').innerText = isGroup ? '#' : name.substr(0,2).toUpperCase();
            document.getElementById('activeChatStatus').innerText = isGroup ? 'Публичное bento-сообщество' : 'Личный безопасный диалог';
            renderMessages();
        }

        function renderMessages() {
            const area = document.getElementById('messagesArea');
            if (!activeChat) return;

            const shouldScroll = area.scrollTop + area.clientHeight >= area.scrollHeight - 60;
            area.innerHTML = '';

            const filtered = serverData.messages.filter(m => {
                if (isGroupChat) {
                    return m.isGroup && m.to === activeChat;
                } else {
                    return !m.isGroup && ((m.from === currentUser && m.to === activeChat) || (m.from === activeChat && m.to === currentUser));
                }
            });

            if (filtered.length === 0) {
                area.innerHTML = `<div style="text-align: center; color: var(--text-muted); margin-top: auto; margin-bottom: auto; font-size: 13px;">Здесь пока пусто. Начните историю общения!</div>`;
                return;
            }

            filtered.forEach(m => {
                const div = document.createElement('div');
                const isOut = m.from === currentUser;
                div.className = `message ${isOut ? 'outbound' : 'inbound'}`;
                
                let authorHTML = !isOut && isGroupChat ? `<strong style="font-size:11px;color:#3b82f6;display:block;margin-bottom:4px;">@${m.from}</strong>` : '';
                
                div.innerHTML = `
                    ${authorHTML}
                    <div>${m.text}</div>
                    <div class="meta">${new Date(m.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                `;
                area.appendChild(div);
            });

            if (shouldScroll) {
                area.scrollTop = area.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChat) return;

            try {
                await fetch(`${API_URL}/api/messages/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from: currentUser,
                        to: activeChat,
                        text: text,
                        isGroup: isGroupChat
                    })
                });
                input.value = '';
                syncData();
            } catch (e) {
                alert('Ошибка сети при отправке сообщения');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function openModal() { document.getElementById('groupModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('groupModal').style.display = 'none'; }

        async function createGroup() {
            const name = document.getElementById('newGroupNameInput').value.trim();
            if (!name) return alert('Введите имя группы');

            try {
                const res = await fetch(`${API_URL}/api/groups/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, creator: currentUser })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    document.getElementById('newGroupNameInput').value = '';
                    syncData();
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert('Не удалось создать группу');
            }
        }
    </script>
</body>
</html>
